name: Build container

on:
  workflow_call:
    inputs:
      build-ref:
        required: false
        default: ${{ github.sha }}
        description: Ref, branch, or SHA to build.
        type: string
      image-name:
        required: true
        description: Name of the image to build and push.
        type: string
      build-args:
        required: false
        default: ""
        description: Additional Docker build args.
        type: string
      build-contexts:
        required: false
        default: ""
        description: Additional Docker build contexts.
        type: string
      trtllm-ccache-tag:
        required: false
        default: ""
        description: Prefix for the TRT-LLM ccache image tag; the target architecture and a hash of the effective base image are appended automatically. Empty disables the ccache.
        type: string
      dockerfile:
        required: true
        description: Path to the Dockerfile.
        type: string
      platform:
        required: true
        description: Docker build platform.
        type: string
      runner:
        required: true
        description: Runner to use for the build.
        type: string
      registry:
        required: true
        description: Container registry to push to.
        type: string
      target:
        required: false
        default: ""
        description: Dockerfile stage to build.
        type: string

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    env:
      REGISTRY: ${{ inputs.registry }}
      IMAGE_NAME: ${{ inputs.image-name }}
      GH_REF: ${{ github.ref }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.build-ref }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve TRT-LLM ccache tag
        id: trtllm_ccache_tag
        if: inputs.trtllm-ccache-tag != ''
        shell: bash
        env:
          BUILD_ARGS: ${{ inputs.build-args }}
          CACHE_TAG_PREFIX: ${{ inputs.trtllm-ccache-tag }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          PLATFORM: ${{ inputs.platform }}
        run: |
          set -euo pipefail

          # Prefer an explicit build-arg override, then fall back to the
          # Dockerfile default used by the build.
          BASE_IMAGE=$(printf '%s\n' "$BUILD_ARGS" | sed -nE 's/^[[:space:]]*BASE_IMAGE[[:space:]]*=[[:space:]]*(.+)[[:space:]]*$/\1/p' | tail -1)
          if [[ -z "$BASE_IMAGE" ]]; then
            BASE_IMAGE=$(sed -nE 's/^[[:space:]]*ARG[[:space:]]+BASE_IMAGE[[:space:]]*=[[:space:]]*(.+)[[:space:]]*$/\1/p' "$DOCKERFILE" | tail -1)
          fi
          if [[ -z "$BASE_IMAGE" ]]; then
            echo "Could not resolve BASE_IMAGE from build args or $DOCKERFILE" >&2
            exit 1
          fi

          ARCH="${PLATFORM#*/}"
          ARCH="${ARCH%%/*}"
          if [[ -z "$ARCH" || "$PLATFORM" != */* || "$PLATFORM" == *,* ]]; then
            echo "Expected a single OS/architecture platform, got: $PLATFORM" >&2
            exit 1
          fi

          BASE_IMAGE_KEY=$(printf '%s' "$BASE_IMAGE" | sha256sum | cut -c1-12)
          TAG="${CACHE_TAG_PREFIX}-${ARCH}-${BASE_IMAGE_KEY}"
          echo "Using TRT-LLM ccache tag $TAG for $BASE_IMAGE on $ARCH"
          {
            echo "arch=$ARCH"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

      # Temporary one-shot migration from the old TRT-LLM-ref-scoped tags.
      # Remove this step after both architecture builds have run successfully.
      - name: Migrate legacy TRT-LLM ccache tag (temporary)
        if: inputs.trtllm-ccache-tag != ''
        shell: bash
        env:
          LEGACY_TAG: trtllm-ccache-${{ steps.trtllm_ccache_tag.outputs.arch }}-bf2ef86f
          NEW_TAG: ${{ steps.trtllm_ccache_tag.outputs.tag }}
        run: |
          set -euo pipefail

          LEGACY_REF="$REGISTRY/$IMAGE_NAME:$LEGACY_TAG"
          NEW_REF="$REGISTRY/$IMAGE_NAME:$NEW_TAG"
          if docker buildx imagetools inspect "$NEW_REF" >/dev/null 2>&1; then
            echo "TRT-LLM ccache tag $NEW_REF already exists; skipping migration"
          elif docker buildx imagetools inspect "$LEGACY_REF" >/dev/null 2>&1; then
            echo "Migrating TRT-LLM ccache tag $LEGACY_REF to $NEW_REF"
            docker buildx imagetools create --tag "$NEW_REF" "$LEGACY_REF"
            docker buildx imagetools inspect "$NEW_REF" >/dev/null
          else
            echo "Legacy TRT-LLM ccache tag $LEGACY_REF was not found; skipping migration"
          fi

      - name: Resolve TRT-LLM ccache seed
        id: trtllm_ccache_seed
        if: inputs.trtllm-ccache-tag != ''
        shell: bash
        run: |
          set -euo pipefail
          REF="$REGISTRY/$IMAGE_NAME:${{ steps.trtllm_ccache_tag.outputs.tag }}"
          if docker buildx imagetools inspect "$REF" >/dev/null 2>&1; then
            echo "Using TRT-LLM ccache seed $REF"
            echo "build-context=trtllm-ccache-seed=docker-image://$REF" >> "$GITHUB_OUTPUT"
          else
            echo "No TRT-LLM ccache image found at $REF; starting with an empty cache"
          fi

      - name: Get recently merged PR cache refs
        id: recent_pr_cache_refs
        uses: actions/github-script@v8
        env:
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image-name }}
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
            const result = await github.graphql(`
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  pullRequests(states: MERGED, first: 100, orderBy: {field: UPDATED_AT, direction: DESC}) {
                    nodes {
                      number
                    }
                  }
                }
              }
            `, { owner, repo });

            const refs = result.repository.pullRequests.nodes
              .map(({ number }) => `type=registry,ref=${process.env.REGISTRY}/${process.env.IMAGE_NAME}:${number}-buildcache,mode=max`)
              .join("\n");

            core.setOutput("cache-from", refs);
            core.info(`Found ${result.repository.pullRequests.nodes.length} recently merged PR cache refs.`);

      - name: Compute build metadata
        id: build_meta
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER=""
          if [[ "$GH_REF" =~ refs/heads/pull-request/([0-9]+) ]]; then
            PR_NUMBER="${BASH_REMATCH[1]}"
          fi

          TAGS=("$REGISTRY/$IMAGE_NAME:$RUN_ID")
          if [[ "$GH_REF" == "refs/heads/main" ]]; then
            CACHE_KEY="main"
            TAGS+=("$REGISTRY/$IMAGE_NAME:main")
          elif [[ -n "$PR_NUMBER" ]]; then
            CACHE_KEY="$PR_NUMBER"
            TAGS+=("$REGISTRY/$IMAGE_NAME:$PR_NUMBER")
          else
            CACHE_KEY=$(printf '%s' "${GITHUB_REF_NAME:-$RUN_ID}" | tr '/' '-' | tr -cd '[:alnum:]._-')
            if [[ -z "$CACHE_KEY" ]]; then
              CACHE_KEY="$RUN_ID"
            fi
          fi

          CACHE_FROM=(
            "type=registry,ref=$REGISTRY/$IMAGE_NAME:main-buildcache,mode=max"
          )
          if [[ "$CACHE_KEY" != "main" ]]; then
            CACHE_FROM+=("type=registry,ref=$REGISTRY/$IMAGE_NAME:$CACHE_KEY-buildcache,mode=max")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
            echo "cache-from<<EOF"
            printf '%s\n' "${CACHE_FROM[@]}"
            echo "EOF"
            echo "cache-to=type=registry,ref=$REGISTRY/$IMAGE_NAME:$CACHE_KEY-buildcache,mode=max"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          file: ${{ inputs.dockerfile }}
          push: true
          context: .
          platforms: ${{ inputs.platform }}
          build-contexts: |
            ${{ inputs.build-contexts }}
            ${{ steps.trtllm_ccache_seed.outputs.build-context }}
          build-args: ${{ inputs.build-args }}
          cache-from: |
            ${{ steps.build_meta.outputs.cache-from }}
            ${{ steps.recent_pr_cache_refs.outputs.cache-from }}
          cache-to: ${{ steps.build_meta.outputs.cache-to }}
          no-cache: false
          tags: |
            ${{ steps.build_meta.outputs.tags }}
          target: ${{ inputs.target }}

      - name: Update TRT-LLM ccache image
        # Cache mounts survive a failed RUN in the current Buildx builder. Run
        # this step after both successful and failed image builds so completed
        # compiler outputs are preserved for the next retry.
        if: ${{ always() && !cancelled() && inputs.trtllm-ccache-tag != '' && steps.trtllm_ccache_tag.outcome == 'success' }}
        uses: docker/build-push-action@v5
        with:
          file: ${{ inputs.dockerfile }}
          push: true
          context: .
          platforms: ${{ inputs.platform }}
          build-contexts: |
            ${{ inputs.build-contexts }}
            ${{ steps.trtllm_ccache_seed.outputs.build-context }}
          build-args: |
            ${{ inputs.build-args }}
            CCACHE_EXPORT_KEY=${{ github.run_id }}-${{ github.run_attempt }}
          cache-from: |
            ${{ steps.build_meta.outputs.cache-from }}
            ${{ steps.recent_pr_cache_refs.outputs.cache-from }}
          no-cache: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.trtllm_ccache_tag.outputs.tag }}
          target: trtllm-ccache
