# Minimal SimpleStorage DataPlaneConfig for tq_client-style test fixtures.
# Production loads this from ``master_config.data_plane`` (e.g.
# examples/configs/grpo_math_1B.yaml:409). Tests bypass the master_config
# layer and load this subset directly via OmegaConf.
enabled: true
impl: transfer_queue
backend: simple
storage_capacity: 1024
num_storage_units: 1
claim_meta_poll_interval_s: 0.5
global_segment_size: 8589934592    # 8 GiB (only read by mooncake_cpu)
local_buffer_size: 1073741824      # 1 GiB (only read by mooncake_cpu)
