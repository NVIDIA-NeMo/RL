python-version = "3.12.0"
replace-imports-with-any = [
    "pynvml.*",
    "hydra._internal.*",
    "hydra.core.override_parser.*",
    "datasets.*",
    "transformers.*",
    "vllm.*",
    "math_verify.*",
    "sympy.*",
    "torchdata.*",
    "nemo.*",
    "megatron.*",
    "ray.*",
]
project-includes = [
    "nemo_rl/**/*.py",
    "examples/**/*.py",
    "docs/*.py",
    "tools/**/*.py",
    # TODO: eventually enable to tests but isn't as critical
    #"tests/**/*.py",
]

# Disable TypedDict mutation errors since TypedDict objects are regular dicts at runtime
[errors]
missing-attribute = false
