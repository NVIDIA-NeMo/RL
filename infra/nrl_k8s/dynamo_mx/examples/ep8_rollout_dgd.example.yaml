# SPDX-License-Identifier: Apache-2.0
#
# EP>1 rollout DGD for Qwen3-30B-A3B — the config that makes EP byte-pruning
# MEASURABLE on a live cluster (the current deployment is EP=1, so the EP filter
# reads as a no-op there). Fill the <PLACEHOLDER>s and apply after the MX server
# is up in the same namespace.
#
# Layout: TP=1, DP=8, --enable-expert-parallel  => EP=8 across the 8 workers.
# Qwen3-30B-A3B has 128 experts, so each worker holds 16 experts (1/8) and its
# refit should pull ~1/8 of the expert bytes + the (replicated) non-expert
# weights. That 1/8 is the number to confirm against the synthetic proof
# (temp/ep_gt1_byte_pruning.py: 8.0x savings).
#
# NOTE on EP wiring: vLLM expert parallelism sizes the EP group over the
# data-parallel ranks. Across a DGD's replicas this needs the workers to form
# one vLLM DP group (`--data-parallel-size 8` + the DP coordination the Dynamo
# vLLM component wires). Confirm the DP/EP group formation for your Dynamo
# version; the flags below are the intent. For a single-node sanity check you
# can instead run TP=1, DP=2, EP=2 on one node.

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-30b-a3b-ep8-mx
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      resources:
        requests: {cpu: "2", memory: "4Gi"}
        limits: {cpu: "4", memory: "8Gi"}
      extraPodSpec:
        nodeSelector: {kubernetes.io/arch: arm64}
        tolerations: [{operator: Exists}]
        imagePullSecrets: [{name: <IMAGE_PULL_SECRET>}]
        mainContainer:
          image: <WORKER_IMAGE>
          command: [python3, -m, dynamo.frontend]
          args: ["--router-reset-states"]

    VllmDecodeWorker:
      componentType: worker
      replicas: 8                        # DP=8  (8 x TP1 = 8 GPUs, EP=8)
      envFromSecret: <SECRETS_NAME>      # HF_TOKEN etc.
      resources:
        requests: {gpu: "1", memory: "150Gi"}
        limits: {gpu: "1", memory: "190Gi"}
      extraPodSpec:
        securityContext:
          runAsUser: 0
          capabilities: {add: [IPC_LOCK]}
        nodeSelector: {nvidia.com/gpu.product: <GPU_PRODUCT>}
        tolerations: [{operator: Exists}]
        imagePullSecrets: [{name: <IMAGE_PULL_SECRET>}]
        resourceClaims:
          - {name: roce-channel, resourceClaimTemplateName: <ROCE_CLAIM_TEMPLATE>}
        volumes:
          - name: rl-workspace
            persistentVolumeClaim: {claimName: <WORKSPACE_PVC>}
        mainContainer:
          image: <WORKER_IMAGE>
          volumeMounts: [{mountPath: /mnt/rl-workspace, name: rl-workspace}]
          command: [python3, -m, dynamo.vllm]
          args:
            - --model
            - Qwen/Qwen3-30B-A3B-Instruct-2507
            - --served-model-name
            - Qwen/Qwen3-30B-A3B-Instruct-2507
            - --tensor-parallel-size
            - "1"
            - --data-parallel-size
            - "8"
            - --enable-expert-parallel        # <-- EP=8 (the point of this DGD)
            - --moe-backend
            - triton                          # <-- required for MoE refit
            - --dtype
            - bfloat16
            - --gpu-memory-utilization
            - "0.85"
            - --max-model-len
            - "4096"
            - --enforce-eager
            # weight-transfer backend (native "mx"); or --load-format mx + DYN_MX_REFIT_ENABLED
            - --weight-transfer-config
            - '{"backend":"mx"}'
            - --model-express-url
            - modelexpress-server.<NAMESPACE>.svc.cluster.local:8001
          resources:
            claims: [{name: roce-channel}]
          env:
            - {name: MODEL_EXPRESS_URL, value: "modelexpress-server.<NAMESPACE>.svc.cluster.local:8001"}
            - {name: HF_HOME, value: "<HF_CACHE_PATH>"}
            - {name: DYN_SYSTEM_PORT, value: "9090"}
            - {name: UCX_TLS, value: "rc,cuda_copy,sm,self,tcp"}
            - {name: UCX_IB_GPU_DIRECT_RDMA, value: "yes"}
            - {name: MX_RDMA_NIC_PIN, value: "stripe"}
            - {name: MX_MEGATRON_BUFFER_LOC, value: "host"}     # frees HBM alongside the 30B model
            - {name: MX_MEGATRON_ARENA, value: "1"}
            - {name: UCX_CUDA_COPY_REG_WHOLE_ALLOC, value: "off"}  # required with arena
            - {name: MX_LOAD_MODE, value: "direct"}             # MDL
            # EP filter inputs (so the receiver pulls only its local experts):
            - {name: MX_EP_WORLD_SIZE, value: "8"}
            - {name: MX_NUM_EXPERTS, value: "128"}
            - {name: MX_EXPERT_PLACEMENT, value: "linear"}
