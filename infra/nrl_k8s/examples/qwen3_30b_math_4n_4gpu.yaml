# Qwen3-30B-A3B GRPO on math — **single RayCluster, 4 nodes × 4 GPUs (GB300)**.
#
# Extends the performance async-1off recipe (training + generation inside one
# Ray cluster, non-colocated split: 2 nodes training, 2 nodes generation).
# The 16 workers are a single pod-group on GB300 so NVLink spans all 16 GPUs
# via a ComputeDomain channel claim (see the paired infra file).
#
# Pair with qwen3_30b_math_4n_4gpu.gb300.infra.yaml.
defaults: ../../../examples/configs/recipes/llm/performance/grpo-qwen3-30ba3b-4n4g-async-1off.yaml

cluster:
  gpus_per_node: 4
  num_nodes: 4
grpo:
  max_num_steps: 500
  val_period: 50
checkpointing:
  save_period: 50
logger:
  wandb_enabled: true
  wandb:
    project: nemorl-single-k8s
    name: qwen3-30b-math-4n-4gpu-gb300
  tensorboard_enabled: true
  monitor_gpus: true
