# Smoke-test recipe for the Dynamo backend.
#
# This recipe is paired with dynamo_qwen3_0.6b.kind.infra.yaml. nrl-k8s brings
# up a small DynamoGraphDeployment, then the orchestrator auto-injects
# `policy.generation.backend=dynamo` and `policy.generation.dynamo_cfg.dgd_name`
# into this recipe before staging the working_dir.
#
# Inherits a stock 1B GRPO config; overrides only what's needed to point at
# the dynamo backend. The `dgd_name` field is intentionally omitted — the
# orchestrator stamps it from infra.dynamo.<key> at submission time.
defaults: ../../../examples/configs/grpo_math_1B.yaml

policy:
  model_name: Qwen/Qwen3-0.6B
  generation:
    backend: dynamo
    dynamo_cfg:
      # frontend_port and namespace fall through to the operator defaults
      # (8000, infra.namespace).
      tool_call_parser: "none"
      reasoning_parser: "none"

cluster:
  num_nodes: 1
  gpus_per_node: 1
