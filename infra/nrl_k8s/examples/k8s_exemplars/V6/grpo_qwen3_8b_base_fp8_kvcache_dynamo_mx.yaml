# Qwen3-8B-Base Megatron GRPO FP8 KV-cache smoke with Dynamo + MX.
#
# Based on:
# examples/configs/recipes/llm/grpo-qwen3-8b-base-1n8g-fp8-kvcache-megatron.yaml
#
# This V6 exemplar keeps the source recipe's Megatron TP=4 policy and FP8
# vLLM/KV-cache generation settings, but routes generation through a
# Kubernetes-managed DynamoGraphDeployment and refits it through ModelExpress.

defaults: ../../../../../examples/configs/recipes/llm/grpo-qwen3-8b-base-1n8g-fp8-kvcache-megatron.yaml

grpo:
  num_prompts_per_step: 2
  num_generations_per_prompt: 2
  max_rollout_turns: 1
  max_num_steps: 2
  val_period: 0
  val_at_start: false
  val_at_end: false
  max_val_samples: 4
  val_batch_size: 4

checkpointing:
  enabled: false

policy:
  tokenizer:
    name: ${policy.model_name}
    chat_template: null
    chat_template_kwargs: null
  train_global_batch_size: ${mul:${grpo.num_prompts_per_step}, ${grpo.num_generations_per_prompt}}
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 8192

  dtensor_cfg:
    enabled: false

  megatron_cfg:
    enabled: true
    tensor_model_parallel_size: 4
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    sequence_parallel: false
    activation_checkpointing: false

  generation:
    backend: "dynamo"
    max_new_tokens: 512
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    dynamo_cfg:
      request_timeout_s: 900.0
    vllm_cfg:
      async_engine: true
      precision: fp8
      kv_cache_dtype: fp8
      use_deep_gemm: false
      tensor_parallel_size: 4
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.8
      max_model_len: ${policy.max_total_sequence_length}
      enable_vllm_metrics_logger: false
      enforce_eager: true
    colocated:
      enabled: false

env:
  dapo:
    num_workers: 4
  math:
    num_workers: 4

logger:
  log_dir: "logs/grpo-qwen3-8b-base-fp8-kvcache-dynamo-mx-v6"
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: false

cluster:
  gpus_per_node: 4
  num_nodes: 1
  weight_sync:
    method: "mx"
    mx_config:
      enabled: true
      mx_server_url: "modelexpress-server.default.svc.cluster.local:8001"
      timeout_seconds: 300.0
      same_rank_only: true
      tree_scale_out: false
      moe_expert_filter: false
      nic_pin: "auto"
      retain_latest_k: 1
