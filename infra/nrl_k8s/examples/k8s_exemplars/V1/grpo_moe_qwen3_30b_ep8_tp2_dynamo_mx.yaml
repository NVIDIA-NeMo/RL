# Qwen3-30B-A3B target validation:
#   2 x 4-GPU GB200 Megatron trainer (EP8/TP1/PP1/CP1)
#     -> 1 x 2-GPU vLLM rollout (TP2/EP1)
# Weight updates use ModelExpress through vLLM's native WeightTransferEngine.

defaults: ../../../../../examples/configs/grpo_math_qwen30ba3b_megatron.yaml

grpo:
  max_num_steps: 3
  num_prompts_per_step: 2
  num_generations_per_prompt: 2
  max_rollout_turns: 1
  val_period: 0
  val_at_start: false
  val_at_end: false

policy:
  model_name: Qwen/Qwen3-30B-A3B
  train_global_batch_size: 8
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 1024

  dtensor_cfg:
    enabled: false

  megatron_cfg:
    enabled: true
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 8
    sequence_parallel: false
    activation_checkpointing: true
    empty_unused_memory_level: 1
    env_vars:
      # CUDA expandable segments can remap registered VAs and invalidate RDMA.
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:False

  generation:
    backend: dynamo
    max_new_tokens: 256
    temperature: 1.0
    top_p: 1.0
    dynamo_cfg:
      request_timeout_s: 900.0
    vllm_cfg:
      async_engine: false
      tensor_parallel_size: 2
      expert_parallel_size: 1
      gpu_memory_utilization: 0.6
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: true
    vllm_kwargs:
      # Retains the refit-capable 3D expert layout.
      moe_backend: triton
    colocated:
      enabled: false
      resources:
        gpus_per_node: 2
        num_nodes: 1

data:
  max_input_seq_length: 1024

logger:
  log_dir: logs/grpo-moe-qwen3-30b-ep8-tp2-dynamo-mx
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: false

cluster:
  gpus_per_node: 4
  num_nodes: 2
  weight_sync:
    method: mx
    mx_config:
      enabled: true
      mx_server_url: modelexpress-server.${user:}.svc.cluster.local:8001
      timeout_seconds: 600.0
      same_rank_only: false
      tree_scale_out: false
      moe_expert_filter: true
      nic_pin: "off"
