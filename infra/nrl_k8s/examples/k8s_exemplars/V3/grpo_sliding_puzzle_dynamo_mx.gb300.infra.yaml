# Sliding-puzzle GRPO + Dynamo direct generation + ModelExpress on GB300.
#
# Run from the NeMo-RL repo root:
#   RECIPE=infra/nrl_k8s/examples/k8s_exemplars/V3/grpo_sliding_puzzle_dynamo_mx.yaml
#   INFRA=infra/nrl_k8s/examples/k8s_exemplars/V3/grpo_sliding_puzzle_dynamo_mx.gb300.infra.yaml
#   nrl-k8s check $RECIPE --infra $INFRA
#   nrl-k8s run   $RECIPE --infra $INFRA --raycluster --no-wait --replace

_shared:
  headNodeSelector: &head_node_selector
    nodeGroup: customer-cpu
    kubernetes.io/arch: arm64
  workerNodeSelector: &worker_node_selector
    nvidia.com/gpu.product: NVIDIA-GB300
  userSecretEnvFrom: &user_secret_env_from
    - secretRef:
        name: ${user:}-secrets
        optional: true
  headEnv: &shared_head_env
    - {name: HF_HOME,                       value: "/mnt/rl-workspace/${user:}/hf-cache"}
    - {name: NCCL_DEBUG,                    value: WARN}
    - {name: RAY_memory_monitor_refresh_ms, value: "0"}
  workerEnv: &shared_worker_env
    - {name: HF_HOME,                       value: "/mnt/rl-workspace/${user:}/hf-cache"}
    - {name: NCCL_DEBUG,                    value: WARN}
    - {name: RAY_memory_monitor_refresh_ms, value: "0"}
    - {name: UCX_TLS,                       value: "^tcp"}
    - {name: NIXL_UCX_TLS,                  value: "^tcp"}
    - {name: UCX_IB_GPU_DIRECT_RDMA,        value: "yes"}
    - {name: UCX_CUDA_COPY_DMABUF,          value: "yes"}
    - {name: MX_RDMA_NIC_PIN,               value: "auto"}
  headResources: &head_resources
    limits:   {cpu: "8",  memory: "32Gi"}
    requests: {cpu: "4",  memory: "16Gi"}
  gpuWorkerResources: &gpu_worker_resources
    limits:
      cpu: "16"
      memory: "120Gi"
      nvidia.com/gpu: "1"
    requests:
      cpu: "8"
      memory: "64Gi"
      nvidia.com/gpu: "1"
    claims:
      - {name: roce-channel}
  gpuHeadPorts: &gpu_head_ports
    - {containerPort: 6379,  name: gcs-server}
    - {containerPort: 8265,  name: dashboard}
    - {containerPort: 10001, name: client}
  codeMounts: &code_mounts
    - {mountPath: /dev/shm,          name: dshm}
    - {mountPath: /opt/nemo-rl,      name: rl-workspace, subPath: "${user:}/nemo-rl-dynamo-generate-worktree"}
    - {mountPath: /mnt/rl-workspace, name: rl-workspace}
  headVolumes: &head_volumes
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 8Gi}
    - name: rl-workspace
      persistentVolumeClaim: {claimName: rl-workspace}
  workerVolumes: &worker_volumes
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 16Gi}
    - name: rl-workspace
      persistentVolumeClaim: {claimName: rl-workspace}

image: jwillthomson/nemo-rl-mx:06-11
imagePullSecrets: [nvcr-secret]
serviceAccount: nemo-rl-endpoint-registry

labels:
  nrl-k8s/owner: ${user:}

submit:
  submitter: portForward

launch:
  mode: attach
  runMode: batch
  codeSource: image
  codePath: /opt/nemo-rl
  attach:
    training: ${user:}-rc-sliding-q25-dynamo-mx
  peerWatcher: false
  env: {}
  entrypoint: |
    set -eu
    cd /opt/nemo-rl
    if [ ! -d /mnt/rl-workspace ]; then
      echo "ERROR: /mnt/rl-workspace not mounted; is the rl-workspace PVC bound?" >&2
      exit 1
    fi

    export PYTHONPATH=.:3rdparty/Gym-workspace/Gym:3rdparty/Megatron-Bridge-workspace/Megatron-Bridge:3rdparty/Megatron-Bridge-workspace/Megatron-Bridge/3rdparty/Megatron-LM
    export MX_RDMA_NIC_PIN=auto
    TIMESTAMP=$(date -u +%Y%m%d-%H%M%S-%N)
    LOG_DIR=/mnt/rl-workspace/${user:}/driver_logs
    LOG=\${LOG_DIR}/${user:}-sliding-q25-dynamo-mx-\${TIMESTAMP}.log
    mkdir -p "\${LOG_DIR}"

    PIPE=$(mktemp -u)
    mkfifo "\${PIPE}"
    tee "\${LOG}" < "\${PIPE}" &
    TEE_PID=$!

    RC=0
    python -u examples/run_grpo_sliding_puzzle.py \
      --config infra/nrl_k8s/examples/k8s_exemplars/V3/grpo_sliding_puzzle_dynamo_mx.yaml \
      +policy.generation.dynamo_cfg.dgd_name=${user:}-dyn-slide-q25-mx \
      > "\${PIPE}" 2>&1 || RC=$?

    wait "\${TEE_PID}" || true
    rm -f "\${PIPE}"
    exit "\${RC}"

kuberay:
  training:
    name: ${user:}-rc-sliding-q25-dynamo-mx
    labels:
      disagg.nemo-rl/cluster: sliding-q25-dynamo-mx
      disagg.nemo-rl/run: sliding-q25-dynamo-mx
      kai.scheduler/queue: backfill
    spec:
      rayVersion: "2.52.0"
      headGroupSpec:
        rayStartParams:
          dashboard-host: "0.0.0.0"
          no-monitor: "true"
          num-gpus: "0"
          object-store-memory: "100000000"
        template:
          spec:
            schedulerName: kai-scheduler
            dnsPolicy: ClusterFirst
            nodeSelector: *head_node_selector
            tolerations:
              - operator: Exists
            containers:
              - name: ray-head
                env: *shared_head_env
                envFrom: *user_secret_env_from
                resources: *head_resources
                ports: *gpu_head_ports
                volumeMounts: *code_mounts
            volumes: *head_volumes
      workerGroupSpecs:
        - groupName: gpu-workers
          replicas: 1
          minReplicas: 1
          maxReplicas: 1
          rayStartParams:
            num-gpus: "1"
            object-store-memory: "100000000"
          template:
            spec:
              schedulerName: kai-scheduler
              dnsPolicy: ClusterFirst
              nodeSelector: *worker_node_selector
              tolerations:
                - operator: Exists
              resourceClaims:
                - name: roce-channel
                  resourceClaimTemplateName: roce-mx-trainer-sliding-q25
              containers:
                - name: ray-worker
                  env: *shared_worker_env
                  envFrom: *user_secret_env_from
                  resources: *gpu_worker_resources
                  securityContext:
                    capabilities:
                      add: [IPC_LOCK]
                  volumeMounts: *code_mounts
              volumes: *worker_volumes

dynamo:
  serving:
    manifest: ../../../examples_dgd/k8s_exemplars/V3/qwen2_5_1_5b_instruct_gb300_mx.yaml
    name: ${user:}-dyn-slide-q25-mx
    readyTimeoutS: 1200
