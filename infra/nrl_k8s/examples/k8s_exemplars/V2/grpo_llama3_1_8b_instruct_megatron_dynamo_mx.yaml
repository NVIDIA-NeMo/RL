# Llama 3.1 8B Instruct Megatron async-GRPO smoke with Dynamo + ModelExpress.
#
# Based on:
# examples/configs/recipes/llm/performance/grpo-llama3.1-8b-instruct-2n8g-async-1off.yaml
#
# The source recipe is a 16-GPU async Megatron run. On GB300, the physical
# mapping is 4 Ray worker pods x 4 GPUs instead of 2 pods x 8 GPUs, but the
# total trainer world size stays 16.

defaults: ../../../../../examples/configs/recipes/llm/performance/grpo-llama3.1-8b-instruct-2n8g-async-1off.yaml

grpo:
  num_prompts_per_step: 2
  num_generations_per_prompt: 2
  max_rollout_turns: 1
  max_num_steps: 2
  val_period: 0
  val_at_start: false
  val_at_end: false
  max_val_samples: 4
  val_batch_size: 4
  async_grpo:
    enabled: true
    max_trajectory_age_steps: 1
    in_flight_weight_updates: true

checkpointing:
  enabled: false

policy:
  train_global_batch_size: ${mul:${grpo.num_prompts_per_step}, ${grpo.num_generations_per_prompt}}
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 4096

  dtensor_cfg:
    enabled: false

  megatron_cfg:
    enabled: true
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    activation_checkpointing: true
    fp8_cfg:
      enabled: false

  generation:
    backend: "dynamo"
    max_new_tokens: 256
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids:
      - 128009
    dynamo_cfg:
      request_timeout_s: 900.0
    vllm_cfg:
      async_engine: true
      tensor_parallel_size: 1
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.8
      max_model_len: ${policy.max_total_sequence_length}
      enable_vllm_metrics_logger: false
    colocated:
      enabled: false

data:
  max_input_seq_length: 4096

logger:
  log_dir: "logs/grpo-llama3-8b-megatron-dynamo-mx-v2"
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: false

cluster:
  # GB300 nodes expose 4 GPUs. Use 4x4 physical Ray workers to preserve the
  # linked recipe's 16-GPU trainer world size.
  gpus_per_node: 4
  num_nodes: 4
  weight_sync:
    method: "mx"
    mx_config:
      enabled: true
      mx_server_url: "modelexpress-server.default.svc.cluster.local:8001"
      timeout_seconds: 300.0
      same_rank_only: true
      tree_scale_out: false
      moe_expert_filter: false
      nic_pin: "auto"
      retain_latest_k: 1
