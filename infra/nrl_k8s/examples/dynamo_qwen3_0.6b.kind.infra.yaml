# Kind-cluster infra for the Dynamo smoke-test recipe.
#
# Brings up:
#   * one small training RayCluster (1 worker × 1 GPU)
#   * one DynamoGraphDeployment (Frontend + 1 GPU VllmDecodeWorker)
#
# Prereqs:
#   * dynamo-operator installed (cd infra/helm && helmfile -e kind sync)
#   * kuberay-operator installed (same helmfile)
#   * a kind cluster with at least 2 GPUs surfaced via nvkind
#
# Usage:
#   RECIPE=infra/nrl_k8s/examples/dynamo_qwen3_0.6b.yaml
#   INFRA=infra/nrl_k8s/examples/dynamo_qwen3_0.6b.kind.infra.yaml
#
#   nrl-k8s check $RECIPE --infra $INFRA
#   nrl-k8s run   $RECIPE --infra $INFRA --raycluster --wait

namespace: default
image: nvcr.io/nvidian/nemo-rl:latest

submit:
  submitter: portForward

launch:
  mode: single
  runMode: interactive
  codeSource: upload
  entrypoint: |
    set -eu
    cd /opt/nemo-rl
    python -u examples/run_grpo.py --config nrl_k8s_run.yaml

kuberay:
  training:
    name: dynamo-smoke-train
    spec:
      rayVersion: "2.49.2"
      headGroupSpec:
        rayStartParams:
          dashboard-host: "0.0.0.0"
          num-gpus: "0"
        template:
          spec:
            containers:
              - name: ray-head
                image: nvcr.io/nvidian/nemo-rl:latest
                resources:
                  limits:   {cpu: "2", memory: "4Gi"}
                  requests: {cpu: "1", memory: "2Gi"}
                ports:
                  - {containerPort: 6379, name: gcs-server}
                  - {containerPort: 8265, name: dashboard}
                  - {containerPort: 10001, name: client}
      workerGroupSpecs:
        - groupName: gpu-workers
          replicas: 1
          minReplicas: 1
          maxReplicas: 1
          rayStartParams: {num-gpus: "1"}
          template:
            spec:
              containers:
                - name: ray-worker
                  image: nvcr.io/nvidian/nemo-rl:latest
                  resources:
                    limits:   {cpu: "4", memory: "16Gi", nvidia.com/gpu: "1"}
                    requests: {cpu: "2", memory: "8Gi",  nvidia.com/gpu: "1"}

dynamo:
  serving:
    # Path resolves against this infra YAML's directory.
    manifest: ../examples_dgd/qwen3_0.6b_kind.yaml
    # Override the manifest's metadata.name so the run is user-scoped.
    name: ${user:}-dynamo-smoke
    readyTimeoutS: 600
