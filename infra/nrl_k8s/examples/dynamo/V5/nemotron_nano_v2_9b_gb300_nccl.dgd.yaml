# DynamoGraphDeployment example for nvidia/NVIDIA-Nemotron-Nano-9B-v2 on GB300.
#
# Used by the V5 workplace-assistant smoke. The TP=2 vLLM worker uses its
# native NCCL weight-transfer backend for NeMo-RL refits.

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: nemotron-nano-v2-9b-gb300-nccl
  annotations:
    nvidia.com/kai-scheduler-queue: backfill
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      envFromSecret: ${user:}-secrets
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      extraPodSpec:
        nodeSelector:
          nodeGroup: customer-cpu
          kubernetes.io/arch: arm64
        tolerations:
          - operator: Exists
        volumes:
          - name: rl-workspace
            persistentVolumeClaim:
              claimName: rl-workspace
        mainContainer:
          image: jwillthomson/dynamo-nemorl-nomx-f6d44eba
          workingDir: /workspace
          volumeMounts:
            - mountPath: /mnt/rl-workspace
              name: rl-workspace
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-reset-states
          env:
            - name: HF_HOME
              value: /mnt/rl-workspace/${user:}/hf-cache
    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      envFromSecret: ${user:}-secrets
      resources:
        requests:
          gpu: "2"
          memory: "128Gi"
        limits:
          gpu: "2"
          memory: "220Gi"
      extraPodSpec:
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-GB300
        tolerations:
          - operator: Exists
        volumes:
          - name: rl-workspace
            persistentVolumeClaim:
              claimName: rl-workspace
        mainContainer:
          image: jwillthomson/dynamo-nemorl-nomx-f6d44eba
          workingDir: /workspace
          volumeMounts:
            - mountPath: /mnt/rl-workspace
              name: rl-workspace
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - nvidia/NVIDIA-Nemotron-Nano-9B-v2
            - --served-model-name
            - nvidia/NVIDIA-Nemotron-Nano-9B-v2
            - --enable-rl
            - --weight-transfer-config
            - '{"backend":"nccl"}'
            - --tensor-parallel-size
            - "2"
            - --dtype
            - bfloat16
            - --gpu-memory-utilization
            - "0.8"
            - --max-model-len
            - "8192"
            - --max-num-seqs
            - "16"
            - --max-num-batched-tokens
            - "16384"
            - --enforce-eager
            - --mamba-ssm-cache-dtype
            - float32
            - --dyn-tool-call-parser
            - nemotron_deci
            - --dyn-reasoning-parser
            - nemotron_nano
          env:
            - name: HF_HOME
              value: /mnt/rl-workspace/${user:}/hf-cache
            - name: NCCL_DEBUG
              value: WARN
            # The refit collective spans independently scheduled Ray and DGD pods;
            # force RoCE instead of MNNVL/IMEX.
            - name: NCCL_MNNVL_ENABLE
              value: "0"
