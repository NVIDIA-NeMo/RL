# Nemotron Nano v2 9B workplace-assistant Megatron GRPO + Dynamo NCCL on GB300.
#
# Run from the NeMo-RL repo root:
#   RECIPE=infra/nrl_k8s/examples/dynamo/V5/grpo_workplace_assistant_nemotron_nano_v2_9b_dynamo_nccl.yaml
#   INFRA=infra/nrl_k8s/examples/dynamo/V5/grpo_workplace_assistant_nemotron_nano_v2_9b_dynamo_nccl.gb300.infra.yaml
#   nrl-k8s check $RECIPE --infra $INFRA
#   nrl-k8s run   $RECIPE --infra $INFRA --rayjob --no-wait
#
# NRL_TRAIN_PATH and NRL_VAL_PATH must be available in the Ray head environment.
# The standard per-user secret referenced below can provide both variables.

_shared:
  headNodeSelector: &head_node_selector
    nodeGroup: customer-cpu
    kubernetes.io/arch: arm64
  workerNodeSelector: &worker_node_selector
    nvidia.com/gpu.product: NVIDIA-GB300
  userSecretEnvFrom: &user_secret_env_from
    - secretRef:
        name: ${user:}-secrets
        optional: true
  headEnv: &shared_head_env
    - {name: HF_HOME,                       value: "/mnt/rl-workspace/${user:}/hf-cache"}
    - {name: NCCL_DEBUG,                    value: WARN}
    - {name: RAY_memory_monitor_refresh_ms, value: "0"}
    - {name: TOKENIZERS_PARALLELISM,        value: "false"}
  workerEnv: &shared_worker_env
    - {name: HF_HOME,                       value: "/mnt/rl-workspace/${user:}/hf-cache"}
    - {name: NCCL_DEBUG,                    value: WARN}
    - {name: NCCL_MNNVL_ENABLE,             value: "0"}
    - {name: RAY_memory_monitor_refresh_ms, value: "0"}
    - {name: TOKENIZERS_PARALLELISM,        value: "false"}
    - {name: TORCH_CUDA_ARCH_LIST,           value: "10.3"}
  headResources: &head_resources
    limits:   {cpu: "48", memory: "128Gi"}
    requests: {cpu: "16", memory: "64Gi"}
  gpuWorkerResources: &gpu_worker_resources
    limits:
      cpu: "96"
      memory: "700Gi"
      nvidia.com/gpu: "2"
    requests:
      cpu: "64"
      memory: "500Gi"
      nvidia.com/gpu: "2"
    claims:
      - {name: roce-channel}
  gpuHeadPorts: &gpu_head_ports
    - {containerPort: 6379,  name: gcs-server}
    - {containerPort: 8265,  name: dashboard}
    - {containerPort: 10001, name: client}
  codeMounts: &code_mounts
    - {mountPath: /dev/shm,          name: dshm}
    - {mountPath: /mnt/rl-workspace, name: rl-workspace}
  headVolumes: &head_volumes
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 8Gi}
    - name: rl-workspace
      persistentVolumeClaim: {claimName: rl-workspace}
  workerVolumes: &worker_volumes
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 64Gi}
    - name: rl-workspace
      persistentVolumeClaim: {claimName: rl-workspace}

image: jwillthomson/nemo-rl-nomx-aa7faa7a
imagePullSecrets: [nvcr-secret]
serviceAccount: nemo-rl-endpoint-registry

labels:
  nrl-k8s/owner: ${user:}

submit:
  submitter: portForward

launch:
  mode: rayjob
  runMode: batch
  codeSource: image
  codePath: /opt/nemo-rl
  peerWatcher: false
  env: {}
  entrypoint: |
    set -eu
    cd /opt/nemo-rl
    if [ ! -d /mnt/rl-workspace ]; then
      echo "ERROR: /mnt/rl-workspace not mounted; is the rl-workspace PVC bound?" >&2
      exit 1
    fi

    export PYTHONPATH=.:3rdparty/Gym-workspace/Gym:3rdparty/Megatron-Bridge-workspace/Megatron-Bridge:3rdparty/Megatron-Bridge-workspace/Megatron-Bridge/3rdparty/Megatron-LM
    export TOKENIZERS_PARALLELISM=false

    TIMESTAMP=$(date -u +%Y%m%d-%H%M%S-%N)
    LOG_DIR=/mnt/rl-workspace/${user:}/driver_logs
    LOG=\${LOG_DIR}/${user:}-nemotron-nano-v2-9b-dyn-nccl-\${TIMESTAMP}.log
    mkdir -p "\${LOG_DIR}"

    PIPE=$(mktemp -u)
    mkfifo "\${PIPE}"
    tee "\${LOG}" < "\${PIPE}" &
    TEE_PID=$!

    RC=0
    uv run --frozen python -u examples/nemo_gym/run_grpo_nemo_gym.py \
      --config infra/nrl_k8s/examples/dynamo/V5/grpo_workplace_assistant_nemotron_nano_v2_9b_dynamo_nccl.yaml \
      +policy.generation.dynamo_cfg.dgd_name=${user:}-dyn-nano-v2-nccl \
      data.train.data_path=\${NRL_TRAIN_PATH} \
      data.validation.data_path=\${NRL_VAL_PATH} \
      > "\${PIPE}" 2>&1 || RC=$?

    wait "\${TEE_PID}" || true
    rm -f "\${PIPE}"
    exit "\${RC}"

kuberay:
  training:
    name: ${user:}-rc-nemotron-nano-v2-9b-dyn-nccl
    labels:
      disagg.nemo-rl/cluster: nemotron-nano-v2-9b-dyn-nccl
      disagg.nemo-rl/run: nemotron-nano-v2-9b-dyn-nccl
      kai.scheduler/queue: backfill
    spec:
      rayVersion: "2.55.1"
      headGroupSpec:
        rayStartParams:
          dashboard-host: "0.0.0.0"
          no-monitor: "true"
          num-cpus: "0"
          num-gpus: "0"
          object-store-memory: "200000000"
        template:
          spec:
            schedulerName: kai-scheduler
            dnsPolicy: ClusterFirst
            nodeSelector: *head_node_selector
            tolerations:
              - operator: Exists
            containers:
              - name: ray-head
                env: *shared_head_env
                envFrom: *user_secret_env_from
                resources: *head_resources
                ports: *gpu_head_ports
                volumeMounts: *code_mounts
            volumes: *head_volumes
      workerGroupSpecs:
        - groupName: gpu-workers
          replicas: 1
          minReplicas: 1
          maxReplicas: 1
          numOfHosts: 1
          rayStartParams:
            num-gpus: "2"
            object-store-memory: "200000000"
          template:
            spec:
              schedulerName: kai-scheduler
              dnsPolicy: ClusterFirst
              nodeSelector: *worker_node_selector
              tolerations:
                - operator: Exists
              resourceClaims:
                - name: roce-channel
                  resourceClaimTemplateName: roce-trainer-nemotron-nano-v2-9b-nccl
              containers:
                - name: ray-worker
                  env: *shared_worker_env
                  envFrom: *user_secret_env_from
                  resources: *gpu_worker_resources
                  securityContext:
                    capabilities:
                      add: [IPC_LOCK]
                  volumeMounts: *code_mounts
              volumes: *worker_volumes

dynamo:
  serving:
    manifest: nemotron_nano_v2_9b_gb300_nccl.dgd.yaml
    name: ${user:}-dyn-nano-v2-nccl
    readyTimeoutS: 1800
    overrides:
      services:
        VllmDecodeWorker:
          extraPodSpec:
            resourceClaims:
              - name: roce-channel
                resourceClaimTemplateName: roce-${user:}-rc-nemotron-nano-v2-9b-dyn-nccl-training
            mainContainer:
              resources:
                claims:
                  - name: roce-channel
