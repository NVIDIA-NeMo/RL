# DynamoGraphDeployment example for Qwen/Qwen2.5-1.5B-Instruct on GB300.
#
# Used by the sliding-puzzle V3 exemplar with vLLM's native NCCL
# weight-transfer backend.

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen2-5-1-5b-instruct-gb300-nccl
  annotations:
    nvidia.com/kai-scheduler-queue: backfill
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      extraPodSpec:
        nodeSelector:
          nodeGroup: customer-cpu
          kubernetes.io/arch: arm64
        tolerations:
          - operator: Exists
        volumes:
          - name: rl-workspace
            persistentVolumeClaim:
              claimName: rl-workspace
        mainContainer:
          image: jwillthomson/dynamo-nemorl-nomx-f6d44eba
          workingDir: /workspace
          volumeMounts:
            - mountPath: /mnt/rl-workspace
              name: rl-workspace
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-reset-states
          env:
            - name: HF_HOME
              value: /mnt/rl-workspace/${user:}/hf-cache
    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      envFromSecret: ${user:}-secrets
      resources:
        requests:
          gpu: "1"
          memory: "64Gi"
        limits:
          gpu: "1"
          memory: "128Gi"
      extraPodSpec:
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-GB300
        tolerations:
          - operator: Exists
        volumes:
          - name: rl-workspace
            persistentVolumeClaim:
              claimName: rl-workspace
        mainContainer:
          image: jwillthomson/dynamo-nemorl-nomx-f6d44eba
          workingDir: /workspace
          volumeMounts:
            - mountPath: /mnt/rl-workspace
              name: rl-workspace
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - Qwen/Qwen2.5-1.5B-Instruct
            - --served-model-name
            - Qwen/Qwen2.5-1.5B-Instruct
            - --enable-rl
            - --weight-transfer-config
            - '{"backend":"nccl"}'
            - --tensor-parallel-size
            - "1"
            - --dtype
            - bfloat16
            - --gpu-memory-utilization
            - "0.6"
            - --max-model-len
            - "1024"
            - --max-num-seqs
            - "32"
            - --max-num-batched-tokens
            - "4096"
            - --enforce-eager
          env:
            - name: HF_HOME
              value: /mnt/rl-workspace/${user:}/hf-cache
            - name: NCCL_DEBUG
              value: WARN
            # The refit collective spans independently scheduled Ray and DGD pods;
            # force RoCE instead of MNNVL/IMEX.
            - name: NCCL_MNNVL_ENABLE
              value: "0"
