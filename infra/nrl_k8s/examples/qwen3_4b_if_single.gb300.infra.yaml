# Infra for qwen3_4b_if_single.yaml on a GB300 (p6e-gb300r.36xlarge) EKS cluster.
#
# Per-node hardware: 4× NVIDIA-GB300, ~140 CPU, ~925 GiB memory, arm64. GB300
# nodes advertise no taints on this cluster — plain nodeSelector is enough.
# There is no aws-efa-k8s-device-plugin here, so vpc.amazonaws.com/efa is not
# a schedulable resource; NCCL/UCX ride the Mellanox NICs over hostNetwork.
#
# Sizing mirrors the paired recipe (1 node × 4 GPUs). Namespace is inferred
# from the current kube context (default — the FSx Lustre PVC `rl-workspace`
# is namespace-scoped and lives there, so experiments run in `default`).

_shared:
  nodeSelector: &shared_node_selector
    nvidia.com/gpu.product: NVIDIA-GB300
  headEnv: &shared_head_env
    - {name: HF_HOME,                        value: /tmp/huggingface}
    - {name: TRANSFORMERS_CACHE,             value: /tmp/huggingface}
    - {name: NCCL_DEBUG,                     value: INFO}
    - {name: RAY_memory_monitor_refresh_ms,  value: "0"}
  workerEnv: &shared_worker_env
    - {name: HF_HOME,                        value: /tmp/huggingface}
    - {name: TRANSFORMERS_CACHE,             value: /tmp/huggingface}
    - {name: NCCL_DEBUG,                     value: INFO}
    - {name: RAY_memory_monitor_refresh_ms,  value: "0"}
  headResources: &shared_head_resources
    limits:   {cpu: "8", memory: "32Gi"}
    requests: {cpu: "2", memory: "8Gi"}
  gpuWorkerResources: &gpu_worker_resources
    # p6e-gb300r.36xlarge allocatable: ~139.6 CPU, ~924 GiB, 4 GPUs.
    # Claim 128 CPU / 880 GiB to leave headroom for the Ray head pod +
    # gpu-operator / device-plugin / dgxc daemonsets (~11 CPU, ~40 GiB).
    limits:
      cpu: "128"
      memory: "880Gi"
      nvidia.com/gpu: "4"
    requests:
      cpu: "128"
      memory: "880Gi"
      nvidia.com/gpu: "4"
  gpuHeadPorts: &gpu_head_ports
    - {containerPort: 6379,  name: gcs-server}
    - {containerPort: 8265,  name: dashboard}
    - {containerPort: 10001, name: client}
  dshmMounts: &dshm_mounts
    - {mountPath: /dev/shm, name: dshm}
  dshm16: &dshm_16
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 16Gi}
  dshm64: &dshm_64
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 64Gi}

# namespace intentionally omitted — CLI auto-infers `default` from kube context.
image: nvcr.io/nvidian/nemo-rl:nightly
imagePullSecrets: [nvcr-secret]
serviceAccount: nemo-rl-endpoint-registry

labels:
  nrl-k8s/owner: ${user:}

launch:
  mode: attach
  attach:
    training: ${user:}-raycluster-single-qwen3-4b-gb300
  peerWatcher: false
  entrypoint: |
    pip install kubernetes -q || true
    # Data files are pre-staged on the pods via kubectl cp.
    export DISAGG_TRAIN_PATH=/tmp/train.jsonl
    export DISAGG_VALID_PATH=/tmp/validation.jsonl
    # NOTE: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True is incompatible
    # with colocated vLLM's CuMemAllocator (AssertionError at vLLM init).
    export RAY_enable_infeasible_task_early_exit=true
    export PYTHONPATH=.:3rdparty/Gym-workspace/Gym:3rdparty/Megatron-LM-workspace/Megatron-LM
    python -u examples/nemo_gym/run_grpo_nemo_gym.py \
      --config nrl_k8s_run.yaml \
      ++env.nemo_gym.config_paths='[responses_api_models/vllm_model/configs/vllm_model_for_training.yaml,resources_servers/instruction_following/configs/instruction_following.yaml]' \
      ~policy.optimizer.kwargs.foreach \
      ~policy.optimizer.kwargs.fused
  env: {}
  rayUploadPaths:
    - nemo_rl
    - examples
    - infra/examples
    - tests/check_metrics.py
    - tests/json_dump_tb_logs.py
    - 3rdparty/Gym-workspace/Gym/nemo_gym
    - 3rdparty/Gym-workspace/Gym/responses_api_models/vllm_model
    - 3rdparty/Gym-workspace/Gym/responses_api_agents/simple_agent
    - 3rdparty/Gym-workspace/Gym/pyproject.toml
    - 3rdparty/Gym-workspace/Gym/uv.lock
    - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/app.py
    - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/requirements.txt
    - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/configs
    - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/tests
    - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/data/validation.jsonl
    - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/data/example.jsonl
    - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/data/example_rollouts.jsonl
    - 3rdparty/Megatron-LM-workspace/Megatron-LM/megatron

clusters:
  # ---------------- Training (GPU head + worker: generation + gym colocated) ----------------
  training:
    name: ${user:}-raycluster-single-qwen3-4b-gb300
    labels:
      disagg.nemo-rl/cluster: single-qwen3-4b-gb300
      disagg.nemo-rl/run: qwen3-4b-single-gb300
    spec:
      rayVersion: "2.52.0"
      headGroupSpec:
        rayStartParams: {dashboard-host: "0.0.0.0", num-gpus: "0", object-store-memory: "200000000"}
        template:
          spec:
            schedulerName: default-scheduler
            dnsPolicy: ClusterFirst
            nodeSelector: *shared_node_selector
            containers:
              - name: ray-head
                env:
                  - {name: HF_HOME,                        value: /tmp/huggingface}
                  - {name: TRANSFORMERS_CACHE,             value: /tmp/huggingface}
                  - {name: NCCL_DEBUG,                     value: INFO}
                  - {name: RAY_memory_monitor_refresh_ms,  value: "0"}
                  - name: WANDB_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: wandb-api-key
                        key: WANDB_API_KEY
                resources: *shared_head_resources
                ports: *gpu_head_ports
                volumeMounts: *dshm_mounts
            volumes: *dshm_16
      workerGroupSpecs:
        - groupName: gpu-workers
          replicas: 1
          minReplicas: 1
          maxReplicas: 1
          rayStartParams: {num-gpus: "4", object-store-memory: "200000000"}
          template:
            spec:
              schedulerName: default-scheduler
              hostNetwork: true
              dnsPolicy: ClusterFirstWithHostNet
              nodeSelector: *shared_node_selector
              containers:
                - name: ray-worker
                  env: *shared_worker_env
                  resources: *gpu_worker_resources
                  volumeMounts: *dshm_mounts
              volumes: *dshm_64
