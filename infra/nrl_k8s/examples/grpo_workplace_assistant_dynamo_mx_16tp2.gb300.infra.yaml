# Weight-transfer perf benchmark infra — Dynamo + **ModelExpress v2 refit**,
# 4-GPU DTensor trainer fanning out to a 16 × TP=2 MX DGD (32 inference ranks).
#
# Sibling of grpo_workplace_assistant_dynamo_mx.gb300.infra.yaml. Differences:
#   1. Training worker is 4 GPUs in a single GB300 node (was 1) so DTensor runs
#      FSDP DP=4. num-gpus="4" + resources.nvidia.com/gpu:"4".
#   2. Points at the scaled DGD manifest
#      (examples_dgd/qwen3_4b_thinking_gb300_mx_16tp2.yaml, 16 × TP2).
#   3. Separate cluster + DGD names (…-16tp2) so it doesn't collide with the
#      1-worker MX recipe.
#   4. Entrypoint launches grpo_workplace_assistant_dynamo_mx_16tp2.yaml.
#
# Prerequisites (same as the 1-worker MX recipe):
#   * modelexpress-server applied in the namespace.
#   * Worker image with modelexpress + NIXL baked in.
#   * RoCE DRA available (CLI auto-creates the trainer + DGD ResourceClaimTemplates).
#
# Usage:
#   RECIPE=examples/nemo_gym/grpo_workplace_assistant_dynamo_mx_16tp2.yaml
#   INFRA=infra/nrl_k8s/examples/grpo_workplace_assistant_dynamo_mx_16tp2.gb300.infra.yaml
#   nrl-k8s check $RECIPE --infra $INFRA
#   nrl-k8s run   $RECIPE --infra $INFRA --raycluster --no-wait

_shared:
  headNodeSelector: &head_node_selector
    nodeGroup: customer-cpu
  workerNodeSelector: &worker_node_selector
    nvidia.com/gpu.product: NVIDIA-GB300
  userSecretEnvFrom: &user_secret_env_from
    - secretRef:
        name: ${user:}-secrets
        optional: true
  headEnv: &shared_head_env
    - {name: HF_HOME,                       value: "/mnt/rl-workspace/${user:}/hf-cache"}
    - {name: NCCL_DEBUG,                    value: WARN}
    - {name: RAY_memory_monitor_refresh_ms, value: "0"}
  workerEnv: &shared_worker_env
    - {name: HF_HOME,                       value: "/mnt/rl-workspace/${user:}/hf-cache"}
    - {name: NCCL_DEBUG,                    value: WARN}
    - {name: RAY_memory_monitor_refresh_ms, value: "0"}
    # RDMA over RoCE + cuda_copy for dma-buf staging. Restricted TLS
    # (rc,cuda_copy only) — broader set caused prep_xfer_dlist failures.
    - {name: UCX_TLS,                       value: "rc,cuda_copy"}
    - {name: NIXL_UCX_TLS,                  value: "rc,cuda_copy"}
    - {name: UCX_IB_GPU_DIRECT_RDMA,        value: "yes"}
    - {name: UCX_CUDA_COPY_DMABUF,          value: "yes"}
    - {name: MX_RDMA_NIC_PIN,               value: "auto"}
  headResources: &head_resources
    limits:   {cpu: "8",  memory: "32Gi"}
    requests: {cpu: "4",  memory: "16Gi"}
  # 4-GPU trainer: one whole GB300 node (allocatable ~140 CPU / ~924 GiB / 4 GPU).
  gpuWorkerResources: &gpu_worker_resources
    limits:
      cpu: "120"
      memory: "850Gi"
      nvidia.com/gpu: "4"
    requests:
      cpu: "64"
      memory: "400Gi"
      nvidia.com/gpu: "4"
    claims:
      - {name: roce-channel}
  gpuHeadPorts: &gpu_head_ports
    - {containerPort: 6379,  name: gcs-server}
    - {containerPort: 8265,  name: dashboard}
    - {containerPort: 10001, name: client}
  codeMounts: &code_mounts
    - {mountPath: /dev/shm,           name: dshm}
    - {mountPath: /opt/nemo-rl,       name: rl-workspace, subPath: "${user:}/nemo-rl"}
    - {mountPath: /mnt/rl-workspace,  name: rl-workspace}
  headVolumes: &head_volumes
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 8Gi}
    - name: rl-workspace
      persistentVolumeClaim: {claimName: rl-workspace}
  workerVolumes: &worker_volumes
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 64Gi}
    - name: rl-workspace
      persistentVolumeClaim: {claimName: rl-workspace}

# namespace auto-inferred from kube context.
image: jwillthomson/nemo-rl-mx:05-25-v3
imagePullSecrets: [nvcr-secret]
serviceAccount: nemo-rl-endpoint-registry

labels:
  nrl-k8s/owner: ${user:}

submit:
  submitter: portForward

launch:
  mode: attach
  runMode: batch
  codeSource: image
  codePath: /opt/nemo-rl
  attach:
    training: ${user:}-raycluster-wpa-dynamo-mx-16tp2
  peerWatcher: false
  env: {}
  entrypoint: |
    set -eu
    cd /opt/nemo-rl
    if [ ! -d /mnt/rl-workspace ]; then
      echo "ERROR: /mnt/rl-workspace not mounted — is the rl-workspace PVC bound?" >&2
      exit 1
    fi

    export PYTHONPATH=.:3rdparty/Megatron-LM-workspace/Megatron-LM
    export MX_RDMA_NIC_PIN=auto
    TIMESTAMP=$(date -u +%Y%m%d-%H%M%S-%N)
    LOG_DIR=/mnt/rl-workspace/${user:}/driver_logs
    LOG=\${LOG_DIR}/${user:}-wpa-dynamo-mx-16tp2-\${TIMESTAMP}.log
    mkdir -p "\${LOG_DIR}"

    PIPE=$(mktemp -u)
    mkfifo "\${PIPE}"
    tee "\${LOG}" < "\${PIPE}" &
    TEE_PID=$!

    RC=0
    python -u examples/nemo_gym/run_grpo_nemo_gym.py \
      --config examples/nemo_gym/grpo_workplace_assistant_dynamo_mx_16tp2.yaml \
      +policy.generation.dynamo_cfg.dgd_name=${user:}-dynamo-wpa-mx-16tp2 \
      > "\${PIPE}" 2>&1 || RC=$?

    wait "\${TEE_PID}" || true
    rm -f "\${PIPE}"
    exit "\${RC}"

kuberay:
  training:
    name: ${user:}-raycluster-wpa-dynamo-mx-16tp2
    labels:
      disagg.nemo-rl/cluster: wpa-dynamo-mx-16tp2
      disagg.nemo-rl/run: wpa-dynamo-mx-16tp2
      kai.scheduler/queue: backfill
    spec:
      rayVersion: "2.52.0"
      headGroupSpec:
        rayStartParams:
          dashboard-host: "0.0.0.0"
          no-monitor: "true"
          num-gpus: "0"
          object-store-memory: "100000000"
        template:
          spec:
            schedulerName: kai-scheduler
            dnsPolicy: ClusterFirst
            nodeSelector: *head_node_selector
            containers:
              - name: ray-head
                env: *shared_head_env
                envFrom: *user_secret_env_from
                resources: *head_resources
                ports: *gpu_head_ports
                volumeMounts: *code_mounts
            volumes: *head_volumes
      workerGroupSpecs:
        - groupName: gpu-workers
          replicas: 1
          minReplicas: 1
          maxReplicas: 1
          numOfHosts: 1
          rayStartParams:
            num-gpus: "4"
            object-store-memory: "100000000"
          template:
            spec:
              schedulerName: kai-scheduler
              dnsPolicy: ClusterFirst
              nodeSelector: *worker_node_selector
              tolerations:
                - operator: Exists
              # RoCE DRA on the trainer side too — needed for NIXL publisher.
              # nrl-k8s will auto-create the ResourceClaimTemplate.
              resourceClaims:
                - name: roce-channel
                  resourceClaimTemplateName: roce-mx-trainer-wpa-16tp2
              containers:
                - name: ray-worker
                  env: *shared_worker_env
                  envFrom: *user_secret_env_from
                  resources: *gpu_worker_resources
                  securityContext:
                    capabilities:
                      add: [IPC_LOCK]
                  volumeMounts: *code_mounts
              volumes: *worker_volumes

dynamo:
  serving:
    manifest: ../examples_dgd/qwen3_4b_thinking_gb300_mx_16tp2.yaml
    name: ${user:}-dynamo-wpa-mx-16tp2
    readyTimeoutS: 1200
