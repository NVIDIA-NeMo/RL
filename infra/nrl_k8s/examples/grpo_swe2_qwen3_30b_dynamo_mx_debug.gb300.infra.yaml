# =============================================================================
# SWE2 async-GRPO replication infra — GB300, DTensor trainer + Dynamo + MX + KV
# =============================================================================
# Union of two proven GB300 infra templates:
#   * grpo_workplace_assistant_dynamo_mx.gb300.infra.yaml  — MX refit: RoCE DRA
#     on the trainer, UCX/NIXL env, modelexpress overlay on PYTHONPATH, IPC_LOCK.
#   * grpo_mini_swe_nemotron_v3.gb300.infra.yaml — multi-node SWE: ComputeDomain
#     DRA + KAI topology gang-scheduling for cross-node NCCL, and the
#     singularity-container + privileged + /dev/loop setup that swe_agents needs
#     to `singularity exec` the SWE-bench arm64 .sif sandboxes.
#
# Trainer: 8 GB300 nodes x 4 GPU = 32 GPUs (DTensor v2, EP8/TP2/CP2 — smoke-gated).
# Generation: the MX DGD (qwen3_30b_thinking_gb300_mx.yaml) — 16 workers x TP2.
#
# PREREQUISITES (verify before launching):
#   * modelexpress-server applied in the namespace (infra/nrl_k8s/dynamo_mx/).
#   * Training image MUST include nemo_automodel + deepep (the DTensor MoE
#     automodel path). The MX image below was built for DTensor *dense* 4B and
#     may lack these — CONFIRM, or rebuild. This is the first thing `nrl-k8s
#     check` / a smoke will surface.
#   * SWE-bench arm64 .sif set staged at
#     /mnt/rl-workspace/jothomson/swebench_containers/ (281 instances).
#   * SWE1 step_230_hf init checkpoint staged on the PVC (see recipe TODO) or a
#     decision to start from the public base.
#
# RECOMMENDED FIRST RUN: a reduced-seqlen smoke to validate the DTensor MoE
# mesh + MX refit before the full 131k run, e.g. append to the entrypoint:
#   policy.max_total_sequence_length=32768
#
# Usage:
#   RECIPE=examples/nemo_gym/grpo_swe2_qwen3_30b_dynamo_mx.yaml
#   INFRA=infra/nrl_k8s/examples/grpo_swe2_qwen3_30b_dynamo_mx.gb300.infra.yaml
#   nrl-k8s check $RECIPE --infra $INFRA
#   nrl-k8s run   $RECIPE --infra $INFRA --raycluster --no-wait
# =============================================================================

_shared:
  headNodeSelector: &head_node_selector
    nodeGroup: customer-cpu
  workerNodeSelector: &worker_node_selector
    nvidia.com/gpu.product: NVIDIA-GB300
  userSecretEnvFrom: &user_secret_env_from
    - secretRef:
        name: ${user:}-secrets
        optional: true
  headEnv: &shared_head_env
    - {name: HF_HOME,                       value: "/mnt/rl-workspace/${user:}/hf-cache"}
    - {name: NCCL_DEBUG,                    value: WARN}
    - {name: RAY_memory_monitor_refresh_ms, value: "0"}
  workerEnv: &shared_worker_env
    - {name: HF_HOME,                       value: "/mnt/rl-workspace/${user:}/hf-cache"}
    - {name: NCCL_DEBUG,                    value: WARN}
    # Cross-pod NVLink for DTensor's cross-node NCCL (ComputeDomain clique).
    - {name: NCCL_MNNVL_ENABLE,             value: "1"}
    - {name: RAY_memory_monitor_refresh_ms, value: "0"}
    # MX NIXL RDMA over RoCE — restricted TLS forces the RDMA path.
    - {name: UCX_TLS,                       value: "^tcp"}
    - {name: NIXL_UCX_TLS,                  value: "^tcp"}
    - {name: UCX_IB_GPU_DIRECT_RDMA,        value: "yes"}
    - {name: UCX_CUDA_COPY_DMABUF,          value: "yes"}
    - {name: MX_RDMA_NIC_PIN,               value: "auto"}
  headResources: &head_resources
    # Bumped (per mini_swe): driver coordinates 32 cross-pod workers + gym head
    # + swe_agents SPREAD runners.
    limits:   {cpu: "48",  memory: "128Gi"}
    requests: {cpu: "16",  memory: "64Gi"}
  gpuWorkerResources: &gpu_worker_resources
    limits:
      cpu: "132"
      memory: "900Gi"
      nvidia.com/gpu: "4"          # 4gpu
    requests:
      cpu: "120"
      memory: "850Gi"
      nvidia.com/gpu: "4"          # 4gpu
    claims:
      - {name: compute-domain-channel}   # cross-node NVLink (NCCL)
      - {name: roce-channel}             # NIXL RDMA (MX publisher)
  gpuHeadPorts: &gpu_head_ports
    - {containerPort: 6379,  name: gcs-server}
    - {containerPort: 8265,  name: dashboard}
    - {containerPort: 10001, name: client}
  codeMounts: &code_mounts
    - {mountPath: /dev/shm,           name: dshm}
    - {mountPath: /opt/nemo-rl,       name: rl-workspace, subPath: "${user:}/nemo-rl"}
    - {mountPath: /mnt/rl-workspace,  name: rl-workspace}
  headVolumes: &head_volumes
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 8Gi}
    - name: rl-workspace
      persistentVolumeClaim: {claimName: rl-workspace}
  workerVolumes: &worker_volumes
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 16Gi}
    - name: rl-workspace
      persistentVolumeClaim: {claimName: rl-workspace}
  # Install singularity-container + squashfuse + loop devices before Ready, so
  # swe_agents can `singularity exec` the SWE-bench arm64 .sif sandboxes.
  # Both pods (head + worker) need it — swe_agents runners use Ray SPREAD.
  singularityPostStart: &singularity_post_start
    postStart:
      exec:
        command:
          - /bin/bash
          - -lc
          - |
            set -u
            exec >>/tmp/postStart.log 2>&1
            # singularity-container + squashfuse are BAKED into the image
            # (infra/nrl_k8s/dynamo_mx/Dockerfile.nemorl) — runtime apt is
            # unreliable from these nodes. Here we only verify presence (fatal
            # if missing => the image wasn't rebuilt) and mknod the loop devices
            # (a runtime-only op the image can't bake).
            command -v singularity >/dev/null 2>&1 || { echo "[postStart] singularity MISSING — rebuild the image with singularity baked in"; exit 1; }
            command -v squashfuse  >/dev/null 2>&1 || { echo "[postStart] squashfuse MISSING — rebuild the image"; exit 1; }
            echo "[postStart] singularity: $(singularity --version)"
            # The swe_agents harness shells out to `apptainer` (not `singularity`);
            # the two CLIs are compatible. singularity-container only provides the
            # `singularity` binary, so symlink apptainer -> singularity.
            command -v apptainer >/dev/null 2>&1 || ln -sf "$(command -v singularity)" /usr/bin/apptainer
            echo "[postStart] apptainer: $(apptainer --version 2>&1 | head -1)"
            for i in 0 1 2 3 4 5 6 7; do
              [ -e /dev/loop$i ] || mknod -m 0660 /dev/loop$i b 7 $i || true
            done
            ls -l /dev/loop* 2>&1 | head -10
  privilegedSecurityContext: &privileged_security_context
    privileged: true                 # SIF mount needs CAP_SYS_ADMIN; CAP_MKNOD for loop; IPC_LOCK for NIXL
    capabilities:
      add: [IPC_LOCK]

# namespace auto-inferred from kube context.
# MX-capable arm64 training image (modelexpress + nixl baked in) + singularity-
# container/squashfuse baked in (Dockerfile.nemorl). REBUILD+PUSH this tag before
# launching: docker buildx build --platform linux/arm64 -t jwillthomson/nemo-rl-mx:06-04-singularity
#   -f infra/nrl_k8s/dynamo_mx/Dockerfile.nemorl . && docker push <same>
# NOTE: also confirm it carries nemo_automodel + deepep for the DTensor MoE path.
image: jwillthomson/nemo-rl-mx:06-04-v2
imagePullSecrets: [nvcr-secret]
serviceAccount: nemo-rl-endpoint-registry

labels:
  nrl-k8s/owner: ${user:}

submit:
  submitter: portForward

launch:
  mode: attach
  runMode: batch
  codeSource: image
  codePath: /opt/nemo-rl
  attach:
    training: ${user:}-rc-swe2-q30b-dynamo-mx
  peerWatcher: false
  env: {}
  entrypoint: |
    set -eu
    cd /opt/nemo-rl
    if [ ! -d /mnt/rl-workspace ]; then
      echo "ERROR: /mnt/rl-workspace not mounted — is the rl-workspace PVC bound?" >&2
      exit 1
    fi
    command -v singularity >/dev/null 2>&1 || {
      echo "ERROR: singularity not found on PATH; postStart hook failed?" >&2
      exit 1
    }
    echo "[setup] singularity: $(singularity --version 2>&1 | head -1)"

    # Shadow the image-baked modelexpress with the Lustre tree (e45a14f).
    # DTensor automodel — no Megatron-LM path needed.
    export PYTHONPATH=/mnt/rl-workspace/${user:}/modelexpress/modelexpress_client/python:.
    export MX_RDMA_NIC_PIN=auto
    TIMESTAMP=$(date -u +%Y%m%d-%H%M%S-%N)
    LOG_DIR=/mnt/rl-workspace/${user:}/driver_logs
    LOG=\${LOG_DIR}/${user:}-swe2-q30b-dynamo-mx-\${TIMESTAMP}.log
    mkdir -p "\${LOG_DIR}"

    PIPE=$(mktemp -u)
    mkfifo "\${PIPE}"
    tee "\${LOG}" < "\${PIPE}" &
    TEE_PID=$!

    RC=0
    # Full SWE2 config (recipe defaults: pps8/gpp8, max_turns=200, concurrency=512,
    # swebench_agent_timeout=1800, seqlen 131072). The MX heartbeat fix lets the
    # per-step refit survive past v2 (the old crash point) for a multi-step run.
    python -u examples/nemo_gym/run_grpo_nemo_gym.py \
      --config examples/nemo_gym/grpo_swe2_qwen3_30b_dynamo_mx_debug.yaml \
      +policy.generation.dynamo_cfg.dgd_name=${user:}-swe2-q30b-mx \
      grpo.max_num_steps=5 \
      logger.wandb.name=grpo-swe2-q30b-mx-24w-genmetrics \
      > "\${PIPE}" 2>&1 || RC=$?

    wait "\${TEE_PID}" || true
    rm -f "\${PIPE}"
    exit "\${RC}"

kuberay:
  training:
    name: ${user:}-rc-swe2-q30b-dynamo-mx
    labels:
      disagg.nemo-rl/cluster: swe2-q30b-dynamo-mx
      disagg.nemo-rl/run: swe2-q30b-dynamo-mx
      kai.scheduler/queue: backfill
    spec:
      rayVersion: "2.52.0"
      headGroupSpec:
        rayStartParams:
          dashboard-host: "0.0.0.0"
          no-monitor: "true"
          num-gpus: "0"
          object-store-memory: "100000000"
        template:
          spec:
            schedulerName: kai-scheduler
            dnsPolicy: ClusterFirst
            nodeSelector: *head_node_selector
            containers:
              - name: ray-head
                env: *shared_head_env
                envFrom: *user_secret_env_from
                resources: *head_resources
                ports: *gpu_head_ports
                volumeMounts: *code_mounts
                lifecycle: *singularity_post_start
                securityContext: *privileged_security_context
            volumes: *head_volumes
      workerGroupSpecs:
        - groupName: gpu-workers
          replicas: 4                  # 4 nodes x 4 GPU = 16 training GPU (FSDP dp=16, mocked trainer).
          minReplicas: 4               # extra nodes host the 512 SWE-agent sandboxes (RAM headroom).
          maxReplicas: 4
          numOfHosts: 1
          rayStartParams:
            num-gpus: "4"
            object-store-memory: "100000000"
          template:
            metadata:
              annotations:
                # Gang-schedule the 4 worker pods into one gb300 NVLink clique so
                # ComputeDomain spans all 16 GPUs (DTensor needs cross-node NCCL).
                kai.scheduler/topology: gb300-topology
                kai.scheduler/topology-required-placement: nvidia.com/gpu.clique
            spec:
              schedulerName: kai-scheduler
              dnsPolicy: ClusterFirst
              nodeSelector: *worker_node_selector
              # Exclude ip-7-248-83-146: broken aws-cni (ens177 "Link not found")
              # => FailedCreatePodSandBox / worker flap. Steer our pods off it (can't cordon).
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                      - matchExpressions:
                          - key: kubernetes.io/hostname
                            operator: NotIn
                            values:
                              - ip-7-248-83-146.us-east-2.compute.internal
              tolerations:
                - operator: Exists
              resourceClaims:
                - name: compute-domain-channel
                  resourceClaimTemplateName: compute-domain-swe2-q30b
                - name: roce-channel
                  resourceClaimTemplateName: roce-swe2-q30b
              containers:
                - name: ray-worker
                  env: *shared_worker_env
                  envFrom: *user_secret_env_from
                  resources: *gpu_worker_resources
                  securityContext: *privileged_security_context
                  lifecycle: *singularity_post_start
                  volumeMounts: *code_mounts
              volumes: *worker_volumes

dynamo:
  serving:
    manifest: ../examples_dgd/qwen3_30b_thinking_gb300_mx_4gpu.yaml
    name: ${user:}-swe2-q30b-mx          # 22 chars + VllmDecodeWorker(16) = 38 <= 45
    readyTimeoutS: 2400   # 32-replica DGD spans 16 fresh nodes (image pulls + 32 model loads + MX readiness)
