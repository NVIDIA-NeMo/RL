# Nano v3 GRPO with equivalence_llm_judge via Dynamo + Grove autoscaling
# — 4 training nodes × 4 GPUs on GB300 NVL72.
#
# Every sample hits the Dynamo LLM judge (100% trigger rate). The Planner
# monitors request load and scales VllmDecodeWorker replicas between 1 and 4.
#
# Topology: 4 training workers × 4 GPUs = 16 GPUs in a single RayCluster.
# Judge runs as an autoscaling DynamoGraphDeployment:
#   * Frontend (CPU, static)
#   * Planner (CPU, runs dynamo.planner for load-based scaling decisions)
#   * 1-4× VllmDecodeWorker (4 GPUs each, TP=4, with scalingAdapter)
#
# The Planner scales workers based on SLA targets (TTFT/ITL) and observed
# request load. During verification bursts (all 128 samples hitting the
# judge simultaneously), the Planner scales up; during training phases
# (no judge traffic), it scales back down to min_endpoint.
#
# Prereqs:
#   - Dynamo operator installed in the cluster
#   - planner-profile-data ConfigMap in the namespace
#   - Pre-download the judge model:
#     HF_HOME=/mnt/rl-workspace/terryk/hf-cache \
#       uvx --from huggingface-hub hf download Qwen/Qwen3-30B-A3B-Instruct-2507
#
# Compare with:
#   nanov3_equiv_judge_dynamo_4n4g.gb300.infra.yaml — Dynamo, no autoscaling
#   nanov3_equiv_judge_4n4g.gb300.infra.yaml — local_vllm_model baseline
#
# Usage:
#   RECIPE=examples/nemo_gym/grpo_nanov3_equiv_judge_dynamo_autoscale_4n4g.yaml
#   INFRA=infra/nrl_k8s/examples/nanov3_equiv_judge_dynamo_autoscale_4n4g.gb300.infra.yaml
#
#   nrl-k8s cluster down $RECIPE --infra $INFRA
#   sleep 20
#   nrl-k8s cluster up $RECIPE --infra $INFRA --wait
#   nrl-k8s run $RECIPE --infra $INFRA --wait --raycluster --replace

_shared:
  headNodeSelector: &head_node_selector
    nodeGroup: customer-cpu
  # DGD Frontend/Planner land on Karpenter-managed amd64 CPU nodes (nodePool
  # "cpu") to avoid contention with Ray head pods on the static customer-cpu
  # ARM nodes. The vllm-runtime image is multi-arch so amd64 works fine.
  frontendNodeSelector: &frontend_node_selector
    karpenter.sh/nodepool: cpu
  workerNodeSelector: &worker_node_selector
    nvidia.com/gpu.product: NVIDIA-GB300
  userSecretEnvFrom: &user_secret_env_from
    - secretRef:
        name: ${user:}-secrets
        optional: true
  headEnv: &shared_head_env
    - {name: HF_HOME,                        value: "/mnt/rl-workspace/${user:}/hf-cache"}
    - {name: NCCL_DEBUG,                     value: WARN}
    - {name: RAY_memory_monitor_refresh_ms,  value: "0"}
  workerEnv: &shared_worker_env
    - {name: HF_HOME,                        value: "/mnt/rl-workspace/${user:}/hf-cache"}
    - {name: NCCL_DEBUG,                     value: WARN}
    - {name: NCCL_MNNVL_ENABLE,              value: "1"}
    - {name: RAY_memory_monitor_refresh_ms,  value: "0"}
  headResources: &head_resources
    limits:   {cpu: "16", memory: "64Gi"}
    requests: {cpu: "8", memory: "32Gi"}
  gpuWorkerResources: &gpu_worker_resources
    limits:
      cpu: "132"
      memory: "900Gi"
      nvidia.com/gpu: "4"
    requests:
      cpu: "120"
      memory: "850Gi"
      nvidia.com/gpu: "4"
    claims:
      - {name: compute-domain-channel}
      - {name: roce-channel}
  gpuHeadPorts: &gpu_head_ports
    - {containerPort: 6379,  name: gcs-server}
    - {containerPort: 8265,  name: dashboard}
    - {containerPort: 10001, name: client}
  codeMounts: &code_mounts
    - {mountPath: /dev/shm, name: dshm}
    - {mountPath: /opt/nemo-rl, name: rl-workspace, subPath: "${user:}/nemo-rl"}
    - {mountPath: /mnt/rl-workspace, name: rl-workspace}
  headVolumes: &head_volumes
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 32Gi}
    - name: rl-workspace
      persistentVolumeClaim: {claimName: rl-workspace}
  workerVolumes: &worker_volumes
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 64Gi}
    - name: rl-workspace
      persistentVolumeClaim: {claimName: rl-workspace}

image: nvcr.io/nvidian/nemo-rl:664d29c-49528955
imagePullSecrets: [nvcr-secret]
serviceAccount: nemo-rl-endpoint-registry

labels:
  nrl-k8s/owner: ${user:}

submit:
  submitter: portForward

launch:
  mode: attach
  runMode: batch
  codeSource: image
  codePath: /opt/nemo-rl
  attach:
    training: ${user:}-raycluster-equiv-judge-as-gb300
  peerWatcher: false
  env: {}
  entrypoint: |
    set -eu
    cd /opt/nemo-rl
    if [ ! -d /mnt/rl-workspace ]; then
      echo "ERROR: /mnt/rl-workspace not mounted — is the rl-workspace PVC bound?" >&2
      exit 1
    fi
    export RAY_enable_infeasible_task_early_exit=true
    export PYTHONPATH=.:3rdparty/Megatron-LM-workspace/Megatron-LM
    TIMESTAMP=$(date -u +%Y%m%d-%H%M%S-%N)
    LOG_DIR=/mnt/rl-workspace/${user:}/driver_logs
    NEMO_GYM_LOG_DIR=/mnt/rl-workspace/${user:}/gym_logs/${user:}-equiv-judge-as-\${TIMESTAMP}
    LOG=\${LOG_DIR}/${user:}-equiv-judge-as-gb300-\${TIMESTAMP}.log
    CHECKPOINT_DIR=/mnt/rl-workspace/${user:}/results/nanov3-equiv-judge-dynamo-autoscale-4n4g
    mkdir -p "\${LOG_DIR}" "\${CHECKPOINT_DIR}" "\${NEMO_GYM_LOG_DIR}"

    python -u examples/nemo_gym/run_grpo_nemo_gym.py \
      --config examples/nemo_gym/grpo_nanov3_equiv_judge_dynamo_autoscale_4n4g.yaml \
      data.train.data_path=/mnt/rl-workspace/terryk/data/equivalence_llm_judge/train.jsonl \
      data.validation.data_path=/mnt/rl-workspace/terryk/data/equivalence_llm_judge/val.jsonl \
      checkpointing.checkpoint_dir=\${CHECKPOINT_DIR} \
      logger.log_dir=\${CHECKPOINT_DIR}/logs \
      logger.wandb_enabled=true \
      logger.tensorboard_enabled=true \
      logger.monitor_gpus=true \
      logger.wandb.project=nemorl-nanov3-judge \
      logger.wandb.name=nanov3-equiv-judge-dynamo-autoscale-4n4g-gb300 \
      +env.nemo_gym.nemo_gym_log_dir=\${NEMO_GYM_LOG_DIR} \
      "env.nemo_gym.dynamo_judge.responses_api_models.vllm_model.base_url=http://${user:}-equiv-judge-as-frontend:8000/v1" \
      2>&1 | tee "\${LOG}"

kuberay:
  training:
    name: ${user:}-raycluster-equiv-judge-as-gb300
    segmentSize: 1
    labels:
      disagg.nemo-rl/cluster: equiv-judge-as-gb300
      disagg.nemo-rl/run: equiv-judge-as-gb300
      kai.scheduler/queue: backfill
    spec:
      rayVersion: "2.52.0"
      headGroupSpec:
        rayStartParams:
          dashboard-host: "0.0.0.0"
          no-monitor: "true"
          num-gpus: "0"
          object-store-memory: "200000000"
        template:
          spec:
            schedulerName: kai-scheduler
            dnsPolicy: ClusterFirst
            nodeSelector: *head_node_selector
            containers:
              - name: ray-head
                env: *shared_head_env
                envFrom: *user_secret_env_from
                resources: *head_resources
                ports: *gpu_head_ports
                volumeMounts: *code_mounts
            volumes: *head_volumes
      workerGroupSpecs:
        - groupName: gpu-workers
          replicas: 4
          minReplicas: 4
          maxReplicas: 4
          numOfHosts: 1
          rayStartParams:
            num-gpus: "4"
            object-store-memory: "200000000"
          template:
            metadata:
              annotations:
                kai.scheduler/topology: gb300-topology
                kai.scheduler/topology-required-placement: nvidia.com/gpu.clique
            spec:
              schedulerName: kai-scheduler
              dnsPolicy: ClusterFirst
              nodeSelector: *worker_node_selector
              tolerations:
                - operator: Exists
              resourceClaims:
                - name: compute-domain-channel
                  resourceClaimTemplateName: compute-domain-equiv-judge-as
                - name: roce-channel
                  resourceClaimTemplateName: roce-equiv-judge-as
              containers:
                - name: ray-worker
                  env: *shared_worker_env
                  envFrom: *user_secret_env_from
                  resources: *gpu_worker_resources
                  securityContext:
                    capabilities:
                      add: [IPC_LOCK]
                  volumeMounts: *code_mounts
              volumes: *worker_volumes

dynamo:
  serving:
    name: ${user:}-equiv-judge-as
    readyTimeoutS: 900
    annotations:
      nvidia.com/kai-scheduler-queue: backfill
    spec:
      services:
        Frontend:
          componentType: frontend
          replicas: 1
          resources:
            requests: {cpu: "2", memory: "4Gi"}
            limits:   {cpu: "4", memory: "8Gi"}
          extraPodSpec:
            nodeSelector: *frontend_node_selector
            mainContainer:
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
              workingDir: /workspace
              command: [python3, -m, dynamo.frontend]
              args: [--router-reset-states]
        Planner:
          componentType: planner
          replicas: 1
          resources:
            requests: {cpu: "1", memory: "2Gi"}
            limits:   {cpu: "2", memory: "4Gi"}
          extraPodSpec:
            nodeSelector: *frontend_node_selector
            mainContainer:
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
              command: [bash, -c]
              args:
                - |
                  python3 -c "import filterpy, pmdarima, prophet, sklearn, kubernetes_asyncio" 2>/dev/null || \
                    pip install --quiet \
                      filterpy==1.4.5 pmdarima==2.1.1 prophet==1.2.1 \
                      scikit-learn==1.7.2 'scipy>=1.14.0,<2.0' \
                      kubernetes_asyncio==32.0.0 prometheus-api-client==0.6.0 \
                      plotly aiofiles
                  exec python3 -m dynamo.planner --config '{"environment":"kubernetes","backend":"vllm","mode":"agg","optimization_target":"sla","enable_throughput_scaling":false,"enable_load_scaling":true,"ttft":30000.0,"itl":5000.0,"throughput_adjustment_interval":60,"load_adjustment_interval":15,"min_endpoint":1,"decode_engine_num_gpu":4,"model_name":"Qwen/Qwen3-30B-A3B-Instruct-2507","profile_results_dir":"/workspace/profiling_results"}'
              volumeMounts:
                - {mountPath: /workspace/profiling_results, name: planner-profile-data, readOnly: true}
            volumes:
              - name: planner-profile-data
                configMap: {name: planner-profile-data}
        VllmDecodeWorker:
          componentType: worker
          replicas: 4
          resources:
            requests: {gpu: "4", memory: "512Gi"}
            limits:   {gpu: "4", memory: "700Gi"}
          scalingAdapter:
            enabled: true
          extraPodSpec:
            nodeSelector: *worker_node_selector
            mainContainer:
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
              workingDir: /workspace
              command: [python3, -m, dynamo.vllm]
              args:
                - --model
                - Qwen/Qwen3-30B-A3B-Instruct-2507
                - --tensor-parallel-size
                - "4"
                - --gpu-memory-utilization
                - "0.9"
                - --dyn-tool-call-parser
                - hermes
                - --kv-events-config
                - '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:20080","enable_kv_cache_events":true}'
              env:
                - {name: DYN_HEALTH_CHECK_ENABLED, value: "false"}
                - {name: HF_HOME, value: "/mnt/rl-workspace/${user:}/hf-cache"}
              volumeMounts:
                - {mountPath: /mnt/rl-workspace, name: rl-workspace}
            volumes:
              - name: rl-workspace
                persistentVolumeClaim: {claimName: rl-workspace}
