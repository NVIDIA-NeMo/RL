# DynamoGraphDeployment for Qwen3-4B-Thinking on a GB300 cluster, **MX-enabled**,
# scaled out to **16 × TP=2 decode workers** for a weight-transfer perf benchmark.
#
# Sibling of qwen3_4b_thinking_gb300_mx.yaml. Only the VllmDecodeWorker shape
# changes:
#   * replicas: 16            (was 1)
#   * --tensor-parallel-size 2 (was 1)  → each pod claims 2 GB300 GPUs (NVLink-
#                                          local; a GB300 node has 4 GPUs, so 2
#                                          TP2 workers land per node, 8 nodes total)
#   * resources.gpu: 2         (was 1)
#   * RoCE claim template name → roce-mx-qwen3-4b-16tp2 (unique per DGD so the
#                                nrl-k8s CLI's auto-created ResourceClaimTemplate
#                                doesn't collide with the 1-worker MX DGD).
#
# 16 receivers means the trainer fans weights out to 32 inference ranks. The
# paired recipe enables mx_config.tree_scale_out so receivers republish and
# pull from peers rather than all contending on the trainer's NIC.
#
# Everything else (NIXL/UCX env, NIXL_PLUGIN_DIR, MX refit gating, frontend)
# is identical to the 1-worker MX DGD.

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-4b-thinking-gb300-mx-16tp2
  annotations:
    nvidia.com/kai-scheduler-queue: backfill
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      extraPodSpec:
        nodeSelector:
          nodeGroup: customer-cpu
          # Pin to arm64 — the dynamo image is arm64-only and the customer-cpu
          # pool has mixed arches.
          kubernetes.io/arch: arm64
        mainContainer:
          # Frontend doesn't need MX — same image as the non-MX variant works.
          image: jwillthomson/dynamo-arm-rl-tokenize-endpoint-91cdc71:latest
          workingDir: /workspace
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-reset-states
    VllmDecodeWorker:
      componentType: worker
      replicas: 16
      envFromSecret: jothomson-secrets
      resources:
        requests:
          gpu: "2"
          memory: "64Gi"
        limits:
          gpu: "2"
          memory: "128Gi"
      extraPodSpec:
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-GB300
        # RoCE DRA claim — required for NIXL RDMA. The nrl-k8s CLI will
        # auto-create the matching ResourceClaimTemplate (named
        # "roce-mx-qwen3-4b-16tp2") at apply time based on this reference.
        resourceClaims:
          - name: roce-channel
            resourceClaimTemplateName: roce-mx-qwen3-4b-16tp2
        # Shared rl-workspace PVC — used by HF cache and any ad-hoc debug
        # paths inside the pod.
        volumes:
          - name: rl-workspace
            persistentVolumeClaim:
              claimName: rl-workspace
        mainContainer:
          # dynamo worker image baked from
          # jthomson04/tokenize-endpoint-merge-main-05-07 @ 8590c2694e —
          # tokenize-endpoint + MX v2 mid-training refit + bundled-UCX nixl +
          # modelexpress @ kavink/nemo_rl_moe @ 8594fd6. See sibling DGD for
          # the full provenance note.
          #
          # Tree fan-out overlay: the baked modelexpress + dynamo extension
          # predate the inference_replica heartbeat / worker_id /
          # named_parameters fixes. Overlay the post-fix sources from Lustre
          # into the venv before dynamo.vllm starts. Same pattern as the
          # 1-pod MX DGD; copy modelexpress to /tmp first (Lustre egg-info
          # mtime issue) then pip install --force-reinstall --no-deps; then
          # cp the extension.py over the baked file.
          image: jwillthomson/dynamo-arm-tokenize-endpoint-8590c26:latest
          workingDir: /workspace
          volumeMounts:
            - mountPath: /mnt/rl-workspace
              name: rl-workspace
          command:
            - /bin/bash
            - -c
            - |
              echo "[mx-debug] start $(date -u +%FT%TZ)"
              MX_SRC=/tmp/mx-src
              rm -rf "$MX_SRC"
              cp -a /mnt/rl-workspace/jothomson/modelexpress/modelexpress_client/python "$MX_SRC"
              rm -rf "$MX_SRC"/modelexpress.egg-info "$MX_SRC"/build "$MX_SRC"/__pycache__
              echo "[mx-debug] installing overlay from $MX_SRC"
              /opt/dynamo/venv/bin/pip install --force-reinstall --no-deps "$MX_SRC"
              INSTALL_RC=$?
              echo "[mx-debug] pip install exit=$INSTALL_RC"
              if [ "$INSTALL_RC" -ne 0 ]; then
                echo "[mx-debug] FATAL: overlay install failed"
                exit "$INSTALL_RC"
              fi
              MXRX_SRC=/mnt/rl-workspace/jothomson/dynamo/components/src/dynamo/vllm/mx_refit/extension.py
              MXRX_DST=/opt/dynamo/venv/lib/python3.12/site-packages/dynamo/vllm/mx_refit/extension.py
              if [ -f "$MXRX_SRC" ]; then
                cp "$MXRX_SRC" "$MXRX_DST"
                echo "[mx-debug] overlaid extension.py: $(md5sum $MXRX_DST | cut -d' ' -f1)"
              else
                echo "[mx-debug] WARN: $MXRX_SRC missing; not overlaying extension.py"
              fi
              echo "[mx-debug] handoff to dynamo.vllm $(date -u +%FT%TZ)"
              exec python3 -m dynamo.vllm "$@"
            - --   # script-name placeholder so dynamo args land as $1, $2, ...
          args:
            - --model
            - Qwen/Qwen3-4B-Thinking-2507
            - --tensor-parallel-size
            - "2"
            - --gpu-memory-utilization
            - "0.85"
            - --max-model-len
            - "16384"
            - --enforce-eager
            - --dyn-tool-call-parser
            - hermes
            - --dyn-reasoning-parser
            - qwen3
          # RoCE NIC visible to the user-space NIXL agent.
          resources:
            claims:
              - name: roce-channel
          env:
            - name: DYN_HEALTH_CHECK_ENABLED
              value: "false"
            # Shared Lustre HF cache (model pre-staged) instead of per-pod
            # /tmp — 16 workers downloading Qwen3-4B simultaneously hit HF
            # HTTP 429 and crashloop. The populated cache means no weight
            # re-download (no 429) even online.
            #
            # IMPORTANT: do NOT set HF_HUB_OFFLINE/TRANSFORMERS_OFFLINE here.
            # Offline mode makes vLLM resolve --model to the local snapshot
            # PATH, so vllm_config.model_config.model becomes
            # ".../snapshots/<hash>" instead of "Qwen/Qwen3-4B-Thinking-2507".
            # The MX receiver's discover_v2_sources filters sources by that
            # exact string against the trainer's published model_name (the HF
            # id), so the path mismatch rejects every source → "no v2 source
            # available". Keeping it online (cache-backed) preserves the HF id.
            - name: HF_HOME
              value: /mnt/rl-workspace/jothomson/hf-cache
            # The dynamo operator hardcodes NIXL_PLUGIN_DIR to
            # /opt/nvidia/nvda_nixl/lib64/plugins (GDS only, no UCX). The
            # bundled-UCX nixl wheel puts libplugin_UCX.so under
            # nixl_cu12.libs/nixl/ — point NIXL at the venv path.
            - name: NIXL_PLUGIN_DIR
              value: "/opt/dynamo/venv/lib/python3.12/site-packages/nixl_cu12.libs/nixl"
            # ModelExpress v2 refit gating + discovery.
            - name: DYN_MX_REFIT_ENABLED
              value: "1"
            - name: MODEL_EXPRESS_URL
              value: "modelexpress-server.default.svc.cluster.local:8001"
            # Restricted TLS (rc,cuda_copy) forces the RDMA path even within a
            # host; the broader set caused prep_xfer_dlist failures for
            # cross-pod CUDA descriptors. See sibling DGD comments.
            - name: UCX_TLS
              value: "rc,cuda_copy"
            - name: NIXL_UCX_TLS
              value: "rc,cuda_copy"
            - name: UCX_IB_GPU_DIRECT_RDMA
              value: "yes"
            - name: UCX_CUDA_COPY_DMABUF
              value: "yes"
            - name: UCX_LOG_LEVEL
              value: "info"
            - name: MX_RDMA_NIC_PIN
              value: "auto"
