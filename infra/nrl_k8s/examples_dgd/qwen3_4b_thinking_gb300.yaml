# DynamoGraphDeployment for Qwen3-4B-Thinking on a GB300 cluster.
#
# Two services:
#   * Frontend (CPU only, lands on customer-cpu via nodeSelector)
#   * 1× VllmDecodeWorker (1 GPU on a GB300 node)
#
# Image: a personal arm64 + Blackwell build of the dynamo vllm-runtime.
# nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.2 ships only Hopper-and-earlier
# CUDA cubins, so its custom kernels (e.g. TopKMaskLogits) fail on SM 100.
#
# vLLM args mirror what we proved working for the colocated WPA smoke:
#   --tool-call-parser hermes  (vLLM's Qwen-family tool parser)
#   --reasoning-parser deepseek_r1  (extracts <think>…</think> blocks
#     from Qwen3-Thinking output)
#   --enable-auto-tool-choice  (required for the parser to fire)
#
# Frontend args: [--router-reset-states] is intentional — the upstream image
# carries a default CMD of ['-m', 'dynamo.frontend', ...]. K8s overrides
# ENTRYPOINT (via `command`) but leaves CMD in the args slot, so without an
# explicit non-empty `args` the python frontend ends up parsing
# '-m dynamo.frontend' as user input and crash-loops.

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-4b-thinking-gb300
  annotations:
    # Tells the dynamo operator which kai-scheduler queue to stamp on
    # the PodCliques' pods. The cluster's Kyverno admission webhook
    # only allows {"backfill","default-queue"} from this serviceaccount;
    # the operator's default of "dynamo" gets rejected.
    nvidia.com/kai-scheduler-queue: backfill
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      extraPodSpec:
        nodeSelector:
          nodeGroup: customer-cpu
        mainContainer:
          image: jwillthomson/dynamo-arm-rl-tokenize-endpoint-07c4f28:latest
          workingDir: /workspace
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-reset-states
    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      envFromSecret: jothomson-secrets
      resources:
        requests:
          gpu: "1"
          memory: "64Gi"
        limits:
          gpu: "1"
          memory: "128Gi"
      extraPodSpec:
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-GB300
        mainContainer:
          image: jwillthomson/dynamo-arm-rl-tokenize-endpoint-07c4f28:latest
          workingDir: /workspace
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - Qwen/Qwen3-4B-Thinking-2507
            - --enable-rl
            - --tensor-parallel-size
            - "1"
            - --gpu-memory-utilization
            - "0.85"
            - --max-model-len
            - "16384"
            - --enforce-eager
            # Dynamo-specific tool-call + reasoning parsers (note the
            # --dyn- prefix — vLLM's --tool-call-parser / --reasoning-parser
            # are server-only flags, but in Dynamo the worker handles tool
            # parsing because the frontend is a Rust binary that just
            # routes OpenAI-protocol traffic).
            - --dyn-tool-call-parser
            - hermes
            - --dyn-reasoning-parser
            - qwen3
          env:
            - name: DYN_HEALTH_CHECK_ENABLED
              value: "false"
            - name: HF_HOME
              value: /tmp/hf-cache
