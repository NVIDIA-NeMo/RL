# DynamoGraphDeployment for Qwen3-4B-Thinking on a GB300 cluster, **MX-enabled**.
#
# Sibling of qwen3_4b_thinking_gb300.yaml — identical model + parsers, but with
# ModelExpress v2 mid-training weight refit wired into the VllmDecodeWorker:
#
#   1. DYN_MX_REFIT_ENABLED=1                 → dynamo's main.py sets
#                                              parallel_config.worker_extension_cls
#                                              to MxRefitWorkerExtension.
#   2. MODEL_EXPRESS_URL=modelexpress-server.<ns>.svc.cluster.local:8001
#                                            → MxV2RefitReceiver knows where to
#                                              discover the trainer's published
#                                              weight metadata.
#   3. RoCE DRA claim                        → each worker pod gets a RoCE NIC
#                                              for NIXL RDMA pulls.
#
# Frontend is unchanged from the non-MX variant.
#
# Apply manually for ad-hoc testing, or reference it from an infra YAML's
# `dynamo:` block.
#
# Image expectations: the worker image must include modelexpress
# (kavink/nemo_rl_moe @ 8594fd6) + the bundled-UCX nixl wheel — see
# jthomson04/tokenize-endpoint-merge-main-05-07 @ 8590c2694e on
# ai-dynamo/dynamo for the build recipe.

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-4b-thinking-gb300-mx
  annotations:
    nvidia.com/kai-scheduler-queue: backfill
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      extraPodSpec:
        nodeSelector:
          nodeGroup: customer-cpu
          # Pin to arm64 — the dynamo image is arm64-only and the customer-cpu
          # pool has mixed arches.
          kubernetes.io/arch: arm64
        mainContainer:
          # Frontend doesn't need MX — same image as the non-MX variant works.
          image: jwillthomson/dynamo-arm-rl-tokenize-endpoint-91cdc71:latest
          workingDir: /workspace
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-reset-states
    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      envFromSecret: jothomson-secrets
      resources:
        requests:
          gpu: "1"
          memory: "64Gi"
        limits:
          gpu: "1"
          memory: "128Gi"
      extraPodSpec:
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-GB300
        # RoCE DRA claim — required for NIXL RDMA. The nrl-k8s CLI will
        # auto-create the matching ResourceClaimTemplate (named "roce-mx-qwen3-4b")
        # at apply time based on this reference. Same mechanism as the
        # training-pod RoCE claims in
        # infra/nrl_k8s/examples/grpo_mini_swe_nemotron_v3.gb300.infra.yaml.
        resourceClaims:
          - name: roce-channel
            resourceClaimTemplateName: roce-mx-qwen3-4b
        # Shared rl-workspace PVC — used by HF cache and any ad-hoc debug
        # paths inside the pod. Worker doesn't read code from here anymore
        # (dynamo + modelexpress are baked into the image).
        volumes:
          - name: rl-workspace
            persistentVolumeClaim:
              claimName: rl-workspace
        mainContainer:
          # dynamo worker image baked from
          # jthomson04/tokenize-endpoint-merge-main-05-07 @ 8590c2694e:
          #   - tokenize-endpoint feature
          #   - ModelExpress v2 mid-training refit + synchronous /engine/<route>
          #     RPC integration
          #   - UCX bundled inside the nixl_cu12 wheel (commit 8590c2694e:
          #     auditwheel repair + contrib/wheel_add_ucx_plugins.py)
          #   - modelexpress @ kavink/nemo_rl_moe @ 8594fd6 (sidecar fix +
          #     post-rebase fixups) via ENABLE_MODELEXPRESS_P2P=true +
          #     MODELEXPRESS_REF=8594fd6 at build time.
          image: jwillthomson/dynamo-arm-tokenize-endpoint-8590c26:latest
          workingDir: /workspace
          volumeMounts:
            - mountPath: /mnt/rl-workspace
              name: rl-workspace
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - Qwen/Qwen3-4B-Thinking-2507
            - --tensor-parallel-size
            - "1"
            - --gpu-memory-utilization
            - "0.85"
            - --max-model-len
            - "16384"
            - --enforce-eager
            - --dyn-tool-call-parser
            - hermes
            - --dyn-reasoning-parser
            - qwen3
          # RoCE NIC visible to the user-space NIXL agent.
          resources:
            claims:
              - name: roce-channel
          env:
            - name: DYN_HEALTH_CHECK_ENABLED
              value: "false"
            - name: HF_HOME
              value: /tmp/hf-cache
            # The dynamo operator hardcodes NIXL_PLUGIN_DIR to
            # /opt/nvidia/nvda_nixl/lib64/plugins (which only has GDS, not
            # UCX). The bundled-UCX nixl wheel installed in the venv puts
            # libplugin_UCX.so under nixl_cu12.libs/nixl/ — point NIXL at
            # the venv path so its UCX backend can actually load.
            - name: NIXL_PLUGIN_DIR
              value: "/opt/dynamo/venv/lib/python3.12/site-packages/nixl_cu12.libs/nixl"
            # ModelExpress v2 refit gating + discovery.
            - name: DYN_MX_REFIT_ENABLED
              value: "1"
            - name: MODEL_EXPRESS_URL
              # The trainer side sets the same URL in its MxConfig; both halves
              # must agree for the picker to match same-rank pairs. Replace
              # "default" with the namespace where modelexpress-server was
              # applied if it lives elsewhere.
              value: "modelexpress-server.default.svc.cluster.local:8001"
            # RDMA over RoCE + cuda_copy for dma-buf staging. The full
            # set "cuda_copy,cuda_ipc,rc,sm,self" caused prep_xfer_dlist
            # to fail in e2e even though the standalone repro PASSED with
            # the restricted set "rc,cuda_copy" — UCX picks intra-host
            # transports (sm/cuda_ipc/self) first and prep_xfer_dlist
            # fails for cross-pod descriptors. Restricting to rc+cuda_copy
            # forces RDMA path even within same host.
            - name: UCX_TLS
              value: "rc,cuda_copy"
            - name: NIXL_UCX_TLS
              value: "rc,cuda_copy"
            # Enable dma-buf for GPU memory registration with the IB
            # transport. These knobs default to "try" but the standalone
            # two-process repro confirmed prep_xfer_dlist only succeeds
            # for CUDA descriptors when explicitly forced to "yes".
            # (UCX_IB_REG_METHODS is NOT a real env var in UCX 1.20.1
            # — it's silently ignored if set; use the two below.)
            - name: UCX_IB_GPU_DIRECT_RDMA
              value: "yes"
            - name: UCX_CUDA_COPY_DMABUF
              value: "yes"
            - name: UCX_LOG_LEVEL
              value: "info"
            # RDMA path benefits from NUMA-local NIC selection.
            - name: MX_RDMA_NIC_PIN
              value: "auto"
