# DynamoGraphDeployment for meta-llama/Llama-3.1-8B-Instruct on GB300.
#
# Used by the V2 Megatron + Dynamo + ModelExpress smoke. The container image is
# intentionally not rebuilt; startup overlays Modelexpress PR 429 and the
# Megatron-capable Dynamo mx_refit extension from the NeMo-RL worktree.

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: llama3-1-8b-instruct-gb300-mx
  annotations:
    nvidia.com/kai-scheduler-queue: backfill
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      extraPodSpec:
        nodeSelector:
          nodeGroup: customer-cpu
          kubernetes.io/arch: arm64
        tolerations:
          - operator: Exists
        volumes:
          - name: rl-workspace
            persistentVolumeClaim:
              claimName: rl-workspace
        mainContainer:
          image: jwillthomson/dynamo-arm-tokenize-endpoint-3c63dd69-mx
          workingDir: /workspace
          volumeMounts:
            - mountPath: /mnt/rl-workspace
              name: rl-workspace
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-reset-states
          env:
            - name: HF_HOME
              value: /mnt/rl-workspace/jothomson/hf-cache
    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      envFromSecret: jothomson-secrets
      resources:
        requests:
          gpu: "1"
          memory: "96Gi"
        limits:
          gpu: "1"
          memory: "192Gi"
      extraPodSpec:
        # Runtime overlay writes the Megatron-capable mx_refit extension into
        # the image's system site-packages. Drop this after rebuilding Dynamo.
        securityContext:
          runAsUser: 0
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-GB300
        tolerations:
          - operator: Exists
        resourceClaims:
          - name: roce-channel
            # nrl-k8s only creates RayCluster-side DRA templates. DGD workers
            # use this pre-provisioned RoCE template, shared by existing MX
            # single-worker DGD exemplars.
            resourceClaimTemplateName: roce-mx-qwen3-4b
        volumes:
          - name: rl-workspace
            persistentVolumeClaim:
              claimName: rl-workspace
        mainContainer:
          image: jwillthomson/dynamo-arm-tokenize-endpoint-3c63dd69-mx
          workingDir: /workspace
          volumeMounts:
            - mountPath: /mnt/rl-workspace
              name: rl-workspace
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "[startup] dynamo.vllm llama3.1-8b mx $(date -u +%FT%TZ)"

              MX_SRC=/tmp/mx-src
              rm -rf "$MX_SRC"
              cp -a /mnt/rl-workspace/jothomson/modelexpress-pr429/modelexpress_client/python "$MX_SRC"
              rm -rf "$MX_SRC"/modelexpress.egg-info "$MX_SRC"/build "$MX_SRC"/__pycache__
              export PYTHONPATH="$MX_SRC:${PYTHONPATH:-}"

              MXRX_SRC=/mnt/rl-workspace/jothomson/nemo-rl-megatron-dynamo-mx-v2/infra/nrl_k8s/dynamo_mx/mx_refit_extension_megatron.py
              DYN_SITE=$(python3 - <<'PY'
              import importlib.util

              spec = importlib.util.find_spec("dynamo")
              if spec is None or spec.submodule_search_locations is None:
                  raise RuntimeError("Could not locate installed dynamo package")
              print(next(iter(spec.submodule_search_locations)))
              PY
              )
              MXRX_DST="$DYN_SITE/vllm/mx_refit/extension.py"
              mkdir -p "$(dirname "$MXRX_DST")"
              cp "$MXRX_SRC" "$MXRX_DST"

              python3 - <<'PY'
              import modelexpress
              from modelexpress.engines.vllm.registration import _PLUGIN_LOAD_FORMATS
              import modelexpress.megatron_translator as mt
              import dynamo.vllm.mx_refit.extension as mx_ext
              print("modelexpress at", modelexpress.__file__)
              print("_PLUGIN_LOAD_FORMATS =", _PLUGIN_LOAD_FORMATS)
              print("megatron translator at", mt.__file__)
              print("mx refit extension at", mx_ext.__file__)
              PY

              exec python3 -m dynamo.vllm "$@"
            - --
          args:
            - --model
            - meta-llama/Llama-3.1-8B-Instruct
            - --served-model-name
            - meta-llama/Llama-3.1-8B-Instruct
            - --load-format
            - mx
            - --model-express-url
            - modelexpress-server.default.svc.cluster.local:8001
            - --tensor-parallel-size
            - "1"
            - --dtype
            - bfloat16
            - --gpu-memory-utilization
            - "0.8"
            - --max-model-len
            - "4096"
            - --max-num-seqs
            - "16"
            - --max-num-batched-tokens
            - "8192"
            - --enforce-eager
          resources:
            claims:
              - name: roce-channel
          env:
            - name: DYN_HEALTH_CHECK_ENABLED
              value: "false"
            - name: DYN_SYSTEM_PORT
              value: "9090"
            - name: HF_HOME
              value: /mnt/rl-workspace/jothomson/hf-cache
            - name: DYN_MX_REFIT_ENABLED
              value: "1"
            - name: MODEL_EXPRESS_URL
              value: "modelexpress-server.default.svc.cluster.local:8001"
            - name: UCX_TLS
              value: "rc,cuda_copy"
            - name: NIXL_UCX_TLS
              value: "rc,cuda_copy"
            - name: UCX_IB_GPU_DIRECT_RDMA
              value: "yes"
            - name: UCX_CUDA_COPY_DMABUF
              value: "yes"
            - name: UCX_LOG_LEVEL
              value: "info"
            - name: MX_RDMA_NIC_PIN
              value: "auto"
