# DynamoGraphDeployment for Nemotron-3-Nano-30B-A3B-BF16 on GB300.
#
# Single decoder pod, 1 GPU. The 30B MoE BF16 weights are ~60GB —
# easily fits in one GB300 GPU's HBM (~282GB). Inference TP=1.
#
# Model is pre-staged on shared Lustre at
# /mnt/rl-workspace/jothomson/nemotron-nano-v3/ (downloaded via
# `hf download nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
# --local-dir ...`). Frontend + worker both mount Lustre and
# point --model at the local snapshot path, matching the pattern
# we proved out for Qwen3-4B-Thinking in the planner/fault tests.
#
# Parsers carry over from the Nemotron-Nano-V2 DGD:
#   * --dyn-tool-call-parser nemotron_deci  (handles the
#     <TOOLCALL>[{...}]</TOOLCALL> array Nemotron emits, not the
#     per-call <tool_call> blocks Qwen3 uses)
#   * --dyn-reasoning-parser nemotron_nano  (extracts
#     <think>...</think> blocks; uses the DeepseekR1 reasoning
#     parser under the hood but is the canonical key for the
#     Nemotron-Nano family)
#
# `--mamba-ssm-cache-dtype float32` is explicit even though the
# model's config.json already sets it — Nemotron-Nano is a hybrid
# Mamba and needs fp32 SSM state for numerical stability.

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: nemotron-nano-v3-gb300
  annotations:
    nvidia.com/kai-scheduler-queue: backfill
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      envFromSecret: jothomson-secrets
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      extraPodSpec:
        nodeSelector:
          nodeGroup: customer-cpu
        volumes:
          - name: rl-workspace
            persistentVolumeClaim:
              claimName: rl-workspace
        mainContainer:
          image: jwillthomson/dynamo-arm-rl-tokenize-endpoint-cc1bdc:latest
          workingDir: /workspace
          volumeMounts:
            - mountPath: /mnt/rl-workspace
              name: rl-workspace
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-reset-states
            - --model-path
            - /mnt/rl-workspace/jothomson/nemotron-nano-v3
            - --model-name
            - nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      envFromSecret: jothomson-secrets
      resources:
        requests:
          gpu: "1"
          memory: "128Gi"
        limits:
          gpu: "1"
          memory: "200Gi"
      extraPodSpec:
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-GB300
        volumes:
          - name: rl-workspace
            persistentVolumeClaim:
              claimName: rl-workspace
        mainContainer:
          image: jwillthomson/dynamo-arm-rl-tokenize-endpoint-cc1bdc:latest
          workingDir: /workspace
          volumeMounts:
            - mountPath: /mnt/rl-workspace
              name: rl-workspace
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - /mnt/rl-workspace/jothomson/nemotron-nano-v3
            - --served-model-name
            - nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
            - --tensor-parallel-size
            - "1"
            - --gpu-memory-utilization
            - "0.85"
            - --max-model-len
            - "16384"
            - --enforce-eager
            - --mamba-ssm-cache-dtype
            - float32
            - --dyn-tool-call-parser
            - nemotron_deci
            - --dyn-reasoning-parser
            - nemotron_nano
          env:
            - name: DYN_HEALTH_CHECK_ENABLED
              value: "false"
            - name: HF_HOME
              value: /mnt/rl-workspace/jothomson/hf-cache
