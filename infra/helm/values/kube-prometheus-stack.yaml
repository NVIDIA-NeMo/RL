# Prometheus + Grafana for KAI scheduler fairshare monitoring.
#
# Access Grafana: kubectl port-forward svc/kube-prometheus-stack-grafana -n monitoring 3000:80
# Default credentials: admin / prom-operator

prometheus:
  prometheusSpec:
    # Scrape KAI metrics from the kai-scheduler namespace.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    # Reduce resource usage for kind dev cluster.
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 2Gi
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

grafana:
  enabled: true
  adminPassword: prom-operator
  persistence:
    enabled: false
  sidecar:
    dashboards:
      enabled: true          # auto-discovers ConfigMaps with grafana_dashboard: "1"
      searchNamespace: ALL
    datasources:
      enabled: true

# Disable components we don't need on a kind dev cluster.
alertmanager:
  enabled: false
nodeExporter:
  enabled: false
kubeStateMetrics:
  enabled: false
