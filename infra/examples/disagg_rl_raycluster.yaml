# Disaggregated RL RayCluster with peer-watcher sidecar.
# Runs nemo-rl GRPO training with vLLM workers.
# Uses K8s ConfigMap endpoint registry for service discovery with the Gym cluster.
# The peer-watcher sidecar monitors raycluster-gym and tears down both clusters
# if the Gym cluster fails or the application signals an error.
#
# Prerequisites:
#   kubectl apply -f endpoint-registry-rbac.yaml
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raycluster-rl
  labels:
    kai.scheduler/queue: priority-team
spec:
  rayVersion: "2.52.0"
  headGroupSpec:
    rayStartParams:
      object-store-memory: "200000000"
    template:
      spec:
        serviceAccountName: nemo-rl-endpoint-registry
        schedulerName: kai-scheduler
        imagePullSecrets:
        - name: nvcr-secret
        containers:
        - name: ray-head
          image: nvcr.io/nvidian/nemo-rl:e5a729c-47084432
          env:
          - name: RAY_CLUSTER_NAME
            value: raycluster-rl
          resources:
            limits:
              cpu: "4"
              memory: "16Gi"
            requests:
              cpu: "1"
              memory: "4Gi"
          ports:
          - containerPort: 6379
            name: gcs-server
          - containerPort: 8265
            name: dashboard
          - containerPort: 10001
            name: client
          volumeMounts:
          - name: nemo-rl-src
            mountPath: /workspace/nemo-rl
          - name: peer-watcher-script
            mountPath: /opt/peer-watcher
        # Sidecar: monitors raycluster-gym, tears down both on failure.
        - name: peer-watcher
          image: python:3.12-slim
          command: ["python3", "/opt/peer-watcher/peer-watcher.py"]
          env:
          - name: SELF_CLUSTER_NAME
            value: raycluster-rl
          - name: PEER_CLUSTER_NAME
            value: raycluster-gym
          - name: POLL_INTERVAL
            value: "10"
          - name: MAX_PEER_FAILURES
            value: "3"
          # JOB_ID should be set to match +env.disagg_job_id in the GRPO command.
          # Uncomment and set when using the endpoint registry.
          # - name: JOB_ID
          #   value: "my-job-id"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
          - name: peer-watcher-script
            mountPath: /opt/peer-watcher
        volumes:
        - name: nemo-rl-src
          hostPath:
            path: /workspace/nemo-rl
            type: DirectoryOrCreate
        - name: peer-watcher-script
          configMap:
            name: peer-watcher-script
            defaultMode: 0755
  workerGroupSpecs:
  - groupName: gpu-workers
    replicas: 1
    minReplicas: 1
    maxReplicas: 1
    rayStartParams:
      num-gpus: "2"
      object-store-memory: "200000000"
    template:
      spec:
        serviceAccountName: nemo-rl-endpoint-registry
        schedulerName: kai-scheduler
        imagePullSecrets:
        - name: nvcr-secret
        containers:
        - name: ray-worker
          image: nvcr.io/nvidian/nemo-rl:e5a729c-47084432
          resources:
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: "2"
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "2"
          volumeMounts:
          - name: nemo-rl-src
            mountPath: /workspace/nemo-rl
        volumes:
        - name: nemo-rl-src
          hostPath:
            path: /workspace/nemo-rl
            type: DirectoryOrCreate
