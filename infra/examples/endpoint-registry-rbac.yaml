# RBAC for disaggregated RL-Gym service discovery.
# Allows Ray pods to CRUD ConfigMaps (as an endpoint registry)
# and read RayClusters (for ownerReference UID lookup).
#
# NOTE: This is an example for development/testing. For production deployments,
# consider scoping the Role to specific ConfigMap names (resourceNames) and
# using separate ServiceAccounts for the RL and Gym clusters.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nemo-rl-endpoint-registry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nemo-rl-endpoint-registry
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update", "patch", "delete"]
- apiGroups: ["ray.io"]
  resources: ["rayclusters"]
  verbs: ["get", "delete"]
# RL-412: pod-kill fault-inject mode lists pods by label to map a shard
# IP to a pod name, then deletes that pod to exercise the autoscaler-v2
# reclaim path. Scoped to the same namespace as the SA.
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nemo-rl-endpoint-registry
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nemo-rl-endpoint-registry
subjects:
- kind: ServiceAccount
  name: nemo-rl-endpoint-registry
