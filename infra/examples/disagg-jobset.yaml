# Disaggregated RL + Gym as a single JobSet (alternative to disagg-rayclusters.yaml).
#
# Four ReplicatedJobs:
#   rl-head    — Ray head daemon (CPU), long-running
#   rl-workers — GPU workers, connect to rl-head
#   gym        — Standalone Gym HTTP server (CPU)
#   driver     — Submits GRPO training, gates JobSet success
#
# Advantages over the KubeRay RayCluster approach:
#   - Native failure cascading via failurePolicy (no peer-watcher sidecar)
#   - Startup ordering via dependsOn (no init container polling)
#   - Predictable DNS names (no Service or ConfigMap needed for discovery)
#   - Single resource to manage (one JobSet instead of two RayClusters + RBAC)
#
# DNS names (auto-created by JobSet headless service):
#   rl-head:    disagg-job-rl-head-0-0.disagg-job
#   rl-workers: disagg-job-rl-workers-0-0.disagg-job (one pod per worker)
#   gym:        disagg-job-gym-0-0.disagg-job
#   driver:     disagg-job-driver-0-0.disagg-job
#
# Prerequisites:
#   JobSet controller installed (helmfile sync installs it)
#   kubectl apply -f kai-queue.yaml
#   kubectl apply -f endpoint-registry-rbac.yaml
#
# Usage:
#   kubectl apply -f disagg-jobset.yaml
#   kubectl get jobset disagg-job -w

apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: disagg-job
  labels:
    kai.scheduler/queue: high-prio
spec:
  network:
    enableDNSHostnames: true
    publishNotReadyAddresses: true

  # Head pod address propagated to all pods as a label.
  coordinator:
    replicatedJob: rl-head
    jobIndex: 0
    podIndex: 0

  # JobSet succeeds when the driver exits 0.
  successPolicy:
    operator: All
    targetReplicatedJobs: [driver]

  # Any critical failure tears down everything (replaces peer-watcher).
  failurePolicy:
    maxRestarts: 0
    rules:
    - name: head-crash
      action: FailJobSet
      targetReplicatedJobs: [rl-head]
    - name: driver-crash
      action: FailJobSet
      targetReplicatedJobs: [driver]
    - name: gym-crash
      action: FailJobSet
      targetReplicatedJobs: [gym]
    - name: worker-crash
      action: FailJobSet
      targetReplicatedJobs: [rl-workers]

  replicatedJobs:
  # ========================
  # RL Ray head (long-running daemon)
  # ========================
  - name: rl-head
    replicas: 1
    template:
      spec:
        backoffLimit: 0
        completions: 1
        parallelism: 1
        template:
          spec:
            schedulerName: kai-scheduler
            serviceAccountName: nemo-rl-endpoint-registry
            imagePullSecrets:
            - name: nvcr-secret
            containers:
            - name: ray-head
              image: nvcr.io/nvidian/nemo-rl:e5a729c-47084432
              command: ["/bin/bash", "-c"]
              args:
              - |
                ulimit -n 65536
                ray start --head --port=6379 \
                  --dashboard-host=0.0.0.0 \
                  --object-store-memory=200000000 \
                  --block
              ports:
              - { containerPort: 6379, name: gcs-server }
              - { containerPort: 8265, name: dashboard }
              - { containerPort: 10001, name: client }
              readinessProbe:
                exec:
                  command: ["ray", "health-check"]
                initialDelaySeconds: 10
                periodSeconds: 5
                timeoutSeconds: 5
              resources:
                requests: { cpu: "1", memory: "4Gi" }
                limits:   { cpu: "4", memory: "16Gi" }
              env:
              - name: RAY_ADDRESS
                value: "127.0.0.1:6379"
              volumeMounts:
              - { name: nemo-rl-src, mountPath: /workspace/nemo-rl }
              - { name: dshm, mountPath: /dev/shm }
            volumes:
            - name: nemo-rl-src
              hostPath: { path: /workspace/nemo-rl, type: DirectoryOrCreate }
            - name: dshm
              emptyDir: { medium: Memory }

  # ========================
  # RL GPU workers
  # ========================
  - name: rl-workers
    replicas: 1
    dependsOn:
    - name: rl-head
      status: Ready
    template:
      spec:
        backoffLimit: 0
        completions: 1
        parallelism: 1
        template:
          spec:
            schedulerName: kai-scheduler
            serviceAccountName: nemo-rl-endpoint-registry
            imagePullSecrets:
            - name: nvcr-secret
            containers:
            - name: ray-worker
              image: nvcr.io/nvidian/nemo-rl:e5a729c-47084432
              command: ["/bin/bash", "-c"]
              args:
              - |
                ulimit -n 65536
                HEAD=disagg-job-rl-head-0-0.disagg-job
                ray start --address=${HEAD}:6379 \
                  --num-gpus=2 \
                  --object-store-memory=200000000 \
                  --block
              resources:
                requests: { cpu: "2", memory: "8Gi", nvidia.com/gpu: "2" }
                limits:   { cpu: "8", memory: "32Gi", nvidia.com/gpu: "2" }
              env:
              - name: RAY_ADDRESS
                value: "disagg-job-rl-head-0-0.disagg-job:6379"
              volumeMounts:
              - { name: nemo-rl-src, mountPath: /workspace/nemo-rl }
              - { name: dshm, mountPath: /dev/shm }
            volumes:
            - name: nemo-rl-src
              hostPath: { path: /workspace/nemo-rl, type: DirectoryOrCreate }
            - name: dshm
              emptyDir: { medium: Memory }

  # ========================
  # Gym standalone server (CPU only)
  # ========================
  - name: gym
    replicas: 1
    dependsOn:
    - name: rl-head
      status: Ready
    template:
      spec:
        backoffLimit: 0
        completions: 1
        parallelism: 1
        template:
          spec:
            schedulerName: kai-scheduler
            serviceAccountName: nemo-rl-endpoint-registry
            imagePullSecrets:
            - name: nvcr-secret
            containers:
            - name: gym-server
              image: nvcr.io/nvidian/nemo-rl:e5a729c-47084432
              command: ["/bin/bash", "-c"]
              args:
              - |
                cd /workspace/nemo-rl
                uv run --extra nemo_gym python -m nemo_rl.distributed.standalone_gym_server \
                  --job-id disagg-job \
                  --port 9090 \
                  --model-name Qwen/Qwen3-0.6B \
                  --config-yaml infra/examples/gym_standalone_config.yaml
              ports:
              - { containerPort: 9090, name: head-server }
              resources:
                requests: { cpu: "1", memory: "4Gi" }
                limits:   { cpu: "4", memory: "16Gi" }
              volumeMounts:
              - { name: nemo-rl-src, mountPath: /workspace/nemo-rl }
            volumes:
            - name: nemo-rl-src
              hostPath: { path: /workspace/nemo-rl, type: DirectoryOrCreate }

  # ========================
  # Driver (submits GRPO, gates success)
  # ========================
  - name: driver
    replicas: 1
    dependsOn:
    - name: rl-head
      status: Ready
    template:
      spec:
        backoffLimit: 0
        completions: 1
        parallelism: 1
        template:
          spec:
            schedulerName: kai-scheduler
            serviceAccountName: nemo-rl-endpoint-registry
            imagePullSecrets:
            - name: nvcr-secret
            containers:
            - name: driver
              image: nvcr.io/nvidian/nemo-rl:e5a729c-47084432
              command: ["/bin/bash", "-c"]
              args:
              - |
                HEAD=disagg-job-rl-head-0-0.disagg-job
                # Wait for Ray dashboard to be reachable.
                until curl -sf http://${HEAD}:8265/api/version >/dev/null 2>&1; do
                  echo "Waiting for Ray dashboard at ${HEAD}:8265..."
                  sleep 5
                done
                echo "Ray dashboard is up, submitting job..."
                # Submit GRPO training with disaggregated Gym.
                ray job submit --address http://${HEAD}:8265 \
                  --submission-id grpo-run \
                  --working-dir /workspace/nemo-rl \
                  -- python examples/nemo_gym/run_grpo_nemo_gym.py \
                    +env.disagg_job_id=disagg-job
                # Follow logs until completion (ray job submit --follow is not reliable).
                ray job logs --follow --address http://${HEAD}:8265 grpo-run
                # Exit with the job's exit code.
                STATUS=$(ray job status --address http://${HEAD}:8265 grpo-run 2>/dev/null | grep -oP 'status: \K\w+')
                [ "$STATUS" = "SUCCEEDED" ] && exit 0 || exit 1
              resources:
                requests: { cpu: "500m", memory: "1Gi" }
                limits:   { cpu: "1", memory: "2Gi" }
              env:
              - name: RAY_ADDRESS
                value: "disagg-job-rl-head-0-0.disagg-job:6379"
              volumeMounts:
              - { name: nemo-rl-src, mountPath: /workspace/nemo-rl }
            volumes:
            - name: nemo-rl-src
              hostPath: { path: /workspace/nemo-rl, type: DirectoryOrCreate }
