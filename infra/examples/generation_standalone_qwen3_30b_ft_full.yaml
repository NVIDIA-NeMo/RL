# Standalone generation server config for the RL-412 fault-tolerant
# Megatron-backend demo (Qwen3-30B-A3B). Self-contained (no `defaults:`
# inheritance) so it can be loaded directly by
# examples/run_standalone_generation_server.py from the daemon's working_dir.

policy:
  model_name: Qwen/Qwen3-30B-A3B
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  precision: bfloat16
  max_total_sequence_length: 2048
  generation:
    backend: vllm
    max_new_tokens: ${policy.max_total_sequence_length}
    temperature: 1.0
    top_p: 1.0
    top_k: -1
    stop_token_ids: null
    stop_strings: null
    # 8 DP shards × TP=1 = 8 GPUs total. TP=1 is the validated layout
    # (matching the canonical grpo-qwen3-30ba3b-8n4g-megatron hero run);
    # TP=2 causes NCCL broadcast hang on the cross-cluster
    # model_update_group.
    colocated:
      enabled: false
      resources:
        gpus_per_node: 1
        num_nodes: 8
    vllm_cfg:
      tensor_parallel_size: 1
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      async_engine: true
      precision: ${policy.precision}
      kv_cache_dtype: auto
      gpu_memory_utilization: 0.8
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 0.5
      expose_http_server: true
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: hermes
      # Skip loading weights from disk on startup — every shard receives
      # its real weights from the train side via the cross-cluster refit
      # broadcast on the very first refit anyway. ``dummy`` allocates
      # randomly-initialized tensors of the right shape/dtype, which
      # cuts vLLM bring-up from ~6-7min (Qwen3-30B-A3B safetensor load)
      # down to ~1-2min. CRITICAL on the FT path: ``add_shard``
      # provisions a replacement pod after every kill, and shrinking
      # bring-up time directly shrinks the joining→ready window —
      # which means more steady-state time at full world per FT cycle.
      # Safe because ``prepare_refit_info`` runs immediately after init,
      # priming ``state_dict_info``, so the FIRST broadcast lands on
      # correctly-shaped (just-junk-valued) buffers and overwrites them.
      load_format: dummy
    vllm_kwargs: {}
    # GenerationRouter health-poll + cordon thresholds. These propagate to
    # GenerationRouter.__init__ in run_standalone_generation_server.py;
    # omit any field to take the in-code default.
    #
    # Defaults below are tuned for 30B-class shards under heavy gen burst
    # load (FastAPI event-loop jitter when vLLM is batching hundreds of
    # in-flight `/v1/completions`). For lighter workloads (smaller models,
    # lower concurrency) the in-code defaults are fine.
    router:
      # Probe `/openapi.json` every N seconds.
      health_poll_interval_s: 2.0
      # Per-probe timeout. vLLM's FastAPI loop can stall 2-3s under
      # heavy inflight load; 5s gives enough headroom that load jitter
      # isn't classified as failure.
      health_timeout_s: 5.0
      # Consecutive failed probes before cordon. With the values above,
      # cordon now requires ~50s of sustained unresponsiveness — genuine
      # failures (pod death, OOM, NCCL hang) still trip cordon within a
      # bounded window; transient probe lag during burst load doesn't.
      failure_threshold: 10
      # Consecutive successful probes before joining/recovered shards
      # transition to ready.
      join_success_threshold: 2
      # Per-request proxy timeout for /v1/{completions,chat/completions}.
      # Matches the in-code default.
      proxy_timeout_s: 600.0
      # Consecutive /v1 proxy errors (5xx or transport) before the shard
      # is cordoned. Replaces the prior single-shot cordon-on-first-5xx
      # behavior that turned a transient burst into a permanent eviction.
      # Distinct from `failure_threshold` (which counts /openapi.json
      # health-probe failures).
      proxy_failure_threshold: 5
      # Downstream connection pool sizing. aiohttp's default is limit=100
      # which becomes the router's bottleneck under 30B-class burst (2048
      # concurrent /v1/completions). Sized so 8 shards × 256 in-flight
      # fits with headroom; bump if num_prompts × num_generations grows.
      proxy_pool_limit_total: 4096
      proxy_pool_limit_per_host: 1024
      # uvicorn TCP listen backlog. Kernel drops SYNs above backlog,
      # which surfaces as ServerDisconnectedError on the client. 4096
      # comfortably absorbs an RL burst.
      uvicorn_backlog: 4096
      uvicorn_keep_alive_s: 120

# RL-412 fault injection — picked up by maybe_launch_fault_injector after the
# router boots. Two staggered faults so we can see step changes in throughput
# at 8 → 7 → 6 gen shards (each kill = 12.5% drop).
#
# Re-enabled: round-7 confirmed canonical-parity reward (step-1 = 0.5757 vs
# canonical 0.5659) on the disagg+async+router path with TP=1/PP=1/EP=8. The
# FT machinery (router pool sizing, NCCL gate, threshold-based cordon, auto-
# recovery, broadcast retry) is the only remaining variable to validate.
fault_inject:
  enabled: true
  mode: pod-kill
  # 50-step extreme FT demo: baseline → kill 6 → staged recovery 2→4→6→8
  # With 8×8=64 samples at 2048 seq: ~2 min/step at 8 shards, ~8 min at 2.
  # trigger_after_s=1200 (20 min, ~10 baseline steps)
  # recover_after_s=2400 (40 min, ~5 steps at 2 shards)
  # recover_batch_delay_s=1200 (20 min between batches, ~5+ steps each)
  recover: true
  trigger_after_s: 1200
  recover_after_s: 2400
  max_cycles: 1
  rotate_target: true
  target_shard: dp-0
  new_shard_grace_period_s: 9999
  burst_size: 6
  burst_every_n_cycles: 1
  recover_batch_size: 2
  recover_batch_delay_s: 1200
