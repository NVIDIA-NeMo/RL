# Gang-schedule two GPU pods via KAI scheduler.
# Both pods are scheduled simultaneously or not at all.
apiVersion: scheduling.run.ai/v2alpha2
kind: PodGroup
metadata:
  name: gpu-test-group
spec:
  minMember: 2
  queue: priority-team
---
apiVersion: v1
kind: Pod
metadata:
  name: gpu-test-0
  labels:
    kai.scheduler/queue: priority-team
  annotations:
    pod-group-name: gpu-test-group
spec:
  schedulerName: kai-scheduler
  restartPolicy: Never
  containers:
  - name: gpu-test
    image: nvidia/cuda:12.8.1-base-ubuntu24.04
    command: ["nvidia-smi"]
    resources:
      limits:
        nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Pod
metadata:
  name: gpu-test-1
  labels:
    kai.scheduler/queue: priority-team
  annotations:
    pod-group-name: gpu-test-group
spec:
  schedulerName: kai-scheduler
  restartPolicy: Never
  containers:
  - name: gpu-test
    image: nvidia/cuda:12.8.1-base-ubuntu24.04
    command: ["nvidia-smi"]
    resources:
      limits:
        nvidia.com/gpu: "1"
