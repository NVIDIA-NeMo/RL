# Disaggregated Gym RayCluster with peer-watcher sidecar.
# Runs NeMo Gym servers as a standalone HTTP service.
# Uses K8s ConfigMap endpoint registry for service discovery with the RL cluster.
# The peer-watcher sidecar monitors raycluster-rl and tears down both clusters
# if the RL cluster fails or the application signals an error.
#
# Prerequisites:
#   kubectl apply -f endpoint-registry-rbac.yaml
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raycluster-gym
  labels:
    kai.scheduler/queue: team-a
spec:
  rayVersion: "2.52.0"
  headGroupSpec:
    rayStartParams:
      object-store-memory: "200000000"
    template:
      spec:
        serviceAccountName: nemo-rl-endpoint-registry
        schedulerName: kai-scheduler
        imagePullSecrets:
        - name: nvcr-secret
        containers:
        - name: ray-head
          image: nvcr.io/nvidian/nemo-rl:e5a729c-47084432
          resources:
            limits:
              cpu: "4"
              memory: "16Gi"
            requests:
              cpu: "1"
              memory: "4Gi"
          ports:
          - containerPort: 6379
            name: gcs-server
          - containerPort: 8265
            name: dashboard
          - containerPort: 9090
            name: head-server
          volumeMounts:
          - name: peer-watcher-script
            mountPath: /opt/peer-watcher
        # Sidecar: monitors raycluster-rl, tears down both on failure.
        - name: peer-watcher
          image: python:3.12-slim
          command: ["python3", "/opt/peer-watcher/peer-watcher.py"]
          env:
          - name: SELF_CLUSTER_NAME
            value: raycluster-gym
          - name: PEER_CLUSTER_NAME
            value: raycluster-rl
          - name: POLL_INTERVAL
            value: "10"
          - name: MAX_PEER_FAILURES
            value: "3"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
          - name: peer-watcher-script
            mountPath: /opt/peer-watcher
        volumes:
        - name: peer-watcher-script
          configMap:
            name: peer-watcher-script
            defaultMode: 0755
