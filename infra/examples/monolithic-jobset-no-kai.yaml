# Same as monolithic-jobset.yaml but WITHOUT KAI scheduler.
# Uses default-scheduler so your colleague can diff the two and compare
# pod specs, resource claim allocation, and CDI device injection.
#
# The only differences from monolithic-jobset.yaml:
#   - No kai.scheduler/queue label
#   - No schedulerName: kai-scheduler on pod specs
#   - Resource names suffixed with "-no-kai" to avoid conflicts
#
# Usage:
#   kubectl apply -f monolithic-jobset-no-kai.yaml
#   kubectl get jobset monolithic-job-no-kai -w

# --- 1. ComputeDomain (controller auto-creates the ResourceClaimTemplate) ---
apiVersion: resource.nvidia.com/v1beta1
kind: ComputeDomain
metadata:
  name: compute-domain-monolithic-no-kai
spec:
  channel:
    resourceClaimTemplate:
      name: compute-domain-monolithic-no-kai
  numNodes: 0
---
# --- 2. RoCE ResourceClaimTemplate (manually created) ---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: roce-monolithic-no-kai
spec:
  spec:
    devices:
      requests:
      - exactly:
          count: 8
          deviceClassName: roce.networking.k8s.aws
        name: roce
---
# --- JobSet ---
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: monolithic-job-no-kai
spec:
  network:
    enableDNSHostnames: true
    publishNotReadyAddresses: true

  coordinator:
    replicatedJob: head
    jobIndex: 0
    podIndex: 0

  successPolicy:
    operator: All
    targetReplicatedJobs: [driver]

  failurePolicy:
    maxRestarts: 0
    rules:
    - name: head_crash
      action: FailJobSet
      targetReplicatedJobs: [head]
    - name: driver_crash
      action: FailJobSet
      targetReplicatedJobs: [driver]
    - name: worker_crash
      action: FailJobSet
      targetReplicatedJobs: [workers]

  replicatedJobs:
  # ========================
  # Ray head (CPU-only)
  # ========================
  - name: head
    replicas: 1
    template:
      spec:
        backoffLimit: 0
        completions: 1
        parallelism: 1
        template:
          spec:
            imagePullSecrets:
            - name: nvcr-secret
            tolerations:
            - operator: Exists
            containers:
            - name: ray-head
              image: nvcr.io/nvidian/nemo-rl:nightly
              command: ["/bin/bash", "-c"]
              args:
              - |
                ulimit -n 65536
                ray start --head --port=6379 \
                  --dashboard-host=0.0.0.0 \
                  --num-gpus=0 \
                  --object-store-memory=200000000 \
                  --block
              ports:
              - { containerPort: 6379, name: gcs-server }
              - { containerPort: 8265, name: dashboard }
              - { containerPort: 10001, name: client }
              readinessProbe:
                exec:
                  command: ["ray", "health-check"]
                initialDelaySeconds: 10
                periodSeconds: 5
                timeoutSeconds: 5
              resources:
                requests: { cpu: "2", memory: "8Gi" }
                limits:   { cpu: "8", memory: "32Gi" }
              env:
              - { name: RAY_ADDRESS, value: "127.0.0.1:6379" }
              - { name: RAY_memory_monitor_refresh_ms, value: "0" }
              volumeMounts:
              - { name: dshm, mountPath: /dev/shm }
              - { name: rl-workspace, mountPath: /mnt/rl-workspace }
            volumes:
            - name: dshm
              emptyDir: { medium: Memory, sizeLimit: 16Gi }
            - name: rl-workspace
              persistentVolumeClaim: { claimName: rl-workspace }

  # ========================
  # GPU workers (4 pods × 4 GPUs = 16 GPUs)
  # ========================
  - name: workers
    replicas: 1
    template:
      spec:
        backoffLimit: 0
        completions: 4
        parallelism: 4
        template:
          spec:
            imagePullSecrets:
            - name: nvcr-secret
            tolerations:
            - operator: Exists
            initContainers:
            - name: wait-for-head
              image: nvcr.io/nvidian/nemo-rl:nightly
              command: ["/bin/bash", "-c"]
              args:
              - |
                HEAD=monolithic-job-no-kai-head-0-0.monolithic-job-no-kai
                echo "Waiting for head at ${HEAD}:6379..."
                until ray health-check --address ${HEAD}:6379 >/dev/null 2>&1; do
                  sleep 5
                done
                echo "Head is ready."
              resources:
                requests: { cpu: "200m", memory: "256Mi" }
            containers:
            - name: ray-worker
              image: nvcr.io/nvidian/nemo-rl:nightly
              command: ["/bin/bash", "-c"]
              args:
              - |
                ulimit -n 65536
                HEAD=monolithic-job-no-kai-head-0-0.monolithic-job-no-kai
                ray start --address=${HEAD}:6379 \
                  --num-gpus=4 \
                  --object-store-memory=200000000 \
                  --block
              resources:
                claims:
                - name: compute-domain-channel
                - name: roce-channel
                requests:
                  cpu: "32"
                  memory: "200Gi"
                  nvidia.com/gpu: "4"
                limits:
                  cpu: "128"
                  memory: "800Gi"
                  nvidia.com/gpu: "4"
              env:
              - { name: RAY_ADDRESS, value: "monolithic-job-no-kai-head-0-0.monolithic-job-no-kai:6379" }
              - { name: RAY_memory_monitor_refresh_ms, value: "0" }
              - { name: HF_HOME, value: /mnt/rl-workspace/shared/hf-cache }
              - { name: HF_DATASETS_CACHE, value: /mnt/rl-workspace/shared/hf-cache/datasets }
              - { name: TRANSFORMERS_CACHE, value: /mnt/rl-workspace/shared/hf-cache }
              - { name: NCCL_DEBUG, value: INFO }
              - { name: NCCL_MNNVL_ENABLE, value: "1" }
              volumeMounts:
              - { name: dshm, mountPath: /dev/shm }
              - { name: rl-workspace, mountPath: /mnt/rl-workspace }
              securityContext:
                capabilities:
                  add: [IPC_LOCK]
            resourceClaims:
            - name: compute-domain-channel
              resourceClaimTemplateName: compute-domain-monolithic-no-kai
            - name: roce-channel
              resourceClaimTemplateName: roce-monolithic-no-kai
            volumes:
            - name: dshm
              emptyDir: { medium: Memory, sizeLimit: 64Gi }
            - name: rl-workspace
              persistentVolumeClaim: { claimName: rl-workspace }

  # ========================
  # Driver (submits SFT training, gates success)
  # ========================
  - name: driver
    replicas: 1
    template:
      spec:
        backoffLimit: 0
        completions: 1
        parallelism: 1
        template:
          spec:
            imagePullSecrets:
            - name: nvcr-secret
            tolerations:
            - operator: Exists
            initContainers:
            - name: wait-for-head
              image: nvcr.io/nvidian/nemo-rl:nightly
              command: ["/bin/bash", "-c"]
              args:
              - |
                HEAD=monolithic-job-no-kai-head-0-0.monolithic-job-no-kai
                echo "Waiting for head at ${HEAD}:6379..."
                until ray health-check --address ${HEAD}:6379 >/dev/null 2>&1; do
                  sleep 5
                done
                echo "Head is ready."
              resources:
                requests: { cpu: "200m", memory: "256Mi" }
            containers:
            - name: driver
              image: nvcr.io/nvidian/nemo-rl:nightly
              command: ["/bin/bash", "-c"]
              args:
              - |
                set -eo pipefail
                HEAD=monolithic-job-no-kai-head-0-0.monolithic-job-no-kai
                SUBMISSION_ID="sft-$(date +%s)"

                ray job submit --address http://${HEAD}:8265 \
                  --submission-id ${SUBMISSION_ID} \
                  -- bash -c "
                    cd /opt/nemo-rl
                    export HF_HOME=/mnt/rl-workspace/shared/hf-cache
                    export HF_DATASETS_CACHE=/mnt/rl-workspace/shared/hf-cache/datasets
                    export TRANSFORMERS_CACHE=/mnt/rl-workspace/shared/hf-cache

                    python -u examples/run_sft.py \
                      --config examples/configs/sft.yaml \
                      policy.model_name=Qwen/Qwen3-0.6B \
                      cluster.gpus_per_node=4 \
                      cluster.num_nodes=4 \
                      policy.train_global_batch_size=32 \
                      policy.train_micro_batch_size=1 \
                      policy.max_total_sequence_length=1024 \
                      policy.dtensor_cfg.tensor_parallel_size=1 \
                      sft.max_num_steps=10 \
                      sft.val_period=5 \
                      checkpointing.enabled=false \
                      logger.wandb_enabled=false \
                      logger.tensorboard_enabled=false
                  " 2>&1
              resources:
                requests: { cpu: "500m", memory: "2Gi" }
                limits:   { cpu: "2", memory: "8Gi" }
              env:
              - { name: RAY_ADDRESS, value: "monolithic-job-no-kai-head-0-0.monolithic-job-no-kai:6379" }
              volumeMounts:
              - { name: rl-workspace, mountPath: /mnt/rl-workspace }
            volumes:
            - name: rl-workspace
              persistentVolumeClaim: { claimName: rl-workspace }
