defaults: ../examples/configs/grpo_math_1B.yaml

grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  max_rollout_turns: 1
  max_num_epochs: 10
  max_num_steps: 10000
  normalize_rewards: true
  use_leave_one_out_baseline: false
  val_period: 10
  val_at_start: false
  overlong_filtering: false
  max_val_samples: 960
  val_batch_size: 960
  batch_multiplier: 1
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  seed: 42
  reward_scaling:
    enabled: false
    target_min: -1.0
  reward_shaping:
    enabled: false
    overlong_buffer_length: 512
    max_response_length: 2048

loss_fn:
  reference_policy_kl_penalty: 0.0
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 2
  truncated_importance_sampling_type: tis
  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: 10
  token_level_loss: true
checkpointing:
  enabled: true
  checkpoint_dir: results/grpo-m3-32n8g-non-colocated-fusedadam-pp
  keep_top_k: 2
  save_period: 3
  checkpoint_must_save_by: "00:03:45:00"
  save_optimizer: true
policy:
  model_name: /apps/models/MiniMax-M3
  hf_config_overrides:
    text_config:
      num_mtp_modules: 0
  train_micro_batch_size: 1
  train_global_batch_size: 512
  logprob_batch_size: 1
  max_total_sequence_length: 4096
  logprob_chunk_size: 1024
  offload_optimizer_for_logprob: true
  optimizer:
    name: transformer_engine.pytorch.optimizers.fused_adam.FusedAdam
    kwargs:
      lr: 1.0e-06
      weight_decay: 0.1
      betas: [0.9, 0.999]
      eps: 1.0e-08
      master_weights: true
      store_param_remainders: true
      exp_avg_dtype: "torch.bfloat16"
      exp_avg_sq_dtype: "torch.bfloat16"
  scheduler:
  - name: torch.optim.lr_scheduler.LinearLR
    kwargs:
      start_factor: 1.0e-08
      end_factor: 1.0
      total_iters: 10
  - name: torch.optim.lr_scheduler.ConstantLR
    kwargs:
      factor: 1.0
      total_iters: 10000000000
  - milestones:
    - 10
  dtensor_cfg:
    pipeline_parallel_size: 4
    expert_parallel_size: 32
    activation_checkpointing: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    automodel_kwargs:
      pipeline_config:
        _target_: nemo_automodel.components.distributed.pipelining.config.PipelineConfig
        pp_schedule: interleaved1f1b
        pp_microbatch_size: 1
        layers_per_stage: 2
        round_virtual_stages_to_pp_multiple: down
        scale_grads_in_schedule: false
        patch_inner_model: false
        patch_causal_lm_model: false
      backend:
        _target_: nemo_automodel.components.models.common.utils.BackendConfig
        attn: sdpa
        linear: te
        rms_norm: torch_fp32
        fake_balanced_gate: false
        rope_fusion: false
        enable_hf_state_dict_adapter: true
        experts: torch_mm
        dispatcher: deepep
        enable_fsdp_optimizations: true
      freeze_config:
        freeze_vision_tower: true
        freeze_audio_tower: true
        freeze_language_model: false
  sequence_packing:
    enabled: false
  dynamic_batching:
    enabled: false
  generation:
    max_new_tokens: 2048
    vllm_kwargs:
      language_model_only: true
      block_size: 128
    vllm_cfg:
      tensor_parallel_size: 16
      pipeline_parallel_size: 1
      expert_parallel_size: 16
      gpu_memory_utilization: 0.8
      enforce_eager: true
      max_model_len: 4096
      env_vars:
        VLLM_USE_RAY_V2_EXECUTOR_BACKEND: "0"
    colocated:
      enabled: false
      resources:
        gpus_per_node: 8
        num_nodes: 16
data:
  max_input_seq_length: 2048
  train:
    dataset_name: DAPOMath17K
  validation:
    dataset_name: DAPOMathAIME2024
  default:
    prompt_file: null
env:
  math:
    num_workers: 16
    math_verify_impl: "dapo_math_verify"
logger:
  wandb_enabled: true
  tensorboard_enabled: false
  wandb:
    project: nemorl-m3
    name: grpo-m3-32n8g-non-colocated-fusedadam-pp
cluster:
  gpus_per_node: 8
  num_nodes: 32
