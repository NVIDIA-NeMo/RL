# AR GRPO on Nemotron-Labs-Diffusion-3B, 6x6 Sudoku (2x3 boxes).
# Parents: DeepScaleR AR algorithm base + grpo_sudoku6x6_base.yaml (shared 6x6 task).
defaults:
  - deepscaler_nemotron_labs_diffusion_3b_sglang_ar_megatron.yaml
  - grpo_sudoku6x6_base.yaml

checkpointing:
  checkpoint_dir: "results/grpo-nd3b-ar-sudoku6x6-megatron"

logger:
  log_dir: "logs/grpo-nd3b-ar-sudoku6x6-sglang"
  wandb:
    name: "grpo-nd3b-ar-sudoku6x6-blanks-fewshot"

cluster:
  num_nodes: 1

