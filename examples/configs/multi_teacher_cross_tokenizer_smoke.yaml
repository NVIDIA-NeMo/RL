# Multi-teacher cross-tokenizer off-policy distillation smoke.
#
# Student : meta-llama/Llama-3.2-1B
# Teacher0: Qwen/Qwen3-4B        — cross-tokenizer (needs projection matrix)
# Teacher1: meta-llama/Llama-3.2-3B — SAME tokenizer as the student, so it is a
#           same-vocab teacher: projection_matrix_path=null => no projection,
#           no alignment, direct per-position KL. send_full_logits=false => it
#           ships top-K logits via Policy.get_topk_logits (the lighter path).
#
# Inherits everything (policy/loss_fn/data/logger/cluster/checkpointing/
# distillation) from the exemplar; only the `teachers:` list is replaced.
# Set teacher0's projection path via Hydra CLI:
#   teachers.0.projection_matrix_path=/path/to/llama_qwen_projection.pt

defaults: xtoken_off_policy_distillation.yaml

teachers:
  # ---- Teacher 0: Qwen3-4B (cross-tokenizer) ----
  - model_name: "Qwen/Qwen3-4B"
    projection_matrix_path: null   # REQUIRED at runtime; set via CLI override.
    weight: 1.0
    tokenizer:
      name: "Qwen/Qwen3-4B"
    train_global_batch_size: 64
    train_micro_batch_size: 1
    logprob_batch_size: 1
    max_total_sequence_length: 2048
    make_sequence_length_divisible_by: 1
    precision: "bfloat16"
    logprob_chunk_size: null
    offload_optimizer_for_logprob: false
    dtensor_cfg:
      enabled: true
      _v2: true
      cpu_offload: false
      sequence_parallel: false
      activation_checkpointing: true
      tensor_parallel_size: 1
      context_parallel_size: 1
      custom_parallel_plan: null
    max_grad_norm: 1.0
    dynamic_batching:
      enabled: false
      train_mb_tokens: 2048
      logprob_mb_tokens: 2048
      sequence_length_round: 64
    sequence_packing:
      enabled: false
      train_mb_tokens: 2048
      logprob_mb_tokens: 2048
      algorithm: "modified_first_fit_decreasing"
      sequence_length_round: 64
    optimizer:
      name: "torch.optim.AdamW"
      kwargs:
        lr: 5.0e-5
        weight_decay: 0.001
        betas: [0.9, 0.95]
        eps: 1e-8
        foreach: false
        fused: false
  # ---- Teacher 1: Llama-3.2-3B (same tokenizer as student => same-vocab) ----
  - model_name: "meta-llama/Llama-3.2-3B"
    projection_matrix_path: null   # same tokenizer => direct KL, no projection.
    weight: 1.0
    send_full_logits: false        # ship top-K logits (lighter); true = full vocab.
    tokenizer:
      name: "meta-llama/Llama-3.2-3B"
    train_global_batch_size: 64
    train_micro_batch_size: 1
    logprob_batch_size: 1
    max_total_sequence_length: 2048
    make_sequence_length_divisible_by: 1
    precision: "bfloat16"
    logprob_chunk_size: null
    offload_optimizer_for_logprob: false
    dtensor_cfg:
      enabled: true
      _v2: true
      cpu_offload: false
      sequence_parallel: false
      activation_checkpointing: true
      tensor_parallel_size: 1
      context_parallel_size: 1
      custom_parallel_plan: null
    max_grad_norm: 1.0
    dynamic_batching:
      enabled: false
      train_mb_tokens: 2048
      logprob_mb_tokens: 2048
      sequence_length_round: 64
    sequence_packing:
      enabled: false
      train_mb_tokens: 2048
      logprob_mb_tokens: 2048
      algorithm: "modified_first_fit_decreasing"
      sequence_length_round: 64
    optimizer:
      name: "torch.optim.AdamW"
      kwargs:
        lr: 5.0e-5
        weight_decay: 0.001
        betas: [0.9, 0.95]
        eps: 1e-8
        foreach: false
        fused: false
