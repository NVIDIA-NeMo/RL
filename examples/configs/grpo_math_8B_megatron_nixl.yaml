# GRPO with non-colocated NIXL/UCX checkpoint-engine refit
defaults: "grpo_math_8B_megatron.yaml"

policy:
  generation:
    colocated:
      enabled: false
      resources:
        gpus_per_node: 8
        num_nodes: 1
    checkpoint_engine:
      enabled: true
      backend: nixl
      update_weights_bucket_megabytes: 2048
      engine_kwargs:
        nixl:
          device: cuda
          cleanup_after_load: false
          shard_hf_weights: false
          backend_name: UCX
          backend_init_params: null

cluster:
  num_nodes: 2
