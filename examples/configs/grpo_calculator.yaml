# GRPO Algorithm Configuration for Calculator Tool-Call
defaults: "grpo_math_1B.yaml"

grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  max_rollout_turns: 8
  max_num_steps: 200
  seed: 42

checkpointing:
  enabled: true
  checkpoint_dir: "results/grpo-calculator"
  metric_name: null
  higher_is_better: true
  keep_top_k: 3
  save_period: 50

policy:
  model_name: "Qwen/Qwen3-0.6B"
  max_total_sequence_length: 4096

  dtensor_cfg:
    enabled: true
    cpu_offload: true
    activation_checkpointing: true
    sequence_parallel: true

  generation:
    backend: "vllm"
    max_new_tokens: 512
    temperature: 1.0
    top_p: 0.999
    top_k: 10000
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.6
      max_model_len: ${policy.max_total_sequence_length}

data:
  shuffle: false

env:
  calculator:
    cfg:
      max_tool_calls: 3
      tolerance: 0.01
      relative_tolerance: 0.10

logger:
  log_dir: "logs"
  wandb_enabled: true
  wandb:
    project: "nemo-rl-native-env"
    name: "grpo-calculator-v2"
