# Reproducer for the fp8_param convergence bug in mcore with MXFP8:
#   https://github.com/NVIDIA-NeMo/RL/issues/1164
#
# This config is intentionally minimal for a single node (8 GPUs, TP=8).
# Both runs are seeded and deterministic so the *only* variable is fp8_param.
#
# Usage (see reproduce_fp8_param_bug.sh):
#   # fp8_param=false (expected good convergence):
#   uv run examples/run_sft.py --config examples/configs/fp8_param_bug_reproducer.yaml \
#       policy.megatron_cfg.fp8_cfg.fp8_param=false \
#       logger.tensorboard.log_dir=tb_logs-fp8_param_false
#
#   # fp8_param=true (shows diverged / different convergence):
#   uv run examples/run_sft.py --config examples/configs/fp8_param_bug_reproducer.yaml \
#       policy.megatron_cfg.fp8_cfg.fp8_param=true \
#       logger.tensorboard.log_dir=tb_logs-fp8_param_true

defaults: sft.yaml

sft:
  max_num_epochs: 1
  max_num_steps: 30
  val_period: 5
  val_batches: 4
  val_global_batch_size: 8
  val_micro_batch_size: 1
  val_at_start: true
  val_at_end: true
  seed: 42

checkpointing:
  enabled: false

policy:
  model_name: "meta-llama/Llama-3.2-1B"
  tokenizer:
    name: ${policy.model_name}
    chat_template: "{% for message in messages %}{%- if message['role'] == 'system'  %}{{'Context: ' + message['content'].strip()}}{%- elif message['role'] == 'user'  %}{{' Question: ' + message['content'].strip() + ' Answer:'}}{%- elif message['role'] == 'assistant'  %}{{' ' + message['content'].strip()}}{%- endif %}{% endfor %}"
    chat_template_kwargs: null

  train_global_batch_size: 8
  train_micro_batch_size: 1
  max_total_sequence_length: 512
  precision: "bfloat16"

  offload_optimizer_for_logprob: false

  # Use Megatron backend for FP8 support
  dtensor_cfg:
    _v2: true
    enabled: false

  megatron_cfg:
    enabled: true
    tensor_model_parallel_size: 4
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    # SP is off so individual sequence divisibility is just make_sequence_length_divisible_by
    sequence_parallel: false
    activation_checkpointing: true

    empty_unused_memory_level: 0
    apply_rope_fusion: true
    bias_activation_fusion: false
    defer_fp32_logits: true #false
    gradient_accumulation_fusion: false
    # Use flash attention. When FP8 is enabled TE would otherwise select its
    # cuDNN fused-attention path (requires cuDNN >= 9 with FP8 flash support).
    # Setting this clears all NVTE_*_ATTN env vars and sets the mcore backend.
    # Flash attention is deterministic under NVTE_ALLOW_NONDETERMINISTIC_ALGO=0.
    attention_backend: flash

    pipeline_dtype: bfloat16
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null

    freeze_moe_router: false
    moe_router_dtype: null
    moe_router_load_balancing_type: "aux_loss"
    moe_router_bias_update_rate: 1e-3
    moe_permute_fusion: true
    moe_per_layer_logging: false
    moe_enable_deepep: false
    moe_token_dispatcher_type: "alltoall"
    moe_shared_expert_overlap: false

    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 1

    # Fully deterministic training — the ONLY variable between runs should be fp8_param.
    # Sets deterministic_mode=True in mcore, disables cross-entropy fusion and TP comm
    # overlap, and sets NCCL_ALGO=Ring at the process level plus
    # NVTE_ALLOW_NONDETERMINISTIC_ALGO=0 / CUBLAS_WORKSPACE_CONFIG=:4096:8 after CUDA
    # initialization (to avoid CUDNN_STATUS_NOT_INITIALIZED at import time).
    deterministic_mode: true

    env_vars: {}

    peft:
      enabled: false
      target_modules: []
      exclude_modules: []
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init_method: "xavier"
      lora_B_init_method: "zero"
      a2a_experimental: false
      lora_dtype: None

    optimizer:
      optimizer: "adam"
      lr: 5.0e-6
      min_lr: 4.9999e-6
      weight_decay: 0.1
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.98
      adam_eps: 1e-5
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      clip_grad: ${policy.max_grad_norm}
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0

      ## mxfp8-specific
      fp8_recipe: "mxfp8"
      overlap_param_gather: true

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 1000
      lr_warmup_iters: 5
      lr_warmup_init: 4.9999e-6

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      data_parallel_sharding_strategy: "optim_grads_params"
      use_custom_fsdp: false

    fp8_cfg:
      enabled: true
      fp8: "e4m3"
      fp8_recipe: "mxfp8"
      # Toggle this flag to reproduce the bug:
      #   fp8_param: false  ->  baseline (expected convergence)
      #   fp8_param: true   ->  buggy    (diverged / different convergence)
      # Note: when fp8_param=true + fp8_recipe="mxfp8", setup.py automatically sets
      # reuse_grad_buf_for_mxfp8_param_ag=True (required by Megatron-Bridge).
      fp8_param: false

  # MXFP8 uses block size 32 and requires every tensor dim to be 32-divisible.
  make_sequence_length_divisible_by: 32
  max_grad_norm: 1.0
  dynamic_batching:
    enabled: false
  sequence_packing:
    enabled: false

data:
  max_input_seq_length: ${policy.max_total_sequence_length}
  add_bos: true
  add_eos: true
  add_generation_prompt: false
  shuffle: true
  num_workers: 1
  train:
    dataset_name: "squad"
    split: "train"
  validation:
    dataset_name: "squad"
    split: "validation"
  default:
    prompt_file: null
    system_prompt_file: null
    processor: "sft_processor"

logger:
  log_dir: "logs/fp8_param_bug"
  wandb_enabled: true
  tensorboard_enabled: true
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: false
  wandb:
    project: "nrl_fp8_param_debug"
    name: "fp8_param_bug"
  tensorboard:
    log_dir: "tb_logs-fp8_param-bug"

cluster:
  gpus_per_node: 4
  num_nodes: 1
