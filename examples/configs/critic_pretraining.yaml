# Offline scalar critic pretraining with the upstream NeMo RL Value model.

critic_pretraining:
  max_num_steps: -1
  max_num_epochs: 1
  val_period: 0
  val_batches: -1
  val_global_batch_size: 32
  val_micro_batch_size: 1
  val_at_start: false
  val_at_end: true
  # Keep every point target; sample at most this many span positions per target.
  # Set to -1 to evaluate every supervised span position.
  val_max_span_targets_per_definition: 256
  resume_dataloader: true
  seed: 42

# MseValueLossFn applies 0.5 * scale; scale=2 makes logged loss equal raw MSE.
# PPO clipping is intentionally disabled because this is offline supervision.
value_loss_fn:
  scale: 2.0
  cliprange: null

checkpointing:
  enabled: true
  checkpoint_dir: ${oc.env:CRITIC_CHECKPOINT_DIR,results/critic_pretraining}
  metric_name: "val:validation-test_mse"
  higher_is_better: false
  keep_top_k: 3
  save_period: 100
  checkpoint_must_save_by: null
  model_save_format: "safetensors"
  save_consolidated: false
  save_optimizer: true

value:
  model_name: ${oc.env:CRITIC_MODEL_NAME,Qwen/Qwen2.5-1.5B}
  tokenizer:
    name: ${value.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}

  train_global_batch_size: 32
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 4096
  make_sequence_length_divisible_by: 1
  precision: "bfloat16"
  max_grad_norm: 1.0

  reward_model_cfg:
    enabled: true
    reward_model_type: "regression"

  dtensor_cfg:
    _v2: true
    enabled: true
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: true
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
    lora_cfg:
      enabled: false
      target_modules: []
      exclude_modules: []
      match_all_linear: true
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init: "xavier"
      use_triton: true

  megatron_cfg:
    enabled: false
    empty_unused_memory_level: 1
    activation_checkpointing: false
    tensor_model_parallel_size: 1
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${value.precision}
    sequence_parallel: false
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: false
    moe_enable_deepep: false
    moe_token_dispatcher_type: "allgather"
    moe_shared_expert_overlap: false
    use_gloo_process_groups: false
    apply_rope_fusion: true
    bias_activation_fusion: true
    gradient_accumulation_fusion: false
    use_fused_weighted_squared_relu: false
    defer_fp32_logits: false
    moe_per_layer_logging: false
    optimizer:
      optimizer: "adam"
      lr: 1.0e-6
      min_lr: 1.0e-7
      weight_decay: 0.1
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1.0e-8
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      clip_grad: ${value.max_grad_norm}
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0
    scheduler:
      start_weight_decay: 0.1
      end_weight_decay: 0.1
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 1000
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-7
    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"
    fp8_cfg:
      enabled: false
      fp8: "e4m3"
      fp8_recipe: "blockwise"
      fp8_param: false
    env_vars: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${value.max_total_sequence_length}, ${value.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${value.max_total_sequence_length}, ${value.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: false
    train_mb_tokens: ${mul:${value.max_total_sequence_length}, ${value.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${value.max_total_sequence_length}, ${value.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    fuse_loss: false

  optimizer:
    name: torch.optim.AdamW
    kwargs:
      lr: 1.0e-6
      weight_decay: 0.1
      betas: [0.9, 0.999]
      eps: 1.0e-8
      foreach: false
      fused: false
  scheduler:
    - name: torch.optim.lr_scheduler.ConstantLR
      kwargs:
        factor: 1.0
        total_iters: 10000000000
    - milestones: []

data:
  max_input_seq_length: ${value.max_total_sequence_length}
  shuffle: true
  num_workers: 4
  train:
    data_path: ${oc.env:CRITIC_TRAIN_DATA,/path/to/train.jsonl}
  validation:
    data_path: ${oc.env:CRITIC_TEST_DATA,/path/to/test.jsonl}
  default:
    dataset_name: "TrajectoryValueDataset"
    processor: "trajectory_value_processor"
    prompt_file: null
    system_prompt_file: null

logger:
  log_dir: ${oc.env:CRITIC_LOG_DIR,logs/critic_pretraining}
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: false
  wandb:
    project: "critic-pretraining"
    name: "trajectory-value"
  swanlab:
    project: "critic-pretraining"
    name: "trajectory-value"
  tensorboard: {}
  mlflow:
    experiment_name: "critic-pretraining"
    run_name: "trajectory-value"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 1
  num_nodes: 1
