# GRPO Algorithm Configuration
defaults: "grpo_math_1B_megatron.yaml"

grpo:
  num_prompts_per_step: 64
  num_generations_per_prompt: 32

checkpointing:
  enabled: false
  checkpoint_dir: "results/grpo_8b_megatron"
  checkpoint_must_save_by: null
  # pretrained_checkpoint: load weights from an existing megatron-bridge or
  # Megatron-LM checkpoint instead of converting from HuggingFace.
  # pretrained_checkpoint:
  #   path: "/path/to/checkpoint"  # iter dir or checkpoint root
  #   format: "megatron_bridge"    # or "megatron_lm"

policy:
  model_name: "meta-llama/Llama-3.1-8B-Instruct"
  tokenizer:
    name: ${policy.model_name} ## specify if you'd like to use a tokenizer different from the model's default
  train_global_batch_size: 512
  train_micro_batch_size: 1
  generation_batch_size: 32 # Only used when generating using HF backend
  logprob_batch_size: 4
  max_total_sequence_length: 4096
  precision: "bfloat16"

  dtensor_cfg:
    enabled: false

  optimizer: null # remove default FSDP optimizer

  scheduler: null # remove default FSDP scheduler

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 1  # 1 is the minimum recommendation for RL since we almost always need to offload before beginning generation. Setting to 0 is faster, but you are more likely to run out of GPU memory.
    tensor_model_parallel_size: 1
    # On H100, can run with pp=1 for better performance with expandable segments (which is enabled by default)
    pipeline_model_parallel_size: 2
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}

    optimizer:
      optimizer: "adam"
      lr: 3.0e-7
      min_lr: 3.0e-8
      weight_decay: 0.01
      bf16: true
      fp16: false
      params_dtype: "float32"

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 1000
      lr_warmup_iters: 13
      lr_warmup_init: 3.0e-8

  generation:
    backend: "vllm"
    max_new_tokens: ${policy.max_total_sequence_length}
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.6
      max_model_len: ${policy.max_total_sequence_length}
    # Optional: NIXL/UCX checkpoint-engine refit for non-colocated vLLM
    # generation. Streams Megatron policy weights directly to generation workers
    # instead of the NCCL collective path. Requires a Megatron policy, the vLLM
    # generation backend, and policy.generation.colocated.enabled=false. Disabled
    # by default; see docs/guides/checkpoint-engine-refit.md.
    checkpoint_engine:
      enabled: false
      backend: nixl  # built-in backend, or a "module:ClassName" plugin path
      update_weights_bucket_megabytes: 2048  # reusable per-worker transfer buffer
      engine_kwargs:
        nixl:
          device: cuda  # "cuda" for GPU buffers, "cpu" for host-pinned fallback
          cleanup_after_load: false
          # shard_hf_weights: false  # Megatron/vLLM MoE expert-sharded refit
          # sharded_target_tp_size: null  # defaults to rollout world size
          backend_name: UCX
          backend_init_params: null  # set UCX/NIXL backend params here if needed

cluster:
  gpus_per_node: 8
  num_nodes: 1
  segment_size: null  # Nodes per NVLink domain segment for topology-aware alignment; null to disable
