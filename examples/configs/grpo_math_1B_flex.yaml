# GRPO Algorithm Configuration
defaults: ./grpo_math_1B.yaml
grpo:
  num_prompts_per_step: 4
  num_generations_per_prompt: 16

checkpointing:
  enabled: true
  checkpoint_dir: "results/grpo-flextron"
  
policy:
  model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  tokenizer:
    name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  hf_config_overrides: {} 
  train_global_batch_size: 8
  train_micro_batch_size: 1
  logprob_batch_size: ${policy.train_micro_batch_size}
  max_total_sequence_length: 2048
  precision: "bfloat16"
  logprob_chunk_size: null
  offload_optimizer_for_logprob: false # Only useful for non-colocated generation since colocated generation will always offload optimizer to cuda before refit

  dtensor_cfg:
    enabled: false

  megatron_cfg:
    enabled: true
      # force_reconvert_from_hf: False # Set to True to force reconvert of the model from Hugging Face
      # pretrained_checkpoint_path: /data/flextron-nano-models/30b
    empty_unused_memory_level: 1  # 1 is the minimum recommendation for RL since we almost always need to offload before beginning generation. Setting to 0 is faster, but you are more likely to run out of GPU memory.
    activation_checkpointing: false
    converter_type: "NemotronHForCausalLM"
    tensor_model_parallel_size: 8
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 8
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    sequence_parallel: true
    freeze_moe_router: true
    # Deterministic Flextron submodel routes. Each route can set scalar dims
    # for all eligible layers or one value per main hybrid layer. Setup expands
    # and projects these lists to the layer types supported by Flextron hooks.
    flex_routers:
      # 23B nested Flextron route
      - mlp_int_list: 1856
        emb_int_list: 2688
      # 12B nested Flextron route
      - mlp_int_list: 960
        emb_int_list: 1920
    # Sampling rates for [base_model, 23B nested route, 12B nested route].
    flextron_sampling_rates: [0.5, 0.3, 0.2]
    # flextron_sampling_rates: [1.0, 0.0, 0.0]
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none" # "seq_aux_loss" causes logprob error divergence for grpo
    moe_router_bias_update_rate: 0.0 # by default, disable bias updates for grpo
    moe_permute_fusion: true
    # gives ~20% training perf speedup with sequence packing
    apply_rope_fusion: True
    # gives ~25% training perf speedup with sequence packing and apply_rope_fusion
    bias_activation_fusion: False
    defer_fp32_logits: False
    moe_per_layer_logging: False
    moe_enable_deepep: false
    moe_token_dispatcher_type: "alltoall"
    moe_shared_expert_overlap: false
    gradient_accumulation_fusion: false

    peft:
      enabled: false
      target_modules: []
      exclude_modules: ['*out_proj*'] # Exclude all out_proj modules. When NemotronHMamba2Mixer uses cuda_kernels_forward, out_proj LoRA has no gradient.
      dim: 128
      alpha: 512
      dropout: 0.0
      dropout_position: "post"
      lora_A_init_method: "xavier"
      lora_B_init_method: "zero"
      a2a_experimental: false
      lora_dtype: None

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"

    fp8_cfg: 
      enabled: false
      fp8: "e4m3"
      fp8_recipe: "blockwise"
      fp8_param: false

    env_vars: null

  # See docs/design-docs/sequence-packing-and-dynamic-batching.md 
  # for more details on dynamic batching and sequence packing.
  dynamic_batching:
    enabled: false

  sequence_packing:
    enabled: false

  # makes the training sequence length divisible by the tensor parallel size
  # this is useful for sequence parallel training
  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  max_grad_norm: 1.0

  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 5.0e-6
      weight_decay: 0.01
      betas: [0.9, 0.999]
      eps: 1e-8
      # when using Dtensor, we need to set foreach
      # and fused to False
      foreach: False
      fused: False

  generation:
    backend: "megatron"
    max_new_tokens: ${policy.max_total_sequence_length}
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    mcore_generation_config:
      buffer_size_gb: 10  # Total buffer size is 2x this value (active requests + paused requests)
      num_cuda_graphs: null  # Number of CUDA graphs to pre-compile for different batch sizes
      block_size_tokens: 256  # Size of each KV cache block in tokens (affects memory granularity)
      use_cuda_graphs_for_non_decode_steps: false  # Enable CUDA graphs for prefill/context processing
      enable_chunked_prefill: true  # Split long prefills into chunks for better memory management
      unified_memory_level: 0  # Unified memory usage level (0=disabled, higher values enable more aggressive paging)
      max_tokens: 16384 # Maximum number of tokens to use in a single step. Analogous to vllm's max_num_batched_tokens
    vllm_cfg:
      async_engine: false
      precision: ${policy.precision}
      kv_cache_dtype: "auto"
      tensor_parallel_size: 8
      pipeline_parallel_size: 1
      expert_parallel_size: 8  # When EP > 1, EP must be a multiple of TP since vLLM's EP = DP * TP
      gpu_memory_utilization: 0.7
      max_model_len: ${policy.max_total_sequence_length}
      # when enforce_eager is False, it is optional to set ++policy.generation.vllm_kwargs.compilation_config.backend=eager for better accuracy,
      # with the flag, vllm will use the custom CUDA kernels instead of the Triton kernels generated by torch.compile
      # for more details, see convergence issue https://github.com/NVIDIA-NeMo/RL/issues/998
      enforce_eager: False
      use_deep_gemm: False
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true # Set to true to enable vLLM internal metrics logger, turn off for better performance
      vllm_metrics_logger_interval: 0.5 # Interval in seconds to collect vLLM logger metrics
    vllm_kwargs: {}
    colocated:
      # true: generation shares training GPUs
      # false: uses dedicated generation resources
      enabled: true
      # only relevant when enabled is false
      resources:
        gpus_per_node: null # Decides num gpus to be dedicated to generation when there is one node in the cluster i.e cluster.num_nodes == 1
        num_nodes: null # Decides number of nodes to be dedicated to generation


env:
  math:
    num_workers: 8
    math_verify_impl: "hf_math_verify"

logger:
  wandb_enabled: true
  tensorboard_enabled: false
  wandb:
    project: "grpo-dev"
    name: "nanov3-flex-debug"

cluster:
  gpus_per_node: 8
  num_nodes: 2
