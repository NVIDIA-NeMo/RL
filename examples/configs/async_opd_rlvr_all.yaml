# Async On-Policy Distillation (MOPD) config for SuperV3.
# Based on grpo_superv3.yaml with OPD-specific changes.
# Reference: MOPD (arXiv:2601.02780), Section 4.4

checkpointing:
  enabled: true
  checkpoint_dir: "results/grpo"
  metric_name: "val:total_reward/mean"
  higher_is_better: true
  keep_top_k: 1000000
  save_period: 10
  checkpoint_must_save_by: "00:03:30:00"
  model_save_format: "safetensors"
  save_consolidated: false

grpo:
  num_prompts_per_step: 128
  num_generations_per_prompt: 16
  num_val_generations_per_prompt: 2
  max_rollout_turns: 1
  max_num_epochs: 1
  max_num_steps: 1000000
  normalize_rewards: true
  use_leave_one_out_baseline: true
  # Clipping bounds for normalized advantages to prevent extreme values from small std
  # Set to null to disable clipping (default), or e.g. -100/100 to clip
  advantage_clip_low: null
  advantage_clip_high: null
  val_period: 5
  val_at_start: false
  val_at_end: false
  overlong_filtering: false
  max_val_samples: null
  val_batch_size: 256
  seed: 42
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1

  penalize_invalid_tool_call: false
  invalid_tool_call_advantage: -5.0

  reward_shaping:
    enabled: false
    overlong_buffer_length: 128
    overlong_buffer_penalty: 1
    max_response_length: ${policy.max_total_sequence_length}
    stop_properly_penalty_coef: null
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0
  # OPD: async must be enabled
  async_grpo:
    enabled: true
    max_trajectory_age_steps: 1
    in_flight_weight_updates: false
    recompute_kv_cache_after_weight_updates: false

  # OPD: use OPD advantage estimator
  adv_estimator:
    name: opd

  # OPD: use ORM blending (optional)
  use_orm_advantage: false
  orm_advantage_weight: 0.0

  seq_logprob_error_threshold: 2

loss_fn:
  reference_policy_kl_penalty: 0.0
  reference_policy_kl_type: "k3"
  kl_input_clamp_value: null
  kl_output_clamp_value: null

  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: null
  use_on_policy_kl_approximation: true
  # OPD: MOPD Equation 7 — REINFORCE loss (no PPO ratio)
  disable_ppo_ratio: true
  # OPD: MOPD Equation 8 — IS truncation via ICE-POP hard gate
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 5.0          # ε_high
  truncated_importance_sampling_ratio_min: 0.2      # ε_low
  truncated_importance_sampling_type: "icepop"
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: true
  use_kl_in_reward: false

# =============================================================================
# Policy
# =============================================================================
policy:
  model_name: "/lustre/fsw/portfolios/llmservice/users/soumyes/sft-runs/eval_and_sleep/ultra-v3-sft-bf16-hybridep-ep64-cp32-bindpcie-recompute-offload-mar13-blend-512k-filt-1e-5/iter_0001900/hf"
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}

  train_global_batch_size: 4096
  train_micro_batch_size: 1
  generation_batch_size: 64
  logprob_batch_size: 1
  max_total_sequence_length: 65536
  precision: "bfloat16"
  logprob_chunk_size: 2048
  offload_optimizer_for_logprob: false

  dtensor_cfg:
    _v2: true
    enabled: false
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 2
    activation_checkpointing: true

    # TP=8 spans 2 GB200 nodes (4 GPUs each) via intra-rack NVLink.
    tensor_model_parallel_size: 8
    expert_tensor_parallel_size: 1
    # EP=64: 512 experts / 64 = 8 experts per EP rank
    # All-to-all spans 64 GPUs (16 nodes), fits within one NVLink domain
    expert_model_parallel_size: 64
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 8
    pipeline_dtype: ${policy.precision}
    sequence_parallel: true

    # MoE
    freeze_moe_router: true
    moe_router_dtype: "fp32"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 1.0e-3
    moe_router_enable_expert_bias: true
    moe_permute_fusion: true
    moe_enable_deepep: false
    moe_token_dispatcher_type: "flex"
    moe_flex_dispatcher_backend: "hybridep"
    moe_hybridep_num_sms: 32
    moe_aux_loss_coeff: 0.0
    moe_shared_expert_overlap: false

    # Compute
    apply_rope_fusion: true
    use_fused_weighted_squared_relu: true
    bias_activation_fusion: false
    defer_fp32_logits: true

    # Logging
    track_moe_metrics: true
    moe_per_layer_logging: true
    do_not_average_loss: true
    cp_normalize: true
    calculate_per_token_loss: true
    scale_loss_by_dp_cp_size: false

    # MTP — disabled
    mtp_loss_scaling_factor: 0.3
    mtp_use_repeated_layer: true
    mtp_num_layers: 5
    mtp_detach_heads: true

    optimizer:
      optimizer: "adam"
      lr: 3.0e-6
      min_lr: 3.0e-6
      weight_decay: 0.0
      bf16: true
      fp16: false
      params_dtype: "float32"

      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8

      sgd_momentum: 0.9

      use_distributed_optimizer: true
      use_precision_aware_optimizer: true

      clip_grad: ${policy.max_grad_norm}

      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 3e-7
      override_opt_param_scheduler: true

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: false
      overlap_param_gather: true
      average_in_collective: false
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"

    # FP8 — disabled for bf16 runs. Enable for mxfp8 validation.
    fp8_cfg:
      enabled: false
      fp8: "e4m3"
      fp8_recipe: "mxfp8"
      fp8_param: false

    first_last_layers_bf16: true
    num_layers_at_start_in_bf16: 1
    num_layers_at_end_in_bf16: 1

    use_gloo_process_groups: false

    checkpoint:
      async_save: true
      ckpt_assume_constant_structure: true
      fully_parallel_save_process_group: "ep_dp"
      fully_parallel_load_process_group: "ep_dp"
      fully_parallel_load_exchange_algo: "broadcast"

    env_vars: null

  # ---------------------------------------------------------------------------
  # Sequence Packing
  # ---------------------------------------------------------------------------
  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: true
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64
    fuse_loss: true

  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  max_grad_norm: 1.0
  optimizer: null
  scheduler: null

  # ---------------------------------------------------------------------------
  # Generation (vLLM) — Non-colocated, async
  # ---------------------------------------------------------------------------
  generation:
    port_range_low: 3000
    port_range_high: 4999
    backend: "vllm"
    max_new_tokens: 49152
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    # TP=8 EP=8: EP=TP so vllm_dp_size=1, async_engine=true works with NeMo Gym.
    # Same memory as EP=1 but uses all-to-all for expert routing.
    # EP > TP blocked by https://github.com/NVIDIA-NeMo/RL/issues/1101.
    vllm_cfg:
      async_engine: true
      precision: ${policy.precision}
      kv_cache_dtype: "auto"
      tensor_parallel_size: 8
      pipeline_parallel_size: 1
      expert_parallel_size: 8
      gpu_memory_utilization: 0.85
      max_model_len: 49152
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 0.5
      expose_http_server: true
      skip_tokenizer_init: false
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_coder
        reasoning_parser: nano_v3
        reasoning_parser_plugin: nemo_rl/utils/nano_v3_reasoning_parser.py

    vllm_kwargs:
      attention_backend: FLASH_ATTN
      max_num_seqs: 64
      mamba_ssm_cache_dtype: "float32"
      compilation_config:
        cudagraph_capture_sizes: [1,2,4,8,16,32,64]
        pass_config:
          fuse_allreduce_rms: false

    colocated:
      enabled: false
      resources:
        gpus_per_node: 4
        num_nodes: 182   # Overridden by launch script

# =============================================================================
# Data
# =============================================================================
data:
  max_input_seq_length: null
  shuffle: false
  num_workers: 1
  train:
    data_path: null   # Set by launch script
  validation:
    data_path: null   # Set by launch script
  default:
    dataset_name: NemoGymDataset
    env_name: "nemo_gym"
    prompt_file: null
    system_prompt_file: null
    processor: "nemo_gym_data_processor"

# =============================================================================
# Environment — NeMo Gym + Judge Models
# =============================================================================
env:
  should_use_nemo_gym: true
  # true: skip expensive train_data_step*.jsonl (recommended for large Gym runs); false: write full jsonl.
  should_log_nemo_gym_responses: true
  nemo_gym:
    nemo_gym_log_dir: "logs/nemo_gym"
    skip_venv_if_present: true
    port_range_low: 5000
    port_range_high: 5999
    invalid_tool_call_patterns:
      - "<tool_call>"
      - "</tool_call>"
      - "<function_call>"
      - "</function_call>"
    thinking_tags:
      - "<think>"
      - "</think>"
    config_paths:
      - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
      - resources_servers/math_with_judge/configs/math_with_judge.yaml
      - resources_servers/code_gen/configs/code_gen.yaml
      - resources_servers/workplace_assistant/configs/workplace_assistant.yaml
      - resources_servers/mcqa/configs/mcqa.yaml
      - resources_servers/instruction_following/configs/instruction_following.yaml
      - resources_servers/equivalence_llm_judge/configs/lc_judge.yaml
      - resources_servers/calendar/configs/calendar.yaml
      - resources_servers/genrm_compare/configs/genrm_compare.yaml
      - resources_servers/equivalence_llm_judge/configs/nl2bash-equivalency.yaml
      - resources_servers/equivalence_llm_judge/configs/equivalence_llm_judge.yaml
      - resources_servers/single_step_tool_use_with_argument_comparison/configs/single_step_tool_use_with_argument_comparison.yaml
      - resources_servers/reasoning_gym/configs/reasoning_gym.yaml
      - resources_servers/terminus_judge/configs/terminus_judge_string_only.yaml
      - resources_servers/ns_tools/configs/ns_tools.yaml
      - resources_servers/math_formal_lean/configs/math_formal_lean_multi_turn.yaml
      # swerl_gen disabled: requires Apptainer/Singularity (not available on aarch64)
      # - resources_servers/swerl_gen/configs/swerl_gen.yaml
      - resources_servers/multichallenge/configs/multichallenge.yaml
      - resources_servers/inverse_if/configs/inverse_if.yaml
      - resources_servers/single_step_tool_use_with_argument_comparison/configs/search_pivot_single_step_tool_use_with_argument_comparison.yaml
      - resources_servers/single_step_tool_use_with_argument_comparison/configs/toolcall_schema_single_step_tool_use_with_argument_comparison.yaml
      - resources_servers/single_step_tool_use_with_argument_comparison/configs/swe_pivot_single_step_tool_use_with_argument_comparison.yaml
      - resources_servers/abstention/configs/abstention.yaml
      - resources_servers/nvarc/configs/inductive.yaml
      - resources_servers/nvarc/configs/transductive.yaml
      - resources_servers/single_step_tool_use_with_argument_comparison/configs/droid_pivot_single_step_tool_use_with_argument_comparison.yaml
      - resources_servers/equivalence_rule/configs/lc.yaml
      - resources_servers/ether0/configs/ether0.yaml
      - resources_servers/structured_outputs/configs/structured_outputs_json_yaml_xml_v1.yaml
      - resources_servers/structured_outputs/configs/structured_outputs_v3.yaml
      - resources_servers/format_verification/configs/freeform_formatting.yaml
      - resources_servers/format_verification/configs/citation_format.yaml
      - resources_servers/rdkit_chemistry/configs/rdkit_chemistry.yaml
      - resources_servers/jailbreak_detection/configs/jailbreak_detection_nemotron_combined_reward_tp8.yaml
      - resources_servers/indirect_prompt_injection/configs/indirect_prompt_injection.yaml

    abstention:
      resources_servers:
        abstention:
          judge_model_server:
            type: responses_api_models
            name: nl2bash_judge_model
          judge_responses_create_params:
            max_output_tokens: 8192

    # Safety Model: 4B — TP=4 ensures each PG claims a full node,
    # avoiding GPU fragmentation that can block larger-TP models.
    jailbreak_detection:
      resources_servers:
        jailbreak_detection:
          judge_model_server:
            type: responses_api_models
            name: safety_judge_model

    safety_judge_model:
      responses_api_models:
        local_vllm_model:
          entrypoint: app.py
          model: null   # Set by launch script
          return_token_id_information: false
          uses_reasoning_parser: false
          debug: true
          vllm_serve_env_vars:
            VLLM_RAY_DP_PACK_STRATEGY: strict

          vllm_serve_kwargs:
            attention_backend: TRITON_ATTN
            tensor_parallel_size: 4
            data_parallel_size: 2
            data_parallel_size_local: 1
            pipeline_parallel_size: 1
            gpu_memory_utilization: 0.85
            max_model_len: 96000
            max_num_seqs: 16
            model_loader_extra_config:
              enable_multithread_load: true
              num_threads: 112
            compilation_config:
              cudagraph_capture_sizes: [1,2,4,8,16]
 

    # nl2bash / General Judge: TP=4 on GB200 192GB
    nl2bash_judge_model:
      responses_api_models:
        local_vllm_model:
          entrypoint: app.py
          model: null   # Set by launch script
          return_token_id_information: false
          uses_reasoning_parser: false
          debug: true
          vllm_serve_env_vars:
            VLLM_RAY_DP_PACK_STRATEGY: strict

          vllm_serve_kwargs:
            attention_backend: FLASH_ATTN
            tensor_parallel_size: 4
            data_parallel_size: 4
            data_parallel_size_local: 1
            pipeline_parallel_size: 1
            enable_expert_parallel: true
            enable_auto_tool_choice: true
            tool_call_parser: hermes
            gpu_memory_utilization: 0.85
            max_model_len: 131072
            max_num_seqs: 256
            model_loader_extra_config:
              enable_multithread_load: true
              num_threads: 112
            compilation_config:
              cudagraph_capture_sizes: [1,2,4,8,16,32]
          server_env:
            NCCL_MNNVL_ENABLE: "0"

    inverse_if:
      resources_servers:
        inverse_if:
          judge_model_server:
            type: responses_api_models
            name: nl2bash_judge_model

    multichallenge:
      resources_servers:
        multichallenge:
          judge_model_server:
            type: responses_api_models
            name: nl2bash_judge_model
          judge_responses_create_params:
            max_output_tokens: 8192

    equivalence_llm_judge:
      resources_servers:
        equivalence_llm_judge:
          judge_model_server:
            name: nl2bash_judge_model
          judge_responses_create_params:
            max_output_tokens: 8192

    # GenRM: TP=4 on GB200 192GB
    genrm_compare_resources_server:
      resources_servers:
        genrm_compare:
          num_rollouts_per_prompt: ${grpo.num_generations_per_prompt}
          genrm_model_server:
            type: responses_api_models
            name: genrm_model
          genrm_responses_create_params:
            max_output_tokens: 16384
            temperature: 0.6
            top_p: 0.95
          comparison_strategy: "circular"
          num_judges_per_comparison: 1
          use_principle: true
          default_principle: "You will be given one or more evaluation criteria (rubrics).\nEvaluate both responses on EACH criterion individually first, then synthesize an overall judgment.\nCriteria:\n\n1. Please act as an impartial judge and evaluate the quality of the responses provided by two AI assistants to the user prompt. Begin your evaluation by generating your own answer to the prompt. You must provide your answer before judging any answers. When evaluating the assistants' answers, compare both assistants' answers with your answer. You must identify and correct any mistakes or inaccurate information. Then consider if the assistant's answers are helpful, relevant, and concise. Helpful means the answer correctly responds to the prompt or follows the instructions. Note when user prompt has any ambiguity or more than one interpretation, it is more helpful and appropriate to ask for clarifications or more information from the user than providing an answer based on assumptions. Relevant means all parts of the response closely connect or are appropriate to what is being asked. Concise means the response is clear and not verbose or excessive. Then consider the creativity and novelty of the assistant's answers when needed. Finally, identify any missing important information in the assistants' answers that would be beneficial to include when responding to the user prompt."
          aggregator_method: "simple_tiebreaker"
          reasoning_bonus: 0.5
          answer_bonus: 0.5
          top_percentile: 0.2
          group_reasoning_length_penalty_coeff: 0.1
          group_answer_length_penalty_coeff: 0.2
          group_style_penalty_coeff: 0.0
          default_score: 3.0
          default_ranking: 3.5

    genrm_model:
      responses_api_models:
        genrm_model:
          entrypoint: app.py
          base_url: null
          api_key: dummy_key
          model: null   # Set by launch script
          uses_reasoning_parser: true
          return_token_id_information: false
          debug: true
          vllm_serve_env_vars:
            VLLM_RAY_DP_PACK_STRATEGY: strict

          vllm_serve_kwargs:
            attention_backend: FLASH_ATTN
            tensor_parallel_size: 4
            data_parallel_size: 4
            data_parallel_size_local: 1
            pipeline_parallel_size: 1
            reasoning_parser: deepseek_r1
            gpu_memory_utilization: 0.85
            max_model_len: 60000
            max_num_seqs: 256
            model_loader_extra_config:
              enable_multithread_load: true
              num_threads: 112
            compilation_config:
              cudagraph_capture_sizes: [1,2,4,8,16,32]
          server_env:
            NCCL_MNNVL_ENABLE: "0"

    lc_judge:
      resources_servers:
        equivalence_llm_judge:
          judge_model_server:
            name: nl2bash_judge_model
          judge_responses_create_params:
            max_output_tokens: 8192

    math_with_judge:
      resources_servers:
        math_with_judge:
          judge_model_server:
            name: nl2bash_judge_model
          judge_responses_create_params:
            max_output_tokens: 8192
          should_use_judge: true

    code_gen:
      resources_servers:
        code_gen:
          num_processes: 2048
          unit_test_timeout_secs: 10
          debug: false

logger:
  log_dir: "logs"
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  monitor_gpus: true
  swanlab_enabled: false
  wandb:
    project: "grpo-dev"
    name: "grpo-dev-logger"
  tensorboard: {}
  mlflow:
    experiment_name: "grpo-dev"
    run_name: "grpo-dev-logger"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 8
  num_nodes: 1

# OPD: on-policy distillation with non-colocated teachers
on_policy_distillation:
  enabled: true
  use_orm_advantage: false
  orm_advantage_weight: 0.0
  teacher_model_by_agent_name:
    math_with_judge_simple_agent: "/path/to/math_teacher_checkpoint"
    code_gen_simple_agent: "/path/to/code_gen_teacher_checkpoint"
    mcqa_simple_agent: "/path/to/mcqa_teacher_checkpoint"
    instruction_following_simple_agent: "/path/to/instruction_following_teacher_checkpoint"
    single_step_tool_use_with_argument_comparison_agent: "/path/to/tool_use_teacher_checkpoint"
    terminal_pivot_simple_agent: "/path/to/terminal_pivot_teacher_checkpoint"
    swerl_gen_simple_agent: "/path/to/swerl_gen_teacher_checkpoint"
    search_pivot_single_step_tool_use_with_argument_comparison_agent: "/path/to/search_pivot_teacher_checkpoint"
    toolcall_schema_single_step_tool_use_with_argument_comparison_agent: "/path/to/toolcall_schema_teacher_checkpoint"
    swe_pivot_single_step_tool_use_with_argument_comparison_agent: "/path/to/swe_pivot_teacher_checkpoint"
    multichallenge_simple_agent: "/path/to/multichallenge_teacher_checkpoint"
    math_formal_lean_refinement_agent: "/path/to/lean_teacher_checkpoint"
    ns_tools_simple_agent: "/path/to/math_tir_teacher_checkpoint"
    jailbreak_detection_simple_agent: "/path/to/jailbreak_teacher_checkpoint"
    over_refusal_detection_simple_agent: "/path/to/overrefusal_teacher_checkpoint"
    genrm_simple_agent: "/path/to/genrm_teacher_checkpoint"
    genrm_simple_agent_reasoning_off: "/path/to/genrm_teacher_checkpoint"
  default_teacher_alias: instruction_following_simple_agent
  deduplicate_shared_teacher_checkpoints: true
  non_colocated_teachers:
    enabled: true
    default_teacher_cfg:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 4
      context_parallel_size: 1
      num_nodes: 1
      gpus_per_node: 8
      precision: bf16
      micro_batch_size: 1


# For consistency, not used for MOPD
# =============================================================================
# Effort Levels
# =============================================================================
effort_levels:
  low_string: "{reasoning effort: efficient}"
  low_weight: 0.1
  low_penalty: 1
  low_ub: 15000

# =============================================================================
# Token IDs (model-specific, used by token-based penalties)
# =============================================================================
token_ids:
  eos: 2           # </s>
  think_open: 12   # <think>
  think_close: 13  # </think>

# =============================================================================
# Reward Penalties (set reward to 0 when triggered)
# =============================================================================
penalize_duplicated_reasoning: true   # reasoning content == final answer
penalize_empty_final_answer: true     # last message output has empty content
penalize_eos_token: true              # eos token appears in generation
penalize_malformed_think_tag: true     # <think>/<\/think> count != 1 per turn