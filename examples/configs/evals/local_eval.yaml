# Evaluation Configuration from local files.
# Other settings (e.g., eval metrics, vLLM, cluster, etc.) are inherited from examples/configs/evals/eval.yaml.
defaults: "eval.yaml"

generation:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  vllm_cfg:
    max_model_len: 2048

data:
  prompt_file: "examples/prompts/cot.txt"
  system_prompt_file: null
  dataset_name: "ResponseDataset"
  data_path: "https://openaipublic.blob.core.windows.net/simple-evals/math_500_test.csv"
  input_key: "Question"
  output_key: "Answer"
  split: "train"
  processor: "math_hf_data_processor"
