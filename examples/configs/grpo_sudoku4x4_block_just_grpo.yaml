# Block JustGRPO on Nemotron-Labs-Diffusion-3B, 4x4 Mini Sudoku.
# Two parents: (1) the block_just_grpo algorithm base (policy/FastDiffuser block-reveal
# generation, block_size 16) and (2) grpo_sudoku4x4_base.yaml (shared task settings:
# mini_sudoku blanks-only reward, few-shot prompt, gen 512, avg@4 validation). The second
# parent overrides the algorithm base's data/env; this file only sets output paths.
defaults:
  - deepscaler_nemotron_labs_diffusion_3b_sglang_block_just_grpo_megatron.yaml
  - grpo_sudoku4x4_base.yaml

checkpointing:
  checkpoint_dir: "results/grpo-nd3b-block_just_grpo-sudoku4x4-megatron"

logger:
  log_dir: "logs/grpo-nd3b-block_just_grpo-sudoku4x4-sglang"
  wandb:
    name: "grpo-nd3b-block_just_grpo-sudoku4x4-blanks-fewshot"
