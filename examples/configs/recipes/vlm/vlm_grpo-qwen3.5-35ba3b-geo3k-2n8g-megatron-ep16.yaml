defaults: ../../vlm_grpo_3B.yaml
grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  use_leave_one_out_baseline: true
  normalize_rewards: true
loss_fn:
  reference_policy_kl_penalty: 0.0
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 2
  token_level_loss: true
checkpointing:
  checkpoint_dir: results/vlm_grpo-qwen3.5-35ba3b-geo3k-2n8g-megatron-ep16
policy:
  model_name: Qwen/Qwen3.5-35B-A3B-Base
  train_global_batch_size: 512
  train_micro_batch_size: 1
  logprob_batch_size: 1
  precision: "bfloat16"
  max_total_sequence_length: 3072
  dtensor_cfg:
    enabled: false

  dynamic_batching:
    enabled: false

  sequence_packing:
    enabled: false
  megatron_cfg:
    enabled: true
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 16
    sequence_parallel: false
    pipeline_dtype: ${policy.precision}
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: false
    moe_enable_deepep: false
    moe_token_dispatcher_type: "allgather"
    moe_shared_expert_overlap: false
    apply_rope_fusion: false
    activation_checkpointing: true
    defer_fp32_logits: true

    optimizer:
      optimizer: "adam"
      lr: 1.0e-6
      min_lr: 1.0e-7
      weight_decay: 0.1
      bf16: true
      fp16: false
      params_dtype: "float32"

      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8

      use_distributed_optimizer: true
      use_precision_aware_optimizer: false

      clip_grad: ${policy.max_grad_norm}

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-8
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  generation:
    max_new_tokens: 2048
    vllm_cfg:
      tensor_parallel_size: 8
      expert_parallel_size: 1
      gpu_memory_utilization: 0.6
      enforce_eager: false
      max_model_len: 3072
      skip_tokenizer_init: false
data:
  max_input_seq_length: 1024
  train:
    dataset_name: geometry3k
    split: train
  validation:
    dataset_name: geometry3k
    split: test
  default:
    prompt_file: examples/prompts/geo3k.txt
    processor: vlm_hf_data_processor
    env_name: geometry3k
logger:
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: vlm_grpo-qwen3.5-35ba3b-geo3k-2n8g-megatron-ep16
cluster:
  gpus_per_node: 8
  num_nodes: 2
