defaults: ../../sft.yaml
sft:
  max_num_steps: 100
checkpointing:
  enabled: false
policy:
  model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  train_global_batch_size: 16
  max_total_sequence_length: 2048
  dtensor_cfg:
    enabled: false
  sequence_packing:
    enabled: true
  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  optimizer: null
  megatron_cfg:
    enabled: true
    tensor_model_parallel_size: 2
    pipeline_model_parallel_size: 2
    context_parallel_size: 2
    expert_model_parallel_size: 8
    sequence_parallel: true
    moe_router_dtype: fp32
    # MoE aux-loss normalization: a non-zero aux-loss coefficient with
    # seq_aux_loss balancing. This combination was previously rejected by an
    # assertion in nemo_rl/models/megatron/setup.py; the aux-loss gradient is
    # now normalized via moe_grad_scale_func in megatron_policy_worker.py.
    moe_router_load_balancing_type: seq_aux_loss
    moe_aux_loss_coeff: 1.0e-4
    optimizer:
      lr: 1.5e-05
      min_lr: 1.49999e-05
      weight_decay: 0.0
logger:
  wandb:
    project: nemo-rl
    name: sft-nanov3-30BA3B-2n8g-megatron
  tensorboard:
    log_dir: tb_logs-sft-nanov3-30BA3B-2n8g-megatron
  mlflow:
    run_name: sft-nanov3-30BA3B-2n8g-megatron
cluster:
  gpus_per_node: 8
