defaults: ./grpo-qwen3-235b-16n8g.yaml
checkpointing:
  checkpoint_dir: results/grpo-qwen3-235b-16n4g
policy:
  megatron_cfg:
    pipeline_model_parallel_size: 4
    num_layers_in_first_pipeline_stage: 23
    num_layers_in_last_pipeline_stage: 23
    # HybridEP settings
    moe_token_dispatcher_type: flex
    moe_flex_dispatcher_backend: hybridep
    moe_hybridep_num_sms: 32
  generation:
    vllm_cfg:
      tensor_parallel_size: 8
      gpu_memory_utilization: 0.4
      # Use sync engine + eager mode for GB200 step4 refit stability.
      async_engine: false
      enforce_eager: true
      env_vars:
        VLLM_USE_FLASHINFER_MOE_FP16: "0"
        VLLM_USE_FLASHINFER_MOE_FP8: "0"
    vllm_kwargs:
      # Keep MoE refit behavior aligned with stable pre-v0.20 path.
      moe_backend: triton
logger:
  log_dir: logs/grpo-qwen3-235b-16n4g
  wandb:
    name: grpo-qwen3-235b-16n4g
cluster:
  gpus_per_node: 4
  num_nodes: 16
