defaults: ./grpo-nemotron-super-20n8g-gym.yaml

policy:
  generation:
    colocated:
      enabled: false
      resources:
        num_nodes: 16
        gpus_per_node: 4
env:
  nemo_gym:
    nl2bash_judge_model:
      responses_api_models:
        local_vllm_model:
          vllm_serve_kwargs:
            data_parallel_size: 1

cluster:
  gpus_per_node: 4
  num_nodes: 36
