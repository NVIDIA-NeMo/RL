defaults: ../../grpo_math_1B.yaml
grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  max_rollout_turns: 1
  max_num_epochs: 10
  max_num_steps: 10000
  normalize_rewards: true
  use_leave_one_out_baseline: false
  val_period: 5
  val_at_start: false
  overlong_filtering: false
  max_val_samples: 960
  val_batch_size: 960
  batch_multiplier: 2
  use_dynamic_sampling: true
  dynamic_sampling_max_gen_batches: 10
  seed: 42
  reward_scaling:
    enabled: true
    target_min: -1.0
  reward_shaping:
    enabled: true
    overlong_buffer_length: 512
    max_response_length: 8192
loss_fn:
  reference_policy_kl_penalty: 0.0
  use_importance_sampling_correction: true
  truncated_importance_sampling_type: "tis"
  truncated_importance_sampling_ratio: 2
  ratio_clip_max: 0.28
  ratio_clip_c: 10
  token_level_loss: true
checkpointing:
  checkpoint_dir: results/dapo-B32N16-8k-OFFPOLICY-LR2E-6-EP128-automodel-16n8g-VLLMFP8
  keep_top_k: 3
  save_period: 5
  checkpoint_must_save_by: "00:03:45:00"
policy:
  model_name: MiniMaxAI/MiniMax-M2.7
  hf_config_overrides:
    router_aux_loss_coef: 0
  train_global_batch_size: 512
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 10240
  logprob_chunk_size: 2048
  offload_optimizer_for_logprob: true
  optimizer:
    name: transformer_engine.pytorch.optimizers.fused_adam.FusedAdam
    kwargs:
      master_weights: true
      store_param_remainders: true
      exp_avg_dtype: torch.bfloat16
      exp_avg_sq_dtype: torch.bfloat16
  dtensor_cfg:
    expert_parallel_size: 128
    activation_checkpointing: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    automodel_kwargs:
      backend:
        _target_: nemo_automodel.components.models.common.utils.BackendConfig
        attn: te
        linear: te
        rms_norm: te
        experts: torch_mm
        dispatcher: deepep
        fake_balanced_gate: false
        rope_fusion: false
        enable_hf_state_dict_adapter: true
  sequence_packing:
    enabled: false
  dynamic_batching:
    enabled: true
  generation:
    max_new_tokens: 8192
    vllm_cfg:
      precision: fp8
      tensor_parallel_size: 8
      expert_parallel_size: 8
      enable_expert_parallel: true
      gpu_memory_utilization: 0.5
      max_model_len: 10240
data:
  max_input_seq_length: 2048
  train:
    dataset_name: DAPOMath17K
  validation:
    dataset_name: DAPOMathAIME2024
  default:
    prompt_file: null
env:
  math:
    num_workers: 16
    math_verify_impl: dapo_math_verify
logger:
  wandb_enabled: true
  tensorboard_enabled: false
  wandb:
    project: nemo-rl
    name: dapo-B32N16-8k-OFFPOLICY-LR2E-6-EP128-automodel-16n8g-VLLMFP8
cluster:
  gpus_per_node: 8
  num_nodes: 16
