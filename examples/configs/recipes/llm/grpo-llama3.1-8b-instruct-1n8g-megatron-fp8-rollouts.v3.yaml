defaults: ../../grpo_math_1B.yaml
grpo:
  num_generations_per_prompt: 32
  max_num_steps: 500
loss_fn:
  use_importance_sampling_correction: true
checkpointing:
  checkpoint_dir: results/grpo-llama3.1-8b-instruct-1n8g-megatron-fp8-rollouts
policy:
  model_name: meta-llama/Llama-3.1-8B-Instruct
  tokenizer:
    name: meta-llama/Llama-3.1-8B-Instruct
  train_micro_batch_size: 1
  logprob_batch_size: 2
  max_total_sequence_length: 4096
  make_sequence_length_divisible_by: 1
  dtensor_cfg:
    enabled: false
  megatron_cfg:
    enabled: true
    pipeline_model_parallel_size: 2
    activation_checkpointing: true
    defer_fp32_logits: true
    optimizer:
      lr: 5.0e-07
      min_lr: 5.0e-08
      weight_decay: 0.0
    scheduler:
      lr_warmup_iters: 2
      lr_warmup_init: 5.0e-08
  generation:
    max_new_tokens: 4096
    vllm_cfg:
      precision: fp8
      max_model_len: 4096
      use_deep_gemm: true
    vllm_kwargs:
      # At the same gpu_memory_utilization, vLLM 0.25's profiling sizes the
      # KV cache several GiB larger than 0.20 did, growing the CuMemAllocator
      # sleep pool past what can be re-mapped at wake-up next to the
      # colocated Megatron policy ("CUDA Error: out of memory at
      # csrc/cumem_allocator.cpp"; lowering gpu_memory_utilization to 0.5
      # still OOM'ed). Pin the KV cache to a 0.20-equivalent size instead
      # (takes precedence over gpu_memory_utilization).
      kv_cache_memory_bytes: 21474836480  # 20 GiB
data:
  max_input_seq_length: 4096
logger:
  log_dir: logs/grpo-llama3.1-8b-instruct-1n8g-megatron-fp8-rollouts.v2
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: grpo-llama3.1-8b-instruct-1n8g-megatron-fp8-rollouts.v2
cluster:
  gpus_per_node: 8
