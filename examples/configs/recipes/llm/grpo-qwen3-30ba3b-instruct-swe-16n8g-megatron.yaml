defaults: ../../../nemo_gym/grpo_nanov3.yaml

grpo:
  num_prompts_per_step: 16
  num_generations_per_prompt: 16
  num_val_generations_per_prompt: 1
  max_num_epochs: 100
  val_period: 10
  advantage_clip_low: -100
  advantage_clip_high: 100
  penalize_invalid_tool_call: true
  invalid_tool_call_advantage: -5.0
  penalize_malformed_thinking: false
  async_grpo:
    enabled: true
    max_trajectory_age_steps: 1
    in_flight_weight_updates: true

loss_fn:
  truncated_importance_sampling_ratio: 5.0
  force_on_policy_ratio: true

checkpointing:
  checkpoint_dir: results/grpo-qwen3-30ba3b-instruct-swe-16n8g-megatron
  metric_name: "train:total_reward/mean"
  keep_top_k: 100
  save_period: 5
  checkpoint_must_save_by: "00:03:35:00"

policy:
  model_name: Qwen/Qwen3-30B-A3B-Instruct-2507
  train_global_batch_size: 256
  max_total_sequence_length: 131072
  make_sequence_length_divisible_by: 8
  megatron_cfg:
    optimizer:
      lr: 1.0e-6
      min_lr: 1.0e-6
    scheduler:
      lr_warmup_iters: 0
      lr_warmup_init: 0
    distributed_data_parallel_config:
      overlap_grad_reduce: false
      overlap_param_gather: false
  generation:
    vllm_cfg:
      tensor_parallel_size: 2
      gpu_memory_utilization: 0.8
      async_engine: true
      enable_prefix_caching: true
      skip_tokenizer_init: false
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: hermes
    colocated:
      enabled: false
      resources:
        gpus_per_node: 8
        num_nodes: 8

data:
  train:
    data_path: "/path/to/train.jsonl"
  validation:
    data_path: "/path/to/validation.jsonl"

sif_dir: "/path/to/sif"
env:
  should_use_nemo_gym: true
  should_log_nemo_gym_responses: false
  nemo_gym:
    skip_venv_if_present: true
    port_range_low: 15001
    port_range_high: 20000
    config_paths:
    - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
    - responses_api_agents/swe_agents/configs/swebench_openhands_training.yaml
    policy_model_reasoning_off:
      responses_api_models:
        vllm_model:
          uses_reasoning_parser: false
    swe_agents_train:
      responses_api_agents:
        swe_agents:
          agent_max_turns: 200
          concurrency: 768
          swebench_agent_timeout: 3600
          run_with_mixed_prompts: true
          dataset_path: ${data.train.data_path}
          model_server:
            name: policy_model_reasoning_off
          container_formatter:
          - "${sif_dir}/swebench_sweb.eval.x86_64.{instance_id}.sif"
          - "${sif_dir}/swegym_sweb.eval.x86_64.{instance_id}.sif"
          - "${sif_dir}/r2egym_{instance_id}.sif"
    swe_agents_val:
      responses_api_agents:
        swe_agents:
          agent_max_turns: 200
          concurrency: 768
          swebench_agent_timeout: 3600
          dataset_path: ${data.validation.data_path}
          model_server:
            name: policy_model_reasoning_off
          container_formatter: ${env.nemo_gym.swe_agents_train.responses_api_agents.swe_agents.container_formatter}
    use_absolute_ip: true

logger:
  log_dir: logs/grpo-qwen3-30ba3b-instruct-swe-16n8g-megatron
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: grpo-qwen3-30ba3b-instruct-swe-16n8g-megatron

cluster:
  num_nodes: 16
