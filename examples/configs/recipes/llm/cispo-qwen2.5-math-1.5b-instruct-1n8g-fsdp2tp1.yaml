# CISPO (Clipped IS-weight Policy Optimization) on Qwen2.5-Math-1.5B-Instruct.
#
# CISPO replaces GRPO's hard PPO clip + advantage product with a stop-gradient
# clipped importance weight applied to the log-probability:
#
#     L_CISPO = -A_t * sg(clip(r_t, 1-eps_low, 1+eps_high)) * log pi_theta(a_t|s_t)
#
# - ratio_clip_min / ratio_clip_max are reused as eps_low / eps_high.
# - The paper (MiniMax-M1, arXiv:2506.13585) recommends a very loose lower
#   bound (effectively no lower clip) and a tighter upper bound. We use
#   ratio_clip_min=1.0 (lower bound = 1 - 1 = 0, i.e. no effective clipping
#   below since ratios are positive) and ratio_clip_max=0.8 (upper bound = 1.8).
# - KL beta is set to 0 to match the paper.
# - Dual-clipping (ratio_clip_c) is incompatible with CISPO and asserted off.
#
# Mirrors the existing grpo-qwen2.5-math-1.5b-instruct-1n8g-fsdp2tp1.v3 recipe
# for everything other than the loss formulation.
defaults: ../../grpo_math_1B.yaml

grpo:
  max_num_steps: 450

checkpointing:
  checkpoint_dir: results/cispo-qwen2.5-math-1.5b-instruct-1n8g-fsdp2tp1

loss_fn:
  use_cispo: true
  reference_policy_kl_penalty: 0.0
  ratio_clip_min: 1.0   # eps_low: effectively no lower-bound clipping
  ratio_clip_max: 0.8   # eps_high: upper bound = 1.8
  ratio_clip_c: null    # dual clipping MUST be off for CISPO

policy:
  model_name: Qwen/Qwen2.5-Math-1.5B-Instruct
  tokenizer:
    name: Qwen/Qwen2.5-Math-1.5B-Instruct
  dynamic_batching:
    enabled: true
  sequence_packing:
    enabled: false
  make_sequence_length_divisible_by: 1
  generation:
    max_new_tokens: 512
    vllm_cfg:
      max_model_len: 512

data:
  max_input_seq_length: 512

logger:
  log_dir: logs/cispo-qwen2.5-math-1.5b-instruct-1n8g-fsdp2tp1
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: cispo-qwen2.5-math-1.5b-instruct-1n8g-fsdp2tp1

cluster:
  gpus_per_node: 8
