# Arm 3/3 of the SAPO vs GRPO reproduction on Qwen3-30B-A3B:
# SAPO with SYMMETRIC tau (tau_pos = tau_neg = 1.0). Reproduces the
# symmetric point of Figure 5's asymmetric-tau ablation in the SAPO paper.
defaults: grpo-qwen3-30ba3b-2n8g-megatron-sapo-repro-base.yaml

loss_fn:
  sapo_enabled: true
  sapo_tau_pos: 1.0
  sapo_tau_neg: 1.0

logger:
  log_dir: logs/grpo-qwen3-30ba3b-2n8g-megatron-sapo-symm
  wandb:
    name: grpo-qwen3-30ba3b-2n8g-megatron-sapo-symm
