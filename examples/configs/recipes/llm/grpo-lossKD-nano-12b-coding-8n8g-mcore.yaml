defaults: ../../grpo_math_1B_megatron.yaml
grpo:
  num_prompts_per_step: 16
  num_val_generations_per_prompt: 4
  overlong_filtering: true
  max_val_samples: null
  val_batch_size: 64
  async_grpo:
    enabled: true
    max_trajectory_age_steps: 2
  seq_logprob_error_threshold: 2
  adv_estimator:
    normalize_rewards: true
    use_leave_one_out_baseline: true
    distill_coeff: 0.05
loss_fn:
  reference_policy_kl_penalty: 0.0
  kl_input_clamp_value: null
  kl_output_clamp_value: null
  ratio_clip_max: 0.28
  use_on_policy_kl_approximation: true
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 5.0
  disable_ppo_ratio: true
  truncated_importance_sampling_type: icepop
  truncated_importance_sampling_ratio_min: 0.2
  teacher_distillation:
    enabled: true
    loss_coeff: 0.05
checkpointing:
  enabled: true
  checkpoint_dir: results/grpo
  metric_name: val:total_reward/mean
  keep_top_k: 1000000
  save_period: 20
  checkpoint_must_save_by: 00:03:40:00
policy:
  model_name: /data/flextron-nano-models/12b-hf
  train_global_batch_size: 256
  train_micro_batch_size: 1
  generation_batch_size: 8
  logprob_batch_size: 1
  max_total_sequence_length: 49152
  logprob_chunk_size: 1024
  megatron_cfg:
    activation_checkpointing: true
    bias_activation_fusion: false
    expert_model_parallel_size: 8
    context_parallel_size: 8
    sequence_parallel: true
    freeze_moe_router: false
    moe_router_dtype: fp32
    moe_router_bias_update_rate: 0.001
    moe_aux_loss_coeff: 0.0
    moe_router_enable_expert_bias: true
    defer_fp32_logits: true
    track_moe_metrics: true
    moe_per_layer_logging: true
    optimizer:
      lr: 3.0e-06
      min_lr: 3.0e-06
      weight_decay: 0.0
    scheduler:
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 3.0e-07
    distributed_data_parallel_config:
      average_in_collective: false
  make_sequence_length_divisible_by: ${mul:${mul:${policy.megatron_cfg.tensor_model_parallel_size},
    ${policy.megatron_cfg.context_parallel_size}}, 2}
  scheduler: null
  generation:
    mcore_generation_config:
      transformer_impl: inference_optimized
      activation_checkpointing: false
      mamba_inference_ssm_states_dtype: float32
      inference_moe_token_dispatcher_type: nccl
      inference_grouped_gemm_backend: vllm
      moe_router_num_groups: null
      moe_router_group_topk: null
      pipeline_model_parallel_size: 1
      expert_tensor_parallel_size: 1
      expert_model_parallel_size: 8
      sequence_parallel: true
      context_parallel_size: 1
      tensor_model_parallel_size: 2
      buffer_size_gb: 20
      num_cuda_graphs: -1
      max_tokens: 1024
      async_engine: true
      expose_http_server: true
      enable_prefix_caching: true
      parsers:
      - deepseek-r1-reasoning
      - qwen3-coder-tool
      max_new_tokens: ${policy.max_total_sequence_length}
    vllm_cfg:
      async_engine: true
      tensor_parallel_size: 4
      gpu_memory_utilization: 0.8
      expose_http_server: true
      reasoning_parser_plugin: nemo_rl/models/generation/vllm/reasoning_parsers/nano_v3_reasoning_parser.py
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_coder
        reasoning_parser: nano_v3
    vllm_kwargs:
      mamba_ssm_cache_dtype: float32
      compilation_config:
        backend: eager
    colocated:
      enabled: false
      resources:
        gpus_per_node: 8
        num_nodes: 2
data:
  max_input_seq_length: null
  shuffle: false
  train:
    data_path: /data/nemorl-datasets/nanov3-blend/train-coding-subset-fromfull.jsonl
  validation:
    data_path: /data/nemorl-datasets/nanov3-blend/val-coding-split.jsonl
  default:
    dataset_name: NemoGymDataset
    env_name: nemo_gym
    prompt_file: null
    processor: nemo_gym_data_processor
env:
  should_use_nemo_gym: true
  should_log_nemo_gym_responses: true
  nemo_gym:
    port_range_low: 15001
    port_range_high: 20000
    config_paths:
    - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
    - resources_servers/code_gen/configs/code_gen.yaml
    math_with_judge:
      resources_servers:
        math_with_judge:
          judge_model_server:
            name: policy_model
          should_use_judge: false
    code_gen:
      resources_servers:
        code_gen:
          num_processes: 1024
          unit_test_timeout_secs: 10
          debug: false
logger:
  wandb_enabled: true
  monitor_gpus: true
  wandb:
    name: grpo-dev-logger
  mlflow:
    run_name: grpo-dev-logger
cluster:
  gpus_per_node: 8
  num_nodes: 8
on_policy_distillation:
  enabled: true
  teacher_model_by_agent_name:
    default_teacher: /data/flextron-nano-models/30b-patched-hf
  default_teacher_alias: default_teacher
  strict_agent_name_match: false
  deduplicate_shared_teacher_checkpoints: true
  non_colocated_teachers:
    enabled: true
    default_teacher_cfg:
      tensor_model_parallel_size: 1
      expert_tensor_parallel_size: 1
      expert_model_parallel_size: 8
      pipeline_model_parallel_size: 1
      context_parallel_size: 1
      num_nodes: 2
      gpus_per_node: 8
      precision: bf16
      micro_batch_size: 1
