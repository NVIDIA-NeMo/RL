defaults: ../../sft.yaml
sft:
  max_num_steps: 500
checkpointing:
  checkpoint_dir: results/sft-llama3.2-1b-1n8g-fsdp2tp1-muon
  save_period: 100
policy:
  tokenizer:
    name: meta-llama/Llama-3.2-1B
  make_sequence_length_divisible_by: 1
  # Route the linear weights through DTensorMuon and let the embedding /
  # lm_head / norm parameters fall through to the chained AdamW.
  optimizer:
    name: nemo_rl.algorithms.muon.build_dtensor_muon
    kwargs:
      lr: 2.0e-5
      weight_decay: 0.1
      muon_momentum: 0.9
      muon_use_nesterov: false
      muon_scale_mode: spectral
      muon_extra_scale_factor: 0.2
      muon_tp_mode: duplicated
      muon_split_qkv: true
      adamw_kwargs:
        betas: [0.9, 0.999]
        eps: 1.0e-8
data:
  add_generation_prompt: true
  train:
    dataset_name: OpenMathInstruct-2
    output_key: generated_solution
    split: train_1M
    split_validation_size: 0.05
    seed: ${sft.seed}
  validation: null
  default:
    prompt_file: examples/prompts/math.txt
logger:
  log_dir: logs/sft-llama3.2-1b-1n8g-fsdp2tp1-muon
  wandb:
    project: nemo-rl
    name: sft-llama3.2-1b-1n8g-fsdp2tp1-muon
  tensorboard:
    log_dir: tb_logs-sft-llama3.2-1b-muon
cluster:
  gpus_per_node: 8
