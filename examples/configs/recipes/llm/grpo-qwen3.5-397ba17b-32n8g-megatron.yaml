defaults: ../../grpo_math_1B.yaml
grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 8
  max_rollout_turns: 1
  max_num_epochs: 10
  max_num_steps: 10000
  normalize_rewards: true
  use_leave_one_out_baseline: false
  val_period: 10
  val_at_start: false
  overlong_filtering: false
  max_val_samples: 256
  val_batch_size: 256
  batch_multiplier: 2
  use_dynamic_sampling: true
  dynamic_sampling_max_gen_batches: 10
  seed: 42
  reward_scaling:
    enabled: true
    target_min: -1.0
  reward_shaping:
    enabled: true
    overlong_buffer_length: 1024
    max_response_length: 8192
  async_grpo:
    enabled: false
    max_trajectory_age_steps: 1

loss_fn:
  reference_policy_kl_penalty: 0.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: 10
  use_on_policy_kl_approximation: false
  use_importance_sampling_correction: false
  token_level_loss: true

checkpointing:
  enabled: true
  checkpoint_dir: results/grpo-qwen3.5-397ba17b-32n8g-megatron

policy:
  model_name: Qwen/Qwen3.5-397B-A17B
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  train_global_batch_size: 256
  train_micro_batch_size: 1
  logprob_batch_size: 1
  precision: "bfloat16"
  max_total_sequence_length: 8192
  dtensor_cfg:
    enabled: false

  dynamic_batching:
    enabled: false

  sequence_packing:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  optimizer: null
  scheduler: null

  megatron_cfg:
    enabled: true
    tensor_model_parallel_size: 8
    pipeline_model_parallel_size: 8
    num_layers_in_first_pipeline_stage: 6
    num_layers_in_last_pipeline_stage: 6
    context_parallel_size: 1
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 32
    activation_checkpointing: true
    sequence_parallel: true
    pipeline_dtype: ${policy.precision}
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: false
    moe_enable_deepep: false
    moe_token_dispatcher_type: "allgather"
    moe_shared_expert_overlap: false
    apply_rope_fusion: false
    defer_fp32_logits: true
    optimizer:
      optimizer: "adam"
      lr: 1.0e-06
      min_lr: 1.0e-06
      weight_decay: 0.1

      use_distributed_optimizer: true
      use_precision_aware_optimizer: false

      clip_grad: ${policy.max_grad_norm}

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-07

  generation:
    backend: "vllm"
    max_new_tokens: 8192
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: false
      precision: ${policy.precision}
      gpu_memory_utilization: 0.6
      tensor_parallel_size: 16
      pipeline_parallel_size: 1
      expert_parallel_size: 64
      enable_expert_parallel: true
      max_model_len: 8192
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
data:
  max_input_seq_length: 2048
  shuffle: true
  num_workers: 1
  train:
    dataset_name: DAPOMath17K
  validation:
    dataset_name: DAPOMathAIME2024
  default:
    prompt_file: "examples/prompts/cot.txt"
    system_prompt_file: null
    processor: "math_hf_data_processor"
    env_name: "math"
env:
  math:
    num_workers: 16
    math_verify_impl: "dapo_math_verify"

logger:
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: grpo-qwen3.5-397ba17b-32n8g-megatron
cluster:
  gpus_per_node: 8
  num_nodes: 32
