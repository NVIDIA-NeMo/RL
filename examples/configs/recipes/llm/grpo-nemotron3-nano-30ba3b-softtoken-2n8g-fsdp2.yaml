defaults: ./grpo-nanov3-30BA3B-2n8g-fsdp2.yaml

grpo:
  num_prompts_per_step: 8
  num_generations_per_prompt: 2
  max_num_steps: 1
  val_period: 0
  val_at_start: false
  val_at_end: false
  async_grpo:
    enabled: false

checkpointing:
  enabled: false
  checkpoint_dir: results/grpo-nemotron3-nano-30ba3b-softtoken-2n8g-fsdp2

policy:
  train_global_batch_size: 16
  train_micro_batch_size: 1
  generation_batch_size: 16
  logprob_batch_size: 1
  max_total_sequence_length: 1024
  dynamic_batching:
    enabled: false
  sequence_packing:
    enabled: false
  make_sequence_length_divisible_by: 1
  dtensor_cfg:
    context_parallel_size: 1
  generation:
    max_new_tokens: 128
    vllm_cfg:
      max_model_len: 1024
    vllm_kwargs:
      enable_prompt_embeds: true

data:
  max_input_seq_length: 1024
  num_workers: 1
  default:
    processor: soft_token_math_hf_data_processor
  soft_token:
    mode: smoke
    vllm_prompt_mode: prompt_embeds
    hidden_size: 2688
    num_soft_tokens: 8
    scale: 0.01
    seed: 1234

logger:
  log_dir: logs/grpo-nemotron3-nano-30ba3b-softtoken-2n8g-fsdp2
  monitor_gpus: false
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: grpo-nemotron3-nano-30ba3b-softtoken-2n8g-fsdp2
