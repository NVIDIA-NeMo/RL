defaults: ../../grpo_math_1B.yaml
grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  batch_multiplier: 2
  max_rollout_turns: 1
  max_num_steps: 10000
  use_leave_one_out_baseline: false
  val_period: 5
  max_val_samples: 960
  val_batch_size: 960
  use_dynamic_sampling: true
  dynamic_sampling_max_gen_batches: 10
  reward_scaling:
    enabled: true
    source_min: 0.0
    source_max: 1.0
    target_min: -1.0
    target_max: 1.0
  reward_shaping:
    enabled: true
    overlong_buffer_length: 512
    max_response_length: 4096
loss_fn:
  reference_policy_kl_penalty: 0.0
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 2
  ratio_clip_max: 0.28
  ratio_clip_c: 10
checkpointing:
  enabled: true
  checkpoint_dir: results/dapo-gemma4-26ba4b-it-4n8g-fsdp2-automodel
  keep_top_k: 3
  save_period: 5
  model_save_format: "safetensors"
  save_consolidated: false
  save_optimizer: true
policy:
  model_name: google/gemma-4-26B-A4B-it
  train_micro_batch_size: 1
  train_global_batch_size: 32
  logprob_batch_size: 1
  max_total_sequence_length: 6144
  logprob_chunk_size: 4096
  optimizer:
    kwargs:
      lr: 1.0e-06
      weight_decay: 0.1
  scheduler:
  - name: torch.optim.lr_scheduler.LinearLR
    kwargs:
      start_factor: 1.0e-08
      end_factor: 1.0
      total_iters: 10
  - name: torch.optim.lr_scheduler.ConstantLR
    kwargs:
      factor: 1.0
      total_iters: 10000000000
  - milestones:
    - 10
  dtensor_cfg:
    tensor_parallel_size: 1
    context_parallel_size: 1
    expert_parallel_size: 32
    activation_checkpointing: true
    automodel_kwargs:
      backend:
        _target_: nemo_automodel.components.models.common.utils.BackendConfig
        attn: te
        linear: te
        rms_norm: te
        enable_deepep: true
        fake_balanced_gate: false
        rope_fusion: false
        enable_hf_state_dict_adapter: true
      freeze_config:
        freeze_vision_tower: true
        freeze_audio_tower: true
        freeze_language_model: false
  sequence_packing:
    enabled: false
  dynamic_batching:
    enabled: true
  make_sequence_length_divisible_by: 8
  generation:
    max_new_tokens: 4096
    vllm_cfg:
      tensor_parallel_size: 4
      gpu_memory_utilization: 0.6
data:
  max_input_seq_length: 2048
  train:
    dataset_name: DAPOMath17K
  validation:
    dataset_name: DAPOMathAIME2024
  default:
    prompt_file: null
env:
  math:
    num_workers: 16
    math_verify_impl: dapo_math_verify
logger:
  wandb_enabled: true
  wandb:
    project: nemorl-gemma4
    name: dapo-gemma4-26ba4b-it-4n8g-fsdp2-automodel
cluster:
  gpus_per_node: 8
  num_nodes: 4
