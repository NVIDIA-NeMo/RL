defaults: ../../sft.yaml
sft:
  max_num_steps: 500
  val_period: 100
  asft:
    kl_weight: 0.01
    kl_type: k3
checkpointing:
  enabled: false
policy:
  model_name: Qwen/Qwen3-8B
  tokenizer:
    name: Qwen/Qwen3-8B
  train_global_batch_size: 64
  max_total_sequence_length: 4096
  dtensor_cfg:
    enabled: false
  megatron_cfg:
    enabled: true
    use_fused_linear_logprobs: true
    fused_linear_logprobs_chunk_size: 128
    distributed_data_parallel_config:
      overlap_param_gather: false
    tensor_model_parallel_size: 4
    pipeline_model_parallel_size: 2
    sequence_parallel: true
    activation_checkpointing: true
    attention_backend: unfused
    optimizer:
      min_lr: 5.0e-06
      adam_beta2: 0.999
      adam_eps: 1.0e-08
    scheduler:
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-11
      lr_decay_iters: 500
  make_sequence_length_divisible_by: 8
data:
  add_generation_prompt: true
  num_workers: 8
  train:
    dataset_name: OpenMathInstruct-2
    output_key: generated_solution
    split: train_1M
    split_validation_size: 0.05
    seed: ${sft.seed}
  validation: null
  default:
    prompt_file: examples/prompts/math.txt
logger:
  wandb:
    project: nemo-rl
    name: asft-qwen3-8b-megatron
  tensorboard:
    log_dir: tb_logs-asft-qwen3-8b-megatron
  mlflow:
    run_name: asft-qwen3-8b-megatron
cluster:
  gpus_per_node: 8
