defaults: ./grpo-gptoss-20b-8n8g-megatron.yaml
policy:
  megatron_cfg:
    tensor_model_parallel_size: 1
    sequence_parallel: false
  make_sequence_length_divisible_by: 1
  generation:
    vllm_cfg:
      tensor_parallel_size: 1
    vllm_kwargs:
      # TRTLLM (FLASHINFER default on Blackwell) computes attention inconsistently
      # with Megatron/TE, causing logprobs mismatch. Use TRITON_ATTN instead of default
      # FLASHINFER to avoid this issue.
      attention_backend: TRITON_ATTN
cluster:
  gpus_per_node: 4
