# Nightly sanity check for the Nemotron 3 Super RLVR pipeline (Stage 1).
# Uses Qwen3-1.7B (dense) to exercise the full nemo-gym RLVR environment
# stack at minimal cost. nano-v3 is already covered by other nightly tests.
#
# Resource layout (6 nodes total):
#   - 1 node:  policy training + colocated vllm (Qwen3-1.7B is tiny)
#   - 5 nodes: nemo-gym judge servers (genrm, nl2bash, safety)
#              inherited from stage1_rlvr.yaml (env.nemo_gym.num_gpu_nodes: 5)
#
# Judge server settings are scaled down from small_stage1_rlvr_21node.yaml.
#
# Data: nvidia/Nemotron-RL-Super-Training-Blends (rlvr1 split).
# See docs/guides/nemotron-3-super.md for download instructions.
#
# TODO: Fill in data.train.data_path and data.validation.data_path.
defaults: ../../super/stage1_rlvr.yaml

checkpointing:
  checkpoint_dir: results/grpo-qwen3-1.7b-6n8g-megatron-super-rlvr

grpo:
  num_prompts_per_step: 16
  num_generations_per_prompt: 8

policy:
  model_name: "Qwen/Qwen3-1.7B"
  tokenizer:
    name: "Qwen/Qwen3-1.7B"
  train_global_batch_size: 128
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 8192
  make_sequence_length_divisible_by: 1

  megatron_cfg:
    # Qwen3-1.7B is a dense model — override MoE parallelism from base
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    expert_model_parallel_size: 1
    sequence_parallel: false
    activation_checkpointing: false

  generation:
    # Colocate vllm with training — Qwen3-1.7B is small enough to share a node
    colocated:
      enabled: true
    # Qwen3-1.7B uses standard <think> tags; replace nano_v3 custom parser
    vllm_cfg:
      tensor_parallel_size: 1
      max_model_len: 8192
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_coder
        reasoning_parser: deepseek_r1
        # Null out the nano_v3 plugin inherited from stage1_rlvr.yaml
        reasoning_parser_plugin: null
    # Qwen3-1.7B is a dense Transformer — remove Mamba-specific kwarg
    vllm_kwargs:
      compilation_config:
        cudagraph_capture_sizes: [1, 2, 4, 8, 16, 32, 64]

data:
  train:
    # TODO: Set to the cluster path for the rlvr1 training split.
    # See docs/guides/nemotron-3-super.md for download instructions.
    data_path: "/path/to/nemotron-super-training-blends/rlvr1/train-split.jsonl"
  validation:
    # TODO: Set to the cluster path for the rlvr1 validation split.
    data_path: "/path/to/nemotron-super-training-blends/rlvr1/val-split.jsonl"

env:
  nemo_gym:
    # Scaled-down judge server settings from small_stage1_rlvr_21node.yaml.
    # The full config_paths and num_gpu_nodes: 5 are inherited from stage1_rlvr.yaml.
    genrm_model:
      responses_api_models:
        vllm_model:
          # Inherits model: nvidia/Qwen3-Nemotron-235B-A22B-GenRM-2603 from stage1_rlvr.yaml
          router_dp_size: 2
          server_args:
            max_num_seqs: 16
    nl2bash_judge_model:
      responses_api_models:
        vllm_model:
          router_dp_size: 2
          server_args:
            max_num_seqs: 16
    safety_judge_model:
      responses_api_models:
        vllm_model:
          server_args:
            max_num_seqs: 16

logger:
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: grpo-qwen3-1.7b-6n8g-megatron-super-rlvr

cluster:
  gpus_per_node: 8
  # Total nodes: 1 training + vllm (colocated) +
  # 5 nemo-gym (env.nemo_gym.num_gpu_nodes, inherited from stage1_rlvr.yaml)
  num_nodes: 6
