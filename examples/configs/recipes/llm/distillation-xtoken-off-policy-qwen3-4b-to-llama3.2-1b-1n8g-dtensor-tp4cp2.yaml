defaults: ../../xtoken_off_policy_distillation.yaml
distillation:
  num_prompts_per_step: 8
  max_num_steps: 20
  val_period: 10
  val_at_start: true
data:
  train:
    split_validation_size: 64
    seed: 42
policy:
  train_global_batch_size: 8
  max_total_sequence_length: 1024
  dtensor_cfg:
    tensor_parallel_size: 4
    context_parallel_size: 2
  scheduler:
  - name: torch.optim.lr_scheduler.LinearLR
    kwargs:
      start_factor: 0.1
      end_factor: 1.0
      total_iters: 5
  - name: torch.optim.lr_scheduler.ConstantLR
    kwargs:
      factor: 1.0
      total_iters: 10000000000
  - milestones:
    - 5
# Single teacher (Qwen3-4B). The exemplar defaults to two teachers and OmegaConf
# replaces `teachers` lists wholesale (no element-merge), so restate the full
# single entry here, sized to match the student (GBS 8, seqlen 1024) and sharded
# TP2xCP2.
teachers:
  - model_name: "Qwen/Qwen3-4B"
    projection_matrix_path: null   # set per-run via teachers.0.projection_matrix_path
    weight: 1.0
    tokenizer:
      name: "Qwen/Qwen3-4B"
    train_global_batch_size: 8
    train_micro_batch_size: 1
    logprob_batch_size: 1
    max_total_sequence_length: 1024
    make_sequence_length_divisible_by: 1
    precision: "bfloat16"
    logprob_chunk_size: null
    offload_optimizer_for_logprob: false
    dtensor_cfg:
      enabled: true
      _v2: true
      cpu_offload: false
      sequence_parallel: false
      activation_checkpointing: true
      tensor_parallel_size: 2
      context_parallel_size: 2
      custom_parallel_plan: null
    max_grad_norm: 1.0
    dynamic_batching:
      enabled: false
      train_mb_tokens: 1024
      logprob_mb_tokens: 1024
      sequence_length_round: 64
    sequence_packing:
      enabled: false
      train_mb_tokens: 1024
      logprob_mb_tokens: 1024
      algorithm: "modified_first_fit_decreasing"
      sequence_length_round: 64
    optimizer:
      name: "torch.optim.AdamW"
      kwargs:
        lr: 5.0e-5
        weight_decay: 0.001
        betas: [0.9, 0.95]
        eps: 1e-8
        foreach: false
        fused: false
logger:
  log_dir: logs/distillation-xtoken-off-policy-qwen3-4b-to-llama3.2-1b-1n8g-dtensor-tp4cp2
  wandb:
    project: nemo-rl
    name: distillation-xtoken-off-policy-qwen3-4b-to-llama3.2-1b-1n8g-dtensor-tp4cp2
