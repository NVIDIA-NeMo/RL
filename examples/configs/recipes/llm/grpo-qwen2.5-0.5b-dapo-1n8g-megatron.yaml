defaults: ../../grpo_math_1B.yaml
grpo:
  batch_multiplier: 2
  max_num_epochs: 1000000
  use_leave_one_out_baseline: false
  use_dynamic_sampling: true
  max_val_samples: 8
  val_batch_size: 8
  reward_scaling:
    enabled: true
    target_min: -1.0
  reward_shaping:
    enabled: true
    overlong_buffer_length: 16
    max_response_length: 128
loss_fn:
  reference_policy_kl_penalty: 0.0
  ratio_clip_max: 0.28
  ratio_clip_c: 10
  use_importance_sampling_correction: true
policy:
  model_name: Qwen/Qwen2.5-0.5B
  train_global_batch_size: 4
  train_micro_batch_size: 1
  logprob_batch_size: 4
  max_total_sequence_length: 256
  refit_buffer_size_gb: 1
  dtensor_cfg:
    enabled: false
  optimizer: null
  scheduler: null
  megatron_cfg:
    enabled: true
    converter_type: Qwen2ForCausalLM
    optimizer:
      lr: 1.0e-06
      min_lr: 1.0e-06
      weight_decay: 0.1
      use_precision_aware_optimizer: false
    scheduler:
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-08
  make_sequence_length_divisible_by: ${mul:${policy.megatron_cfg.tensor_model_parallel_size},
    2}
  generation:
    max_new_tokens: 128
    vllm_cfg:
      max_model_len: 256
      gpu_memory_utilization: 0.5
      enforce_eager: true
data:
  max_input_seq_length: 128
  train:
    dataset_name: DAPOMath17K
  validation:
    dataset_name: DAPOMathAIME2024
  default:
    prompt_file: null
env:
  dapo:
    num_workers: 2
  math:
    num_workers: 2
    math_verify_impl: dapo_math_verify
checkpointing:
  checkpoint_dir: checkpoints/grpo-qwen2.5-0.5b-dapo-1n8g-bf16
  model_save_format: null
logger:
  log_dir: logs/grpo-qwen2.5-0.5b-dapo-1n8g-bf16
  wandb_enabled: true
  wandb:
    project: nemo-rl-qarl
    name: grpo-qwen2.5-0.5b-dapo-1n8g-bf16
  tensorboard:
    log_dir: tb_logs-grpo-qwen2.5-0.5b-dapo-1n8g-bf16
cluster:
  gpus_per_node: 8
