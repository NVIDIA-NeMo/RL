# DAPO + Qwen3-8B-Base + NVFP4 W4A16 + Megatron, 2 nodes x 8 GPUs.
defaults: ../../grpo_math_1B.yaml

grpo:
  batch_multiplier: 2
  max_num_epochs: 1000000
  use_leave_one_out_baseline: false
  use_dynamic_sampling: true
  max_val_samples: 512
  val_batch_size: 512
  reward_scaling:
    enabled: true
    target_min: -1.0
  reward_shaping:
    enabled: true
    overlong_buffer_length: 4096
    max_response_length: 28672

loss_fn:
  reference_policy_kl_penalty: 0.0
  ratio_clip_max: 0.28
  ratio_clip_c: 10
  use_importance_sampling_correction: true

policy:
  model_name: Qwen/Qwen3-8B-Base
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 30720
  refit_buffer_size_gb: 4
  quant_cfg: examples/modelopt/quant_configs/nvfp4_a16_mlp_only.yaml
  dtensor_cfg:
    enabled: false
  optimizer: null
  scheduler: null
  megatron_cfg:
    enabled: true
    converter_type: Qwen3ForCausalLM
    tensor_model_parallel_size: 4
    sequence_parallel: true
    activation_checkpointing: true
    apply_rope_fusion: false
    optimizer:
      lr: 1.0e-06
      min_lr: 1.0e-06
      weight_decay: 0.1
      use_precision_aware_optimizer: false
    scheduler:
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-08
  make_sequence_length_divisible_by: ${mul:${policy.megatron_cfg.tensor_model_parallel_size},
    2}
  generation:
    max_new_tokens: 28672
    quant_cfg: examples/modelopt/quant_configs/nvfp4_a16_mlp_only.yaml
    real_quant: true
    vllm_cfg:
      tensor_parallel_size: 2
      max_model_len: 30720
      gpu_memory_utilization: 0.5
      enforce_eager: true

data:
  max_input_seq_length: 2048
  train:
    dataset_name: DAPOMath17K
  validation:
    dataset_name: DAPOMathAIME2024
  default:
    prompt_file: null

env:
  dapo:
    num_workers: 16
  math:
    num_workers: 16
    math_verify_impl: dapo_math_verify

checkpointing:
  checkpoint_dir: checkpoints/grpo-qwen3-8b-base-dapo-2n-long-w4a16
  checkpoint_must_save_by: 00:03:45:00
  model_save_format: null

logger:
  log_dir: logs/grpo-qwen3-8b-base-dapo-2n-long-w4a16
  wandb_enabled: true
  wandb:
    project: nemo-rl-qarl
    name: grpo-qwen3-8b-base-dapo-2n-long-w4a16
  tensorboard:
    log_dir: tb_logs-grpo-qwen3-8b-base-dapo-2n-long-w4a16

cluster:
  gpus_per_node: 8
  num_nodes: 2
