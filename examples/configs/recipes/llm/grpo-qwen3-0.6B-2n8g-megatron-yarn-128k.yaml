defaults: ../../grpo_math_1B.yaml
grpo:
  num_prompts_per_step: 8
  num_generations_per_prompt: 4
  max_num_steps: 100
checkpointing:
  enabled: false
policy:
  model_name: Qwen/Qwen3-0.6B
  train_global_batch_size: 32
  train_micro_batch_size: 1
  max_total_sequence_length: 131072
  dtensor_cfg:
    enabled: false
  megatron_cfg:
    enabled: true
    tensor_model_parallel_size: 2
    context_parallel_size: 8
    sequence_parallel: true
    optimizer:
      lr: 1.0e-06
      min_lr: 1.0e-06
      use_distributed_optimizer: false
      use_precision_aware_optimizer: false
    scheduler:
      lr_decay_iters: null
      lr_warmup_iters: 5
      lr_warmup_init: 1.0e-11
  make_sequence_length_divisible_by: 32
  hf_config_overrides:
    rope_scaling:
      rope_type: yarn
      factor: 3.2
      original_max_position_embeddings: 40960
      truncate: true
      beta_fast: 32
      beta_slow: 1
      mscale: 1
      mscale_all_dim: 0
  generation:
    max_new_tokens: 8192
    vllm_cfg:
      tensor_parallel_size: 2
      gpu_memory_utilization: 0.7
      max_model_len: 131072
data:
  num_workers: 8
  default:
    prompt_file: examples/prompts/math.txt
logger:
  log_dir: logs/grpo-qwen3-0.6B-2n8g-megatron-yarn-128k
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: grpo-qwen3-0.6B-2n8g-megatron-yarn-128k
  tensorboard:
    log_dir: tb_logs-grpo-qwen3-0.6B-2n8g-megatron-yarn-128k
  mlflow:
    run_name: grpo-qwen3-0.6B-2n8g-megatron-yarn-128k
cluster:
  gpus_per_node: 8
  num_nodes: 2
