# Nightly sanity check for the Nemotron 3 Super RLHF pipeline (Stage 3).
# Uses Qwen3-1.7B (dense) to exercise the genrm_compare reward mechanism
# at minimal cost.
#
# Resource layout (2 nodes total):
#   - 1 node:  policy training + colocated vllm (Qwen3-1.7B is tiny)
#   - 1 node:  nemo-gym GenRM judge server (env.nemo_gym.num_gpu_nodes)
#
# Data: nvidia/Nemotron-RL-Super-Training-Blends (rlhf split).
# See docs/guides/nemotron-3-super.md for download instructions.
#
# TODO: Fill in data.train.data_path and data.validation.data_path with
# the correct paths on the cluster.
defaults: ../../super/stage3_rlhf.yaml

checkpointing:
  checkpoint_dir: results/grpo-qwen3-1.7b-2n8g-megatron-super-rlhf

grpo:
  num_prompts_per_step: 2
  num_generations_per_prompt: 8

policy:
  model_name: "Qwen/Qwen3-1.7B"
  tokenizer:
    name: "Qwen/Qwen3-1.7B"
  train_global_batch_size: 16
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 8192
  make_sequence_length_divisible_by: 1

  megatron_cfg:
    # Qwen3-1.7B is a dense model — override MoE parallelism from base
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    expert_model_parallel_size: 1
    sequence_parallel: false
    activation_checkpointing: false

  generation:
    # Colocate vllm with training — Qwen3-1.7B is small enough to share a node
    colocated:
      enabled: true
    # Qwen3-1.7B uses standard <think> tags; replace nano_v3 custom parser
    vllm_cfg:
      tensor_parallel_size: 1
      max_model_len: 8192
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_coder
        reasoning_parser: deepseek_r1
        # Null out the nano_v3 plugin inherited from stage3_rlhf.yaml
        reasoning_parser_plugin: null
    # Override vllm_kwargs to remove mamba_ssm_cache_dtype inherited from base
    vllm_kwargs:
      compilation_config:
        cudagraph_capture_sizes: [1, 2, 4, 8, 16, 32, 64]

data:
  train:
    # TODO: Set to the cluster path for the rlhf training split.
    # See docs/guides/nemotron-3-super.md for download instructions.
    data_path: "/path/to/nemotron-super-training-blends/rlhf/train-split.jsonl"
  validation:
    # TODO: Set to the cluster path for the rlhf validation split.
    data_path: "/path/to/nemotron-super-training-blends/rlhf/val-split.jsonl"

env:
  nemo_gym:
    # 1 dedicated GPU node for the GenRM judge server (reduced from base's 8).
    # Base uses router_dp_size=8 x TP=8 = 64 GPUs; nightly uses a single
    # server instance (router_dp_size=1 x TP=8 = 8 GPUs = 1 node).
    num_gpu_nodes: 1
    genrm_model:
      responses_api_models:
        vllm_model:
          # Inherits TP=8, max_model_len=60000, reasoning_parser=deepseek_r1
          # from stage3_rlhf.yaml; only override model path and dp size.
          model: "nvidia/Qwen3-Nemotron-235B-A22B-GenRM-2603"
          router_dp_size: 1

logger:
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: grpo-qwen3-1.7b-2n8g-megatron-super-rlhf

cluster:
  gpus_per_node: 8
  # Total nodes: 1 training + vllm (colocated) + 1 nemo-gym (genrm)
  num_nodes: 2
