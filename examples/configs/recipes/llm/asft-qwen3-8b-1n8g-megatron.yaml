# ASFT on Qwen3-8B, Megatron backend, single 8xH200 node.
#
# Replicates the internal ASFT study (see asft-result.txt) in NeMo-RL:
#   loss = DFT-reweighted NLL + kl_weight * KL(policy || frozen-base)   (target-token k3)
# Sweep kl_weight (0.005/0.01/0.03/0.05) and optimizer.lr (1e-6/5e-6) via CLI
# overrides; kl_weight >= 0.05 over-regularizes and LR >= 5e-5 collapses ASFT.
defaults: ../../asft.yaml

asft:
  # A real single-epoch pass; override sft-style with asft.max_num_steps=<N>.
  max_num_steps: 500
  val_period: 100
  val_at_start: true
  # kl_weight default set to the internal sweet spot; override for the sweep.
  kl_weight: 0.01
  kl_type: "k3"

checkpointing:
  enabled: false

policy:
  model_name: Qwen/Qwen3-8B
  tokenizer:
    name: Qwen/Qwen3-8B
  train_global_batch_size: 64
  train_micro_batch_size: 1
  max_total_sequence_length: 4096
  precision: "bfloat16"

  # Megatron path: DTensor off, Megatron on.
  dtensor_cfg:
    enabled: false

  # Keep dynamic batching / sequence packing OFF: fused-linear-logprobs (and the
  # reference-logprob precompute) are incompatible with sequence packing.
  dynamic_batching:
    enabled: false
  sequence_packing:
    enabled: false

  megatron_cfg:
    enabled: true
    use_fused_linear_logprobs: true
    fused_linear_logprobs_chunk_size: 128
    # Fused linear logprobs bypass output_layer.forward(); disable overlap gather.
    distributed_data_parallel_config:
      overlap_param_gather: false
    tensor_model_parallel_size: 4
    pipeline_model_parallel_size: 2
    sequence_parallel: true
    activation_checkpointing: true
    # cu13 image's cuDNN fused attention is broken; use the unfused backend
    # (matches the working qwen2.5-math7b megatron SFT recipe).
    attention_backend: unfused
    optimizer:
      lr: 5.0e-6
      min_lr: 5.0e-6
      adam_beta2: 0.999
      adam_eps: 1.0e-08
    scheduler:
      lr_decay_style: constant
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-11
      lr_decay_iters: 500
  make_sequence_length_divisible_by: 8

data:
  add_generation_prompt: true
  num_workers: 8
  train:
    dataset_name: OpenMathInstruct-2
    output_key: generated_solution
    split: train_1M
    split_validation_size: 0.05
    seed: ${asft.seed}
  validation: null
  default:
    prompt_file: examples/prompts/math.txt

logger:
  wandb:
    project: nemo-rl
    name: asft-qwen3-8b-megatron
  tensorboard:
    log_dir: tb_logs-asft-qwen3-8b-megatron
  mlflow:
    run_name: asft-qwen3-8b-megatron

cluster:
  gpus_per_node: 8
  num_nodes: 1
