# Nightly sanity check for the Nemotron 3 Super SWE pipeline (Stage 2.1).
# Uses Qwen3-1.7B (dense) to exercise the SWE pivot single-step tool-use
# environment at minimal cost. No Apptainer/Singularity required
# (Stage 2.2 SWE environments are not tested here).
#
# Resource layout (1 node total):
#   - 1 node: policy training + colocated vllm (Qwen3-1.7B is tiny)
#   - 0 nodes: SWE judge is CPU-based (no GPU nodes required)
#
# Data: nvidia/Nemotron-RL-Super-Training-Blends (swe1 split).
# See docs/guides/nemotron-3-super.md for download instructions.
#
# TODO: Fill in data.train.data_path and data.validation.data_path.
defaults: ../../super/stage2_swe1.yaml

checkpointing:
  checkpoint_dir: results/grpo-qwen3-1.7b-1n8g-megatron-super-swe1

grpo:
  num_prompts_per_step: 2
  num_generations_per_prompt: 8

policy:
  model_name: "Qwen/Qwen3-1.7B"
  tokenizer:
    name: "Qwen/Qwen3-1.7B"
  train_global_batch_size: 16
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 8192
  make_sequence_length_divisible_by: 1

  megatron_cfg:
    # Qwen3-1.7B is a dense model — override MoE parallelism from base
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    expert_model_parallel_size: 1
    sequence_parallel: false
    activation_checkpointing: false

  generation:
    # Colocate vllm with training — Qwen3-1.7B is small enough to share a node
    colocated:
      enabled: true
    # Qwen3-1.7B uses standard <think> tags; replace nano_v3 custom parser
    vllm_cfg:
      tensor_parallel_size: 1
      max_model_len: 8192
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_coder
        reasoning_parser: deepseek_r1
        # Null out the nano_v3 plugin inherited from stage2_swe1.yaml
        reasoning_parser_plugin: null
    # Override vllm_kwargs to remove mamba_ssm_cache_dtype inherited from base
    vllm_kwargs:
      compilation_config:
        cudagraph_capture_sizes: [1, 2, 4, 8, 16, 32, 64]

data:
  train:
    # TODO: Set to the cluster path for the swe1 training split.
    # See docs/guides/nemotron-3-super.md for download instructions.
    data_path: "/path/to/nemotron-super-training-blends/swe1/train-split.jsonl"
  validation:
    # TODO: Set to the cluster path for the swe1 validation split.
    data_path: "/path/to/nemotron-super-training-blends/swe1/val-split.jsonl"

logger:
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: nemo-rl
    name: grpo-qwen3-1.7b-1n8g-megatron-super-swe1

cluster:
  gpus_per_node: 8
  # Total nodes: 1 training + vllm (colocated); SWE judge is CPU-based
  num_nodes: 1
