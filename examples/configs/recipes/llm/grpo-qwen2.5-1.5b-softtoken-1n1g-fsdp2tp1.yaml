defaults: ../../grpo_math_1B.yaml

grpo:
  num_prompts_per_step: 2
  num_generations_per_prompt: 2
  max_num_steps: 1
  val_period: 0
  val_at_start: false
  val_at_end: false

checkpointing:
  enabled: false
  checkpoint_dir: results/grpo-qwen2.5-1.5b-softtoken-1n1g-fsdp2tp1

policy:
  train_global_batch_size: 4
  train_micro_batch_size: 1
  generation_batch_size: 4
  logprob_batch_size: 1
  max_total_sequence_length: 512
  dynamic_batching:
    enabled: false
  sequence_packing:
    enabled: false
  make_sequence_length_divisible_by: 1
  dtensor_cfg:
    tensor_parallel_size: 1
    context_parallel_size: 1
  generation:
    max_new_tokens: 128
    vllm_cfg:
      max_model_len: 512
    vllm_kwargs:
      enable_prompt_embeds: true

data:
  max_input_seq_length: 512
  num_workers: 1
  default:
    processor: soft_token_math_hf_data_processor
  soft_token:
    mode: smoke
    vllm_prompt_mode: prompt_embeds
    hidden_size: 1536
    num_soft_tokens: 8
    scale: 0.01
    seed: 1234

logger:
  log_dir: logs/grpo-qwen2.5-1.5b-softtoken-1n1g-fsdp2tp1
  monitor_gpus: false
  wandb_enabled: false
  tensorboard_enabled: true
  wandb:
    name: grpo-qwen2.5-1.5b-softtoken-1n1g-fsdp2tp1

cluster:
  gpus_per_node: 1
  num_nodes: 1
