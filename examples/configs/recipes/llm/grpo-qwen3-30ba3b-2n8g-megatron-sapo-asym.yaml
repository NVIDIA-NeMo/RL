# SAPO (Soft Adaptive Policy Optimization, https://arxiv.org/abs/2511.20347)
# on Qwen3-30B-A3B with Megatron policy + colocated vLLM rollouts.
#
# Uses the paper's recommended asymmetric tau (tau_pos=1.0, tau_neg=1.05).
# Replaces the hard PPO/GRPO clip with a smooth temperature-controlled
# sigmoid gate on the importance ratio:
#
#     f_SAPO(r; A) = sigmoid(tau * (r - 1)) * 4 / tau
#     L_SAPO       = -f_SAPO(r; A) * A
#     tau          = tau_pos  if A > 0  else  tau_neg
#
# Footprint: 2 nodes x 8 H200. Megatron TP=2 x EP=8 = 16 GPUs (the paper's
# Section 5.1 parallelism for Qwen3-30B-A3B); vLLM TP=4 colocated gives 4
# generation replicas during rollout.
#
# Off-policy regime (where SAPO and the hard PPO clip diverge most):
#   * 32 prompts x 16 generations = 512 trajectories per step
#   * train_global_batch_size = 128 -> 4 gradient updates per rollout
#     (matches GSPO Sec 5.1 / arXiv:2507.18071 / ms-swift gspo.sh)
#   * KL beta = 0, token-level loss, sampling temperature 1.0
defaults: ../../grpo_math_qwen30ba3b_megatron.yaml

grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  max_num_steps: 200
  val_period: 20
  val_at_start: true
  val_at_end: true
  max_val_samples: 128
  val_batch_size: 128

policy:
  model_name: Qwen/Qwen3-30B-A3B
  train_global_batch_size: 128
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 4096
  sequence_packing:
    enabled: true
    algorithm: modified_first_fit_decreasing
    sequence_length_round: 64
  megatron_cfg:
    enabled: true
    converter_type: LlamaForCausalLM
    tensor_model_parallel_size: 2
    pipeline_model_parallel_size: 1
    expert_model_parallel_size: 8
    sequence_parallel: true
    empty_unused_memory_level: 1
    freeze_moe_router: true
    moe_router_dtype: fp64
    moe_router_load_balancing_type: none
    moe_router_bias_update_rate: 0.0
    optimizer:
      lr: 3.0e-7
      min_lr: 3.0e-8
    scheduler:
      lr_decay_iters: 500
      lr_warmup_iters: 10
      lr_warmup_init: 3.0e-8
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:False
  generation:
    vllm_cfg:
      tensor_parallel_size: 4
      gpu_memory_utilization: 0.7
      enforce_eager: false
    colocated:
      enabled: true

loss_fn:
  reference_policy_kl_penalty: 0.0
  reference_policy_kl_type: k3
  ratio_clip_min: 0.2
  ratio_clip_max: 0.2
  ratio_clip_c: null
  token_level_loss: true
  use_importance_sampling_correction: false
  sequence_level_importance_ratios: false
  force_on_policy_ratio: false
  sapo_enabled: true
  sapo_tau_pos: 1.0
  sapo_tau_neg: 1.05

checkpointing:
  enabled: false

logger:
  log_dir: logs/grpo-qwen3-30ba3b-2n8g-megatron-sapo-asym
  wandb_enabled: false
  tensorboard_enabled: true
  monitor_gpus: false
  wandb:
    project: nemo-rl
    name: grpo-qwen3-30ba3b-2n8g-megatron-sapo-asym

cluster:
  gpus_per_node: 8
  num_nodes: 2
