defaults: ../../sft.yaml
sft:
  max_num_steps: 100
checkpointing:
  enabled: false
policy:
  model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  train_global_batch_size: 16
  # TODO(automodel-issue): NemotronH needs force_hf=true with transformers v5
  # to bypass custom backbone→model.model attribute mismatch in parallelizer.
  dtensor_cfg:
    automodel_kwargs:
      force_hf: true
  max_total_sequence_length: 2048
logger:
  wandb:
    project: nemo-rl
    name: sft-nanov3-30BA3B-2n8g-fsdp2
  tensorboard:
    log_dir: tb_logs-sft-nanov3-30BA3B-2n8g-fsdp2
  mlflow:
    run_name: sft-nanov3-30BA3B-2n8g-fsdp2
cluster:
  gpus_per_node: 8
  num_nodes: 2
