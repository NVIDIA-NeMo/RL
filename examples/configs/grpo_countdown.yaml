# GRPO training config for the Countdown Game
defaults: "grpo_math_1B.yaml"

grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  max_rollout_turns: 1
  max_num_steps: 100
  max_num_epochs: 1

checkpointing:
  enabled: true
  checkpoint_dir: "results/grpo-countdown"
  metric_name: "val:accuracy"
  higher_is_better: true
  keep_top_k: 3
  save_period: 10

policy:
  model_name: "Qwen/Qwen3-0.6B"
  max_total_sequence_length: 2048

  dtensor_cfg:
    enabled: true
    cpu_offload: false
    activation_checkpointing: true
    sequence_parallel: true

  generation:
    backend: "vllm"
    max_new_tokens: 1024
    temperature: 1.0
    top_p: 0.999
    top_k: 10000
    vllm_cfg:
      async_engine: false
      tensor_parallel_size: 1
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.6
      max_model_len: ${policy.max_total_sequence_length}

data:
  add_system_prompt: false
  shuffle: false

env:
  countdown:
    cfg:
      num_count_min: 3
      num_count_max: 6

logger:
  log_dir: "logs"
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  wandb:
    project: "nemo-rl-native-env"
    name: "grpo-countdown"
  tensorboard: {}
  mlflow:
    experiment_name: "grpo-countdown"
    run_name: "grpo-countdown"
    tracking_uri: "http://localhost:5000"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10
