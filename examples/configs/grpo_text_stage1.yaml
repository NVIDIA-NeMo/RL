# defaults: grpo_nanov3_no_genrm.yaml
# defaults: grpo_nanov3_no_genrm-20251112.yaml
# defaults: grpo_nanov3_no_genrm_no_penguin.yaml
defaults: grpo_nanov3_main_no_genrm.yaml

checkpointing:
  # save_period: 1
  save_period: 5
  # save_period: 10
  keep_top_k: 1000000
  # checkpoint_must_save_by: "00:03:35:00"
  checkpoint_must_save_by: "00:03:40:00"
  metric_name: "val:total_reward/mean"

data:
  train_jsonl_fpath:      "/lustre/fs1/portfolios/coreai/users/aroshanghias/data/curriculum_v7_acrid-teal_main_rename.train.jsonl"
  validation_jsonl_fpath: "/lustre/fs1/portfolios/coreai/users/aroshanghias/data/curriculum_v7_acrid-teal_main_rename.val.jsonl"
  shuffle: False

  num_workers: 1

grpo:
  # val_at_start: False
  val_at_start: True
  val_period: 5
  # val_period: 10

  # num_prompts_per_step: 16
  # num_prompts_per_step: 32
  # num_prompts_per_step: 64
  num_prompts_per_step: 128
  num_generations_per_prompt: 16

  normalize_rewards: True
  overlong_filtering: True
  use_best_at_k: False

  seq_logprob_error_threshold: 2

  batch_multiplier: 1
  use_dynamic_sampling: False
  reward_shaping:
    enabled: False
  reward_scaling:
    enabled: False

  # setup_timeout: 480
  # validation_timeout: 1200
  # rollout_timeout: 1200
  # train_step_timeout: 1200
  # checkpoint_timeout: 300
  # log_timeout: 480
  # commit_timeout: 300

loss_fn:
  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: null
  reference_policy_kl_penalty: 0.0
  reference_policy_kl_type: k3
  kl_input_clamp_value: null
  kl_output_clamp_value: null
  use_on_policy_kl_approximation: True
  use_importance_sampling_correction: True
  sequence_level_importance_ratios: False
  token_level_loss: True
  truncated_importance_sampling_ratio: null

policy:
  # model_name: "/lustre/fsw/portfolios/llmservice/projects/llmservice_nemotron_nano/users/pjin/checkpoints/nano-v3-sft-64gbs-cinnamon-orca-5e-5-constant-wd-0-load-bal-1e-4-presfttoolcall-iter-0013000-hf"
  # model_name: "/lustre/fsw/portfolios/llmservice/projects/llmservice_nemotron_nano/users/pjin/checkpoints/nano-v3-rlvr-rlhf-hs3_lmarena_safety-gspo-actor_peter_step295-genrm_235b_run2_step259-step-94-hf"
  # model_name: "/lustre/fsw/portfolios/llmservice/projects/llmservice_nemotron_nano/users/pjin/checkpoints/nano-v3-sft-64gbs-nickel-capybara-5e-5-constant-wd-0-load-bal-1e-4-lcx3-pretool-base-temp1-iter-0013600-hf"

  # model_name: "/lustre/fsw/portfolios/llmservice/users/pjin/checkpoints/nano-v3-vl-sft_moe_rl_llm_eval_mode_radio_v4_v1365_text_0129-hf"
  # model_name: "/lustre/fsw/portfolios/llmservice/users/pjin/checkpoints/nano-v3-lm-only-vl-sft_moe_rl_llm_eval_mode_radio_v4_v1365_text_0129-hf"
  model_name: "/lustre/fsw/portfolios/llmservice/users/pjin/checkpoints/nano-v3-lm-only-vl-sft-mpo-nanov3omni-mmpr-nanov2-filtered-conv3d-0303-step-400-hf"

  # train_global_batch_size: 256
  # train_global_batch_size: 512
  # train_global_batch_size: 1024
  train_global_batch_size: 2048
  train_micro_batch_size: 1
  logprob_batch_size: 1
  # logprob_batch_size: 2

  # max_total_sequence_length: 8192
  # max_total_sequence_length: 16384
  # max_total_sequence_length: 32768
  max_total_sequence_length: 49152
  # max_total_sequence_length: 65536
  # logprob_chunk_size: 1024
  logprob_chunk_size: 2048

  generation:
    temperature: 1.0
    vllm_cfg:
      tensor_parallel_size: 4
      # tensor_parallel_size: 8

      kv_cache_dtype: auto

  megatron_cfg:
    moe_aux_loss_coeff: 0.0
    moe_router_bias_update_rate: 1e-3

    bias_activation_fusion: False

    optimizer:
      # lr: 2.5e-6
      # min_lr: 2.5e-6
      lr: 3e-6
      min_lr: 3e-6
      weight_decay: 0.0
      # adam_beta1: 0.9
      # adam_beta2: 0.95

      optimizer_cpu_offload: False
      optimizer_offload_fraction: 0

    scheduler:
      lr_warmup_iters: 10
      # lr_warmup_init: 2.5e-7
      lr_warmup_init: 3e-7
      # lr_warmup_init: 0

    tensor_model_parallel_size: 2
    expert_model_parallel_size: 8
    expert_tensor_parallel_size: 1
    pipeline_model_parallel_size: 1
    # pipeline_model_parallel_size: 2
    context_parallel_size: 4

    # tensor_model_parallel_size: 4
    # expert_model_parallel_size: 8
    # expert_tensor_parallel_size: 1
    # pipeline_model_parallel_size: 2
    # context_parallel_size: 2

    defer_fp32_logits: True

    freeze_embedding: True

  offload_optimizer_for_logprob: False

  dynamic_batching:
    enabled: False

  sequence_packing:
    # enabled: False
    enabled: True
