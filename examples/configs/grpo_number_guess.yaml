# GRPO Algorithm Configuration for Number Guessing Game
defaults: "grpo_math_1B.yaml"

grpo:
  num_prompts_per_step: 16
  num_generations_per_prompt: 8
  max_rollout_turns: 7
  max_num_steps: 100
  max_num_epochs: 1

checkpointing:
  enabled: false

policy:
  model_name: "Qwen/Qwen3-0.6B"
  max_total_sequence_length: 1024

  dtensor_cfg:
    enabled: true
    cpu_offload: false
    activation_checkpointing: true
    sequence_parallel: true

  generation:
    backend: "vllm"
    max_new_tokens: ${policy.max_total_sequence_length}
    temperature: 1.0
    top_p: 0.999
    top_k: 10000
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: false
      tensor_parallel_size: 1
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.6
      max_model_len: ${policy.max_total_sequence_length}

data:
  add_system_prompt: false
  shuffle: false

env:
  number_guess_game:
    cfg:
      game_config:
        range_low: 1
        range_high: 50
      max_guesses: 7

logger:
  log_dir: "logs"
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  wandb:
    project: "nemo-rl-native-env"
    name: "grpo-number-guess"
  tensorboard: {}
  mlflow:
    experiment_name: "nemo-rl-native-env"
    run_name: "grpo-number-guess"
    tracking_uri: "http://localhost:5000"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10
