# AR GRPO on Nemotron-Labs-Diffusion-3B, training on reasoning_gym 4x4 Mini Sudoku.
# Mirrors the SPG/AGRPO recipe: 4x4 grid, BLANKS-ONLY reward (fraction of originally-empty
# cells filled correctly -> copying givens earns nothing), few-shot <think>/<answer> prompt.
# Held-out 4x4 validation split. Inherits policy/megatron/generation from the DeepScaleR AR config.
defaults: "deepscaler_nemotron_labs_diffusion_3b_sglang_ar_megatron.yaml"

checkpointing:
  checkpoint_dir: "results/grpo-nemotron-diffusion-3b-ar-sudoku4x4-megatron"

logger:
  log_dir: "logs/grpo-nemotron-diffusion-3b-ar-sudoku4x4-megatron-sglang"
  wandb:
    name: "grpo-nemotron-diffusion-3b-ar-sudoku4x4-blanks-fewshot"

policy:
  max_total_sequence_length: 1536  # ~1024 few-shot prompt + 512 generation
  generation:
    max_new_tokens: 512

data:
  _override_: true
  shuffle: true
  num_workers: 1
  use_multiple_dataloader: false
  max_input_seq_length: 1024  # few-shot prompt + puzzle
  train:
    dataset_name: mini_sudoku
    size: 50000
    seed: 1
  validation:
    dataset_name: mini_sudoku
    size: 500
    seed: 2
  default:
    prompt_file: null
    system_prompt_file: examples/prompts/mini_sudoku_fewshot.txt
    processor: "reasoning_gym_data_processor"
    env_name: "reasoning_gym"

env:
  reasoning_gym:
    task: "mini_sudoku"
    reward_mode: "sudoku_blanks"  # SPG-style: score only the originally-blank cells
