# PPO-DAPO with Megatron-Core Backend
# DAPO-style PPO: no KL penalty, asymmetric clipping, dual-clip, reward scaling
# Dynamic sampling is disabled (standard PPO batching).

ppo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  max_rollout_turns: 1
  max_num_epochs: 100000
  max_num_steps: 100000
  steps_per_epoch: 4
  policy_training_start_epoch: 0
  normalize_rewards: true
  use_leave_one_out_baseline: false  # DAPO: no leave-one-out
  val_period: 20
  val_at_start: true
  val_at_end: false
  overlong_filtering: false
  max_val_samples: 256
  val_batch_size: 256
  seed: 42
  use_dynamic_sampling: false  # DAPO dynamic sampling OFF
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1
  skip_reference_policy_logprobs_calculation: true  # No KL, so skip ref logprobs

  reward_shaping:
    enabled: true
    overlong_buffer_length: 2048
    overlong_buffer_penalty: 1
    max_response_length: 14336
    stop_properly_penalty_coef: null

  adv_estimator:
    name: "gae"
    gae_lambda: 0.95
    gae_gamma: 1
    normalize_advantages: true
    normalize_rewards: true
    use_leave_one_out_baseline: false
    minus_baseline: true
    # VAPO decoupled GAE (arXiv:2504.05118): separate λ for value vs policy.
    # null = use gae_lambda for both (standard GAE, no decoupling).
    gae_lambda_value: null   # VAPO: 1.0 (MC-like unbiased value returns)
    gae_lambda_policy: null  # VAPO: null (let length_adaptive_alpha decide)
    # Length-adaptive λ_policy = 1 - 1/(α·l).  0 = disabled.
    length_adaptive_alpha: 0.0  # VAPO: 0.05

  reward_scaling:
    enabled: true
    source_min: 0.0
    source_max: 1.0
    target_min: -1.0  # DAPO: scale rewards to [-1, 1]
    target_max: 1.0

loss_fn:
  reference_policy_kl_penalty: 0.0  # DAPO: no KL penalty
  reference_policy_kl_type: "k3"
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.28  # DAPO: asymmetric clipping (wider upper bound)
  ratio_clip_c: 10  # DAPO: dual-clip with c=10
  use_on_policy_kl_approximation: false
  use_importance_sampling_correction: false
  truncated_importance_sampling_ratio: null
  truncated_importance_sampling_ratio_min: null
  truncated_importance_sampling_type: tis
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: false
  use_kl_in_reward: false  # No KL in reward (KL penalty is 0 anyway)
  value_loss_scale: 0.4
  value_cliprange: 0.2
  # VAPO: NLL loss on correct samples. 0 = disabled.
  positive_example_nll_weight: 0.0  # VAPO: 0.1

checkpointing:
  enabled: true
  checkpoint_dir: "results/ppo_dapo_megatron"
  metric_name: "val:accuracy"
  higher_is_better: true
  keep_top_k: 5
  save_period: 10
  checkpoint_must_save_by: null
  model_save_format: "safetensors"
  save_consolidated: false

policy:
  model_name: "Qwen/Qwen2.5-1.5B"
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}
  train_global_batch_size: 512
  train_micro_batch_size: 4
  generation_batch_size: 64
  logprob_batch_size: ${policy.train_micro_batch_size}
  max_total_sequence_length: 16384
  precision: "bfloat16"
  logprob_chunk_size: null
  offload_optimizer_for_logprob: false

  dtensor_cfg:
    _v2: true
    enabled: false
    cpu_offload: False
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
    lora_cfg:
      enabled: False
      target_modules: []
      exclude_modules: []
      match_all_linear: true
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init: "xavier"
      use_triton: true

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 1
    activation_checkpointing: false
    converter_type: "Qwen2ForCausalLM"
    tensor_model_parallel_size: 1
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    sequence_parallel: false
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: false
    moe_enable_deepep: false
    moe_token_dispatcher_type: "allgather"
    moe_shared_expert_overlap: false
    apply_rope_fusion: True
    bias_activation_fusion: True
    defer_fp32_logits: False
    moe_per_layer_logging: False

    optimizer:
      optimizer: "adam"
      lr: 1.0e-6  # DAPO: lower LR
      min_lr: 1.0e-7
      weight_decay: 0.1  # DAPO: higher weight decay
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      clip_grad: ${policy.max_grad_norm}
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 1000
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-7

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"

    fp8_cfg: null
    env_vars: null

  dynamic_batching:
    enabled: False
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: True
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  max_grad_norm: 1.0

  optimizer: null
  scheduler: null

  generation:
    backend: "vllm"
    max_new_tokens: ${policy.max_total_sequence_length}
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    mcore_generation_config:
      buffer_size_gb: 20
      buffer_guaranteed_fraction: 0.1
      num_cuda_graphs: 16
      block_size_tokens: 256
      use_cuda_graphs_for_non_decode_steps: true
      enable_chunked_prefill: true
      unified_memory_level: 0
      max_tokens: 16384
    vllm_cfg:
      async_engine: false
      precision: ${policy.precision}
      kv_cache_dtype: "auto"
      tensor_parallel_size: 1
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.6
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: False
      use_deep_gemm: False
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 0.5
    vllm_kwargs: {}
    colocated:
      enabled: true
      resources:
        gpus_per_node: null
        num_nodes: null

# Value Model with Megatron-Core Backend (for GAE in PPO)
value:
  model_name: ${policy.model_name}
  tokenizer:
    name: ${value.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}
  load_value_head_from_model: false

  train_global_batch_size: ${policy.train_global_batch_size}
  train_micro_batch_size: ${policy.train_micro_batch_size}
  max_total_sequence_length: ${policy.max_total_sequence_length}
  make_sequence_length_divisible_by: ${value.megatron_cfg.tensor_model_parallel_size}
  precision: "bfloat16"

  reward_model_cfg:
    enabled: false
    reward_model_type: "regression"
    only_head_unfreeze: true

  dtensor_cfg:
    _v2: true
    enabled: false
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
    lora_cfg:
      enabled: false
      target_modules: []
      exclude_modules: []
      match_all_linear: true
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init: "xavier"
      use_triton: true

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 1
    activation_checkpointing: false
    tensor_model_parallel_size: 1
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${value.precision}
    sequence_parallel: false
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: false
    moe_enable_deepep: false
    moe_token_dispatcher_type: "allgather"
    moe_shared_expert_overlap: false
    apply_rope_fusion: True
    bias_activation_fusion: True
    defer_fp32_logits: False
    moe_per_layer_logging: False

    optimizer:
      optimizer: "adam"
      lr: 2.0e-6
      min_lr: 1.0e-7
      weight_decay: 0.1
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      clip_grad: 1.0
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0

    scheduler:
      start_weight_decay: 0.1
      end_weight_decay: 0.1
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 1000
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-7

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"

    fp8_cfg: null
    env_vars: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${value.max_total_sequence_length}, ${value.train_micro_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: false
    train_mb_tokens: ${mul:${value.max_total_sequence_length}, ${value.train_micro_batch_size}}
    algorithm: "modified_first_fit_decreasing"

  max_grad_norm: 1.0
  optimizer: null
  scheduler: null

data:
  max_input_seq_length: 2048
  shuffle: true
  num_workers: 1
  train:
    dataset_name: DAPOMath17K
  validation:
    dataset_name: DAPOMathAIME2024
  default:
    prompt_file: null
    system_prompt_file: null
    processor: "math_hf_data_processor"
    env_name: "math"

env:
  math:
    num_workers: 8
    math_verify_impl: "dapo_math_verify"

logger:
  log_dir: "logs"
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: false
  wandb:
    project: "ppo-dapo-megatron-dev"
    name: "ppo_dapo_megatron_1B"
  swanlab:
    project: "ppo-dapo-megatron-dev"
    name: "ppo_dapo_megatron_1B"
  tensorboard: {}
  mlflow:
    experiment_name: "ppo-dapo-megatron-dev"
    run_name: "ppo_dapo_megatron_1B"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 1
  num_nodes: 1
