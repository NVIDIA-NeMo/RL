# PPO-DAPO with Megatron-Core Backend
# DAPO-style PPO: no KL penalty, asymmetric clipping, dual-clip, reward scaling
# Dynamic sampling is disabled (standard PPO batching).
defaults: ppo_math_1B.yaml

checkpointing:
  checkpoint_dir: results/ppo_dapo_megatron

policy:
  dtensor_cfg:
    enabled: false
  megatron_cfg:
    enabled: true
  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  optimizer: null
  scheduler: null

# Value Model with Megatron-Core Backend (for GAE in PPO)
value:
  reward_model_cfg:
    enabled: false  # only used for DTensor V2 value worker
  dtensor_cfg:
    enabled: false
  megatron_cfg:
    enabled: true
  make_sequence_length_divisible_by: ${value.megatron_cfg.tensor_model_parallel_size}
  optimizer: null
  scheduler: null

logger:
  wandb:
    project: ppo-dapo-megatron-dev
    name: ppo_dapo_megatron_1B
  swanlab:
    project: ppo-dapo-megatron-dev
    name: ppo_dapo_megatron_1B
  mlflow:
    experiment_name: ppo-dapo-megatron-dev
    run_name: ppo_dapo_megatron_1B
