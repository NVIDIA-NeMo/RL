defaults: vlm_grpo_3B.yaml
policy:
  dtensor_cfg:
    enabled: false
  dynamic_batching:
    enabled: false
  # ensures divisibility by 2*TP*CP (required for context parallel load balancing)
  make_sequence_length_divisible_by: ${mul:${mul:${policy.megatron_cfg.tensor_model_parallel_size}, ${policy.megatron_cfg.context_parallel_size}}, 2}
  megatron_cfg:
    enabled: true
    peft:
      lora_dtype: null
    optimizer:
      lr: 2.0e-07
      min_lr: 2.0e-07
    scheduler:
      lr_warmup_iters: 50
      lr_warmup_init: 2.0e-08
    distributed_data_parallel_config:
      overlap_grad_reduce: false
logger:
  wandb:
    name: vlm-grpo-3b-megatron
  swanlab:
    name: vlm-grpo-3b-megatron
