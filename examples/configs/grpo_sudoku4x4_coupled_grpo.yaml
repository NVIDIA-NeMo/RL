# CoupledGRPO on Nemotron-Labs-Diffusion-3B, 4x4 Mini Sudoku.
# Parents: coupled_grpo algorithm base ([noisy|clean] coupled pair, coupled_grpo
# logprob estimator) + grpo_sudoku4x4_base.yaml (shared task). Batch sizes set to 8 like
# ESPO (coupled uses paired-row microbatching; a smoke should confirm 8 divides
# the per-rank batch). Node count matches ESPO (its sibling).
defaults:
  - deepscaler_nemotron_labs_diffusion_3b_sglang_coupled_grpo_megatron_bs16.yaml
  - grpo_sudoku4x4_base.yaml

checkpointing:
  checkpoint_dir: "results/grpo-nd3b-coupled_grpo-sudoku4x4-megatron"

logger:
  log_dir: "logs/grpo-nd3b-coupled_grpo-sudoku4x4-sglang"
  wandb:
    name: "grpo-nd3b-coupled_grpo-sudoku4x4-blanks-fewshot"

cluster:
  num_nodes: 4

policy:
  train_micro_batch_size: 8    # like ESPO
  logprob_batch_size: 8        # match train_micro_batch_size
