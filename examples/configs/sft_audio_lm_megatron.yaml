# SFT Configuration for Qwen2-Audio-7B with Megatron Backend on AISHELL
defaults:
  - sft.yaml

sft:
  max_num_epochs: 1
  max_num_steps: 1000000
  val_period: 500
  val_batches: 4
  val_global_batch_size: 32
  val_micro_batch_size: 1
  val_at_start: true
  val_at_end: false
  seed: 42

checkpointing:
  enabled: true
  checkpoint_dir: "results/sft_audio_lm_megatron"
  metric_name: "val:val_loss"
  higher_is_better: false
  keep_top_k: 100
  save_period: 500

policy:
  model_name: "Qwen/Qwen2-Audio-7B"
  tokenizer:
    name: ${policy.model_name}
  train_global_batch_size: 32
  train_micro_batch_size: 1
  max_total_sequence_length: 4096
  precision: "bfloat16"

  dtensor_cfg:
    enabled: false

  megatron_cfg:
    activation_checkpointing: false
    context_parallel_size: 1
    distributed_data_parallel_config:
      data_parallel_sharding_strategy: optim_grads_params
      grad_reduce_in_fp32: false
      overlap_grad_reduce: false
      overlap_param_gather: false
      use_custom_fsdp: false
    empty_unused_memory_level: 1
    enabled: true
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    optimizer:
      adam_beta1: 0.9
      adam_beta2: 0.98
      adam_eps: 1.0e-8
      bf16: true
      clip_grad: 0
      fp16: false
      lr: 0.00002
      min_lr: 0.000002
      optimizer: adam
      params_dtype: bfloat16
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: false
      weight_decay: 0.01
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0
    pipeline_dtype: bfloat16
    pipeline_model_parallel_size: 1
    scheduler:
      end_weight_decay: 0.01
      lr_decay_iters: 1000
      lr_decay_style: constant
      lr_warmup_init: 0.00001999999
      lr_warmup_iters: 5
      start_weight_decay: 0.01
      weight_decay_incr_style: constant
    sequence_parallel: false
    tensor_model_parallel_size: 2

    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: false
    apply_rope_fusion: True
    bias_activation_fusion: True
    moe_per_layer_logging: False
    moe_enable_deepep: false
    moe_token_dispatcher_type: "allgather"
    moe_shared_expert_overlap: false
    peft:
      enabled: false
      target_modules: []
      exclude_modules: []
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init_method: "xavier"
      lora_B_init_method: "zero"
      a2a_experimental: false
      lora_dtype: null

    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"

    fp8_cfg:
      enabled: false
      fp8: "e4m3"
      fp8_recipe: "blockwise"
      fp8_param: false

  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: True
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  make_sequence_length_divisible_by: ${mul:16, ${policy.megatron_cfg.tensor_model_parallel_size}}
  max_grad_norm: null
  optimizer: null

data:
  max_input_seq_length: ${policy.max_total_sequence_length}
  add_bos: true
  add_eos: true
  add_generation_prompt: false
  num_workers: 1

  train:
    dataset_name: aishell
    split: train
  validation:
    dataset_name: aishell
    split: dev
  default:
    prompt_file: null

logger:
  log_dir: "logs"
  wandb_enabled: true
  tensorboard_enabled: true
  mlflow_enabled: false
  monitor_gpus: false
  wandb:
    project: "sft-audio-lm-megatron"
    name: "qwen2-audio-7b-aishell"
  tensorboard:
    log_dir: "tb_logs-sft-audio-lm-megatron"
  mlflow:
    experiment_name: "sft-audio-lm"
    run_name: "qwen2-audio-7b-aishell"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 8
  num_nodes: 1
