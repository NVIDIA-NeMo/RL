# AR GRPO on Nemotron-Labs-Diffusion-3B, 4x4 Mini Sudoku.
# Two parents: (1) the DeepScaleR AR algorithm base (autoregressive policy/megatron/
# generation) and (2) grpo_sudoku4x4_base.yaml (shared task settings: mini_sudoku
# blanks-only reward, few-shot prompt, gen 512, avg@4 validation). The second parent
# overrides the algorithm base's data/env; this file only sets output paths.
defaults:
  - deepscaler_nemotron_labs_diffusion_3b_sglang_ar_megatron.yaml
  - grpo_sudoku4x4_base.yaml

checkpointing:
  checkpoint_dir: "results/grpo-nemotron-diffusion-3b-ar-sudoku4x4-megatron"

logger:
  log_dir: "logs/grpo-nemotron-diffusion-3b-ar-sudoku4x4-megatron-sglang"
  wandb:
    name: "grpo-nemotron-diffusion-3b-ar-sudoku4x4-blanks-fewshot"
