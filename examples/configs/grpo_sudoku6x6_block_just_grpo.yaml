# Block JustGRPO on Nemotron-Labs-Diffusion-3B, 6x6 Sudoku (2x3 boxes).
# Parents: block_just_grpo algorithm base (block_size 16) + grpo_sudoku6x6_base.yaml.
defaults:
  - deepscaler_nemotron_labs_diffusion_3b_sglang_block_just_grpo_megatron.yaml
  - grpo_sudoku6x6_base.yaml

checkpointing:
  checkpoint_dir: "results/grpo-nd3b-block_just_grpo-sudoku6x6-megatron"

logger:
  log_dir: "logs/grpo-nd3b-block_just_grpo-sudoku6x6-sglang"
  wandb:
    name: "grpo-nd3b-block_just_grpo-sudoku6x6-blanks-fewshot"

cluster:
  num_nodes: 8

policy:
  train_micro_batch_size: 8    # sudoku seq (1536) is short -> larger microbatch fits
  logprob_batch_size: 8        # match train_micro_batch_size
