# AR GRPO on Nemotron-Labs-Diffusion-3B, 8K context, KL-REGULARIZED variant.
# Identical to deepscaler_nemotron_labs_diffusion_3b_sglang_ar_megatron_8k.yaml EXCEPT the
# reference-policy KL penalty is turned back ON (beta = 0.01) and the reference logprob
# calculation is re-enabled. Motivation: the KL-off 8K run (deepscaler_ar_3b_8k_from4k)
# collapsed around step ~685 -- mean generation length exploded (~2.5k -> ~6k toward the
# budget), generation-vs-training policy divergence (Generation KL Error) blew up
# (~2e-4 -> 0.82), and reward fell from ~0.65 to ~0.03. Re-enabling a small reference KL
# penalty anchors the policy to the base model to resist that drift.
#
# NOTE: enabling the KL penalty REQUIRES skip_reference_policy_logprobs_calculation=false
# (set below); otherwise reference logprobs are never computed and the penalty is a no-op.
# This adds a reference-policy forward pass per step -- watch memory at 8K (micro-batch is
# already 1 in the parent 8K config).
defaults: "deepscaler_nemotron_labs_diffusion_3b_sglang_ar_megatron_8k.yaml"

loss_fn:
  reference_policy_kl_penalty: 0.01

grpo:
  skip_reference_policy_logprobs_calculation: false
