# ASFT (Anchored Supervised Fine-Tuning) base configuration.
#
# Based on "Anchored Supervised Fine-Tuning" (arXiv:2509.23753, ICLR 2026).
# ASFT = DFT (token-probability reweighting) + KL anchoring against a frozen
# reference model. This file inherits all policy/data/logger/cluster defaults
# from sft.yaml and only swaps the algorithm block (`sft` -> `asft`) and points
# checkpointing/logging at ASFT dirs. See recipes/llm/ for concrete model configs.
defaults: sft.yaml

asft:
  max_num_epochs: 1
  max_num_steps: 60

  val_period: 10
  val_batches: 8
  val_global_batch_size: 32
  val_micro_batch_size: 1
  val_at_start: true
  val_at_end: false
  seed: 42
  only_unmask_final: false

  # ASFT loss hyperparameters (see ASFTLossFn).
  #   kl_weight: strength of the KL anchor. 0.03 is the paper/ms-swift bf16
  #     default; internal sweeps found 0.005-0.01 the sweet spot for Qwen3-8B.
  #   kl_type:   Schulman KL estimator on the correct-token logprobs (k1/k2/k3).
  kl_weight: 0.03
  kl_type: "k3"
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0

checkpointing:
  checkpoint_dir: "results/asft"

logger:
  wandb:
    project: nemo-rl
    name: asft-dev
  tensorboard:
    log_dir: tb_logs-asft-dev
