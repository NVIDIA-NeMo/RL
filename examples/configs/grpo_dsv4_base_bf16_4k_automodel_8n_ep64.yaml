defaults: grpo_math_1B.yaml

grpo:
  num_prompts_per_step: 16
  num_generations_per_prompt: 16
  batch_multiplier: 1
  max_rollout_turns: 1
  max_num_steps: 20
  use_leave_one_out_baseline: false
  val_period: 5
  max_val_samples: 960
  val_batch_size: 960
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  reward_scaling:
    enabled: true
    source_min: 0.0
    source_max: 1.0
    target_min: -1.0
    target_max: 1.0
  reward_shaping:
    enabled: true
    overlong_buffer_length: 512
    max_response_length: 2048

loss_fn:
  reference_policy_kl_penalty: 0.0
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 2
  ratio_clip_max: 0.28
  ratio_clip_c: 10

checkpointing:
  keep_top_k: 1
  save_period: 10
  model_save_format: null
  checkpoint_dir: results/grpo-dsv4-base-bf16-4k-automodel-8n-ep64

policy:
  model_name: deepseek-ai/DeepSeek-V4-Flash-Base
  tokenizer:
    name: ${policy.model_name}
    chat_template: deepseek_v4
    chat_template_kwargs:
      enable_thinking: false
  dequantize_base_checkpoint: true
  hf_config_overrides:
    num_nextn_predict_layers: 0
  train_global_batch_size: 256
  train_micro_batch_size: 1
  logprob_batch_size: 1
  precision: bfloat16
  max_total_sequence_length: 3072
  logprob_chunk_size: 1024
  offload_optimizer_for_logprob: true
  make_sequence_length_divisible_by: 64
  max_grad_norm: 1.0
  optimizer:
    kwargs:
      lr: 1.0e-06
      weight_decay: 0.1
      betas: [0.9, 0.98]
      eps: 1.0e-05
  scheduler:
  - name: torch.optim.lr_scheduler.LinearLR
    kwargs:
      start_factor: 1.0e-08
      end_factor: 1.0
      total_iters: 10
  - name: torch.optim.lr_scheduler.ConstantLR
    kwargs:
      factor: 1.0
      total_iters: 10000000000
  - milestones:
    - 10
  dtensor_cfg:
    _v2: true
    enabled: true
    env_vars:
      NEMO_AUTOMODEL_DSV4_EXPERT_LAYOUT: base
      NEMO_AUTOMODEL_MOE_SCATTER_CHUNK_ROWS: "4096"
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    cpu_offload: false
    sequence_parallel: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    expert_parallel_size: 64
    activation_checkpointing: true
    moe_parallelizer:
      ignore_router_for_ac: true
      reshard_after_forward: true
    automodel_kwargs:
      backend:
        _target_: nemo_automodel.components.models.common.utils.BackendConfig
        attn: sdpa
        linear: torch
        rms_norm: torch
        experts: torch_mm
        enable_deepep: false
        fake_balanced_gate: false
        rope_fusion: false
        enable_hf_state_dict_adapter: true
  megatron_cfg:
    enabled: false
  sequence_packing:
    enabled: false
  dynamic_batching:
    enabled: true
  generation:
    max_new_tokens: 2048
    vllm_cfg:
      precision: fp8
      kv_cache_dtype: fp8_ds_mla
      tensor_parallel_size: 8
      expert_parallel_size: 32
      enable_expert_parallel: true
      gpu_memory_utilization: 0.5
      enforce_eager: true
      max_model_len: ${policy.max_total_sequence_length}
      use_deep_gemm: true
    vllm_kwargs:
      tokenizer_mode: deepseek_v4

data:
  max_input_seq_length: 1024
  train:
    dataset_name: DAPOMath17K
  validation:
    dataset_name: DAPOMathAIME2024
  default:
    prompt_file: null

env:
  math:
    num_workers: 16
    math_verify_impl: dapo_math_verify

logger:
  wandb_enabled: true
  monitor_gpus: true
  num_val_samples_to_print: 2
  wandb:
    project: nemo-rl
    name: grpo-dsv4-base-bf16-4k-automodel-8n-ep64
  tensorboard_enabled: true
  tensorboard:
    log_dir: tb_logs/grpo-dsv4-base-bf16-4k-automodel-8n-ep64
  mlflow:
    run_name: grpo-dsv4-base-bf16-4k-automodel-8n-ep64

cluster:
  gpus_per_node: 8
  num_nodes: 8
