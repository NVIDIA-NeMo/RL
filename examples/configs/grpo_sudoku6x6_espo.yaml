# ESPO (block-aware coupled GRPO) on Nemotron-Labs-Diffusion-3B, 6x6 Sudoku (2x3 boxes).
# Parents: ESPO algorithm base (num_mc_samples=2, block_size 16) + grpo_sudoku6x6_base.yaml.
defaults:
  - deepscaler_nemotron_labs_diffusion_3b_sglang_espo_block_aware_coupled_megatron_bs16.yaml
  - grpo_sudoku6x6_base.yaml

checkpointing:
  checkpoint_dir: "results/grpo-nd3b-espo-sudoku6x6-megatron"

logger:
  log_dir: "logs/grpo-nd3b-espo-sudoku6x6-sglang"
  wandb:
    name: "grpo-nd3b-espo-sudoku6x6-blanks-fewshot"

cluster:
  num_nodes: 4

policy:
  train_micro_batch_size: 8    # = num_samples_per_micro_batch(4) * num_mc_samples(2)
  logprob_batch_size: 8        # sequence-units; match microbatch scale
  logprob_estimation:
    num_samples_per_micro_batch: 4
