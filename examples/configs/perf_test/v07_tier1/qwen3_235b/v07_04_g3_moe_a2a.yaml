defaults: ../../../recipes/llm/performance/grpo-qwen3-235b-16n8g.yaml

# v0.7 Tier 1 variant: G3 MoE A2A combine + wgrad GEMM overlap (Qwen3 235B, 16n8g).
checkpointing:
  enabled: false
grpo:
  max_num_steps: 10
logger:
  log_dir: logs/perf_test/v07_tier1/qwen3_235b/v07_04_g3_moe_a2a
  wandb_enabled: false
  tensorboard_enabled: true
policy:
  sequence_packing:
    enabled: true
  megatron_cfg:
    overlap_moe_expert_parallel_comm: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"
      CUDA_HOME: /usr/local/cuda

cluster:
  gpus_per_node: 4
  num_nodes: 32
