defaults: ../../../recipes/llm/performance/grpo-qwen3-235b-16n4g.yaml

# v0.7 Tier 2 variant: tp_comm_atomic_ag/rs (Qwen3 235B, 16n4g, TP=2).
# Switches AG/RS overlap from split (default) to atomic GEMM mode.
checkpointing:
  enabled: false
grpo:
  max_num_steps: 10
logger:
  log_dir: logs/perf_test/v07_tier1/qwen3_235b/v07_09_tp_atomic
  wandb_enabled: false
  tensorboard_enabled: true
policy:
  sequence_packing:
    enabled: true
  megatron_cfg:
    tp_comm_overlap: true
    # Bridge GPT autocast spec uses `split_ag or atomic_ag` — must disable split
    # to actually pick the atomic kernel (gpt_full_te_layer_autocast_spec.py:211).
    tp_comm_split_ag: false
    tp_comm_split_rs: false
    tp_comm_atomic_ag: true
    tp_comm_atomic_rs: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"
      CUDA_HOME: /usr/local/cuda
