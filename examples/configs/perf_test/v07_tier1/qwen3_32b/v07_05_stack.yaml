defaults: ../../../recipes/llm/performance/grpo-qwen3-32b-4n4g.yaml

# v0.7 Tier 1 stack (Qwen3 32B, 4n4g): G1 + G5 + G6 stacked.
# Dense recipe — no MoE A2A overlap (G3) applicable.
checkpointing:
  enabled: false
grpo:
  max_num_steps: 10
logger:
  log_dir: logs/perf_test/v07_tier1/qwen3_32b/v07_05_stack
  wandb_enabled: false
  tensorboard_enabled: true
policy:
  sequence_packing:
    enabled: true
  megatron_cfg:
    bias_dropout_add_fusion: true
    masked_softmax_fusion: true
    persist_layer_norm: true
    tp_comm_overlap: true
    delay_wgrad_compute: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"
      CUDA_HOME: /usr/local/cuda
