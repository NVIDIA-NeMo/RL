defaults: ../../../recipes/llm/performance/grpo-qwen3-32b-4n8g.yaml

# v0.7 Tier 1 variant: G1 tp_comm_overlap (Qwen3 32B, 4n8g, TP=4 SP=on).
# UserBuffers TP comm overlap. Stacks with G5/G6.
checkpointing:
  enabled: false
grpo:
  max_num_steps: 10
logger:
  log_dir: logs/perf_test/v07_tier1/qwen3_32b/v07_02_g1_tpoverlap
  wandb_enabled: false
  tensorboard_enabled: true
policy:
  sequence_packing:
    enabled: true
  megatron_cfg:
    tp_comm_overlap: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"
      CUDA_HOME: /usr/local/cuda
