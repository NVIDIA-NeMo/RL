defaults: ../../../recipes/llm/performance/grpo-qwen3-32b-4n4g.yaml

# v0.7 Tier 2 variant: tp_comm_atomic_ag/rs (Qwen3 32B, 4n4g, TP=2).
# Switches AG/RS overlap from split (default) to atomic GEMM mode.
checkpointing:
  enabled: false
grpo:
  max_num_steps: 10
logger:
  log_dir: logs/perf_test/v07_tier1/qwen3_32b/v07_09_tp_atomic
  wandb_enabled: false
  tensorboard_enabled: true
policy:
  sequence_packing:
    enabled: true
  megatron_cfg:
    tp_comm_overlap: true
    tp_comm_atomic_ag: true
    tp_comm_atomic_rs: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"
      CUDA_HOME: /usr/local/cuda
