defaults: ../../../recipes/llm/performance/grpo-qwen3-30ba3b-4n4g.yaml

# Phase C — external_cuda_graph on Qwen3-30B-A3B MoE.
checkpointing:
  enabled: false
grpo:
  max_num_steps: 10
logger:
  log_dir: logs/perf_test/v07_tier1/qwen3_30ba3b/v07_12_external_cuda_graph
  wandb_enabled: false
  tensorboard_enabled: true
policy:
  make_sequence_length_divisible_by: 128
  sequence_packing:
    enabled: true
  megatron_cfg:
    external_cuda_graph: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"
      CUDA_HOME: /usr/local/cuda
