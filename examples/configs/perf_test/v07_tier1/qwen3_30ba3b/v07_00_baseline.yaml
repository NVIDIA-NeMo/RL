defaults: ../../../recipes/llm/performance/grpo-qwen3-30ba3b-4n4g.yaml

# v0.7 Tier 1 baseline (Qwen3 30B-A3B MoE, 4n4g): no Tier 1 knobs.
checkpointing:
  enabled: false
grpo:
  max_num_steps: 10
logger:
  log_dir: logs/perf_test/v07_tier1/qwen3_30ba3b/v07_00_baseline
  wandb_enabled: false
  tensorboard_enabled: true
policy:
  make_sequence_length_divisible_by: 128
  sequence_packing:
    enabled: true
  megatron_cfg:
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"
      CUDA_HOME: /usr/local/cuda
