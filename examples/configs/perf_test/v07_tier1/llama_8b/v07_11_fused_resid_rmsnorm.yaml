defaults: ../../../recipes/llm/performance/grpo-llama3.1-8b-instruct-2n4g.yaml

# Phase A — MLM PR #3384 (fused_residual_rmsnorm).
# Toggles the fused dLN+add bwd kernel on RMSNorm. Pairs with v07_00_baseline.
checkpointing:
  enabled: false
grpo:
  max_num_steps: 10
logger:
  log_dir: logs/perf_test/v07_tier1/llama_8b/v07_11_fused_resid_rmsnorm
  wandb_enabled: false
  tensorboard_enabled: true
policy:
  sequence_packing:
    enabled: true
  megatron_cfg:
    fused_residual_rmsnorm: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"
      CUDA_HOME: /usr/local/cuda
