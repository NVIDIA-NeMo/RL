defaults: ../../../recipes/llm/performance/grpo-llama3.1-8b-instruct-2n8g.yaml

# v0.7 Tier 1 variant: G6 fusion bundle (Llama 3.1 8B, 2n8g).
# Pure model-provider fusion knobs. Pairs with v07_00_baseline.
checkpointing:
  enabled: false
grpo:
  max_num_steps: 10
logger:
  log_dir: logs/perf_test/v07_tier1/llama_8b/v07_01_g6_fusion
  wandb_enabled: false
  tensorboard_enabled: true
policy:
  sequence_packing:
    enabled: true
  megatron_cfg:
    bias_dropout_add_fusion: true
    masked_softmax_fusion: true
    persist_layer_norm: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"
      CUDA_HOME: /usr/local/cuda

cluster:
  gpus_per_node: 4
  num_nodes: 4
