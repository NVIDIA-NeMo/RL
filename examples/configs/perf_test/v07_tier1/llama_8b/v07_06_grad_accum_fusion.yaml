defaults: ../../../recipes/llm/performance/grpo-llama3.1-8b-instruct-2n4g.yaml

# v0.7 Tier 2 variant: gradient_accumulation_fusion (Llama 3.1 8B, 2n4g).
checkpointing:
  enabled: false
grpo:
  max_num_steps: 10
logger:
  log_dir: logs/perf_test/v07_tier1/llama_8b/v07_06_grad_accum_fusion
  wandb_enabled: false
  tensorboard_enabled: true
policy:
  sequence_packing:
    enabled: true
  megatron_cfg:
    gradient_accumulation_fusion: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"
      CUDA_HOME: /usr/local/cuda
