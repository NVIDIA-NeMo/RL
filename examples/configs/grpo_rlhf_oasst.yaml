defaults: "grpo_math_1B.yaml"

grpo:
  num_prompts_per_step: 16
  num_generations_per_prompt: 8
  max_rollout_turns: 1
  max_num_steps: 30
  seed: 42

policy:
  model_name: "Qwen/Qwen3-0.6B"
  max_total_sequence_length: 2048
  dtensor_cfg:
    enabled: true
    cpu_offload: false
    activation_checkpointing: false
    sequence_parallel: true
  generation:
    backend: "vllm"
    max_new_tokens: 512
    temperature: 1.0
    top_p: 0.999
    top_k: 10000
    vllm_cfg:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.5
      max_model_len: ${policy.max_total_sequence_length}

data:
  train:
    dataset_name: "open_assistant"
  default:
    processor: "sft_processor"
    env_name: "reward_model"

env:
  reward_model:
    model_name: "Skywork/Skywork-Reward-V2-Qwen3-0.6B"
    tokenizer:
      name: ${env.reward_model.model_name}
    precision: "bfloat16"
    batch_size: ${policy.train_micro_batch_size}
    checkpoint_path: null
    max_model_len: 2048
    offload_optimizer_for_logprob: false
    resources:
      gpus_per_node: 1
      num_nodes: 1
    dtensor_cfg:
      _v2: true
      enabled: true
      sequence_parallel: false
      tensor_parallel_size: 1
      context_parallel_size: 1
      custom_parallel_plan: null
      cpu_offload: false
      activation_checkpointing: false
    reward_model_cfg:
      enabled: true
      reward_model_type: "bradley_terry"
    dynamic_batching:
      enabled: false
    sequence_packing:
      enabled: false
    max_grad_norm: null

cluster:
  gpus_per_node: 2
  num_nodes: 1

logger:
  log_dir: "logs"
  wandb_enabled: true
  wandb:
    project: "nemo-rl-native-env"
    name: "grpo-rlhf-oasst"
