# Audio GRPO Qwen3-Omni-30B-A3B-Instruct Megatron Configuration (AudioMCQ).
#
# Mirrors the structure of audio_grpo_qwen_omni3_megatron.yaml in the RL_qwen3
# branch (Qwen3-Omni MoE topology + TIS + allgather dispatcher) but swaps the
# dataset to AudioMCQ-StrongAC-GeminiCoT and follows the checkpoint cadence
# of audio_grpo_7B_megatron.yaml (`enabled: true`, `keep_top_k: 10`,
# `save_period: 50`, `val_at_start: true`).
#
# Bridge selection: relies on the M-latest Megatron-Bridge build registering
# Qwen3OmniBridge on Qwen3OmniMoeForConditionalGeneration. Prepend
# <M-latest>/3rdparty/Megatron-LM and <M-latest>/src to PYTHONPATH at launch
# (see the 4n8g launcher).
defaults: "grpo_math_1B_megatron.yaml"

grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 8
  max_num_steps: 1000
  val_at_start: true
  max_val_samples: 256
  val_batch_size: 256

loss_fn:
  # Truncated Importance Sampling absorbs the per-token train-vs-rollout
  # logprob mismatch from bf16 + MoE router + 20-head audio tower. Mirrors
  # examples/configs/recipes/vlm/vlm_grpo-qwen3.5-35ba3b-geo3k-2n8g-megatron-ep16.yaml.
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 2

checkpointing:
  enabled: true
  checkpoint_dir: results/audio_grpo_qwen3_omni_megatron
  keep_top_k: 5
  save_period: 10

policy:
  model_name: Qwen/Qwen3-Omni-30B-A3B-Instruct
  train_global_batch_size: 32
  train_micro_batch_size: 1
  generation_batch_size: 32
  logprob_batch_size: 1
  max_total_sequence_length: 2048

  sequence_packing:
    enabled: false

  generation:
    max_new_tokens: 1024
    vllm_cfg:
      # Audio/multimodal tokenizer must be init'd before generation.
      skip_tokenizer_init: false
      # Qwen3-Omni audio tower has 20 attention heads, so vLLM TP must divide
      # 20 (TP=8 fails with "20 is not divisible by 8" inside
      # Qwen3OmniMoeAudioAttention). TP=4 gives a clean split.
      # TP=1 deadlocks: NeMo RL routes the model_parallel_size>1 path that
      # sets RAY_EXPERIMENTAL_NOSET_CUDA_VISIBLE_DEVICES + VLLM_RAY_PER_WORKER_GPUS
      # so the vllm Ray executor can grab GPUs; with TP=1 this branch is skipped
      # and vLLM hangs in `_init_workers_ray` waiting for a sub-worker that has
      # no GPU bundle to land on.
      tensor_parallel_size: 4
      # vLLM-side EP must match Megatron-side EP for the MoE generation
      # topology to actually run with experts split across ranks. NeMo-RL
      # reads vllm_cfg.expert_parallel_size at runtime (not megatron_cfg).
      # On 4x8 (32 GPUs), EP=32 / TP=4 gives DP=8 vLLM groups each TP=4.
      expert_parallel_size: 8
      # async_engine must be false when ep_size != tp_size (vLLM DP path).
      async_engine: false
      gpu_memory_utilization: 0.55
      max_model_len: ${policy.max_total_sequence_length}
      limit_mm_per_prompt:
        audio: 1
    vllm_kwargs:
      # vllm.LLM(...) only receives **vllm_kwargs, so the audio cap is
      # restated here to actually flow through to the engine.
      mm_processor_cache_gb: 0
      limit_mm_per_prompt:
        audio: 1

  megatron_cfg:
    converter_type: Qwen3OmniMoeForConditionalGeneration
    tensor_model_parallel_size: 1
    expert_model_parallel_size: 8
    expert_tensor_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    sequence_parallel: false
    activation_checkpointing: true
    defer_fp32_logits: true
    apply_rope_fusion: false
    moe_grouped_gemm: true
    # All EP>=16 large-MoE peers (vlm/text 35B-A3B EP16) use allgather;
    # alltoall scales worse on big EP and contributed to early-step instability.
    moe_token_dispatcher_type: allgather
    moe_router_load_balancing_type: none
    moe_router_dtype: fp64
    moe_permute_fusion: true
    optimizer:
      lr: 1.0e-6
      min_lr: 1.0e-7
      weight_decay: 0.1
      use_precision_aware_optimizer: false
    scheduler:
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-7
    distributed_data_parallel_config:
      overlap_grad_reduce: false
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

data:
  num_workers: 0
  train:
    dataset_name: audiomcq
    split: train
    # Held-out validation slice is synthesized from this train manifest.
    # populate_val_dataset=false suppresses train-side auto-population so
    # setup_response_data only sees the explicit validation entry below.
    split_validation_size: 0.026
    seed: 42
    populate_val_dataset: false
  validation:
    dataset_name: audiomcq
    split: validation
    # Must match the train block to share the same partition.
    split_validation_size: 0.026
    seed: 42
  default:
    prompt_file: null
    system_prompt_file: null
    processor: "vlm_hf_data_processor"
    env_name: "vlm"

env:
  vlm:
    num_workers: 8
    reward_functions:
    - name: format
      weight: 0.2
    - name: exact_alnum
      weight: 0.8

logger:
  wandb_enabled: true
  tensorboard_enabled: true
  monitor_gpus: false
  wandb:
    project: grpo-dev
    name: audio-grpo-qwen3-omni-megatron
  swanlab:
    project: grpo-dev
    name: audio-grpo-qwen3-omni-megatron

cluster:
  gpus_per_node: 8
  num_nodes: 4
