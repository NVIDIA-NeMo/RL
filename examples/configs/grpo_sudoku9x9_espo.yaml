# ESPO (block-aware coupled GRPO) on Nemotron-Labs-Diffusion-3B, 9x9 Sudoku (3x3 boxes).
# Parents: ESPO base (num_mc_samples=2, block_size 16) + grpo_sudoku9x9_base.yaml.
# Conservative batch for the longer 9x9 seq: train_micro_batch_size 4 = num_samples_per_micro_batch(2) * num_mc_samples(2).
defaults:
  - deepscaler_nemotron_labs_diffusion_3b_sglang_espo_block_aware_coupled_megatron_bs16.yaml
  - grpo_sudoku9x9_base.yaml

checkpointing:
  checkpoint_dir: "results/grpo-nd3b-espo-sudoku9x9-megatron"

logger:
  log_dir: "logs/grpo-nd3b-espo-sudoku9x9-sglang"
  wandb:
    name: "grpo-nd3b-espo-sudoku9x9-blanks-fewshot"

cluster:
  num_nodes: 4

policy:
  train_micro_batch_size: 4    # = num_samples_per_micro_batch(2) * num_mc_samples(2)
  logprob_batch_size: 4
  logprob_estimation:
    num_samples_per_micro_batch: 2
