# =============================================================================
# Logger
# =============================================================================
logger:
  log_dir: "logs"
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  monitor_gpus: true
  swanlab_enabled: false
  wandb:
    project: "grpo-ultra-v3"
    name: "grpo-ultra-v3-256n"
  tensorboard: {}
  mlflow:
    experiment_name: "grpo-ultra-v3"
    run_name: "grpo-ultra-v3-256n"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

# =============================================================================
# Effort Levels
# =============================================================================
effort_levels:
  low_string: "{reasoning effort: efficient}"
  low_weight: 0.1
  low_penalty: 1
  low_ub: 15000

# =============================================================================
# Token IDs (model-specific, used by token-based penalties)
# =============================================================================
token_ids:
  eos: 2           # </s>
  think_open: 12   # <think>
  think_close: 13  # </think>

# =============================================================================
# Reward Penalties (set reward to 0 when triggered)
# =============================================================================
penalize_duplicated_reasoning: true   # reasoning content == final answer
penalize_empty_final_answer: true     # last message output has empty content
penalize_eos_token: true              # eos token appears in generation
penalize_malformed_think_tag: true     # <think>/<\/think> count != 1 per turn

# =============================================================================
# Teacher panel — paths set by the launcher.
#
# `_teachers.general` is required; the other slots fall back to it when unset.
# In the simplified public flow:
#   - general    = Student RLVR output (also the MOPD student)
#   - rlhf       = RLHF Teacher output            (genrm_* agents)
#   - ifbench    = IFBench Teacher output         (instruction_following, abstention, multichallenge)
#   - reasoning  = Reasoning Teacher output       (math, mcqa, equivalence, ns_tools, code, lc_judge)
#   - swe        = SWE Teacher output             (swe_*, terminal_multi_harness_*, droid_*, structured_outputs_v3, freeform/citation)
#
# Agents below map to one of these five teacher slots. Production also has
# distinct agentic_safety / gdpval / search / terminalbench / tau teachers;
# until those recipes are ready they fall back to `general` here.
# =============================================================================
_teachers:
  general: ???   # Required — set by launcher via NRL_GENERAL_TEACHER_PATH
  rlhf:      ${_teachers.general}
  ifbench:   ${_teachers.general}
  reasoning: ${_teachers.general}
  swe:       ${_teachers.general}

# =============================================================================
# OPD: on-policy distillation with non-colocated teachers
# =============================================================================
on_policy_distillation:
  enabled: true
  use_orm_advantage: false
  orm_advantage_weight: 0.0
  privileged_information:
    enabled: false
    mode: opsd
    beta: 1.0
    alpha: 0.5
    task_reward_weight: 1.0
    batch_key: privileged_information
    role: system
    template: "Privileged information for the teacher only:\n{privileged_information}"
    allow_missing: false
    strict_alignment: true
  teacher_model_by_agent_name:
    # Reasoning / math / mcqa / equivalence / lc-judge / ns-tools / code
    math_with_judge_simple_agent:            ${_teachers.reasoning}
    equivalence_llm_judge_simple_agent:      ${_teachers.reasoning}
    mcqa_simple_agent:                       ${_teachers.reasoning}
    lc_judge_simple_agent:                   ${_teachers.general}
    ns_tools_simple_agent:                   ${_teachers.reasoning}
    code_gen_simple_agent:                   ${_teachers.reasoning}

    # IFBench / abstention / multichallenge (all share IFBench teacher)
    instruction_following_simple_agent:      ${_teachers.ifbench}
    abstention_simple_agent:                 ${_teachers.ifbench}
    multichallenge_simple_agent:             ${_teachers.ifbench}

    # RLHF (GenRM-judged agents)
    genrm_simple_agent:                      ${_teachers.rlhf}
    genrm_simple_agent_reasoning_off:        ${_teachers.rlhf}

    # SWE / Agentic — production aliases AGENTIC_TEACHER and SWE_TEACHER to
    # the same checkpoint; we follow that convention here.
    swe_pivot_single_step_tool_use_with_argument_comparison_agent: ${_teachers.swe}
    swe_pivot_tool_simulation_agent:         ${_teachers.swe}
    structured_outputs_v3_simple_agent:      ${_teachers.swe}
    terminal_multi_harness_opencode_agent:   ${_teachers.swe}
    terminal_multi_harness_agent006_agent:   ${_teachers.swe}
    terminal_multi_harness_codex_agent:      ${_teachers.swe}
    droid_pivot_single_step_tool_use_with_argument_comparison_agent: ${_teachers.swe}
    freeform_formatting_simple_agent:        ${_teachers.swe}
    citation_format_simple_agent:            ${_teachers.swe}

    # Falling back to general until dedicated recipes exist
    terminal_multi_harness_stirrup_agent:                            ${_teachers.general}  # (prod: gdpval teacher)
    terminus_judge_string_only_simple_agent:                         ${_teachers.general}  # (prod: terminalbench teacher)
    search_pivot_single_step_tool_use_with_argument_comparison_agent: ${_teachers.general}  # (prod: search teacher)
    single_step_tool_use_with_argument_comparison_agent:             ${_teachers.general}  # (prod: tau teacher)
    indirect_prompt_injection_simple_agent:                          ${_teachers.general}  # (prod: agentic_safety teacher)

  default_teacher_alias: lc_judge_simple_agent
  deduplicate_shared_teacher_checkpoints: true
  non_colocated_teachers:
    enabled: true
    default_teacher_cfg:
      tensor_model_parallel_size: 8
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 16
      context_parallel_size: 2
      num_nodes: 4
      gpus_per_node: 4
      precision: bf16
      micro_batch_size: 1
      megatron_cfg_overrides:
        moe_token_dispatcher_type: alltoall
        moe_flex_dispatcher_backend: deepep
