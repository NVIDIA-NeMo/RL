# =============================================================================
# Nemotron 3 Ultra — SWE Teacher (code-execution RLVR, GBS=512, 192k context)
# =============================================================================
# RLVR teacher for software-engineering benchmarks. Trains the policy against
# multi-turn coding agents (`swe_agents`) that execute candidate fixes inside
# apptainer (.sif) container images for SWE-Bench, SWE-Gym, etc.,
# and reward based on test pass/fail — no LLM judges in this stage.
#
# Trained at 192k context with a
# small batch (GBS=512, PPS=32, GPP=16), large CP=32, and EP=32.
#
# Cluster shape (128 nodes × 4 GPUs on GB200 NVL72 = 512 GPUs):
#   Training 64 / vLLM 64 / Gym 0 (no LLM judges). Override via
#   NUM_TRAIN_NODES, NUM_GEN_NODES, NUM_GYM_NODES.
#
# SIF images: the SWE agent's `container_formatter` paths use the top-level
# `sif_dir` Hydra key — set via `SIF_DIR=...` in the launcher. The released
# blend uses two benchmarks, so the directory needs `swerebench/` and `swegym/`
# subdirectories with per-instance `{instance_id}.sif` files. See the public
# guide for how to build these for ARM64 (GB200).
# =============================================================================
#
#   - gpus_per_node: 4
#   - TP: 8, CP: 8, EP: 32, PP: 1
#   - vLLM TP: 8
#   - Non-colocated async inference with 64 generation nodes
#   - Max sequence length: 131072
# =============================================================================

# =============================================================================
# Cluster — overridden by launch script for parallelism changes
# =============================================================================
cluster:
  gpus_per_node: 4
  num_nodes: 128
  segment_size: 16

# =============================================================================
# SIF image root — required, set by the launcher via SIF_DIR. The SWE agent's
# container_formatter (in env.nemo_gym.swe_agents_train) resolves
# `${sif_dir}/<subdir>/{instance_id}.sif` per SWE benchmark family.
# =============================================================================
sif_dir: ???

# =============================================================================
# Checkpointing
# =============================================================================
checkpointing:
  enabled: true
  checkpoint_dir: "results/grpo_ultra_e2e"
  metric_name: "val:total_reward/mean"
  higher_is_better: true
  keep_top_k: 1000000
  save_period: 5
  ft_keep_latest_k: 1
  ft_save_period: 1
  checkpoint_must_save_by: "00:03:30:00"
  model_save_format: "safetensors"
  save_consolidated: false

# =============================================================================
# GRPO Algorithm
# =============================================================================
grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  num_val_generations_per_prompt: 2
  max_rollout_turns: 1
  max_num_epochs: 4
  max_num_steps: 1000000
  normalize_rewards: true
  use_leave_one_out_baseline: true
  advantage_clip_low: -100
  advantage_clip_high: 100
  val_period: 10000
  val_at_start: false
  val_at_end: false
  overlong_filtering: false
  max_val_samples: null
  val_batch_size: 256
  seed: 42

  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1

  penalize_invalid_tool_call: true
  invalid_tool_call_advantage: -5.0
  penalize_malformed_thinking: true
  malformed_thinking_advantage: -5.0

  reward_shaping:
    enabled: false
    overlong_buffer_length: 128
    overlong_buffer_penalty: 1
    max_response_length: ${policy.max_total_sequence_length}
    stop_properly_penalty_coef: null
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0

  async_grpo:
    enabled: true
    max_trajectory_age_steps: 1
    in_flight_weight_updates: true
    recompute_kv_cache_after_weight_updates: false

  use_best_at_k: false
  best_at_k_k: 8
  best_at_k_m: 1000

  use_combined_training: false
  combined_training_weight_mode: "auto"
  combined_training_best_at_k_weight: 0.2
  combined_training_pass_at_1_weight: 1.0

  dynamic_sampling_oversample_ratio: 1.0
  seq_logprob_error_threshold: 2

# =============================================================================
# Loss Function
# =============================================================================
loss_fn:
  reference_policy_kl_penalty: 0.0
  reference_policy_kl_type: "k3"
  kl_input_clamp_value: null
  kl_output_clamp_value: null

  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: null
  use_on_policy_kl_approximation: true
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 5
  truncated_importance_sampling_ratio_min: 0.2
  truncated_importance_sampling_type: tis
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: true
  use_kl_in_reward: false

# =============================================================================
# Policy
# =============================================================================
policy:
  model_name: null
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}

  train_global_batch_size: 512
  train_micro_batch_size: 1
  generation_batch_size: 64
  logprob_batch_size: 1
  max_total_sequence_length: 196608
  precision: "bfloat16"
  logprob_chunk_size: 1024
  offload_optimizer_for_logprob: false

  dtensor_cfg:
    _v2: true
    enabled: false
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 2
    activation_checkpointing: true

    # TP=8 spans 2 GB200 nodes (4 GPUs each) via intra-rack NVLink.
    tensor_model_parallel_size: 8
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 32
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 32
    pipeline_dtype: ${policy.precision}
    sequence_parallel: true

    # MoE
    freeze_moe_router: true
    moe_router_dtype: "fp32"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 1.0e-3
    moe_router_enable_expert_bias: true
    moe_permute_fusion: true
    moe_enable_deepep: false
    moe_token_dispatcher_type: "flex"
    moe_flex_dispatcher_backend: "hybridep"
    moe_hybridep_num_sms: 32
    moe_aux_loss_coeff: 0.0
    moe_shared_expert_overlap: false
    use_gloo_process_groups: false

    # Compute
    apply_rope_fusion: true
    use_fused_weighted_squared_relu: true
    bias_activation_fusion: false
    defer_fp32_logits: true

    # Logging
    track_moe_metrics: true
    moe_per_layer_logging: true
    do_not_average_loss: true
    cp_normalize: true
    calculate_per_token_loss: true
    scale_loss_by_dp_cp_size: false

    # MTP — disabled
    mtp_loss_scaling_factor: 0.0
    mtp_use_repeated_layer: true
    mtp_num_layers: 0
    mtp_detach_heads: true

    optimizer:
      optimizer: "adam"
      lr: 3.0e-6
      min_lr: 3.0e-6
      weight_decay: 0.0
      bf16: true
      fp16: false
      params_dtype: "float32"

      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8

      sgd_momentum: 0.9

      use_distributed_optimizer: true
      use_precision_aware_optimizer: true

      clip_grad: ${policy.max_grad_norm}

      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 3e-7
      override_opt_param_scheduler: true

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: false
      overlap_param_gather: true
      average_in_collective: false
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"

    # FP8 — overridden by precision recipe in launch script
    fp8_cfg:
      enabled: false
      fp8: "e4m3"
      fp8_recipe: "mxfp8"
      fp8_param: false

    first_last_layers_bf16: true
    num_layers_at_start_in_bf16: 1
    num_layers_at_end_in_bf16: 1

    checkpoint:
      async_save: true
      ckpt_assume_constant_structure: true
      fully_parallel_save_process_group: "ep_dp"
      fully_parallel_load_process_group: "ep_dp"
      fully_parallel_load_exchange_algo: "broadcast"

    env_vars: null

  # ---------------------------------------------------------------------------
  # Sequence Packing
  # ---------------------------------------------------------------------------
  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: true
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64
    fuse_loss: true

  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  max_grad_norm: 1.0
  optimizer: null
  scheduler: null

  # ---------------------------------------------------------------------------
  # Generation (vLLM) — Non-colocated, async
  # ---------------------------------------------------------------------------
  generation:
    port_range_low: 11001
    port_range_high: 15000
    backend: "vllm"
    max_new_tokens: ${policy.max_total_sequence_length}
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: true
      precision: ${policy.precision}
      kv_cache_dtype: "auto"
      tensor_parallel_size: 8
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.8
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 0.5
      expose_http_server: true
      skip_tokenizer_init: false
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_coder
        reasoning_parser: nano_v3
        reasoning_parser_plugin: nemo_rl/utils/nano_v3_reasoning_parser.py

    vllm_kwargs:
      attention_backend: FLASH_ATTN
      mamba_ssm_cache_dtype: "float32"
      compilation_config:
        cudagraph_capture_sizes: [1,2,4,8,16,32,64]
        pass_config:
          fuse_allreduce_rms: false

    colocated:
      enabled: false
      resources:
        gpus_per_node: 4
        num_nodes: 64

# =============================================================================
# Data
# =============================================================================
data:
  max_input_seq_length: null
  shuffle: false
  num_workers: 1
  train:
    data_path: null   # Set by launch script
  validation:
    data_path: null   # Set by launch script
  default:
    dataset_name: NemoGymDataset
    env_name: "nemo_gym"
    prompt_file: null
    system_prompt_file: null
    processor: "nemo_gym_data_processor"

# =============================================================================
# Environment — NeMo Gym + SWE Agents
# =============================================================================
env:
  should_use_nemo_gym: true
  should_log_nemo_gym_responses: true
  nemo_gym:
    nemo_gym_log_dir: "logs/nemo_gym"
    skip_venv_if_present: false
    num_gpu_nodes: 0
    port_range_low: 15001
    port_range_high: 20000
    invalid_tool_call_patterns:
      - "<tool_call>"
      - "</tool_call>"
      - "<function_call>"
      - "</function_call>"
    thinking_tags:
      - "<think>"
      - "</think>"
    config_paths:
    - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
    - responses_api_agents/swe_agents/configs/swebench_openhands_training.yaml
    # Model-specific (Nemotron chat template): keep reasoning in the multi-turn SWE
    # agent history so the trajectory grows monotonically for token-in-token-out RL.
    policy_model:
      responses_api_models:
        vllm_model:
          chat_template_kwargs:
            enable_thinking: true
            truncate_history_thinking: false
          sequential_reasoning_allowed: false
    swe_agents_train:
      responses_api_agents:
        swe_agents:
          agent_max_turns: 200
          concurrency: ${mul:2, ${mul:${grpo.num_prompts_per_step}, ${grpo.num_generations_per_prompt}}}
          swebench_agent_timeout: 3600
          run_with_mixed_prompts: true
          dataset_path: ${data.train.data_path}
          apptainer_memory_limit_mb: 65536
          container_formatter:
            - "${sif_dir}/swerebench/{instance_id}.sif"
            - "${sif_dir}/swegym/sweb.eval.arm64.{instance_id}.sif"
    swe_agents_val:
      responses_api_agents:
        swe_agents:
          agent_max_turns: 200
          concurrency: ${mul:2, ${mul:${grpo.num_prompts_per_step}, ${grpo.num_generations_per_prompt}}}
          swebench_agent_timeout: 3600
          dataset_path: ${data.validation.data_path}
          apptainer_memory_limit_mb: 65536
          container_formatter: ${env.nemo_gym.swe_agents_train.responses_api_agents.swe_agents.container_formatter}
    use_absolute_ip: true

# =============================================================================
# Logger
# =============================================================================
logger:
  log_dir: "logs"
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  monitor_gpus: true
  swanlab_enabled: false
  wandb:
    project: "ultra-v3-swe-e2e"
    name: "grpo-ultra-e2e"
  tensorboard: {}
  mlflow:
    experiment_name: "grpo-ultra-e2e"
    run_name: "grpo-ultra-e2e"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

# =============================================================================
# Effort Levels
# =============================================================================
effort_levels:
  low_string: "{reasoning effort: efficient}"
  low_weight: 0.1
  low_penalty: 1
  low_ub: 15000

# =============================================================================
# Token IDs (model-specific, used by token-based penalties)
# =============================================================================
token_ids:
  eos: 2           # </s>
  think_open: 12   # <think>
  think_close: 13  # </think>

# =============================================================================
# Reward Penalties (set reward to 0 when triggered)
# =============================================================================
penalize_duplicated_reasoning: true   # reasoning content == final answer
penalize_empty_final_answer: true     # last message output has empty content
penalize_eos_token: true              # eos token appears in generation
penalize_malformed_think_tag: true     # <think>/<\/think> count != 1 per turn
