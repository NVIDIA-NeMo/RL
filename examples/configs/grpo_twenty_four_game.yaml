# GRPO Algorithm Configuration for 24 Game
defaults: "grpo_math_1B.yaml"

grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  max_rollout_turns: 1
  max_num_steps: 200
  seed: 42

checkpointing:
  enabled: true
  checkpoint_dir: "results/grpo-twenty-four-game"
  metric_name: null
  higher_is_better: true
  keep_top_k: 3
  save_period: 50

policy:
  model_name: "Qwen/Qwen3-0.6B"
  max_total_sequence_length: 2048

  dtensor_cfg:
    enabled: true
    cpu_offload: true
    activation_checkpointing: true
    sequence_parallel: true

  generation:
    backend: "vllm"
    max_new_tokens: 1024
    temperature: 1.0
    top_p: 0.999
    top_k: 10000
    vllm_cfg:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.6
      max_model_len: ${policy.max_total_sequence_length}

data:
  shuffle: false

env:
  twenty_four_game:
    cfg: {}

logger:
  log_dir: "logs"
  wandb_enabled: true
  wandb:
    project: "nemo-rl-native-env"
    name: "grpo-24-game-v2"
