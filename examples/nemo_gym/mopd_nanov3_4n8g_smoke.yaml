# MOPD smoke check on H100 (4 nodes x 8 GPUs).
#
# Cluster shape:
#   * 2 policy nodes (training + colocated vLLM)         -> TP=2, PP=2, CP=4, EP=8
#   * 2 teacher nodes (non-colocated inference workers)  -> TP=2, PP=2, CP=4, EP=8
#
# Same model on student and teacher so the OPD loss should be ~0 every step.
# To run the real training (base student / trained teacher), override
# `policy.model_name=<base-model-path>` from the launcher and leave the
# teacher path alone.
#
# Sized for fast iteration:
#   * max_num_steps         5
#   * max_total_sequence_length 4096
#   * num_prompts_per_step  8
#   * num_generations_per_prompt 4
#   * train_global_batch_size 32  (= 8 * 4, no grad accum)

grpo:
  num_prompts_per_step: 8
  num_generations_per_prompt: 4
  num_val_generations_per_prompt: 1
  max_rollout_turns: 1
  max_num_epochs: 1
  max_num_steps: 5
  normalize_rewards: true
  use_leave_one_out_baseline: true
  val_period: 1000
  val_at_start: false
  val_at_end: false
  overlong_filtering: true
  max_val_samples: null
  val_batch_size: 32
  seed: 42

  # MOPD requires async GRPO + non-colocated teacher.
  async_grpo:
    enabled: true
    max_trajectory_age_steps: 1

  # MOPD: OPD advantage estimator (uses teacher logprobs).
  adv_estimator:
    name: opd

  batch_multiplier: 1
  use_dynamic_sampling: false
  reward_shaping:
    enabled: false
  reward_scaling:
    enabled: false

  # Non-null threshold requires prev_logprobs (force_on_policy_ratio must be false).
  seq_logprob_error_threshold: 2.0

loss_fn:
  reference_policy_kl_penalty: 0.0
  reference_policy_kl_type: k3
  kl_input_clamp_value: null
  kl_output_clamp_value: null

  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: null

  use_on_policy_kl_approximation: true
  # MOPD Eq. 7 — REINFORCE-style update (no PPO ratio).
  disable_ppo_ratio: true
  # MOPD Eq. 8 — IS truncation via ICE-POP hard gate.
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 5.0       # epsilon_high
  truncated_importance_sampling_ratio_min: 0.2   # epsilon_low
  truncated_importance_sampling_type: "icepop"
  sequence_level_importance_ratios: false
  token_level_loss: true
  # Off for the smoke so prev_logprobs are computed (required by
  # seq_logprob_error_threshold). Hard requirement when true:
  #   train_global_batch_size == num_prompts_per_step * num_generations_per_prompt
  force_on_policy_ratio: false
  use_kl_in_reward: false

checkpointing:
  enabled: false
  checkpoint_dir: "results/mopd-nanov3-smoke"
  metric_name: "val:total_reward/mean"
  higher_is_better: true
  keep_top_k: 1
  save_period: 1000
  checkpoint_must_save_by: "00:03:40:00"
  save_optimizer: false

policy:
  model_name: "/path/to/hf_checkpoint"   # set by launcher (student)
  tokenizer:
    name: ${policy.model_name}
  train_global_batch_size: 32
  train_micro_batch_size: 1
  generation_batch_size: 64
  logprob_batch_size: 1
  max_total_sequence_length: 8192
  precision: "bfloat16"
  logprob_chunk_size: 2048

  dtensor_cfg:
    _v2: true
    enabled: false
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 1
    activation_checkpointing: true
    bias_activation_fusion: false
    # Non-colocated layout on 4 H100 nodes (VARIANT A — DP=2, CP=1):
    #   teacher: 1 node  (8 GPUs, TP=2 PP=2 CP=1 EP=2)
    #   vLLM:    1 node  (8 GPUs, TP=4 -> 2 replicas)
    #   policy:  2 nodes (16 GPUs, TP=2 PP=2 CP=1 EP=2 = world 4, DP=4)
    # CP=1 because sequence_packing is temporarily disabled (transitive
    # mamba-ssm in mcore extra got the PyPI version, broken against
    # transformers v5 — fix tracked separately). mcore enforces
    # "Sequence Packing must be enabled to use Context Parallelism".
    tensor_model_parallel_size: 2
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 2
    pipeline_model_parallel_size: 2
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    # Re-enabled: with make_sequence_length_divisible_by=8 applied to BOTH
    # policy training and teacher logprob paths (fix in
    # trajectory_collector.py:595), reduce_scatter_to_sequence_parallel_region
    # gets a TP-divisible seq dim. mcore MoE also requires SP when TP>1.
    sequence_parallel: true
    freeze_moe_router: true
    moe_router_dtype: "fp32"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 1e-3
    moe_permute_fusion: true
    moe_enable_deepep: false
    moe_token_dispatcher_type: "alltoall"
    moe_aux_loss_coeff: 0.0
    moe_router_enable_expert_bias: true
    apply_rope_fusion: true
    defer_fp32_logits: true
    track_moe_metrics: true
    moe_per_layer_logging: true
    moe_shared_expert_overlap: false
    gradient_accumulation_fusion: false

    optimizer:
      optimizer: "adam"
      lr: 3e-6
      min_lr: 3e-6
      weight_decay: 0.0
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      clip_grad: ${policy.max_grad_norm}
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 3.0e-7

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      average_in_collective: false
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"

    env_vars: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  # Temporarily disabled: with sequence_packing=true on Mamba layers,
  # mamba_mixer._ssm_training invokes _check_mamba_sequence_packing_support
  # which imports mamba_ssm. The mcore venv's PyPI mamba_ssm 2.2.6.post3 is
  # incompatible with transformers v5 (uses removed GreedySearchDecoderOnlyOutput).
  # Root cause: tool.uv.sources git-rev override on mamba-ssm doesn't apply to
  # transitive deps (mcore pulls mamba-ssm only via megatron-bridge's static metadata).
  # Fix is to add "mamba-ssm" directly to the mcore extra in pyproject.toml; tracked
  # separately. Disabling packing here is a workaround.
  sequence_packing:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  # CP=2 with TP=2 needs make_sequence_length_divisible_by >= cp_size*2*tp_size = 8.
  make_sequence_length_divisible_by: 8
  max_grad_norm: 1.0

  optimizer: null
  scheduler: null

  offload_optimizer_for_logprob: false

  generation:
    backend: "vllm"
    # vLLM rejects with HTTP 400 if prompt + max_new_tokens > max_model_len.
    # Real nano-v3 chat prompts run ~2000+ tokens with system + user content;
    # a 2048 budget for both prompt and generation hits the 4096 cap. Raise
    # max_total_sequence_length to 8192 (see policy.max_total_sequence_length
    # below) and keep max_new_tokens at 2048 so prompts can run up to 6144.
    max_new_tokens: 2048
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: true
      kv_cache_dtype: auto
      precision: ${policy.precision}
      tensor_parallel_size: 4
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.5
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      expose_http_server: true
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_coder
        reasoning_parser: deepseek_r1

    vllm_kwargs:
      mamba_ssm_cache_dtype: "float32"
      compilation_config:
        backend: eager

    colocated:
      # Async GRPO requires non-colocated inference (MOPD requires async).
      enabled: false
      resources:
        gpus_per_node: 8
        num_nodes: 1

data:
  max_input_seq_length: null
  shuffle: false
  num_workers: 1
  use_multiple_dataloader: false
  train:
    data_path: "/path/to/train.jsonl"
  validation:
    data_path: "/path/to/validation.jsonl"
  default:
    dataset_name: NemoGymDataset
    env_name: "nemo_gym"
    prompt_file: null
    system_prompt_file: null
    processor: "nemo_gym_data_processor"

env:
  should_use_nemo_gym: true
  nemo_gym:
    config_paths:
    - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
    - resources_servers/math_with_judge/configs/math_with_judge.yaml
    - resources_servers/code_gen/configs/code_gen.yaml
    - resources_servers/workplace_assistant/configs/workplace_assistant.yaml
    - resources_servers/mcqa/configs/mcqa.yaml
    - resources_servers/instruction_following/configs/instruction_following.yaml
    - resources_servers/structured_outputs/configs/structured_outputs_json.yaml
    math_with_judge:
      resources_servers:
        math_with_judge:
          judge_model_server:
            name: policy_model
          should_use_judge: false
    code_gen:
      resources_servers:
        code_gen:
          num_processes: 1024
          unit_test_timeout_secs: 10
          debug: false

logger:
  log_dir: "logs"
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: true
  mlflow_enabled: false
  monitor_gpus: true
  swanlab_enabled: false
  wandb:
    project: "mopd-smoke"
    name: "mopd-nanov3-4n8g-smoke"
  tensorboard: {}
  mlflow:
    experiment_name: "mopd-smoke"
    run_name: "mopd-nanov3-4n8g-smoke"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 8
  num_nodes: 4   # TOTAL nodes in the Ray cluster; MOPD subtracts opd_teacher_nodes (2) to get policy_nodes (2)

# MOPD: on-policy distillation with non-colocated teachers.
# For the sanity check, the teacher path equals the student path -> loss ~= 0.
on_policy_distillation:
  enabled: true
  use_orm_advantage: false
  orm_advantage_weight: 0.0
  teacher_model_by_agent_name:
    default_teacher: "/path/to/hf_checkpoint"   # set by launcher (teacher)
  default_teacher_alias: default_teacher
  strict_agent_name_match: false
  deduplicate_shared_teacher_checkpoints: true
  non_colocated_teachers:
    enabled: true
    default_teacher_cfg:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 2
      expert_model_parallel_size: 2
      # CP=1 because sequence_packing is disabled (see policy.megatron_cfg).
      # mcore enforces "Sequence Packing must be enabled to use CP".
      context_parallel_size: 1
      num_nodes: 1
      gpus_per_node: 8
      precision: bf16
      micro_batch_size: 1
