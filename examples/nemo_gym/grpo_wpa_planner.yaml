# Planner scale-up load-source recipe: workplace_assistant via Dynamo.
#
# Pure-LLM load generator (no singularity / SWE-bench overhead) used
# to push a single Dynamo decode worker's KV cache past the planner's
# 40% scale-up threshold:
#   * num_prompts_per_step × num_generations_per_prompt = 32 × 8
#     = 256 rollouts in flight per step (each prompt/generation runs
#     as its own Ray task — no rollout-runner concurrency cap on the
#     WPA agent).
#   * Each rollout is simple_agent's tool-call loop on
#     workplace_assistant — chat traffic only, so the load lands
#     almost entirely on the decoder's KV cache rather than the
#     gym worker's CPU.
#
# Pair this recipe with a planner-enabled DGD (Frontend + Planner
# service + 1 initial VllmDecodeWorker, max_gpu_budget=4). The
# planner observes FPM, sees KV utilization climb past the static
# `latency` scale-up threshold (40%), and bumps replicas up toward
# the cap.

defaults: grpo_workplace_assistant_dynamo_smoke.yaml

grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 8
  max_rollout_turns: 1
  max_num_steps: 2
  val_period: 999999
  val_at_start: false
  val_at_end: false

policy:
  train_global_batch_size: ${mul:${grpo.num_prompts_per_step}, ${grpo.num_generations_per_prompt}}
  train_micro_batch_size: 1
  logprob_batch_size: 1

logger:
  log_dir: "logs/grpo-wpa-planner"
