defaults: "grpo_nanov3.yaml"

grpo:
  async_grpo:
    enabled: true
    # Limits stale trajectories. Higher values can improve speed, but may be
    # more aggressive in terms of model accuracy.
    max_trajectory_age_steps: 1
    # Lets generation workers receive weight updates while new rollouts are in flight.
    in_flight_weight_updates: true
    # Configurable knob on reusing the existing KV cache across weight updates.
    recompute_kv_cache_after_weight_updates: false

loss_fn:
  # Required for async mode because trajectories may be generated by a slightly
  # older policy than the one used for training.
  use_importance_sampling_correction: True
  # Truncates importance weights to reduce sensitivity to train/generation
  # logprob mismatch from the MoE + vLLM backend.
  truncated_importance_sampling_type: tis
  # If truncated_importance_sampling_type is tis, this cannot be null.
  truncated_importance_sampling_ratio: 5.0
  # Optional: set to true to force the PPO ratio to 1.0
  force_on_policy_ratio: false

policy:
  generation:
    colocated:
      # Uses dedicated generation resources instead of sharing training GPUs.
      enabled: false
      resources:
        gpus_per_node: 8
        # Reserve generation nodes here. Training nodes = total num_nodes - generation nodes.
        num_nodes: 16
