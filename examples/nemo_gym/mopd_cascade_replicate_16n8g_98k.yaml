# Internal MOPD recipe replicating the Nemotron-Cascade MOPD run, FAITHFUL 98k variant.
# Source recipe: /lustre/fs1/portfolios/coreai/users/yifuw/cascade/mopd_v2_ifwork.yaml
# (ran on a DIFFERENT MOPD impl; the CODE here is ported from ultra-v3-posttraining and
#  verified on this recipe). This repo's MOPD = run_grpo_nemo_gym.py +
#  on_policy_distillation + non-colocated teachers.
#
# Faithful to the source: student/reference/teachers + per-agent routing, multidomain_v2
# data, lr/warmup/batch, eps_low/eps_high, disable_ppo_ratio, max_total_sequence_length
# 98304, max_new_tokens 98304, sequence packing.
#
# Deviations required by this repo's MOPD architecture:
#   1. async_grpo.enabled=true + adv_estimator=opd (this impl's OPD needs async GRPO +
#      non-colocated teachers; source used async_grpo=false).
#   2. eps_low(0.5)/eps_high(2.0) -> loss_fn ICE-POP (this impl has no eps field on
#      on_policy_distillation; the OPD advantage + loss_fn express it).
#   3. reference_model_name omitted (KL penalty=0 in the source -> unused).
#
# Hardware adaptation: the source ran on GB200 (192 GB). On H100 (80 GB) here, CP=4
# (results-equivalent to the source CP=8 — CP only shards the sequence) keeps per-rank
# tokens (98304/4) below the validated 32k/CP1 run, so it fits 80 GB.
#
# Teachers (paths point at the copied checkpoints):
#   * safetensors-checkpoint-0033000 (AceMath SFT)  -> math_with_judge   [default]
#   * nano_v3 ...ifrl...stage2 (= student)          -> instruction_following,
#       workplace_assistant, mcqa, structured_outputs, code_opd
#   * nano_v3 ...rlvr...stage2 (= reference)         -> rlhf_opd
#
# Gym: opd_proxy_reward server + code_opd/rlhf_opd agents come from
# patches/gym/opd_proxy_reward.patch (applied to the gym the launcher mounts).
#
# Cluster shape (16 nodes x 8 GPUs):
#   * 8 policy nodes  (TP=2 PP=2 CP=4 EP=4 -> DP=4)
#   * 5 vLLM gen nodes (TP=8 -> 5 replicas; generation is ~96% of step time, so
#     more replicas ~linearly speed up the throughput-bound rollouts)
#   * 3 teacher nodes (one per unique checkpoint, TP=2 PP=1 CP=4 EP=2)

grpo:
  num_prompts_per_step: 128
  num_generations_per_prompt: 4
  num_val_generations_per_prompt: 1
  max_rollout_turns: 1
  max_num_epochs: 2
  max_num_steps: 200
  normalize_rewards: true
  use_leave_one_out_baseline: false
  val_period: 100
  val_at_start: false
  val_at_end: false
  overlong_filtering: true
  max_val_samples: null
  val_batch_size: 128
  seed: 42

  # This repo's OPD requires async GRPO + non-colocated teachers
  # (the source ran a different impl with async_grpo=false).
  async_grpo:
    enabled: true
    max_trajectory_age_steps: 1

  adv_estimator:
    name: opd

  batch_multiplier: 1
  use_dynamic_sampling: false
  reward_shaping:
    enabled: false
  reward_scaling:
    enabled: false

  seq_logprob_error_threshold: 2.0

loss_fn:
  reference_policy_kl_penalty: 0.0
  reference_policy_kl_type: k3
  kl_input_clamp_value: null
  kl_output_clamp_value: null

  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: null

  use_on_policy_kl_approximation: true
  disable_ppo_ratio: true
  # Source on_policy_distillation eps_low=0.5 / eps_high=2.0 -> ICE-POP gate here.
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 2.0       # eps_high
  truncated_importance_sampling_ratio_min: 0.5   # eps_low
  truncated_importance_sampling_type: "icepop"
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: false
  use_kl_in_reward: false

checkpointing:
  enabled: true
  checkpoint_dir: "results/mopd-cascade-replicate"
  metric_name: "val:total_reward/mean"
  higher_is_better: true
  keep_top_k: 1000000
  save_period: 5
  checkpoint_must_save_by: null   # no wall-time save deadline; save_period handles it (don't cut the session short)
  save_optimizer: true   # save optimizer + LR-scheduler state so resumes continue the warmup/schedule (don't restart it)

policy:
  # Student = nano_v3 ...ifrl...stage2 (source policy.model_name). Override from launcher.
  model_name: "/lustre/fs1/portfolios/coreai/users/yifuw/cascade/checkpoints/nano_v3_oursft_33k_ifrl_stage1_dapo_step_180-workbench-stage2"
  tokenizer:
    name: ${policy.model_name}
  train_global_batch_size: 512
  train_micro_batch_size: 1
  generation_batch_size: 64
  logprob_batch_size: 1
  max_total_sequence_length: 98304
  precision: "bfloat16"
  logprob_chunk_size: 512

  dtensor_cfg:
    _v2: true
    enabled: false
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 1
    activation_checkpointing: true
    bias_activation_fusion: false
    monitor_moe_load_balancing: true
    tensor_model_parallel_size: 2
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 4
    pipeline_model_parallel_size: 2
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 4
    pipeline_dtype: ${policy.precision}
    sequence_parallel: true
    freeze_moe_router: true
    moe_router_dtype: "fp32"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 1e-3
    moe_permute_fusion: true
    moe_enable_deepep: false
    moe_token_dispatcher_type: "alltoall"
    moe_aux_loss_coeff: 0.0
    moe_router_enable_expert_bias: true
    apply_rope_fusion: true
    defer_fp32_logits: true
    track_moe_metrics: true
    moe_per_layer_logging: true
    moe_shared_expert_overlap: false
    gradient_accumulation_fusion: false

    optimizer:
      optimizer: "adam"
      lr: 2e-6
      min_lr: 2e-6
      weight_decay: 0.0
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      clip_grad: ${policy.max_grad_norm}
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: null
      lr_warmup_iters: 30
      lr_warmup_init: 2.0e-7
      # take schedule params from this config on resume instead of asserting they
      # match the checkpoint (required after changing max_num_steps; LR is constant)
      override_opt_param_scheduler: true

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      average_in_collective: false
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"

    env_vars: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: true
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  make_sequence_length_divisible_by: 16   # 2*CP(4)*TP(2)
  max_grad_norm: 1.0

  optimizer: null
  scheduler: null

  offload_optimizer_for_logprob: false

  generation:
    backend: "vllm"
    max_new_tokens: 98304
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: true
      kv_cache_dtype: auto
      precision: ${policy.precision}
      tensor_parallel_size: 8
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.8
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      expose_http_server: true
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_coder
        reasoning_parser: deepseek_r1

    vllm_kwargs:
      mamba_ssm_cache_dtype: "float32"
      compilation_config:
        backend: eager

    colocated:
      enabled: false
      resources:
        gpus_per_node: 8
        num_nodes: 5

data:
  max_input_seq_length: null
  shuffle: false
  num_workers: 1
  use_multiple_dataloader: false
  train:
    data_path: "/lustre/fs1/portfolios/coreai/users/yifuw/cascade/data/train_opd_multidomain_v2_comprehensive.jsonl"
  validation:
    data_path: "/lustre/fs1/portfolios/coreai/users/yifuw/cascade/data/math_val.jsonl"
  default:
    dataset_name: NemoGymDataset
    env_name: "nemo_gym"
    prompt_file: null
    system_prompt_file: null
    processor: "nemo_gym_data_processor"

env:
  should_use_nemo_gym: true
  nemo_gym:
    config_paths:
    - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
    - resources_servers/math_with_judge/configs/math_with_judge.yaml
    - resources_servers/workplace_assistant/configs/workplace_assistant.yaml
    - resources_servers/mcqa/configs/mcqa.yaml
    - resources_servers/instruction_following/configs/instruction_following.yaml
    - resources_servers/structured_outputs/configs/structured_outputs_json.yaml
    math_with_judge:
      resources_servers:
        math_with_judge:
          judge_model_server:
            name: policy_model
          should_use_judge: false
    # code_opd/rlhf_opd: verifier-less OPD domains -> stock simple_agent generates with
    # the policy and skips verification (reward unused; use_orm_advantage=false).
    # resources_server is required by schema but never called -> reuse math_with_judge.
    code_opd_simple_agent:
      responses_api_agents:
        simple_agent:
          entrypoint: app.py
          skip_verification: true
          model_server:
            type: responses_api_models
            name: policy_model
          resources_server:
            type: resources_servers
            name: math_with_judge
    rlhf_opd_simple_agent:
      responses_api_agents:
        simple_agent:
          entrypoint: app.py
          skip_verification: true
          model_server:
            type: responses_api_models
            name: policy_model
          resources_server:
            type: resources_servers
            name: math_with_judge

logger:
  log_dir: "logs"
  num_val_samples_to_print: 0
  wandb_enabled: true
  tensorboard_enabled: true
  mlflow_enabled: false
  monitor_gpus: true
  swanlab_enabled: false
  wandb:
    project: "mopd-cascade-replicate"
    # Fixed name (no timestamp) so relaunches/resumes group together in wandb.
    name: "mopd-cascade-98k-16n-clean-20260615"
  tensorboard: {}
  mlflow:
    experiment_name: "mopd-cascade-replicate"
    run_name: "mopd-cascade-replicate"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 8
  num_nodes: 16   # 8 policy (TP2/PP2/CP4/EP4) + 5 vLLM (TP8 replicas, gen throughput) + 3 teachers (TP2/PP1/CP4/EP2)

on_policy_distillation:
  enabled: true
  use_orm_advantage: false
  orm_advantage_weight: 0.0
  teacher_model_by_agent_name:
    # AceMath SFT teacher (source default_teacher_alias = math_with_judge_simple_agent).
    math_with_judge_simple_agent: "/lustre/fs1/portfolios/coreai/users/yifuw/cascade/checkpoints/safetensors-checkpoint-0033000"
    # nano_v3 ifrl teacher (= student) for IF / workplace / mcqa / structured / code.
    instruction_following_simple_agent: "/lustre/fs1/portfolios/coreai/users/yifuw/cascade/checkpoints/nano_v3_oursft_33k_ifrl_stage1_dapo_step_180-workbench-stage2"
    workplace_assistant_simple_agent: "/lustre/fs1/portfolios/coreai/users/yifuw/cascade/checkpoints/nano_v3_oursft_33k_ifrl_stage1_dapo_step_180-workbench-stage2"
    mcqa_simple_agent: "/lustre/fs1/portfolios/coreai/users/yifuw/cascade/checkpoints/nano_v3_oursft_33k_ifrl_stage1_dapo_step_180-workbench-stage2"
    structured_outputs_simple_agent: "/lustre/fs1/portfolios/coreai/users/yifuw/cascade/checkpoints/nano_v3_oursft_33k_ifrl_stage1_dapo_step_180-workbench-stage2"
    code_opd_simple_agent: "/lustre/fs1/portfolios/coreai/users/yifuw/cascade/checkpoints/nano_v3_oursft_33k_ifrl_stage1_dapo_step_180-workbench-stage2"
    # nano_v3 rlvr teacher (= source reference_model) for rlhf.
    rlhf_opd_simple_agent: "/lustre/fs1/portfolios/coreai/users/yifuw/cascade/checkpoints/nano_v3_oursft_33k_rlvr_stage1_nocode-v2_step_280_rlhf_stage2"
  default_teacher_alias: math_with_judge_simple_agent
  strict_agent_name_match: false
  deduplicate_shared_teacher_checkpoints: true
  non_colocated_teachers:
    enabled: true
    # One node per teacher: TP=2 PP=1 CP=4 EP=2 (CP=4 fits the 98304 inference forward).
    default_teacher_cfg:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 2
      context_parallel_size: 4
      num_nodes: 1
      gpus_per_node: 8
      precision: bf16
      micro_batch_size: 1
    teacher_overrides: {}
