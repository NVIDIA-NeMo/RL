grpo:
  num_prompts_per_step: 64
  num_generations_per_prompt: 16
  num_val_generations_per_prompt: 4
  max_rollout_turns: 1
  max_num_epochs: 1
  max_num_steps: 1000000
  normalize_rewards: true
  use_leave_one_out_baseline: true
  val_period: -1 # 5
  val_at_start: false
  val_at_end: false
  overlong_filtering: true
  max_val_samples: null
  val_batch_size: 256
  seed: 42
  async_grpo:
    enabled: true
    max_trajectory_age_steps: 1
  batch_multiplier: 1
  use_dynamic_sampling: false
  reward_shaping:
    enabled: false
  reward_scaling:
    enabled: false
  seq_logprob_error_threshold: 2
  skip_reference_policy_logprobs_calculation: false
loss_fn:
  reference_policy_kl_penalty: 0
  reference_policy_kl_type: k3
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.2
  ratio_clip_c: null
  use_on_policy_kl_approximation: false
  use_importance_sampling_correction: true
  sequence_level_importance_ratios: true
  token_level_loss: false
  truncated_importance_sampling_ratio: 3.0
  truncated_importance_sampling_ratio_min: null
  truncated_importance_sampling_type: tis
  force_on_policy_ratio: false
  use_kl_in_reward: false
checkpointing:
  enabled: false
  checkpoint_dir: results/grpo
  metric_name: val:total_reward/mean
  higher_is_better: true
  keep_top_k: 1000000
  save_period: 10
  checkpoint_must_save_by: 00:03:40:00
  save_optimizer: true
policy:
  model_name: /lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemorl/users/rohitkumarj/data/nano-v3-12b-hf
  tokenizer:
    name: /lustre/fs1/portfolios/coreai/projects/coreai_dlalgo_nemorl/users/rohitkumarj/data/nano-v3-12b-hf
  train_global_batch_size: 1024
  train_micro_batch_size: 1
  generation_batch_size: 64
  logprob_batch_size: 1
  max_total_sequence_length: 49152
  precision: bfloat16
  logprob_chunk_size: 2048
  dtensor_cfg:
    _v2: true
    enabled: false
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
  megatron_cfg:
    use_fused_weighted_squared_relu: false
    enabled: true
    empty_unused_memory_level: 1
    activation_checkpointing: false
    bias_activation_fusion: false
    tensor_model_parallel_size: 2
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 8
    pipeline_model_parallel_size: 2
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 8
    pipeline_dtype: bfloat16
    sequence_parallel: true
    freeze_moe_router: true
    moe_router_dtype: fp32
    moe_router_load_balancing_type: none
    moe_router_bias_update_rate: 0.001
    moe_permute_fusion: true
    moe_enable_deepep: false
    moe_token_dispatcher_type: alltoall
    moe_aux_loss_coeff: 0.0
    moe_router_enable_expert_bias: true
    apply_rope_fusion: true
    defer_fp32_logits: true
    track_moe_metrics: true
    moe_per_layer_logging: true
    moe_shared_expert_overlap: false
    gradient_accumulation_fusion: false
    optimizer:
      optimizer: adam
      lr: 3.0e-06
      min_lr: 3.0e-06
      weight_decay: 0.0
      bf16: true
      fp16: false
      params_dtype: float32
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1.0e-08
      sgd_momentum: 0.9
      clip_grad: 1.0
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0
    scheduler:
      start_weight_decay: 0.0
      end_weight_decay: 0.0
      weight_decay_incr_style: constant
      lr_decay_style: constant
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 3.0e-07
    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      average_in_collective: false
      use_custom_fsdp: false
      data_parallel_sharding_strategy: optim_grads_params
    env_vars: null
  dynamic_batching:
    enabled: false
    train_mb_tokens: 49152
    logprob_mb_tokens: 49152
    sequence_length_round: 64
  sequence_packing:
    enabled: true
    train_mb_tokens: 49152
    logprob_mb_tokens: 49152
    algorithm: modified_first_fit_decreasing
    sequence_length_round: 64
  make_sequence_length_divisible_by: 32
  max_grad_norm: 1.0
  optimizer: null
  scheduler: null
  offload_optimizer_for_logprob: false
  generation:
    backend: vllm
    max_new_tokens: 49152
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: true
      kv_cache_dtype: auto
      precision: bfloat16
      tensor_parallel_size: 4
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.5
      max_model_len: 49152
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      expose_http_server: true
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_coder
        reasoning_parser: deepseek_r1
    vllm_kwargs:
      mamba_ssm_cache_dtype: float32
      compilation_config:
        backend: eager
    colocated:
      enabled: false
      resources:
        gpus_per_node: 8
        num_nodes: 4
data:
  max_input_seq_length: null
  shuffle: false
  num_workers: 1
  use_multiple_dataloader: false
  train:
    data_path: /lustre/fsw/portfolios/coreai/users/haitianj/data/nanov3/train-split.jsonl
  validation:
    data_path: /lustre/fsw/portfolios/coreai/users/haitianj/data/nanov3/val-split.jsonl
  default:
    dataset_name: NemoGymDataset
    env_name: nemo_gym
    prompt_file: null
    system_prompt_file: null
    processor: nemo_gym_data_processor
env:
  should_use_nemo_gym: true
  nemo_gym:
    config_paths:
    - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
    - resources_servers/math_with_judge/configs/math_with_judge.yaml
    - resources_servers/code_gen/configs/code_gen.yaml
    - resources_servers/workplace_assistant/configs/workplace_assistant.yaml
    - resources_servers/mcqa/configs/mcqa.yaml
    - resources_servers/instruction_following/configs/instruction_following.yaml
    - resources_servers/structured_outputs/configs/structured_outputs_json.yaml
    math_with_judge:
      resources_servers:
        math_with_judge:
          judge_model_server:
            name: policy_model
          should_use_judge: false
    code_gen:
      resources_servers:
        code_gen:
          num_processes: 1024
          unit_test_timeout_secs: 10
          debug: false
    skip_venv_if_present: true
logger:
  log_dir: logs
  num_val_samples_to_print: 0
  wandb_enabled: true
  tensorboard_enabled: false
  mlflow_enabled: false
  monitor_gpus: true
  swanlab_enabled: false
  wandb:
    project: grpo-dev
    name: grpo-nanov3-32nodes-logger
  tensorboard: {}
  mlflow:
    experiment_name: grpo-dev
    run_name: grpo-dev-logger
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10
cluster:
  gpus_per_node: 8
  num_nodes: 8