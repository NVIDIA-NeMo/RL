# Stage 2.1 (SWE 1) smoke — Nano-30B-A3B policy, NO GPU judges.
#
# Inherits small_stage2_swe1_9node.yaml and shrinks the policy to a single training node,
# applying the same fixes validated on the nano RLVR smoke (short seqlen, optimizer offload,
# wider async age window). swe1 has no GPU judges, so the whole job is 2 nodes.
#
#   - Policy train: 1 node -> TP2 x PP1 x EP8 x CP1 (DP4, EP8 = DP*TP)
#   - Policy gen:   1 node -> vLLM TP8
#   - cluster.num_nodes = 2; SBATCH_NUM_NODES=2 (no judge nodes).
#
# Set MODEL_PATH=/lustre/fs1/portfolios/coreai/users/yifuw/checkpoints/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
defaults: "small_stage2_swe1_9node.yaml"

checkpointing:
  checkpoint_dir: "results/super_v3_smoke_stage2_swe1_nano30b_2node"
  # Resume-safe: CPU-offload optimizer KeyErrors on load_state_dict during resume; push
  # save_period past the smoke length so no resumable checkpoint is written mid-run.
  save_period: 1000
  save_optimizer: false

grpo:
  num_prompts_per_step: 4
  num_generations_per_prompt: 4
  async_grpo:
    max_trajectory_age_steps: 4   # absorb generation lag on the small-batch smoke

data:
  # Cap prompt length below max_model_len so over-long prompts are capped at the
  # dataloader instead of being rejected by vLLM (prompt>=max_model_len -> 400/422).
  max_input_seq_length: 28672   # leave ~4096 for the (short) tool-call output

policy:
  train_global_batch_size: 16
  max_total_sequence_length: 32768   # smoke: fits ~78% of swe prompts (p50~20k tok); offload handles mem
  generation:
    max_new_tokens: 4096   # cap output so prompt+gen <= max_total_sequence_length
    colocated:
      resources:
        num_nodes: 1
    vllm_cfg:
      tensor_parallel_size: 8
  megatron_cfg:
    tensor_model_parallel_size: 2
    pipeline_model_parallel_size: 1
    expert_model_parallel_size: 8
    context_parallel_size: 1
    optimizer:
      params_dtype: "bfloat16"
      use_precision_aware_optimizer: false
      optimizer_cpu_offload: true            # optimizer-step OOM fix
      optimizer_offload_fraction: 1.0
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

cluster:
  num_nodes: 2
