# Prod-test of stage1_rlvr on H100 (80GB) at MINIMUM nodes, keeping prod context (65536),
# global batch (4096), and data. The base stage1_rlvr.yaml is tuned for B200 (192GB) at 109 nodes.
#
# World size = TP * PP * CP * DP  (EP is NOT a multiplicand; experts are carved from this pool via
# EDP = world / (ETP*EP*PP) -- see megatron/core/parallel_state.py:733,786). So one DP=1 replica:
#   TP4 * CP8 * PP1 = 32 GPUs = 4 train nodes.
#
# H100 adaptations vs prod (B200):
#   - EP 8 -> 16: shard the 512 experts (99% of params) 16-ways so weights+grads fit 80GB.
#   - optimizer_cpu_offload: the ~1.4TB fp32 Adam state can't sit on 80GB; offload to host RAM
#     (fp32 master / precision-aware optimizer preserved -> numerically identical to prod).
#   - gen vLLM TP 4 -> 8: 231GB bf16 won't fit on 4x80GB; TP8 = 1 node.
#   - judges DP -> 1 (same prod 235B models, single replica) -> num_gpu_nodes 5 -> 3.
#
# SBATCH_NUM_NODES=8  ==  cluster.num_nodes=5 (4 train + 1 gen)  +  num_gpu_nodes=3 (judges).
# MODEL_PATH stays the prod Super checkpoint (rs-feb5_iter350), set at launch.
defaults: "stage1_rlvr.yaml"

checkpointing:
  # CPU-offload optimizer KeyErrors on load_state_dict during resume; push save_period past the
  # test length so no resumable ckpt is written mid-run.
  save_period: 1000

policy:
  generation:
    colocated:
      resources:
        num_nodes: 1            # 1 dedicated H100 node for policy vLLM generation
    vllm_cfg:
      tensor_parallel_size: 8   # 231GB bf16 won't fit on 4x80GB; TP8 = 1 node (mamba KV is tiny)
  megatron_cfg:
    tensor_model_parallel_size: 4    # keep prod TP4 (mamba n_groups=8 caps TP<=8; dense is ~1% of params)
    context_parallel_size: 8         # keep prod CP8 for the 65536-token activations (8192 tok/rank)
    pipeline_model_parallel_size: 1
    expert_model_parallel_size: 16   # was 8; shard 512 experts 16-ways (28 vs 57 GB expert w+g per rank)
    expert_tensor_parallel_size: 1
    optimizer:
      optimizer_cpu_offload: true    # move the fp32 Adam states off-GPU; keeps prod fp32 master
      optimizer_offload_fraction: 1.0
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

env:
  nemo_gym:
    num_gpu_nodes: 3   # genrm TP8 (1 node) + nl2bash TP8 (1 node) + safety TP1 -> 17 GPUs -> 3 nodes
    genrm_model:
      responses_api_models:
        genrm_model:
          vllm_serve_kwargs:
            data_parallel_size: 1   # prod 2; one replica for the test (keep TP8)
    nl2bash_judge_model:
      responses_api_models:
        local_vllm_model:
          vllm_serve_kwargs:
            data_parallel_size: 1   # prod 2 (keep TP8)
    safety_judge_model:
      responses_api_models:
        local_vllm_model:
          vllm_serve_kwargs:
            data_parallel_size: 1   # prod 8 (keep TP1)

cluster:
  num_nodes: 5   # 4 train (TP4*CP8*PP1=32 GPUs) + 1 gen (TP8). +3 judge nodes at launch -> SBATCH=8.
