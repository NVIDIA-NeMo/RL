# Stage 2.2 (SWE 2) smoke — Nano-30B-A3B policy, NO GPU judges.
#
# Inherits small_stage2_swe2_9node.yaml; shrinks the policy to one training node with the
# validated nano fixes. Still the full OpenHands SWE-bench agent, so SANDBOX_CONTAINER +
# SIF_DIR are required at launch. 2 nodes total (no GPU judges).
#
#   - Policy train: 1 node -> TP2 x PP1 x EP8 x CP1
#   - Policy gen:   1 node -> vLLM TP8
#   - cluster.num_nodes = 2; SBATCH_NUM_NODES=2.
#
# Set MODEL_PATH=/lustre/fs1/portfolios/coreai/users/yifuw/checkpoints/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
defaults: "small_stage2_swe2_9node.yaml"

checkpointing:
  checkpoint_dir: "results/super_v3_smoke_stage2_swe2_nano30b_2node"
  # Resume-safe: CPU-offload optimizer KeyErrors on load_state_dict during resume; push
  # save_period past the smoke length so no resumable checkpoint is written mid-run.
  save_period: 1000

grpo:
  num_prompts_per_step: 8
  num_generations_per_prompt: 4
  async_grpo:
    max_trajectory_age_steps: 4

data:
  # Cap prompt length below max_model_len so over-long prompts are capped at the
  # dataloader instead of being rejected by vLLM (prompt>=max_model_len -> 400/422).
  max_input_seq_length: 28672   # leave ~4096 for the (short) tool-call output

policy:
  train_global_batch_size: 32
  max_total_sequence_length: 32768   # smoke: fits ~78% of swe prompts (p50~20k tok); offload handles mem
  generation:
    max_new_tokens: 4096   # cap output so prompt+gen <= max_total_sequence_length
    colocated:
      resources:
        num_nodes: 1
    vllm_cfg:
      tensor_parallel_size: 8
  megatron_cfg:
    tensor_model_parallel_size: 2
    pipeline_model_parallel_size: 1
    expert_model_parallel_size: 8
    context_parallel_size: 1
    optimizer:
      params_dtype: "bfloat16"
      use_precision_aware_optimizer: false
      optimizer_cpu_offload: true
      optimizer_offload_fraction: 1.0
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

env:
  nemo_gym:
    swe_agents_train:
      responses_api_agents:
        swe_agents:
          concurrency: 8
          # Cap episode length so the OpenHands history stays inside the smoke context
          # (max_total_sequence_length=32768). Prod runs 200 turns at 196608; at 32768 a
          # long episode would overflow and trigger OpenHands' condenser, which rewrites
          # earlier turns -> non-monotonic trajectory -> the token-in-token-out
          # reconstruction assertion fires. 40 keeps episodes well inside 32768.
          agent_max_turns: 40
    swe_agents_val:
      responses_api_agents:
        swe_agents:
          concurrency: 8
          agent_max_turns: 40

cluster:
  num_nodes: 2
