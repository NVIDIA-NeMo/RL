# Stage 2.2 (SWE 2) smoke — full Super model, NO GPU judges.
#
# swe2 uses the full OpenHands SWE-bench agent (responses_api_agents/swe_agents); reward comes
# from SWE-bench test pass/fail run in the sandbox, so there are NO LLM-judge GPU servers.
# REQUIRES at launch: SANDBOX_CONTAINER set, SIF_DIR pointing at the .sif images, and the
# apptainer SETUP_COMMAND (super_launch.sh handles the last one).
#
#   - Policy train: 8 nodes -> TP4 x PP4 x EP8 x CP2
#   - Policy gen:   1 node  -> vLLM TP8
#   - cluster.num_nodes = 9 (8 train + 1 vLLM); SBATCH_NUM_NODES=9 (no judge nodes).
#   - SWE-agent concurrency reduced from prod 768 for a light smoke.
#
# Set MODEL_PATH to the actual Super checkpoint (continues from SWE 1 output).
defaults: "stage2_swe2.yaml"

checkpointing:
  checkpoint_dir: "results/super_v3_smoke_stage2_swe2_9node"

grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 8

data:
  # Cap prompt length below max_model_len so over-long prompts are capped at the
  # dataloader instead of being rejected by vLLM (prompt>=max_model_len -> 400/422).
  max_input_seq_length: 24576

policy:
  train_global_batch_size: 256
  max_total_sequence_length: 32768   # smoke: down from prod 196608
  generation:
    max_new_tokens: 8192   # cap output so prompt+gen <= max_total_sequence_length
    colocated:
      resources:
        num_nodes: 1
    vllm_cfg:
      tensor_parallel_size: 8
    vllm_kwargs:
      max_num_seqs: 16
  megatron_cfg:
    tensor_model_parallel_size: 4
    pipeline_model_parallel_size: 4
    expert_model_parallel_size: 8
    context_parallel_size: 2
    optimizer:
      params_dtype: "bfloat16"
      use_precision_aware_optimizer: false

env:
  nemo_gym:
    swe_agents_train:
      responses_api_agents:
        swe_agents:
          concurrency: 16          # smoke: down from 768
          agent_max_turns: 50       # smoke: down from 200
    swe_agents_val:
      responses_api_agents:
        swe_agents:
          concurrency: 16
          agent_max_turns: 50

cluster:
  num_nodes: 9
