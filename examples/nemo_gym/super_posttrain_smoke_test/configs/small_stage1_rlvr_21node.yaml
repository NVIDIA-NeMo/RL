defaults: "stage1_rlvr.yaml"

checkpointing:
  enabled: true
  checkpoint_dir: "results/super_v3_prod_stage1_rlvr_21node"

grpo:
  num_prompts_per_step: 128
  num_generations_per_prompt: 8

policy:
  train_global_batch_size: 1024
  generation:
    colocated:
      resources:
        num_nodes: 8
    vllm_cfg:
      tensor_parallel_size: 8
    vllm_kwargs:
      max_num_seqs: 16
  megatron_cfg:
    expert_model_parallel_size: 8   # base value; do NOT increase on a smaller cluster
    context_parallel_size: 2        # reduce from inherited 8; TP=4 x EP=8 x CP=2 = 64 GPUs/replica

env:
  nemo_gym:
    genrm_compare_resources_server:
      resources_servers:
        genrm_compare:
          num_rollouts_per_prompt: 8   # must match grpo.num_generations_per_prompt
    genrm_model:
      responses_api_models:
        genrm_model:
          vllm_serve_kwargs:
            max_num_seqs: 16
    nl2bash_judge_model:
      responses_api_models:
        local_vllm_model:
          vllm_serve_kwargs:
            max_num_seqs: 16
    safety_judge_model:
      responses_api_models:
        local_vllm_model:
          vllm_serve_kwargs:
            max_num_seqs: 16

cluster:
  num_nodes: 16  # NeMo-RL budget (training + vLLM); SBATCH_NUM_NODES=21 adds 5 for Gym judges
