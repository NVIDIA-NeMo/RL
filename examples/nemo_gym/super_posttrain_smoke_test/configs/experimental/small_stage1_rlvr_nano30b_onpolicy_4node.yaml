# Strict synchronous diagnostic for the offload-enabled nano RLVR smoke test.
#
# This keeps the original 4-node nano setup, including optimizer CPU offload, and
# disables async GRPO entirely. Async mode cannot use max_trajectory_age_steps=0
# because the replay-buffer capacity is derived from that value.
defaults: "small_stage1_rlvr_nano30b_4node.yaml"

grpo:
  async_grpo:
    enabled: false
    max_trajectory_age_steps: 1
    in_flight_weight_updates: false
    recompute_kv_cache_after_weight_updates: false

# super_launch.sh reads this directly before Hydra resolves defaults.
cluster:
  num_nodes: 2
