# Prefetch-only config: union of all NeMo Gym environments used across the
# nemotron-3-super training stages (stage1_rlvr + stage2_swe{1,2} + stage3_rlhf,
# from docs/guides/nemotron-3-super.md).
#
# Purpose: pass to the docker build so every gym server venv is baked into the image:
#   docker buildx build -f docker/Dockerfile \
#     --build-arg NEMO_GYM_PREFETCH_CONFIGS="examples/nemo_gym/prefetch_super_all_envs.yaml" \
#     --tag <registry>/nemo-rl:latest .
#
# examples/nemo_gym/prefetch_venvs.py reads ONLY config["env"]["nemo_gym"] and dry-runs
# NemoGym._spinup (no policy model), so policy / megatron_cfg / data / cluster / grpo /
# loss_fn / logger are intentionally omitted — they are not read during prefetch.
#
# The judge model-server blocks (safety_judge_model / nl2bash_judge_model / genrm_model)
# are kept because resource servers below reference them by name; the dry run resolves
# the config graph (it never loads the referenced model weights). All three use the
# `vllm_model` server type, so they add no venv beyond the policy `vllm_model` one.
#
# Deviations from super-v3 stage1_rlvr.yaml:
#   - `resources_servers/terminal_pivot/...` DROPPED: it does not exist at our Gym pin
#     (9b52dc8a). The newer Gym has terminus_judge / terminal_multi_harness / swe_pivot
#     instead, with no 1:1 successor. Re-add (remapped) if you need that env.
#   - `num_gpu_nodes` DROPPED: irrelevant to the prefetch dry run (reserves no nodes).
env:
  should_use_nemo_gym: true
  nemo_gym:
    skip_venv_if_present: true
    port_range_low: 15001
    port_range_high: 20000
    invalid_tool_call_patterns:
      - "<tool_call>"
      - "</tool_call>"
      - "<function_call>"
      - "</function_call>"
    thinking_tags:
      - "<think>"
      - "</think>"
    config_paths:
    # --- stage1_rlvr (RLVR blend) ---
    - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
    - resources_servers/math_with_judge/configs/math_with_judge.yaml
    - resources_servers/code_gen/configs/code_gen.yaml
    - resources_servers/workplace_assistant/configs/workplace_assistant.yaml
    - resources_servers/mcqa/configs/mcqa.yaml
    - resources_servers/instruction_following/configs/instruction_following.yaml
    - resources_servers/structured_outputs/configs/structured_outputs_json.yaml
    - resources_servers/equivalence_llm_judge/configs/lc_judge.yaml
    - resources_servers/calendar/configs/calendar.yaml
    - resources_servers/genrm_compare/configs/genrm_compare.yaml
    - resources_servers/equivalence_llm_judge/configs/nl2bash-equivalency.yaml
    - resources_servers/equivalence_llm_judge/configs/equivalence_llm_judge.yaml
    - resources_servers/single_step_tool_use_with_argument_comparison/configs/single_step_tool_use_with_argument_comparison.yaml
    - resources_servers/reasoning_gym/configs/reasoning_gym.yaml
    # NOTE: terminal_pivot dropped (absent at Gym pin 9b52dc8a) — see header.
    - resources_servers/ns_tools/configs/ns_tools.yaml
    - resources_servers/math_formal_lean/configs/math_formal_lean_multi_turn.yaml
    - resources_servers/swerl_gen/configs/swerl_gen.yaml
    - resources_servers/jailbreak_detection/configs/jailbreak_detection_nemotron_combined_reward_tp8.yaml
    - resources_servers/over_refusal_detection/configs/over_refusal_detection_nemotron_tp8.yaml
    - resources_servers/multichallenge/configs/multichallenge.yaml
    - resources_servers/inverse_if/configs/inverse_if.yaml
    - resources_servers/single_step_tool_use_with_argument_comparison/configs/search_pivot_single_step_tool_use_with_argument_comparison.yaml
    - resources_servers/single_step_tool_use_with_argument_comparison/configs/toolcall_schema_single_step_tool_use_with_argument_comparison.yaml
    # --- stage2_swe1 / stage2_swe2 (SWE) ---
    - resources_servers/single_step_tool_use_with_argument_comparison/configs/swe_pivot_single_step_tool_use_with_argument_comparison.yaml
    - responses_api_agents/swe_agents/configs/swebench_openhands_training.yaml

    # ---- judge model servers (referenced by the resource servers above) ----
    safety_judge_model:
      responses_api_models:
        vllm_model:
          entrypoint: app.py
          base_url: http://127.0.0.1:8001/v1
          api_key: dummy_key
          model: "nvidia/Nemotron-Content-Safety-Reasoning-4B"
          return_token_id_information: false
          uses_reasoning_parser: false
          spinup_server: true
          router_dp_size: 8
          server_args:
            tensor_parallel_size: 1
            gpu_memory_utilization: 0.85
            max_model_len: 96000
            model_loader_extra_config:
              enable_multithread_load: true
              num_threads: 2
            compilation_config:
              cudagraph_capture_sizes: [1, 2, 4, 8, 16]
          server_env:
            VLLM_ATTENTION_BACKEND: TRITON_ATTN

    nl2bash_judge_model:
      responses_api_models:
        vllm_model:
          entrypoint: app.py
          base_url: http://127.0.0.1:10000/v1
          api_key: dummy_key
          model: "Qwen/Qwen3-235B-A22B-Instruct-2507-FP8"
          return_token_id_information: False
          uses_reasoning_parser: False
          spinup_server: True
          router_dp_size: 2
          server_args:
            tensor_parallel_size: 8
            data_parallel_size: 1
            enable_expert_parallel: True
            enable_auto_tool_choice: true
            tool_call_parser: hermes
            gpu_memory_utilization: 0.85
            max_model_len: 131072
            model_loader_extra_config:
              enable_multithread_load: true
              num_threads: 112
            compilation_config:
              cudagraph_capture_sizes: [1, 2, 4, 8, 16, 32]

    genrm_model:
      responses_api_models:
        vllm_model:
          entrypoint: app.py
          base_url: http://127.0.0.1:8000/v1
          api_key: dummy_key
          model: "nvidia/Qwen3-Nemotron-235B-A22B-GenRM-2603"
          uses_reasoning_parser: True
          return_token_id_information: False
          spinup_server: True
          router_dp_size: 2
          server_args:
            tensor_parallel_size: 8
            reasoning_parser: deepseek_r1
            gpu_memory_utilization: 0.85
            max_model_len: 60000
            model_loader_extra_config:
              enable_multithread_load: true
              num_threads: 112
            compilation_config:
              cudagraph_capture_sizes: [1, 2, 4, 8, 16, 32]

    # ---- per-resource judge wiring (point resource servers at the judges above) ----
    jailbreak_detection:
      resources_servers:
        jailbreak_detection:
          judge_model_server:
            type: responses_api_models
            name: safety_judge_model

    over_refusal_detection:
      resources_servers:
        over_refusal_detection:
          judge_model_server:
            type: responses_api_models
            name: nl2bash_judge_model

    inverse_if:
      resources_servers:
        inverse_if:
          judge_model_server:
            type: responses_api_models
            name: nl2bash_judge_model

    multichallenge:
      resources_servers:
        multichallenge:
          judge_model_server:
            type: responses_api_models
            name: nl2bash_judge_model
          judge_responses_create_params:
            max_output_tokens: 8192

    equivalence_llm_judge:
      resources_servers:
        equivalence_llm_judge:
          judge_model_server:
            name: nl2bash_judge_model
          judge_responses_create_params:
            max_output_tokens: 8192

    lc_judge:
      resources_servers:
        equivalence_llm_judge:
          judge_model_server:
            name: nl2bash_judge_model
          judge_responses_create_params:
            max_output_tokens: 8192

    math_with_judge:
      resources_servers:
        math_with_judge:
          judge_model_server:
            name: nl2bash_judge_model
          judge_responses_create_params:
            max_output_tokens: 8192
          should_use_judge: true

    genrm_compare:
      resources_servers:
        genrm_compare:
          genrm_model_server:
            type: responses_api_models
            name: genrm_model
          genrm_responses_create_params:
            max_output_tokens: 16384
            temperature: 0.6
            top_p: 0.95
          comparison_strategy: "circular"
          num_judges_per_comparison: 1
          use_principle: true
          aggregator_method: "simple_tiebreaker"
          default_score: 3.0
          default_ranking: 3.5

    code_gen:
      resources_servers:
        code_gen:
          num_processes: 1024
          unit_test_timeout_secs: 10
          debug: false
