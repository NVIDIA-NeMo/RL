# Nano3 (NemotronH) NVFP4 default (W4A4) custom quantization recipe.
#
# Reference this from a NeMo-RL YAML config:
#
#     policy:
#       quant_cfg: "examples/modelopt/quant_configs/nano3_nvfp4_default.yaml"
#
# Mirrors the legacy ``NANO3_NVFP4_CFG`` Python constant
# (``mtq.NVFP4_DEFAULT_CFG`` + Nano3 BF16 disables) under ModelOpt's
# current list-based ``quant_cfg`` schema.
#
# W4A4: NVFP4 (e2m1, dynamic e4m3 micro-block scales) on weights and
# layer-input activations only. Output activations stay unquantized,
# matching ``NVFP4_DEFAULT_CFG`` (no ``*output_quantizer``).
#
# Disables (from ``_default_disabled_quantizer_cfg``): BatchNorm1d/2d/3d,
# LeakyReLU, ``*lm_head*``, ``*proj_out.*``, ``*block_sparse_moe.gate*``,
# ``*router*``, ``*mlp.gate.*``, ``*mlp.shared_expert_gate.*``,
# ``*linear_attn.conv1d*``, ``*mixer.conv1d*``, ``*output_layer*``,
# ``output.*``.
#
# Plus the Nano3-specific BF16 layer set:
#   - attention QKV / output projection (HF q_proj/k_proj/v_proj/o_proj,
#     fused qkv_proj, Megatron linear_qkv / linear_proj)
#   - explicit pre-attention layers 4/11/18/25/32/41 (BF16 by design)
#
# See https://github.com/NVIDIA/Model-Optimizer for the full set of
# supported quantizer options and built-in PTQ recipes.
#
# Only the `quantize:` section is consumed by `mtq.quantize`; `metadata:`
# is informational.
metadata:
  recipe_type: ptq
  description: Nano3 NVFP4 W4A4 (default) recipe.
quantize:
  algorithm: max
  quant_cfg:
    # Deny-all-then-enable: start by disabling every quantizer (including
    # KV-cache q/k/v_bmm_quantizers, which are NOT input/weight and would
    # otherwise be enabled by a wildcard '*' true and produce NaN amax on
    # dummy calibration), then explicitly enable the two quantizer types
    # NVFP4_DEFAULT_CFG enables for W4A4.
    - quantizer_name: '*'
      enable: false
    - quantizer_name: '*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*input_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    # Standard ModelOpt _default_disabled_quantizer_cfg exclusions
    # (sensitive / structurally-incompatible layers).
    - parent_class: 'nn.BatchNorm1d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.BatchNorm2d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.BatchNorm3d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.LeakyReLU'
      quantizer_name: '*'
      enable: false
    - quantizer_name: '*lm_head*'
      enable: false
    - quantizer_name: '*proj_out.*'
      enable: false
    - quantizer_name: '*block_sparse_moe.gate*'
      enable: false
    - quantizer_name: '*router*'
      enable: false
    - quantizer_name: '*mlp.gate.*'
      enable: false
    - quantizer_name: '*mlp.shared_expert_gate.*'
      enable: false
    - quantizer_name: '*linear_attn.conv1d*'
      enable: false
    - quantizer_name: '*mixer.conv1d*'
      enable: false
    - quantizer_name: '*output_layer*'
      enable: false
    - quantizer_name: 'output.*'
      enable: false
    # Nano3-specific BF16 layers: attention projections and explicit
    # pre-attention layers 4/11/18/25/32/41.
    - quantizer_name: '*.[q|k|v|o]_proj.*'
      enable: false
    - quantizer_name: '*.qkv_proj.*'
      enable: false
    - quantizer_name: '*.linear_proj.*'
      enable: false
    - quantizer_name: '*.linear_qkv.*'
      enable: false
    - quantizer_name: '*.layers.4.*'
      enable: false
    - quantizer_name: '*.layers.11.*'
      enable: false
    - quantizer_name: '*.layers.18.*'
      enable: false
    - quantizer_name: '*.layers.25.*'
      enable: false
    - quantizer_name: '*.layers.32.*'
      enable: false
    - quantizer_name: '*.layers.41.*'
      enable: false
