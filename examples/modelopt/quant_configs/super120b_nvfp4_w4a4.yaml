# Nemotron 3 Super routed-expert NVFP4 W4A4 recipe for QARL.
#
# Both routed-expert weights and inputs use block-16 E2M1 NVFP4. Attention,
# Mamba, latent MoE projections, shared experts, MTP, and output heads remain
# in their native dtype.
metadata:
  recipe_type: ptq
  description: Nemotron 3 Super routed-expert NVFP4 W4A4.
quantize:
  algorithm: max
  quant_cfg:
    - quantizer_name: '*'
      enable: false
    # Hugging Face / vLLM module names.
    - quantizer_name: '*mixer.experts.*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*mixer.experts.*input_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    # Megatron-Core module names.
    - quantizer_name: '*mlp.experts*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*mlp.experts*input_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*mtp*'
      enable: false
