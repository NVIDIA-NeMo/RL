# Nano3 (NemotronH) NVFP4 default v2 (W4A4) custom quantization recipe.
#
# This v2 recipe keeps the original nano3_nvfp4_default.yaml auditable, but
# fixes Nano3 BF16 exclusion patterns to match the intended module names.
#
# W4A4: NVFP4 (e2m1, dynamic e4m3 micro-block scales) on weights and
# layer-input activations only. Output activations stay unquantized,
# matching ``NVFP4_DEFAULT_CFG`` (no ``*output_quantizer``).
#
# Compared with v1, this recipe:
#   - replaces the non-glob ``*.[q|k|v|o]_proj.*`` pattern with explicit
#     ``*.q_proj.*``, ``*.k_proj.*``, ``*.v_proj.*``, ``*.o_proj.*`` patterns;
#   - keeps mixer in/out projections, shared experts, and norms in BF16.
#
# Only the `quantize:` section is consumed by `mtq.quantize`; `metadata:`
# is informational.
metadata:
  recipe_type: ptq
  description: Nano3 NVFP4 W4A4 default v2 recipe with corrected BF16 exclusions.
quantize:
  algorithm: max
  quant_cfg:
    # Deny-all-then-enable: start by disabling every quantizer (including
    # KV-cache q/k/v_bmm_quantizers, which are NOT input/weight and would
    # otherwise be enabled by a wildcard '*' true and produce NaN amax on
    # dummy calibration), then explicitly enable the two quantizer types
    # NVFP4_DEFAULT_CFG enables for W4A4.
    - quantizer_name: '*'
      enable: false
    - quantizer_name: '*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*input_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    # Standard ModelOpt _default_disabled_quantizer_cfg exclusions
    # (sensitive / structurally-incompatible layers).
    - parent_class: 'nn.BatchNorm1d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.BatchNorm2d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.BatchNorm3d'
      quantizer_name: '*'
      enable: false
    - parent_class: 'nn.LeakyReLU'
      quantizer_name: '*'
      enable: false
    - quantizer_name: '*lm_head*'
      enable: false
    - quantizer_name: '*proj_out.*'
      enable: false
    - quantizer_name: '*block_sparse_moe.gate*'
      enable: false
    - quantizer_name: '*router*'
      enable: false
    - quantizer_name: '*mlp.gate.*'
      enable: false
    - quantizer_name: '*mlp.shared_expert_gate.*'
      enable: false
    - quantizer_name: '*linear_attn.conv1d*'
      enable: false
    - quantizer_name: '*mixer.conv1d*'
      enable: false
    - quantizer_name: '*.mixer.in_proj.*'
      enable: false
    - quantizer_name: '*.mixer.out_proj.*'
      enable: false
    - quantizer_name: '*.shared_expert.*'
      enable: false
    - quantizer_name: '*.shared_experts.*'
      enable: false
    - quantizer_name: '*.norm.*'
      enable: false
    - quantizer_name: '*output_layer*'
      enable: false
    - quantizer_name: 'output.*'
      enable: false
    # Nano3-specific BF16 layers: attention projections and explicit
    # pre-attention layers 4/11/18/25/32/41.
    - quantizer_name: '*.q_proj.*'
      enable: false
    - quantizer_name: '*.k_proj.*'
      enable: false
    - quantizer_name: '*.v_proj.*'
      enable: false
    - quantizer_name: '*.o_proj.*'
      enable: false
    - quantizer_name: '*.qkv_proj.*'
      enable: false
    - quantizer_name: '*.linear_proj.*'
      enable: false
    - quantizer_name: '*.linear_qkv.*'
      enable: false
    - quantizer_name: '*.layers.4.*'
      enable: false
    - quantizer_name: '*.layers.11.*'
      enable: false
    - quantizer_name: '*.layers.18.*'
      enable: false
    - quantizer_name: '*.layers.25.*'
      enable: false
    - quantizer_name: '*.layers.32.*'
      enable: false
    - quantizer_name: '*.layers.41.*'
      enable: false
