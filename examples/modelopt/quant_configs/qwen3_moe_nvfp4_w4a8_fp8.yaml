# Qwen3 MoE routed-expert NVFP4 W4A8 fake-quant recipe for QARL.
metadata:
  recipe_type: ptq
  description: Qwen3 MoE routed-expert NVFP4 weights with FP8 inputs.
quantize:
  algorithm: max
  quant_cfg:
    - quantizer_name: '*'
      enable: false
    - quantizer_name: '*mlp.experts*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    - quantizer_name: '*mlp.experts*input_quantizer'
      enable: true
      cfg:
        num_bits: e4m3
    - quantizer_name: '*router*'
      enable: false
    - quantizer_name: '*mlp.gate*'
      enable: false

