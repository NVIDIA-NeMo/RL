# Nemotron 3 Super routed-expert NVFP4 W4A16 recipe for QARL.
#
# Super's published mixed-precision recipe keeps attention, Mamba, latent MoE
# projections, shared experts, MTP, and output heads outside NVFP4. This
# weight-only variant follows the same conservative boundary while quantizing
# the 512 routed experts that dominate model size.
metadata:
  recipe_type: ptq
  description: Nemotron 3 Super routed-expert NVFP4 W4A16.
quantize:
  algorithm: max
  quant_cfg:
    - quantizer_name: '*'
      enable: false
    # Hugging Face / vLLM module names.
    - quantizer_name: '*mixer.experts.*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    # Megatron-Core module names.
    - quantizer_name: '*mlp.experts*weight_quantizer'
      enable: true
      cfg:
        block_sizes:
          -1: 16
          type: dynamic
          scale_bits: e4m3
        num_bits: e2m1
    # The repeated MTP block stays BF16 in the published Super recipe.
    - quantizer_name: '*mtp*'
      enable: false
