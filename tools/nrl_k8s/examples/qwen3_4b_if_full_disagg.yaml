# Recipe: Qwen3-4B disaggregated GRPO on instruction_following gym.
#
# Pure NeMo-RL recipe — no infra. Runs in any environment. Pair with an infra
# file via ``nrl-k8s run qwen3_4b_if.yaml --infra qwen3_4b_if.infra.yaml``.
defaults: ../../../examples/nemo_gym/grpo_qwen3_4b_instruct_k8s_base.yaml

cluster:
  gpus_per_node: 8
  num_nodes: 1
grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  max_num_steps: 200
  val_period: 50
  max_rollout_turns: 1
  async_grpo:
    max_trajectory_age_steps: 1
policy:
  train_global_batch_size: 512
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 16384
  dtensor_cfg:
    activation_checkpointing: true
checkpointing:
  save_period: 50
logger:
  wandb_enabled: true
  wandb:
    project: nemorl-full-disagg-k8s
    name: full-disagg-if-qwen3-4b
  tensorboard_enabled: true
  monitor_gpus: true
