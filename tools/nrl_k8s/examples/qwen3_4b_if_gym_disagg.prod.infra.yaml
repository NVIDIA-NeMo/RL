# Production-batch variant of qwen3_4b_if_gym_disagg.infra.yaml.
#
# Same recipe, same two RayClusters (training + gym), same runtime
# behaviour — but submission goes through `kubectl exec` into the
# training head pod and the code lives at /opt/nemo-rl inside the
# image. No working_dir upload; the submitting laptop can disconnect
# as soon as nohup fires.
#
# Usage:
#   # Admins, once: bring up the two RayClusters.
#   nrl-k8s cluster up tools/nrl_k8s/examples/qwen3_4b_if_gym_disagg.yaml \
#       --infra tools/nrl_k8s/examples/qwen3_4b_if_gym_disagg.prod.infra.yaml \
#       --role gym
#   nrl-k8s cluster up tools/nrl_k8s/examples/qwen3_4b_if_gym_disagg.yaml \
#       --infra tools/nrl_k8s/examples/qwen3_4b_if_gym_disagg.prod.infra.yaml \
#       --role training
#
#   # Researcher, per run — idempotent; reuses live clusters if matching,
#   # submits training against the training cluster. Returns in seconds,
#   # laptop disconnectable. Use --skip-daemons after first bring-up if
#   # gym/generation are already healthy.
#   nrl-k8s run tools/nrl_k8s/examples/qwen3_4b_if_gym_disagg.yaml \
#       --infra tools/nrl_k8s/examples/qwen3_4b_if_gym_disagg.prod.infra.yaml \
#       --run-id qwen3-4b-gym-disagg-$(date +%Y%m%d-%H%M%S)
#
#   # Observe from anywhere; handle is cached on disk.
#   nrl-k8s job logs <run-id> \
#       tools/nrl_k8s/examples/qwen3_4b_if_gym_disagg.yaml \
#       --infra tools/nrl_k8s/examples/qwen3_4b_if_gym_disagg.prod.infra.yaml \
#       --role training -f

_shared:
  nodeSelector: &shared_node_selector
    gpu-wrangler.nvidia.com/lease: nemo-rl-testing
  tolerations: &shared_tolerations
    - {key: gpu-wrangler.nvidia.com/lease, operator: Equal, value: nemo-rl-testing, effect: NoSchedule}
    - {key: platform.nvidia.com/gpu,       operator: Equal, value: "true",          effect: NoSchedule}
  headEnv: &shared_head_env
    - {name: HF_HOME,                        value: /tmp/huggingface}
    - {name: TRANSFORMERS_CACHE,             value: /tmp/huggingface}
    - {name: NCCL_DEBUG,                     value: INFO}
    - {name: RAY_memory_monitor_refresh_ms,  value: "0"}
  workerEnv: &shared_worker_env
    - {name: HF_HOME,                        value: /tmp/huggingface}
    - {name: TRANSFORMERS_CACHE,             value: /tmp/huggingface}
    - {name: NCCL_DEBUG,                     value: INFO}
    - {name: RAY_memory_monitor_refresh_ms,  value: "0"}
  headResources: &shared_head_resources
    limits:   {cpu: "8", memory: "32Gi"}
    requests: {cpu: "2", memory: "8Gi"}
  gpuWorkerResources: &gpu_worker_resources
    limits:
      cpu: "176"
      memory: "1800Gi"
      nvidia.com/gpu: "8"
      vpc.amazonaws.com/efa: "32"
    requests:
      cpu: "176"
      memory: "1800Gi"
      nvidia.com/gpu: "8"
      vpc.amazonaws.com/efa: "32"
  gpuHeadPorts: &gpu_head_ports
    - {containerPort: 6379,  name: gcs-server}
    - {containerPort: 8265,  name: dashboard}
    - {containerPort: 10001, name: client}
  dshmMounts: &dshm_mounts
    - {mountPath: /dev/shm, name: dshm}
  dshm16: &dshm_16
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 16Gi}
  dshm64: &dshm_64
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 64Gi}
  dshm4: &dshm_4
    - name: dshm
      emptyDir: {medium: Memory, sizeLimit: 4Gi}

namespace: nemo-rl-testing
image: nvcr.io/nvidian/nemo-rl:nightly
imagePullSecrets: [nvidia-ngcuser-pull-secret, ngc-registry-secret]
serviceAccount: nemo-rl-endpoint-registry

labels:
  nrl-k8s/owner: ${user:}

submit:
  # Shell into the training head pod instead of port-forwarding the
  # dashboard to the laptop. Once `nohup` + `disown` fire the laptop is
  # off the critical path.
  submitter: exec
  execTmpDir: /tmp

launch:
  mode: attach
  # runMode: batch flips defaults without --mode on the CLI.
  runMode: batch
  # Code is baked into the container at /opt/nemo-rl (the
  # nvcr.io/nvidian/nemo-rl:nightly build ships it). No working_dir
  # upload, no .gitignore strip, no 100 MiB cap.
  codeSource: image
  codePath: /opt/nemo-rl
  attach:
    gym: ${user:}-raycluster-gym-disagg-gym-qwen3-4b
    training: ${user:}-raycluster-gym-disagg-qwen3-4b
  peerWatcher: false
  env: {}
  # Entrypoint runs inside the training head pod under `nohup bash`.
  # Env vars here propagate to Ray's worker actors via the standard
  # os.environ capture — no runtime_env.env_vars gymnastics.
  entrypoint: |
    # Keep POSIX-compatible — Ray's port-forward path submits entrypoints
    # through /bin/dash, which doesn't support `set -o pipefail`.
    set -eu
    cd /opt/nemo-rl
    export GLOO_SOCKET_IFNAME=enp71s0
    export NCCL_SOCKET_IFNAME=enp71s0
    export FI_PROVIDER=efa
    export DISAGG_TRAIN_PATH=/tmp/train.jsonl
    export DISAGG_VALID_PATH=/tmp/validation.jsonl
    export RAY_enable_infeasible_task_early_exit=true
    export PYTHONPATH=.:3rdparty/Gym-workspace/Gym:3rdparty/Megatron-LM-workspace/Megatron-LM

    python -u examples/nemo_gym/run_grpo_nemo_gym.py \
      --config examples/nemo_gym/grpo_qwen3_4b_instruct_k8s_base.yaml \
      +env.disagg_job_id=qwen3-4b-gym-disagg \
      ++env.nemo_gym.config_paths='[responses_api_models/vllm_model/configs/vllm_model_for_training.yaml,resources_servers/instruction_following/configs/instruction_following.yaml]' \
      ~policy.optimizer.kwargs.foreach \
      ~policy.optimizer.kwargs.fused

clusters:
  # ---------------- Gym (CPU, head-only) ----------------
  # Gym daemon still submits via port-forward + working_dir upload —
  # it's a long-lived server admins bring up once, so the upload cost
  # is paid once per `cluster up` and the researcher's `launch` never
  # touches it.
  gym:
    name: ${user:}-raycluster-gym-disagg-gym-qwen3-4b
    daemon:
      submissionId: qwen3-4b-gym-disagg-server-v5
      entrypoint: |
        set -eu
        ROOT_DIR=$(pwd)
        GYM_DIR=\${ROOT_DIR}/3rdparty/Gym-workspace/Gym
        export PYTHONPATH=\${ROOT_DIR}:\${GYM_DIR}:\${PYTHONPATH-}
        cd \${GYM_DIR}
        mkdir -p cache
        RAY_VERSION=$(python -c "import ray; print(ray.__version__)")
        echo "ray==\${RAY_VERSION}" > /tmp/ray-pin.txt
        pip install -e "." --constraint /tmp/ray-pin.txt -q
        pip install kubernetes -q
        exec python -m nemo_gym.standalone_server \
          --job-id qwen3-4b-gym-disagg \
          --port 9090 \
          --model-name Qwen/Qwen3-4B-Instruct-2507 \
          --config-yaml \${ROOT_DIR}/infra/examples/gym_standalone_config_instruction_following.yaml
      rayUploadPaths:
        - nemo_rl
        - infra/examples
        - 3rdparty/Gym-workspace/Gym/nemo_gym
        - 3rdparty/Gym-workspace/Gym/responses_api_models/vllm_model
        - 3rdparty/Gym-workspace/Gym/responses_api_agents/simple_agent
        - 3rdparty/Gym-workspace/Gym/pyproject.toml
        - 3rdparty/Gym-workspace/Gym/uv.lock
        - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/app.py
        - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/requirements.txt
        - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/configs
        - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/tests
        - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/data/validation.jsonl
        - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/data/example.jsonl
        - 3rdparty/Gym-workspace/Gym/resources_servers/instruction_following/data/example_rollouts.jsonl
    spec:
      rayVersion: "2.52.0"
      headGroupSpec:
        rayStartParams: {num-gpus: "0", dashboard-host: "0.0.0.0", object-store-memory: "200000000"}
        template:
          spec:
            schedulerName: default-scheduler
            dnsPolicy: ClusterFirst
            nodeSelector: *shared_node_selector
            tolerations: *shared_tolerations
            containers:
              - name: ray-head
                env:
                  - {name: RAY_memory_monitor_refresh_ms, value: "0"}
                resources: *shared_head_resources
                ports:
                  - {containerPort: 6379,  name: gcs-server}
                  - {containerPort: 8265,  name: dashboard}
                  - {containerPort: 10001, name: client}
                  - {containerPort: 9090,  name: gym-server}
                volumeMounts: *dshm_mounts
            volumes: *dshm_4

  # ---------------- Training (GPU head + worker, generation colocated) ----------------
  training:
    name: ${user:}-raycluster-gym-disagg-qwen3-4b
    labels:
      disagg.nemo-rl/cluster: gym-disagg-qwen3-4b
      disagg.nemo-rl/run: qwen3-4b-gym-disagg
    spec:
      rayVersion: "2.52.0"
      headGroupSpec:
        rayStartParams: {dashboard-host: "0.0.0.0", num-gpus: "0", object-store-memory: "200000000"}
        template:
          spec:
            schedulerName: default-scheduler
            dnsPolicy: ClusterFirst
            nodeSelector: *shared_node_selector
            tolerations: *shared_tolerations
            containers:
              - name: ray-head
                env:
                  - {name: HF_HOME,                        value: /tmp/huggingface}
                  - {name: TRANSFORMERS_CACHE,             value: /tmp/huggingface}
                  - {name: NCCL_DEBUG,                     value: INFO}
                  - {name: RAY_memory_monitor_refresh_ms,  value: "0"}
                  - name: WANDB_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: wandb-api-key
                        key: WANDB_API_KEY
                resources: *shared_head_resources
                ports: *gpu_head_ports
                volumeMounts: *dshm_mounts
            volumes: *dshm_16
      workerGroupSpecs:
        - groupName: gpu-workers
          replicas: 1
          minReplicas: 1
          maxReplicas: 1
          rayStartParams: {num-gpus: "8", object-store-memory: "200000000"}
          template:
            spec:
              schedulerName: default-scheduler
              hostNetwork: true
              dnsPolicy: ClusterFirstWithHostNet
              nodeSelector: *shared_node_selector
              tolerations: *shared_tolerations
              containers:
                - name: ray-worker
                  env: *shared_worker_env
                  resources: *gpu_worker_resources
                  volumeMounts: *dshm_mounts
              volumes: *dshm_64
