# Qwen 3.5 SWE/OpenHands parity recipe for the optimized grpo-smoke run that
# reached training with CUDA Graphs enabled.
#
# Reference optimized run:
#   3465015 / swe-qwen35-r2e-wlogging-64k-30turn-pp2real-32train32gen-1h-20260620-062010
#
# Keep this config focused on model/vLLM parity. Dataset, SIF paths, node counts,
# and time limits are supplied by the launcher/CLI overrides.

defaults: grpo_qwen35_397b_swe_openhands_async.yaml

policy:
  max_total_sequence_length: 65536
  generation:
    max_new_tokens: ${policy.max_total_sequence_length}
    vllm_cfg:
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
    vllm_kwargs:
      attention_backend: FLASH_ATTN
      compilation_config:
        backend: inductor
        cudagraph_capture_sizes: [1, 2, 4, 8, 16, 32, 64]
        pass_config:
          fuse_norm_quant: false
          fuse_act_quant: false
          fuse_attn_quant: false
          fuse_allreduce_rms: false

env:
  nemo_gym:
    policy_model:
      responses_api_models:
        vllm_model:
          chat_template_kwargs:
            enable_thinking: false
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
    swe_agents_train:
      responses_api_agents:
        swe_agents:
          agent_max_turns: 30
    swe_agents_val:
      responses_api_agents:
        swe_agents:
          agent_max_turns: 30
