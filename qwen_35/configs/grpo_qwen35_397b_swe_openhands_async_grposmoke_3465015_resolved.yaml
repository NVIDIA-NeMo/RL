# Qwen 3.5 SWE/OpenHands config resolved from the last working optimized
# grpo-smoke CUDA-Graph run.
#
# Reference:
#   optimized job: 3465015
#   experiment: swe-qwen35-r2e-wlogging-64k-30turn-pp2real-32train32gen-1h-20260620-062010
#
# Intent:
#   Select this config and pass no extra user Hydra overrides. The launcher
#   still injects run metadata such as logger paths, checkpoint_dir, cluster
#   node counts, and seed.

defaults: grpo_qwen35_397b_swe_openhands_async.yaml

grpo:
  num_prompts_per_step: 16
  num_generations_per_prompt: 8
  max_num_steps: 50
  val_batch_size: null
  val_period: 5
  val_at_start: true
  val_at_end: false
  overlong_filtering: true
  max_val_samples: null
  skip_reference_policy_logprobs_calculation: true
  async_grpo:
    enabled: true
    max_trajectory_age_steps: 1
    in_flight_weight_updates: false

checkpointing:
  enabled: false
  save_optimizer: false
  save_period: 1000000
  ft_save_period: 1000000
  checkpoint_must_save_by: null

cluster:
  num_nodes: 64
  gpus_per_node: 4
  segment_size: null

data:
  max_input_seq_length: null
  use_multiple_dataloader: false
  train:
    data_path: /lustre/fs1/portfolios/coreai/projects/coreai_mlperf_training/users/arigazzi/grpo-studies/data_swe/r2e_easy_l20_train.with_sifs.jsonl
  validation:
    data_path: /lustre/fs1/portfolios/coreai/projects/coreai_mlperf_training/users/arigazzi/grpo-studies/data_swe/r2e_easy_l20_val.with_sifs.jsonl

sif_dir: /lustre/fs1/portfolios/coreai/projects/coreai_mlperf_training/users/hfilaretov/data/swe-gym

logger:
  wandb_enabled: false
  wandb:
    project: nemotron-3-ultra

policy:
  model_name: /lustre/fsw/portfolios/coreai/projects/coreai_mlperf_training/users/arigazzi/nemotron3_ultra_550b/hf_home/hub/models--Qwen--Qwen3.5-397B-A17B/snapshots/8472618112abcbd45acbcdc58436aff4233c23f7
  tokenizer:
    name: ${policy.model_name}
  train_global_batch_size: 128
  train_micro_batch_size: 1
  logprob_batch_size: 1
  generation_batch_size: 64
  max_total_sequence_length: 65536
  sequence_packing:
    enabled: false
  megatron_cfg:
    tensor_model_parallel_size: 4
    expert_model_parallel_size: 64
    expert_tensor_parallel_size: 1
    context_parallel_size: 1
    pipeline_model_parallel_size: 2
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    sequence_parallel: true
    mtp_num_layers: 0
    mtp_use_repeated_layer: false
    moe_token_dispatcher_type: alltoall
    moe_flex_dispatcher_backend: alltoall
    gradient_accumulation_fusion: false
    apply_rope_fusion: false
    checkpoint:
      async_strategy: mcore
    optimizer:
      lr: 5.0e-6
      min_lr: 4.999e-6
    scheduler:
      lr_warmup_iters: 3
      lr_decay_iters: 100000
  generation:
    temperature: 1.0
    top_p: 1.0
    max_new_tokens: ${policy.max_total_sequence_length}
    mcore_generation_config:
      buffer_size_gb: 8
    vllm_cfg:
      tensor_parallel_size: 8
      pipeline_parallel_size: 1
      expert_parallel_size: 8
      gpu_memory_utilization: 0.55
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
      http_server_serving_chat_kwargs:
        tool_parser: qwen3_xml
        reasoning_parser: qwen3
        reasoning_parser_plugin: null
    vllm_kwargs:
      attention_backend: FLASH_ATTN
      compilation_config:
        backend: inductor
        cudagraph_capture_sizes: [1, 2, 4, 8, 16, 32, 64]
        pass_config:
          fuse_norm_quant: false
          fuse_act_quant: false
          fuse_attn_quant: false
          fuse_allreduce_rms: false
    colocated:
      enabled: false
      resources:
        num_nodes: 32
        gpus_per_node: 4

env:
  nemo_gym:
    num_gpu_nodes: 0
    skip_venv_if_present: true
    allow_noncontiguous_message_tokens: true
    policy_model:
      responses_api_models:
        vllm_model:
          chat_template_kwargs:
            enable_thinking: false
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
    swe_agents_train:
      responses_api_agents:
        swe_agents:
          agent_max_turns: 30
          concurrency: 128
          swebench_agent_timeout: 360
          container_formatter:
            - /lustre/fs1/portfolios/coreai/projects/coreai_mlperf_training/users/hfilaretov/data/swe-gym/r2egym/{instance_id}.sif
            - /lustre/fs1/portfolios/coreai/projects/coreai_mlperf_training/users/hfilaretov/data/nemotron-ultra-swe/r2e_gym/{instance_id}.sif
    swe_agents_val:
      responses_api_agents:
        swe_agents:
          agent_max_turns: 30
          concurrency: 128
          swebench_agent_timeout: 180
          container_formatter:
            - /lustre/fs1/portfolios/coreai/projects/coreai_mlperf_training/users/hfilaretov/data/swe-gym/r2egym/{instance_id}.sif
            - /lustre/fs1/portfolios/coreai/projects/coreai_mlperf_training/users/hfilaretov/data/nemotron-ultra-swe/r2e_gym/{instance_id}.sif

token_ids:
  eos: 248046
  think_open: 248068
  think_close: 248069

penalize_duplicated_reasoning: false
penalize_empty_final_answer: false
penalize_eos_token: false
penalize_malformed_think_tag: false
