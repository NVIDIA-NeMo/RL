# Qwen 3.5 SWE/OpenHands wrapper.
#
# This config inherits the Carlos/grpo-studies Qwen3-235B SWE recipe and only
# changes model-family-specific settings needed for Qwen3.5-397B-A17B. Runtime
# paths, node counts, data, and experiment names are still provided by
# examples/nemo_gym/launch_nemo_gym_multinode_training.sh and CLI overrides.
#
# Selecting this recipe from the launcher automatically mounts qwen_35/configs
# and qwen_35/overrides into the container.

# Relative to qwen_35/configs/.
defaults: ../../examples/nemo_gym/grpo_qwen3_235b_swe_openhands_async.yaml

# Keep SIF roots local to this wrapper for the same reason as data paths below:
# when this file is mounted into a container, the inherited base config may be
# the image-baked copy rather than the checked-out tree on the host.
sif_dir: ${oc.env:NEMO_GYM_SWE_SIF_DIR}
sif_fallback_dir: ${oc.env:NEMO_GYM_SWE_FALLBACK_SIF_DIR,/no-such-r2e-fallback}

# Keep data paths local to this wrapper. The inherited base config may come
# from the container image when this file is mounted, so do not rely on the
# base recipe for path hygiene.
data:
  train:
    data_path: ${oc.env:NEMO_GYM_SWE_TRAIN_DATA_PATH}
  validation:
    data_path: ${oc.env:NEMO_GYM_SWE_VALIDATION_DATA_PATH}
  max_input_seq_length: null
  use_multiple_dataloader: false

# Standard Qwen 3.5 R2E study defaults. Cluster size, paths, walltime, and
# deliberate shmoo changes can still be overridden by launchers. Keep stable
# correctness/performance defaults here so callers do not need long CLI lists.
grpo:
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  max_num_steps: 8
  val_batch_size: null
  max_val_samples: null
  val_period: 5
  val_at_start: true
  val_at_end: false
  overlong_filtering: true
  skip_reference_policy_logprobs_calculation: true
  async_grpo:
    enabled: true
    max_trajectory_age_steps: 1
    in_flight_weight_updates: false

checkpointing:
  enabled: false
  save_optimizer: false
  save_period: 1000000
  checkpoint_must_save_by: null

policy:
  train_global_batch_size: 512
  train_micro_batch_size: 1
  logprob_batch_size: 1
  generation_batch_size: 64
  max_total_sequence_length: 65536

  # Qwen 3.5 GDN currently does not support Megatron packed sequences.
  # Keep this in the Qwen wrapper so callers do not need a correctness-critical
  # CLI override.
  sequence_packing:
    enabled: false

  # Pin tokenizer to the mounted Qwen 3.5 snapshot. The inherited Qwen3 config
  # also points tokenizer.name at policy.model_name, but pinning it here avoids
  # Hydra/override ambiguity and guarantees the qwen_35 tokenizer overlay sees
  # the local tokenizer.json file instead of a hub model id.
  tokenizer:
    name: ${oc.env:CONTAINER_HF_CKPT_PATH}
  megatron_cfg:
    tensor_model_parallel_size: 4
    pipeline_model_parallel_size: 2
    context_parallel_size: 1
    expert_model_parallel_size: 64
    expert_tensor_parallel_size: 1
    sequence_parallel: true
    moe_token_dispatcher_type: alltoall
    optimizer:
      lr: 5.0e-6
      min_lr: 4.999e-6
    scheduler:
      lr_warmup_iters: 3
      lr_decay_iters: 100000
    checkpoint:
      async_strategy: mcore
    apply_rope_fusion: false
    gradient_accumulation_fusion: false
    mtp_loss_scaling_factor: 0.0
    mtp_num_layers: 0
    mtp_use_repeated_layer: false
    mtp_detach_heads: true
    # The inherited Qwen3-235B recipe uses custom first/last PP layer counts.
    # They do not apply to Qwen3.5-397B with the 64-node PP=2 layout; leaving
    # them set makes Megatron think there are no middle PP stages available.
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    first_last_layers_bf16: true
    num_layers_at_start_in_bf16: 1
    num_layers_at_end_in_bf16: 1
    moe_flex_dispatcher_backend: alltoall
    moe_hybridep_num_sms: 32
  generation:
    max_new_tokens: 65536
    temperature: 1.0
    top_p: 1.0
    mcore_generation_config:
      buffer_size_gb: 8
    vllm_cfg:
      max_model_len: 65536
      tensor_parallel_size: 8
      pipeline_parallel_size: 1
      expert_parallel_size: 8
      gpu_memory_utilization: 0.55
      # Keep Qwen 3.5 on the CUDA-graph path used by the known-good smoke run.
      enforce_eager: false
      http_server_serving_chat_kwargs:
        tool_parser: qwen3_xml
        reasoning_parser: qwen3
    vllm_kwargs:
      attention_backend: FLASH_ATTN
      compilation_config:
        backend: inductor
        cudagraph_capture_sizes: [1, 2, 4, 8, 16, 32, 64]
        pass_config:
          fuse_norm_quant: false
          fuse_act_quant: false
          fuse_attn_quant: false
          fuse_allreduce_rms: false

# Qwen 3.5 chat-template/token handling used by the qwen_35 overlay.
env:
  nemo_gym:
    skip_venv_if_present: true
    swe_agents_train:
      responses_api_agents:
        swe_agents:
          agent_max_turns: 15
          concurrency: 128
          swebench_agent_timeout: 360
          swebench_tests_timeout: 300
          container_formatter:
            - "${sif_dir}/r2egym/{instance_id}.sif"
            - "${sif_fallback_dir}/r2e_gym/{instance_id}.sif"
    swe_agents_val:
      responses_api_agents:
        swe_agents:
          agent_max_turns: 15
          concurrency: 128
          swebench_agent_timeout: 180
          swebench_tests_timeout: 180
          container_formatter: ${env.nemo_gym.swe_agents_train.responses_api_agents.swe_agents.container_formatter}
    policy_model:
      responses_api_models:
        vllm_model:
          # Keep this in sync with policy.generation.vllm_cfg.http_server_serving_chat_kwargs.
          # If vLLM is configured with a reasoning parser, the NeMo-Gym policy
          # server must expect reasoning fields in chat-completion responses.
          uses_reasoning_parser: true
          chat_template_kwargs:
            enable_thinking: false
            truncate_history_thinking: false
          sequential_reasoning_allowed: false

token_ids:
  eos: 248046
  think_open: 248068
  think_close: 248069

# SWE reward comes from NeMo-Gym test pass/fail. These scalar response-shape
# penalties are tuned for Nemotron/Nano response conventions and can incorrectly
# zero otherwise valid Qwen trajectories.
penalize_duplicated_reasoning: false
penalize_empty_final_answer: false
penalize_eos_token: false
penalize_malformed_think_tag: false
