# Qwen 3.5 SWE/OpenHands wrapper.
#
# This config inherits the Carlos/grpo-studies Qwen3-235B SWE recipe and only
# changes model-family-specific settings needed for Qwen3.5-397B-A17B. Runtime
# paths, node counts, data, and experiment names are still provided by
# examples/nemo_gym/launch_nemo_gym_multinode_training.sh and CLI overrides.
#
# Selecting this recipe from the launcher automatically mounts qwen_35/configs
# and qwen_35/overrides into the container.

# Relative to qwen_35/configs/.
defaults: ../../examples/nemo_gym/grpo_qwen3_235b_swe_openhands_async.yaml

policy:
  # Pin tokenizer to the mounted Qwen 3.5 snapshot. The inherited Qwen3 config
  # also points tokenizer.name at policy.model_name, but pinning it here avoids
  # Hydra/override ambiguity and guarantees the qwen_35 tokenizer overlay sees
  # the local tokenizer.json file instead of a hub model id.
  tokenizer:
    name: ${oc.env:CONTAINER_HF_CKPT_PATH}
  megatron_cfg:
    apply_rope_fusion: false
    gradient_accumulation_fusion: false
    mtp_loss_scaling_factor: 0.0
    mtp_num_layers: 0
    mtp_use_repeated_layer: false
    mtp_detach_heads: true
    first_last_layers_bf16: true
    num_layers_at_start_in_bf16: 1
    num_layers_at_end_in_bf16: 1
    moe_flex_dispatcher_backend: alltoall
    moe_hybridep_num_sms: 32
  generation:
    vllm_cfg:
      # Keep Qwen 3.5 on the CUDA-graph path used by the known-good smoke run.
      enforce_eager: false
      http_server_serving_chat_kwargs:
        tool_parser: qwen3_xml
        reasoning_parser: qwen3
        reasoning_parser_plugin: null
    vllm_kwargs:
      attention_backend: FLASH_ATTN
      compilation_config:
        backend: inductor
        cudagraph_capture_sizes: [1, 2, 4, 8, 16, 32, 64]
        pass_config:
          fuse_norm_quant: false
          fuse_act_quant: false
          fuse_attn_quant: false
          fuse_allreduce_rms: false

# Qwen 3.5 chat-template/token handling used by the qwen_35 overlay.
env:
  nemo_gym:
    allow_noncontiguous_message_tokens: false
    policy_model:
      responses_api_models:
        vllm_model:
          # Keep this in sync with policy.generation.vllm_cfg.http_server_serving_chat_kwargs.
          # If vLLM is configured with a reasoning parser, the NeMo-Gym policy
          # server must expect reasoning fields in chat-completion responses.
          uses_reasoning_parser: true
          chat_template_kwargs:
            enable_thinking: false
            truncate_history_thinking: false
          sequential_reasoning_allowed: false

token_ids:
  eos: 248046
  think_open: 248068
  think_close: 248069

# SWE reward comes from NeMo-Gym test pass/fail. These scalar response-shape
# penalties are tuned for Nemotron/Nano response conventions and can incorrectly
# zero otherwise valid Qwen trajectories.
penalize_duplicated_reasoning: false
penalize_empty_final_answer: false
penalize_eos_token: false
penalize_malformed_think_tag: false
