# Qwen 3.5 SWE/OpenHands async GRPO recipe.
#
# Standalone version of the Qwen 3.5 recipe. It intentionally does not inherit
# from another model recipe, so Qwen 3.5 jobs do not depend on model-family
# compatibility defaults or comments. Runtime paths, node counts, and experiment
# names are provided by the Qwen 3.5 launcher environment or explicit Hydra
# overrides.

grpo:
  # Default seed so the config parses standalone; the launcher overrides it
  # with ++grpo.seed=<random>.
  seed: 42
  max_num_epochs: 100
  num_prompts_per_step: 32
  num_generations_per_prompt: 16
  max_rollout_turns: 1
  max_num_steps: 8
  normalize_rewards: true
  use_leave_one_out_baseline: true
  val_period: 0
  val_at_start: false
  val_at_end: true
  overlong_filtering: true
  max_val_samples: null
  val_batch_size: null
  validation_generation:
    temperature: 0.0
    top_p: 1.0
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1
  reward_shaping:
    enabled: false
    overlong_buffer_length: 128
    overlong_buffer_penalty: 1
    max_response_length: ${policy.max_total_sequence_length}
  adv_estimator:
    name: grpo
    normalize_rewards: ${grpo.normalize_rewards}
    use_leave_one_out_baseline: ${grpo.use_leave_one_out_baseline}
    minus_baseline: true
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0
  skip_reference_policy_logprobs_calculation: true
  seq_logprob_error_threshold: 2
  async_grpo:
    enabled: true
    max_trajectory_age_steps: 1
    in_flight_weight_updates: false
    recompute_kv_cache_after_weight_updates: false
loss_fn:
  reference_policy_kl_penalty: 0
  reference_policy_kl_type: k3
  kl_input_clamp_value: null
  kl_output_clamp_value: null
  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: null
  use_on_policy_kl_approximation: true
  truncated_importance_sampling_ratio: 5
  truncated_importance_sampling_ratio_min: 0.2
  truncated_importance_sampling_type: tis
  use_importance_sampling_correction: true
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: true
checkpointing:
  enabled: false
  checkpoint_dir: results/grpo-qwen35-397b-swe-openhands
  metric_name: val:total_reward/mean
  higher_is_better: true
  keep_top_k: 2
  save_period: 1000000
  checkpoint_must_save_by: null
  save_optimizer: false
policy:
  model_name: ${oc.env:CONTAINER_HF_CKPT_PATH}
  tokenizer:
    name: ${oc.env:CONTAINER_HF_CKPT_PATH}
    chat_template_kwargs: null
  hf_config_overrides: {}
  train_global_batch_size: 512
  train_micro_batch_size: 1
  generation_batch_size: 64
  logprob_batch_size: 1
  max_total_sequence_length: 65536
  precision: bfloat16
  logprob_chunk_size: 2048
  dtensor_cfg:
    _v2: false
    enabled: false
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: true
    tensor_parallel_size: 2
    context_parallel_size: 1
    custom_parallel_plan: null
    clear_cache_every_n_steps: null
  megatron_cfg:
    enabled: true
    # Force cuDNN fused attention: TE's auto selection fell back to unfused on
    # this stack, materializing [B,H,S,S] scores (98.45 GiB at S=65536) and
    # OOMing every training step. With 'fused', mcore pins the NVTE_*_ATTN env
    # and TE errors out with the rejection reason instead of falling back.
    attention_backend: fused
    empty_unused_memory_level: 1
    train_iters: 100000
    activation_checkpointing: true
    bias_activation_fusion: false
    tensor_model_parallel_size: 4
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 32
    pipeline_model_parallel_size: 2
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    sequence_parallel: true
    freeze_moe_router: true
    moe_router_dtype: fp64
    moe_router_load_balancing_type: none
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: false
    moe_enable_deepep: false
    moe_token_dispatcher_type: alltoall
    moe_shared_expert_overlap: false
    moe_per_layer_logging: false
    gradient_accumulation_fusion: false
    use_fused_weighted_squared_relu: false
    apply_rope_fusion: false
    defer_fp32_logits: true
    optimizer:
      optimizer: adam
      lr: 5.0e-06
      min_lr: 4.999e-06
      weight_decay: 0.0
      bf16: true
      fp16: false
      params_dtype: float32
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0
      clip_grad: ${policy.max_grad_norm}
    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: constant
      lr_decay_style: constant
      lr_decay_iters: 100000
      lr_warmup_iters: 0
      lr_warmup_init: 3e-7
      override_opt_param_scheduler: true
    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: false
      use_custom_fsdp: false
      data_parallel_sharding_strategy: optim_grads_params
    # Memory headroom for the training step. Job 2269463 (64-GPU shape) OOM'd
    # on a ~60.76 GiB fp32 transient in the last-PP-stage backward; job 2269456
    # (128-GPU benchmark shape, max_split_size_mb:512) then died at the first
    # send_forward_recv_backward with ncclUnhandledCudaError and no Python OOM
    # anywhere - the signature of NCCL's own cudaMalloc failing at peak memory
    # when the reverse-direction p2p channels are first created.
    # expandable_segments defragments the torch pool so those non-torch
    # allocations can succeed. Note: may slow refit weight transfer (docstring
    # in _clear_fp8_caches claims ~5x on the IPC path) - measure and revisit.
    # NCCL_DEBUG=WARN surfaces the underlying CUDA error code if it recurs.
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      NCCL_DEBUG: "WARN"
      # Jobs 2269608/2272089 OOM'd in TE's UNFUSED dot-product-attention
      # fallback (softmax.py forward_torch_softmax), which materializes the
      # full [B,H,S,S] score matrix (S=65536 -> 24.85-98.45 GiB allocs).
      # attention_backend: fused (below) makes mcore set the NVTE_*_ATTN env
      # vars itself (raw NVTE_UNFUSED_ATTN=0 trips mcore's consistency assert,
      # job 2272954). Nondeterministic cuDNN attention algorithms are the most
      # common fused-attention rejection cause; debug flags log selection.
      NVTE_ALLOW_NONDETERMINISTIC_ALGO: "1"
      NVTE_DEBUG: "1"
      NVTE_DEBUG_LEVEL: "2"
    checkpoint:
      async_strategy: mcore
    mtp_loss_scaling_factor: 0.0
    mtp_num_layers: 0
    mtp_use_repeated_layer: false
    mtp_detach_heads: true
    first_last_layers_bf16: true
    num_layers_at_start_in_bf16: 1
    num_layers_at_end_in_bf16: 1
    moe_flex_dispatcher_backend: alltoall
    moe_hybridep_num_sms: 32
  draft:
    enabled: false
    model_name: null
    loss_weight: 0.1
    num_layers: null
    aux_layer_indices: null
  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64
  sequence_packing:
    # Matches the qwen3-235B SWE sibling recipe on main. Without packing the
    # megatron path pads every sequence in the batch to one global
    # padded_seq_length; a single 65k rollout then makes ~95% of all tokens
    # pad tokens, which all route to the SAME top-10 experts (frozen router,
    # no load balancing) and blow up one EP rank's alltoall receive/GEMM
    # buffers (~135 GiB transient + failed 24.85 GiB alloc in job 2269608 on
    # stage-0 ranks). Packing keeps microbatches at real tokens.
    enabled: true
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: modified_first_fit_decreasing
    sequence_length_round: 64
  make_sequence_length_divisible_by: 32
  max_grad_norm: 1.0
  offload_optimizer_for_logprob: false
  optimizer: null
  scheduler:
  - name: torch.optim.lr_scheduler.ConstantLR
    kwargs:
      factor: 1.0
      total_iters: 10000000000
  - milestones: []
  generation:
    backend: vllm
    max_new_tokens: 65536
    # Left-truncate over-long HTTP chat prompts instead of erroring; clamped
    # server-side so input + output <= max_model_len.
    truncate_prompt_tokens: 65535
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: true
      kv_cache_dtype: auto
      precision: ${policy.precision}
      tensor_parallel_size: 8
      pipeline_parallel_size: 1
      expert_parallel_size: 8
      gpu_memory_utilization: 0.55
      max_model_len: 65536
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      expose_http_server: true
      skip_tokenizer_init: false
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_xml
        reasoning_parser: qwen3
    vllm_kwargs:
      attention_backend: FLASH_ATTN
      # Keep MoE weights in the standard [E, 2I, H]/[E, H, I] layout. The
      # default (auto -> FlashInfer TRTLLM on Blackwell) converts w13/w2 into a
      # swizzled block layout after load (swap to [w3;w1] + 4D blocking), which
      # breaks every subsequent weight refit: the stock FusedMoE weight_loader
      # raises 'shard_dim=0 is not a valid data dimension for a 3D tensor'
      # against the converted params, and correct values could not be written
      # into the swizzled layout anyway. Triton keeps kernel format == storage
      # format, so per-step refits load correctly. Revisit if a
      # refit-then-reconvert flow lands (perf: trtllm kernels are faster).
      moe_backend: triton
      enable_chunked_prefill: true
      compilation_config:
        backend: inductor
        cudagraph_capture_sizes:
        - 1
        - 2
        - 4
        - 8
        - 16
        - 32
        - 64
        # The image default benchmarks combo kernels during inductor compile;
        # first-hit dynamic-shape compiles of the 60L/512E graph then stall TP
        # ranks past the 600s NCCL watchdog (engine deaths in jobs
        # 2269608/2272089: allgather timeout -> EngineCore fatal). Disable the
        # compile-time benchmarking; inductor itself stays on.
        inductor_compile_config:
          enable_auto_functionalized_v2: false
          combo_kernels: false
          benchmark_combo_kernel: false
        pass_config:
          fuse_norm_quant: false
          fuse_act_quant: false
          fuse_attn_quant: false
          fuse_allreduce_rms: false
      generation_config: vllm
    colocated:
      enabled: false
      resources:
        gpus_per_node: 4
        num_nodes: 32
    mcore_generation_config:
      buffer_size_gb: 8
data:
  max_input_seq_length: null
  shuffle: false
  num_workers: 0
  use_multiple_dataloader: false
  train:
    data_path: ${oc.env:NEMO_GYM_SWE_TRAIN_DATA_PATH}
  validation:
    data_path: ${oc.env:NEMO_GYM_SWE_VALIDATION_DATA_PATH}
  default:
    dataset_name: NemoGymDataset
    env_name: nemo_gym
    prompt_file: null
    system_prompt_file: null
    processor: nemo_gym_data_processor
sif_dir: ${oc.env:NEMO_GYM_SWE_SIF_DIR}
env:
  should_use_nemo_gym: true
  should_log_nemo_gym_responses: false
  nemo_gym:
    skip_venv_if_present: true
    rollout_max_attempts_to_avoid_lp_nan: 1
    is_trajectory_collection: false
    config_paths:
    - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
    - responses_api_agents/swe_agents/configs/swebench_openhands_training.yaml
    use_absolute_ip: true
    swe_agents_train:
      responses_api_agents:
        swe_agents:
          # Must match the OpenHands commit baked into the image
          # (docker/Dockerfile.gym_qwen35 AGENT_FRAMEWORK_COMMIT). The gym
          # default (25bacbc6...) does not exist in the baked nv-OpenHands
          # checkout, and run_infer.sh aborts on any commit switch because the
          # runtime copies prompt templates into the checkout (dirty tree).
          agent_framework_commit: 0d766ad06b2be64a42e6f0175b9ebcc4a06599d9
          agent_prompt_overrides:
          - user_prompt_template: responses_api_agents/swe_agents/prompts/openhands/user_prompt.j2
            system_prompt_template: responses_api_agents/swe_agents/prompts/openhands/system_prompt.j2
            agent_cls: CodeActAgent
            diversify_tool_names: false
          agent_max_turns: 30
          swebench_agent_timeout: 600
          swebench_tests_timeout: 300
          concurrency: 128
          base_results_dir: /logs/nemo_gym/swe_agents_train
          dataset_path: ${data.train.data_path}
          # Fallback list: entries are tried in order per instance. Covers both
          # SIF layouts: <sif_dir>/r2egym/<id>.sif (sif_dir is the parent dir)
          # and <sif_dir>/<id>.sif (sif_dir is the r2egym dir itself).
          container_formatter:
          - ${sif_dir}/r2egym/{instance_id}.sif
          - ${sif_dir}/{instance_id}.sif
    swe_agents_val:
      responses_api_agents:
        swe_agents:
          agent_framework_commit: ${env.nemo_gym.swe_agents_train.responses_api_agents.swe_agents.agent_framework_commit}
          agent_max_turns: 30
          swebench_agent_timeout: 600
          swebench_tests_timeout: 180
          concurrency: 128
          base_results_dir: /logs/nemo_gym/swe_agents_val
          dataset_path: ${data.validation.data_path}
          container_formatter: ${env.nemo_gym.swe_agents_train.responses_api_agents.swe_agents.container_formatter}
    policy_model:
      responses_api_models:
        vllm_model:
          uses_reasoning_parser: true
          chat_template_kwargs:
            enable_thinking: false
            truncate_history_thinking: false
          sequential_reasoning_allowed: false
logger:
  log_dir: logs
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: true
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  wandb:
    project: grpo-dev
    name: grpo-qwen35-397b-swe-openhands
  tensorboard: {}
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10
cluster:
  gpus_per_node: 4
  num_nodes: 64
token_ids:
  eos: 248046
  think_open: 248068
  think_close: 248069
penalize_duplicated_reasoning: false
penalize_empty_final_answer: false
penalize_eos_token: false
penalize_malformed_think_tag: false
