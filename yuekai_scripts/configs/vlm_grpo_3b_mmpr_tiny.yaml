# GRPO training for Qwen2.5-VL-3B-Instruct on MMPR-Tiny
# AutoModel backend, single-node 8xGPU
defaults: "../../examples/configs/vlm_grpo_3B.yaml"

grpo:
  num_prompts_per_step: 64
  num_generations_per_prompt: 8
  val_at_start: true
  reward_shaping:
    overlong_buffer_length: 512

checkpointing:
  checkpoint_dir: results/vlm_grpo_3b_mmpr_tiny

policy:
  model_name: Qwen/Qwen2.5-VL-3B-Instruct
  train_global_batch_size: 128
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 20480
  dynamic_batching:
    enabled: false
  sequence_packing:
    enabled: false
  optimizer:
    kwargs:
      lr: 5.0e-07
  dtensor_cfg:
    activation_checkpointing: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  generation:
    max_new_tokens: 4096
    vllm_cfg:
      skip_tokenizer_init: false
      enforce_eager: true
      max_model_len: ${policy.max_total_sequence_length}
      gpu_memory_utilization: 0.4
    vllm_kwargs:
      limit_mm_per_prompt: {"image": 2}
      mm_processor_cache_gb: 0

data:
  train:
    dataset_name: mmpr-tiny
    download_dir: /lustre/fs1/portfolios/coreai/users/aroshanghias/data/mmpr_tiny/processed
    split_validation_size: 0.008
    seed: 42
  default:
    prompt_file: examples/prompts/mmpr_tiny_cot_nemotron_omni.txt
    processor: vlm_hf_data_processor
    env_name: mmpr-tiny

env:
  mmpr-tiny:
    num_workers: 8
    reward_functions:
    - name: verl_geo3k
      weight: 1.0
      kwargs:
        format_score: 0.1

logger:
  tensorboard_enabled: true
  monitor_gpus: false
  wandb_enabled: true
  wandb:
    project: grpo-vlm
    name: qwen25-vl-3b-grpo-mmpr-tiny-64prompts

cluster:
  gpus_per_node: 8
